  'ArrowLeft': 'btnLeft', 'ArrowRight': 'btnRight',
  'ArrowUp': 'btnPlus',   'ArrowDown': 'btnMinus'
};
const heldKeys = new Set();
// Touches clavier pour les 16 steps
// Codes physiques AZERTY : W→KeyZ, Q→KeyA, M→Semicolon, reste identique
const STEP_CODES = ['KeyZ','KeyX','KeyC','KeyV','KeyB','KeyN','KeyA','KeyS','KeyD','KeyF','KeyG','KeyH','KeyJ','KeyK','KeyL','Semicolon'];

function setNumpadLit(code, on) {
  // Allume/éteint visuellement le bouton SVG correspondant
  const map = {
    'Numpad8':'btnUndo','Numpad9':'btnLoop',
    'Numpad5':'btnDelete','Numpad6':'btnMute',
    'Numpad2':'btnCopy','Numpad3':'btnShift'
  };
  const id = map[code];
  if (!id) return;
  const circle = svg(id)?.querySelector('circle');
  if (!circle) return;
  if (on) {
    circle.setAttribute('fill', '#333');
    circle.setAttribute('stroke', '#aaa');
  } else {
    circle.setAttribute('fill', '#222');
    circle.setAttribute('stroke', code === 'Numpad3' && S.shiftHeld ? '#f0a020' : '#333');
  }
}

function setShiftOn(on) {
  S.shiftHeld = on;
  setBtnLit('btnShift', on, '#f0a020');
  if (on) {
    oled('SHIFT', 'Shift...', '');
  } else {
    S._oledLocked = false;
    if (S.mode === 'loop') {
      const clip = activeClipObj();
      const lo = clip.loopStart ?? 0;
      const hi = clip.loopEnd   ?? (clip.numBars - 1);
      const len = hi - lo + 1;
      oled('LOOP MODE', trackInfo(), `${len} bar${len>1?'s':''} (${lo+1}→${hi+1})`);
    } else {
      oled(S.playing ? '▶ PLAYING' : '■ STOPPED', `${S.bpm} BPM`, trackInfo());
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.repeat) return; // ignorer l'auto-repeat
  const key = e.key.toLowerCase();

  // Shift physique
  if (e.key === 'Shift') {
    setShiftOn(true);
    status('SHIFT — M+track:mute · Shift+M+track:solo · Del:clear · D:double');
    return;
  }

  // Pavé numérique — momentané (keydown = press, keyup = release)
  // Numpad8 = Undo (position R1 col0)
  if (e.code === 'Numpad8') {
    heldKeys.add('Numpad8'); setNumpadLit('Numpad8', true);
    return;
  }
  // Numpad9 = Loop (position R1 col1) : court = toggle loop mode, long = hold pour combos
  if (e.code === 'Numpad9') {
    heldKeys.add('Numpad9'); setNumpadLit('Numpad9', true);
    S._numpad9PressTime = Date.now();
    S._numpad9LongFired = false;
    S._numpad9Timer = setTimeout(() => {
      S._numpad9LongFired = true;
      setLoopHeld(true);
    }, LOOP_LONG_MS);
    return;
  }
  // Numpad5 = Delete (position R2 col0)
  if (e.code === 'Numpad5') {
    heldKeys.add('Numpad5'); setNumpadLit('Numpad5', true);
    S._deleteHeld = true; setDeleteLit(true);
    oled('DELETE', 'Delete...', '');
    return;
  }
  // Numpad6 = Mute (position R2 col1)
  if (e.code === 'Numpad6') {
    heldKeys.add('Numpad6'); setNumpadLit('Numpad6', true);
    return;
  }
  // Numpad2 = Copy (position R3 col0)
  if (e.code === 'Numpad2') {
    heldKeys.add('Numpad2'); setNumpadLit('Numpad2', true);
    S._copyHeld = true; S._copySource = null; setCopyLit(true);
    oled('COPY', 'Copy...', '');
    return;
  }
  // Numpad3 = Shift (position R3 col1)
  if (e.code === 'Numpad3') {
    heldKeys.add('Numpad3');
    setNumpadLit('Numpad3', true);
    setShiftOn(true);
    return;
  }

  // NumpadDivide (/) → bouton Sets — toggle project mode
  if (e.code === 'NumpadDivide') {
    e.preventDefault();
    setBtnLit('btnSession', true);
    setTimeout(() => setBtnLit('btnSession', false), 150);
    if (projectModeActive) exitProjectMode();
    else enterProjectMode();
    return;
  }

  // ── Shift combos ──
  if (S.shiftHeld) {
    if (key === 'delete' || key === 'backspace') { /* clearBar supprimé - trop dangereux */ return; }
    if (e.code === 'KeyD') { doublePattern(); return; }
    if (e.code === 'KeyC') { copyTrack(S.currentTrack, (S.currentTrack+1)%4); return; }
    if (key === '+' || key === '=') { setBpm(S.bpm + 10); return; }
    if (key === '-') { setBpm(S.bpm - 10); return; }
  }

  // ── Transport ──
  if (key === ' ') { e.preventDefault(); togglePlay(); return; }
  if (e.code === 'KeyR') {
    toggleRec();
    return;
  }

  // Track select : & é " ' (= touches 1 2 3 4 sur clavier AZERTY sans shift)
  // Double-press rapide (< 300ms) → changer de page comme le double-tap souris
  const _trkKeyMap = { '&':0, '1':0, 'é':1, '2':1, '"':2, '3':2, "'":3, '4':3 };
  if (key in _trkKeyMap) {
    const slot = _trkKeyMap[key];
    _trkTapCount[`k${slot}`] = (_trkTapCount[`k${slot}`] || 0) + 1;
    clearTimeout(_trkTapTimer[`k${slot}`]);
    _trkTapTimer[`k${slot}`] = setTimeout(() => {
      const count = _trkTapCount[`k${slot}`] || 0;
      _trkTapCount[`k${slot}`] = 0;
      if (count >= 2) {
        const newPage = S.page === 0 ? 1 : 0;
        switchPage(newPage, newPage * 4 + slot);
      } else {
        S._heldTrack = slot;
        handleTrackButtonClick(slot);
        S._heldTrack = -1;
      }
    }, 300);
    return;
  }

  // ↑ / ↓ = même fonctions que + / - (octave, transpose, BPM selon contexte)
  if (key === 'arrowup') {
    e.preventDefault();
    heldKeys.add('ArrowUp');
    setDirBtnLit('btnPlus', true);
    if (S.mode === 'loop' && S._loopBarHeld >= 0) loopBarTranspose(12);
    else if (S._loopHeld)                         duplicatePattern();
    else if (anyStepHeld())                       transposeHeldSteps(1);
    else                                          navBar(1);
    return;
  }
  if (key === 'arrowdown') {
    e.preventDefault();
    heldKeys.add('ArrowDown');
    setDirBtnLit('btnMinus', true);
    if (S.mode === 'loop' && S._loopBarHeld >= 0) loopBarTranspose(-12);
    else if (S._loopHeld)                         halvePattern();
    else if (anyStepHeld())                       transposeHeldSteps(-1);
    else                                          navBar(-1);
    return;
  }
  if (key === 'arrowleft')  {
    e.preventDefault();
    setDirBtnLit('btnLeft', true);
    if (S._loopHeld)         compressPattern();
    else if (anyStepHeld())  nudgeHeldSteps(-1);
    else if (S.shiftHeld)    removeBar();
    else                     moveStepCursor(-1);
    return;
  }
  if (key === 'arrowright') {
    e.preventDefault();
    setDirBtnLit('btnRight', true);
    if (S._loopHeld)         stretchPattern();
    else if (anyStepHeld())  nudgeHeldSteps(1);
    else if (S.shiftHeld)    addBar();
    else                     moveStepCursor(1);
    return;
  }
  // + / - : loop = dup/halve, seul = BPM (transposition via Shift+↑/↓)
  if (key === '+' || key === '=') {
    if (S._loopHeld)  duplicatePattern();
    else              setBpm(S.bpm + 1);
    return;
  }
  if (key === '-') {
    if (S._loopHeld)  halvePattern();
    else              setBpm(S.bpm - 1);
    return;
  }

  // Steps clavier : W X C V B N Q S D F G H J K L M → steps 0-15
  const stepIdx = STEP_CODES.indexOf(e.code);
  if (stepIdx >= 0) {
    ensureAudio();
    // Shift + step 0 (W) = toggle project mode
    if (S.shiftHeld && stepIdx === 0) {
      if (projectModeActive) exitProjectMode();
      else enterProjectMode();
      return;
    }
    if (projectModeActive) {
      // En project mode, les steps = pages
      projectPage = stepIdx;
      renderProjectMode();
      oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'clic=load · vide=save');
      return;
    }
    if (S.mode === 'loop') {
      pressLoopStep(stepIdx);
    } else if (!heldSteps.has(stepIdx)) {
      pressStep(stepIdx);
      if (heldSteps.has(stepIdx)) heldSteps.get(stepIdx).fromKeyboard = true;
    }
    return;
  }

  // Mode session/note : Tab (comme Ableton Live)
  if (e.code === 'Tab' && !S.shiftHeld && !heldKeys.has('Tab')) {
    e.preventDefault(); // empêcher le navigateur de changer de focus
    heldKeys.add('Tab');
    modePressTime = Date.now();
    setModeButtonLit(true);
    if (S.mode === 'loop') {
      S.mode = 'note';
      S._loopBarHeld = -1; S._loopBar2 = -1;
      setBtnLit('btnLoop', false, '#3ddc84');
    }
    const otherMode = S.mode === 'note' ? 'session' : 'note';
    enterMode(otherMode);
    return;
  }
});

document.addEventListener('keyup', e => {
  // Relâchement touches track → reset _heldTrack
  const keyLow = e.key.toLowerCase();
  if (['&','1','é','2','"','3',"'",'4'].includes(e.key)) S._heldTrack = -1;

  // Relâchement Tab → mode switch
  if (e.code === 'Tab' && heldKeys.has('Tab')) {
    e.preventDefault();
    heldKeys.delete('Tab');
    setModeButtonLit(false);
    const held = Date.now() - modePressTime;
    if (held >= MODE_LONG_PRESS) {
      const back = S.mode === 'session' ? 'note' : 'session';
      enterMode(back);
    }
    return;
  }

  // Éteindre les boutons directionnels au relâchement
  if (ARROW_TO_BTN[e.key]) {
    heldKeys.delete(e.key); // retirer ArrowUp/ArrowDown de heldKeys
    setDirBtnLit(ARROW_TO_BTN[e.key], false);
  }

  if (e.key === 'Shift') {
    // Ne relâche le shift que si Numpad3 n'est pas tenu
    if (!heldKeys.has('Numpad3')) setShiftOn(false);
    status('Ready');
    return;
  }

  // Relâchement pavé numérique — déclenche l'action au keyup (momentané)
  // Numpad8 = Undo
  if (e.code === 'Numpad8') {
    heldKeys.delete('Numpad8'); setNumpadLit('Numpad8', false);
    if (S.shiftHeld) doRedo(); else doUndo();
    return;
  }
  // Numpad9 = Loop : court = toggle, long = combo hold
  if (e.code === 'Numpad9') {
    heldKeys.delete('Numpad9'); setNumpadLit('Numpad9', false);
    if (S._numpad9Timer) { clearTimeout(S._numpad9Timer); S._numpad9Timer = null; }
    if (!S._numpad9LongFired) {
      toggleLoopMode();
    } else {
      setLoopHeld(false);
    }
    S._numpad9LongFired = false;
    return;
  }
  // Numpad5 = Delete
  if (e.code === 'Numpad5') {
    heldKeys.delete('Numpad5'); setNumpadLit('Numpad5', false);
    S._deleteHeld = false; setDeleteLit(false);
    return;
  }
  // Numpad6 = Mute — pas d'action solo, combo avec track button
  if (e.code === 'Numpad6') {
    heldKeys.delete('Numpad6'); setNumpadLit('Numpad6', false);
    return;
  }
  // Numpad2 = Copy
  if (e.code === 'Numpad2') {
    heldKeys.delete('Numpad2'); setNumpadLit('Numpad2', false);
    S._copyHeld = false; S._copySource = null; setCopyLit(false);
    return;
  }
  // Numpad3 = Shift
  if (e.code === 'Numpad3') {
    heldKeys.delete('Numpad3'); setNumpadLit('Numpad3', false);
    if (!e.shiftKey) setShiftOn(false);
    return;
  }

  // Relâchement touches steps clavier
  const stepIdx = STEP_CODES.indexOf(e.code);
  if (stepIdx >= 0) {
    if (S.mode === 'loop') {
      releaseLoopStep(stepIdx);
    } else if (heldSteps.has(stepIdx) && heldSteps.get(stepIdx).fromKeyboard) {
      releaseStep(stepIdx);
    }
    return;
  }
});

// ── État bouton M ──
S._mHeld = false;

// ═══════════════════════════════════════════════════════════════
// MENU ROUTING PAR TRACK (Shift + bouton track)
// ═══════════════════════════════════════════════════════════════
var routingMenuMode  = false;
var routingMenuTi    = -1;
// steps : 'mode' | 'sf2_load' | 'sf2_preset' | 'port' | 'channel'
var routingMenuStep  = 'mode';
var routingMenuSel   = 0;
var routingMenuPresetIdx = 0; // index dans trackSF2[ti].presets

function routingItems() {
  if (routingMenuStep === 'mode') return ['SF2 (FluidSynth)', 'MIDI Out'];
  if (routingMenuStep === 'sf2_preset') {
    const presets = trackSF2[routingMenuTi].presets;
    return presets.length ? presets.map(p => p.name) : ['(aucun preset)'];
  }
  if (routingMenuStep === 'port') {
    if (!midiState.access) return ['(aucun port)'];
    return [...midiState.access.outputs.values()].map(o => o.name);
  }
  if (routingMenuStep === 'channel') {
    return Array.from({length:16}, (_,i) => `Canal ${i+1}`);
  }
  return [];
}

function openRoutingMenu(ti) {
  routingMenuMode = true;
  routingMenuTi   = ti;
  routingMenuStep = 'mode';
  const t = S.tracks[ti];
  routingMenuSel  = t.outputMode === 'sf2' ? 0 : 1;
  S._oledLocked   = true;
  // Init sf2 au besoin
  if (!sf2Ready && !sf2Initializing) initSF2();
  renderRoutingMenu();
}

function renderRoutingMenu() {
  if (!routingMenuMode) return;
  const ti = routingMenuTi;
  const ts = trackSF2[ti];

  if (routingMenuStep === 'sf2_load') {
    const sfName = ts.sfontId >= 0 ? ts.sfName.replace('.sf2','').slice(0,14) : 'aucune';
    oledForce(`T${ti+1} · SF2`, sfName, 'molette=charger · clic=preset');
    renderTrackButtons();
    return;
  }

  if (routingMenuStep === 'sf2_preset') {
    const presets = ts.presets;
    if (!presets.length) {
      oledForce(`T${ti+1} · PRESET`, '(charge une SF2)', 'molette=charger');
      renderTrackButtons();
      return;
    }
    const idx = Math.max(0, Math.min(routingMenuPresetIdx, presets.length - 1));
    const p = presets[idx];
    oledForce(`T${ti+1} · PRESET`, p.name.slice(0,14), `${idx+1}/${presets.length} · clic=ok`);
    renderTrackButtons();
    return;
  }

  const items = routingItems();
  const item  = items[routingMenuSel] || '—';
  const total = items.length;
  const stepLabel = routingMenuStep === 'mode' ? 'MODE' :
                    routingMenuStep === 'port'  ? 'PORT' : 'CANAL';
  oledForce(`T${ti+1} · ${stepLabel}`, item, `${routingMenuSel+1}/${total} · clic=ok`);
  renderTrackButtons();
}

function confirmRoutingMenu() {
  if (!routingMenuMode) return;
  const t  = S.tracks[routingMenuTi];
  const ti = routingMenuTi;

  if (routingMenuStep === 'mode') {
    if (routingMenuSel === 0) {
      // SF2 → aller à l'étape chargement/preset
      t.outputMode = 'sf2';
      t.midiOutputId = null;
      routingMenuStep = 'sf2_load';
      renderRoutingMenu();
    } else {
      routingMenuStep = 'port';
      const ports = midiState.access ? [...midiState.access.outputs.values()] : [];
      const curIdx = t.midiOutputId ? ports.findIndex(o => o.id === t.midiOutputId) : 0;
      routingMenuSel = Math.max(0, curIdx);
      renderRoutingMenu();
    }

  } else if (routingMenuStep === 'sf2_load') {
    // Clic = ouvrir sélecteur de fichier SF2
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.sf2';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      oledForce(`T${ti+1} · SF2`, `Chargement…`, file.name.slice(0,14));
      try {
        const buf = await file.arrayBuffer();
        await sf2LoadBank(ti, buf, file.name);
        routingMenuPresetIdx = 0;
        routingMenuStep = 'sf2_preset';
        renderRoutingMenu();
      } catch(err) {
        oledForce(`T${ti+1} · SF2`, 'Erreur !', err.message.slice(0,14));
        setTimeout(() => { S._oledLocked = false; routingMenuMode = false; }, 2000);
      }
    };
    input.click();

  } else if (routingMenuStep === 'sf2_preset') {
    // Confirmer le preset sélectionné
    const ts = trackSF2[ti];
    const idx = Math.max(0, Math.min(routingMenuPresetIdx, ts.presets.length - 1));
    sf2SelectPreset(ti, idx);
    closeRoutingMenu();
    oledForce(`T${ti+1}`, sf2GetTrackName(ti), ts.sfName.replace('.sf2','').slice(0,12));
    setTimeout(() => { S._oledLocked = false; }, 1500);
    renderTrackButtons();

  } else if (routingMenuStep === 'port') {
    const ports = midiState.access ? [...midiState.access.outputs.values()] : [];
    const chosen = ports[routingMenuSel];
    if (chosen) {
      t.midiOutputId = chosen.id;
      midiState.selectedOutput = chosen;
    }
    routingMenuStep = 'channel';
    routingMenuSel  = t.midiChannel - 1;
    renderRoutingMenu();

  } else if (routingMenuStep === 'channel') {
    t.outputMode  = 'midi';
    t.midiChannel = routingMenuSel + 1;
    const portName = midiState.access?.outputs.get(t.midiOutputId)?.name || 'MIDI';
    closeRoutingMenu();
    oledForce(`T${ti+1}`, `${portName.slice(0,12)}`, `Ch ${t.midiChannel}`);
    setTimeout(() => { S._oledLocked = false; }, 2000);
    renderTrackButtons();
  }
}

// Navigation dans le menu routing par la molette encodeur
function routingMenuScroll(delta) {
  if (!routingMenuMode) return false;
  const ti = routingMenuTi;

  if (routingMenuStep === 'sf2_preset') {
    const presets = trackSF2[ti].presets;
    if (!presets.length) return true;
    routingMenuPresetIdx = Math.max(0, Math.min(presets.length - 1, routingMenuPresetIdx + delta));
    sf2SelectPreset(ti, routingMenuPresetIdx);
    renderRoutingMenu();
    return true;
  }

  const items = routingItems();
  routingMenuSel = Math.max(0, Math.min(items.length - 1, routingMenuSel + delta));
  renderRoutingMenu();
  return true;
}

function closeRoutingMenu(cancel = false) {
  routingMenuMode = false;
  routingMenuStep = 'mode';
  S._oledLocked   = false;
  renderTrackButtons();
  if (!cancel) return;
  if (S.mode === 'loop') {
    const clip = activeClipObj();
    const lo = clip.loopStart ?? 0, hi = clip.loopEnd ?? (clip.numBars-1);
    oled('LOOP MODE', trackInfo(), `${hi-lo+1} bars (${lo+1}→${hi+1})`);
  } else {
    oled(S.playing ? '▶ PLAYING' : '■ STOPPED', `${S.bpm} BPM`, trackInfo());
  }
}

// ── Changer de page (0↔1) ──────────────────────────────────────
function switchPage(newPage, targetTrack) {
  S.page = newPage;
  const ti = targetTrack !== undefined ? targetTrack : newPage * 4;
  selectTrack(ti);
  oledForce(`PAGE ${newPage + 1}`, `TRACK ${ti + 1}`, newPage === 1 ? 'T5·T6·T7·MST' : 'T1·T2·T3·T4');
}

function handleTrackButtonClick(slot) {
  if (projectModeActive) return; // ignoré en mode project
  const ti = S.page * 4 + slot;

  if (routingMenuMode) {
    routingMenuTi  = ti;
    routingMenuSel = S.tracks[ti].outputMode === 'sf2' ? 0 : 1;
    renderRoutingMenu();
    return;
  }
  // Shift + Mute + Track = SOLO (priorité avant Shift seul)
  if (S.shiftHeld && (heldKeys.has('Numpad6') || S._mHeld)) {
    soloTrack(ti);
    return;
  }
  // Shift + Track seul : libre (routing menu supprimé)
  if (S.shiftHeld) {
    return;
  }
  if (heldKeys.has('Numpad6') || S._mHeld) {
    muteTrack(ti);
    return;
  }

  selectTrack(ti);
}

// ── Double-tap/press sur bouton track → changer de page ────────
// La track cliquée devient active dans la nouvelle page
S._heldTrack = -1;
const _trkTapTimer  = {};
const _trkTapCount  = {};

for (let slot = 0; slot < 4; slot++) {
  svg(`trkBtn${slot}`).addEventListener('mousedown', () => { S._heldTrack = slot; });
  svg(`trkBtn${slot}`).addEventListener('mouseup',   () => { S._heldTrack = -1; });
  svg(`trkBtn${slot}`).addEventListener('mouseleave',() => { S._heldTrack = -1; });
  svg(`trkBtn${slot}`).addEventListener('click', () => {
    if (projectModeActive) return; // ignoré en mode project
    _trkTapCount[slot] = (_trkTapCount[slot] || 0) + 1;
    clearTimeout(_trkTapTimer[slot]);
    _trkTapTimer[slot] = setTimeout(() => {
      const count = _trkTapCount[slot] || 0;
      _trkTapCount[slot] = 0;
      if (count >= 2) {
        // Double-tap → aller dans l'autre page, track = slot correspondant dans la nouvelle page
        const newPage = S.page === 0 ? 1 : 0;
        const targetTrack = newPage * 4 + slot; // même slot, autre page
        switchPage(newPage, targetTrack);
      } else {
        handleTrackButtonClick(slot);
      }
    }, 300);
  });
}

// ── Double-press touches clavier assignées aux boutons track ────
// (géré directement dans le keydown handler via _trkTapCount/Timer)

// ═══════════════════════════════════════════════════════════════
// STEP HOLD STATE — gère les 6 features simultanément
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
// MULTI-STEP HOLD STATE
// heldSteps = Map<stepIndex, {timer, noteLenTimer, isLong, didAction, fromKeyboard}>
// ═══════════════════════════════════════════════════════════════
const heldSteps = new Map();

function anyStepHeld()  { return heldSteps.size > 0; }
function heldStepList() { return [...heldSteps.keys()]; }

function getStepNotes(stepIdx) {
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return [];
  const bar = currentStepBar();
  const st = bar[stepIdx];
  return st.on ? [st.note, ...(st.extraNotes || [])] : [];
}

// Toutes les notes de TOUS les steps tenus (union)
function getAllHeldNotes() {
  const notes = [];
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return notes;
  const bar = currentStepBar();
  for (const idx of heldSteps.keys()) {
    const st = bar[idx];
    if (!st || !st.on) continue;
    if (!notes.includes(st.note)) notes.push(st.note);
    (st.extraNotes || []).forEach(n => { if (!notes.includes(n)) notes.push(n); });
  }
  return notes;
}

function illuminateStepNotes() { illuminateHeldStepNotes(); }

function illuminateHeldStepNotes() {
  const notes = getAllHeldNotes();
  const col = trackColor(S.currentTrack);
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const n = padNote(r, c);
      if (n < 0) continue;
      if (notes.includes(n)) {
        const el = padEl(r, c);
        el.setAttribute('fill', col + 'ff');
        el.setAttribute('stroke', '#fff');
        el.setAttribute('stroke-width', '2');
      }
    }
  }
  // Sync piano automatiquement
  if (S.pianoOpen) {
    illuminatePianoNotes();
    updatePianoOctaveIndicators();
  }
}

function clearStepNoteIllumination() {
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 8; c++) renderPadAppearance(r, c);
  // Reset piano aussi
  if (S.pianoOpen) {
    document.querySelectorAll('[id^="pk_"]').forEach(el => {
      const h = parseFloat(el.getAttribute('height'));
      const isBlack = h < PK_WH * 0.8;
      el.setAttribute('fill', isBlack ? '#1a1a1a' : '#d0d0d0');
      el.setAttribute('stroke', isBlack ? '#000' : '#888');
    });
  }
}

function showNoteLengthFeedback(stepIdx, isDragging, explicitLen) {
  const t = S.tracks[S.currentTrack];
  const barIdx = wheelDrag ? wheelDrag.startBar : S.currentBar;
  let st = null;
  if (t.mode === 'drum') {
    const db = activeClip().drumBars[S.selectedDrumPad];
    st = db ? db[barIdx]?.[stepIdx] : null;
  } else {
    const bar = activeClip().bars[barIdx];
    st = bar ? bar[stepIdx] : null;
  }
  const len = explicitLen !== undefined ? explicitLen : (st ? st.len || 1 : 1);
  const col = trackColor(S.currentTrack);
  const stepsInThisBar = Math.min(15 - stepIdx, len - 1);
  for (let i = 0; i < 16; i++) {
    if (i === stepIdx) {
      svg('step' + i).setAttribute('fill', col + '88');
      svg('step' + i).setAttribute('stroke', '#fff');
      svg('step' + i).setAttribute('stroke-width', '2');
      svg('sled' + i).setAttribute('fill', '#fff');
    } else if (i > stepIdx && i <= stepIdx + stepsInThisBar) {
      svg('step' + i).setAttribute('fill', col + '33');
      svg('step' + i).setAttribute('stroke', col + '88');
      svg('step' + i).setAttribute('stroke-width', '1');
      svg('sled' + i).setAttribute('fill', col + '88');
    } else {
      const curBar = t.mode === 'drum'
        ? activeClip().drumBars[S.selectedDrumPad]?.[S.currentBar]
        : activeClip().bars[S.currentBar];
      if (curBar) setStepAppearance(i, curBar[i]?.on || false, false);
    }
  }
  if (!isDragging) {
    const h = heldSteps.get(stepIdx);
    if (h) {
      clearTimeout(h.noteLenTimer);
      h.noteLenTimer = setTimeout(() => {
        renderSteps();
        illuminateHeldStepNotes();
      }, 1000);
    }
  }
}

// Transpose TOUTES les notes de TOUT le pattern (tous les bars, tous les steps)
// Registre : S.octave - DEFAULT_OCTAVE → -4 à +3
function transposeHeldSteps(octaveDelta) {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return;
  if (t.mode === 'master') {
    // Sur master : +/- ajuste le BPM des steps tenus par ±10
    const bar = currentStepBar();
    const delta = octaveDelta * 10;
    for (const idx of heldSteps.keys()) {
      const st = bar[idx];
      if (!st || !st.on) continue;
      st.note = Math.max(20, Math.min(300, st.note + delta));
      heldSteps.get(idx).didAction = true;
    }
    renderSteps();
    const firstIdx = [...heldSteps.keys()][0];
    const bpm = bar[firstIdx]?.note || S.bpm;
    oledForce('BPM EDIT', `${Math.round(bpm)} BPM`, `${delta > 0 ? '+' : ''}${delta}`);
    return;
  }
  const bar = currentStepBar();
  const newOctave = Math.max(MIN_OCTAVE, Math.min(MAX_OCTAVE, S.octave + octaveDelta));
  if (newOctave === S.octave && octaveDelta !== 0) {
    oledForce('TRANSPOSE', 'limite atteinte', '');
    return;
  }
  const semis = octaveDelta * 12;
  for (const idx of heldSteps.keys()) {
    const st = bar[idx];
    if (!st || !st.on) continue;
    st.note = Math.max(0, Math.min(127, st.note + semis));
    if (st.extraNotes) st.extraNotes = st.extraNotes.map(n => Math.max(0, Math.min(127, n + semis)));
    heldSteps.get(idx).didAction = true;
  }
  S.octave = newOctave;
  renderPads();
  renderSteps();
  illuminateHeldStepNotes();
  // Afficher le delta cumulatif depuis le début du hold
  if (!transposeHeldSteps._cumul) transposeHeldSteps._cumul = 0;
  transposeHeldSteps._cumul += octaveDelta;
  const sign = transposeHeldSteps._cumul > 0 ? '+' : '';
  const count = heldSteps.size;
  oledForce('TRANSPOSE', `${sign}${transposeHeldSteps._cumul} oct`, count + ' step' + (count > 1 ? 's' : ''));
}

// Décale les steps tenus d'une position (nudge)
// État du step "flottant" en cours de nudge
var _nudgeFloating = null; // { data, lastValidPos, originalPos }

function nudgeHeldSteps(delta) {
  const bar = currentStepBar();
  const indices = heldStepList().sort((a, b) => delta > 0 ? b - a : a - b);
  
  // Vérifier bornes
  for (const idx of indices) {
    const newIdx = idx + delta;
    if (newIdx < 0 || newIdx > 15) return;
  }
  
  // Premier nudge → soulever le step (sauvegarder + vider l'origine)
  if (!_nudgeFloating) {
    if (indices.length !== 1) return; // pour l'instant, un seul step à la fois
    const idx = indices[0];
    const data = Object.assign({}, bar[idx]);
    if (data.extraNotes) data.extraNotes = [...data.extraNotes];
    _nudgeFloating = { data, lastValidPos: idx, originalPos: idx };
    // Vider la position d'origine
    bar[idx] = { on: false, note: 60, vel: 0.8 };
    saveUndo();
  }
  
  const newPos = indices[0] + delta;
  const movingSet = new Set(indices);
  
  // Vérifier si la destination est occupée par un step non-déplacé
  const destOccupied = bar[newPos] && bar[newPos].on && !movingSet.has(newPos);
  
  if (destOccupied) {
    // Step occupé → survoler : le curseur et heldSteps avancent mais on ne pose pas
    // D'abord retirer le step de sa position actuelle (si il était posé)
    const curPos = indices[0];
    if (bar[curPos] && bar[curPos].on && curPos === _nudgeFloating.lastValidPos) {
      // Il était posé ici → le retirer
      bar[curPos] = { on: false, note: 60, vel: 0.8 };
    }
  } else {
    // Destination libre → poser le step ici
    // D'abord retirer de l'ancienne position
    const curPos = indices[0];
    if (curPos === _nudgeFloating.lastValidPos && bar[curPos] && bar[curPos].on) {
      bar[curPos] = { on: false, note: 60, vel: 0.8 };
    }
    // Poser à la nouvelle position
    bar[newPos] = Object.assign({}, _nudgeFloating.data);
    if (_nudgeFloating.data.extraNotes) bar[newPos].extraNotes = [..._nudgeFloating.data.extraNotes];
    _nudgeFloating.lastValidPos = newPos;
  }
  
  // Mettre à jour heldSteps avec la nouvelle position
  const newHeld = new Map();
  for (const [idx, obj] of heldSteps) {
    obj.didAction = true;
    newHeld.set(idx + delta, obj);
  }
  heldSteps.clear();
  for (const [k, v] of newHeld) heldSteps.set(k, v);
  
  // Curseur suit toujours
  stepCursorPos = ((stepCursorPos + delta) % 16 + 16) % 16;
  updateStepCursor();
  renderSteps();
  
  // Compteur cumulé
  if (!nudgeHeldSteps._cumul) nudgeHeldSteps._cumul = 0;
  nudgeHeldSteps._cumul += delta;
  const c = nudgeHeldSteps._cumul;
  const sign = c > 0 ? '+' : '';
  const arrow = delta > 0 ? '→' : '←';
  if (destOccupied) {
    oled('NUDGE', `${arrow} survol`, `Step ${newPos+1} occupé`);
  } else {
    oled('NUDGE', `${arrow} ${sign}${c} step${Math.abs(c)>1?'s':''}`, `Bar ${S.currentBar+1}`);
  }
}

// Appelé quand le step est relâché — finaliser le nudge
function finalizeNudge() {
  if (!_nudgeFloating) return;
  const bar = currentStepBar();
  const pos = heldStepList()[0];
  
  if (pos !== undefined) {
    if (bar[pos] && bar[pos].on) {
      // Position occupée au release → revenir à la dernière position valide
      const lastValid = _nudgeFloating.lastValidPos;
      if (!bar[lastValid] || !bar[lastValid].on) {
        bar[lastValid] = Object.assign({}, _nudgeFloating.data);
        if (_nudgeFloating.data.extraNotes) bar[lastValid].extraNotes = [..._nudgeFloating.data.extraNotes];
      }
      // Mettre le curseur sur la dernière position valide
      stepCursorPos = lastValid;
      updateStepCursor();
    } else if (!bar[pos] || !bar[pos].on) {
      // Position vide au release → poser ici (normalement déjà fait)
      bar[pos] = Object.assign({}, _nudgeFloating.data);
      if (_nudgeFloating.data.extraNotes) bar[pos].extraNotes = [..._nudgeFloating.data.extraNotes];
      _nudgeFloating.lastValidPos = pos;
    }
  }
  
  _nudgeFloating = null;
  renderSteps();
}

// Press/release unifiés
function pressStep(idx) {
  if (heldSteps.has(idx)) return;
  const obj = { timer: null, noteLenTimer: null, isLong: false, didAction: false, fromKeyboard: false };
  const bar = currentStepBar();
  setStepAppearance(idx, bar[idx].on, false);
  obj.timer = setTimeout(() => {
    if (!heldSteps.has(idx)) return;
    heldSteps.get(idx).isLong = true;
    illuminateHeldStepNotes();
    if (S.pianoOpen) illuminatePianoNotes();
    const count = heldSteps.size;
    if (S.tracks[S.currentTrack].mode === 'master') {
      const bpmVal = bar[idx].on ? bar[idx].note : S.bpm;
      oled(count + ' STEP' + (count > 1 ? 'S' : ''), `${Math.round(bpmVal)} BPM`, 'wheel=BPM  </>=nudge');
    } else {
      oled(count + ' STEP' + (count > 1 ? 'S' : '') + ' TENUS', 'VOL=velo wheel=duree', '+/-=oct  </>=nudge');
    }
  }, 250);
  heldSteps.set(idx, obj);
  renderSteps();
  if (typeof updateEncArcs === 'function') updateEncArcs();
}

function releaseStep(idx) {
  // Finaliser le nudge flottant si en cours
  if (_nudgeFloating) finalizeNudge();
  
  const obj = heldSteps.get(idx);
  if (!obj) return;
  clearTimeout(obj.timer);
  clearTimeout(obj.noteLenTimer);
  const wasLong   = obj.isLong;
  const didAction = obj.didAction;
  heldSteps.delete(idx);
  if (heldSteps.size === 0) {
    clearStepNoteIllumination();
    if (S.pianoOpen) illuminatePianoNotes();
    renderSteps();
    undoStack.lastSaveTime = null;
    transposeHeldSteps._cumul = 0;
    nudgeHeldSteps._cumul = 0;
    _nudgeFloating = null;
  } else {
    illuminateHeldStepNotes();
  }
  if (typeof updateEncArcs === 'function') updateEncArcs();
  if (!wasLong && !didAction) toggleStep(idx);
}

// ── Touch → Mouse polyfill global (Android/tactile) ──────────────
// Convertit touchstart/touchend/touchmove en mousedown/mouseup/mousemove
// pour que TOUS les listeners mousedown/mouseup/click fonctionnent au toucher.
// Les éléments avec leurs propres touchstart (piano keys) font preventDefault
// donc ce polyfill ne les affecte pas en doublon.
(function() {
  const svgEl = document.getElementById('moveSVG');
  const touchTargets = {};  // identifier → { target, startX, startY }
  window._touchTargets = touchTargets; // exposé pour les handlers custom (encodeurs)
  function makeMouse(type, touch) {
    return new MouseEvent(type, {
      bubbles: true, cancelable: true,
      clientX: touch.clientX, clientY: touch.clientY,
      screenX: touch.screenX, screenY: touch.screenY,
      button: 0, buttons: type === 'mouseup' ? 0 : 1
    });
  }
  svgEl.addEventListener('touchstart', function(e) {
    if (e.defaultPrevented) return;
    for (const t of e.changedTouches) {
      touchTargets[t.identifier] = { target: t.target, startX: t.clientX, startY: t.clientY };
      t.target.dispatchEvent(makeMouse('mousedown', t));
    }
    e.preventDefault();
  }, { passive: false });
  svgEl.addEventListener('touchend', function(e) {
    if (e.defaultPrevented) return;
    for (const t of e.changedTouches) {
      const info = touchTargets[t.identifier];
      const origTarget = info ? info.target : t.target;
      origTarget.dispatchEvent(makeMouse('mouseup', t));
      document.dispatchEvent(makeMouse('mouseup', t));
      // Dispatch click si le doigt n'a pas trop bougé (< 15px)
      if (info) {
        const dx = t.clientX - info.startX, dy = t.clientY - info.startY;
        if (dx * dx + dy * dy < 225) {
          origTarget.dispatchEvent(new MouseEvent('click', {
            bubbles: true, cancelable: true,
            clientX: t.clientX, clientY: t.clientY,
            button: 0
          }));
        }
        delete touchTargets[t.identifier];
      }
    }
    e.preventDefault();
  }, { passive: false });
  svgEl.addEventListener('touchmove', function(e) {
    for (const t of e.changedTouches) {
      const info = touchTargets[t.identifier];
      const origTarget = info ? info.target : t.target;
      origTarget.dispatchEvent(makeMouse('mousemove', t));
      document.dispatchEvent(makeMouse('mousemove', t));
    }
    e.preventDefault();
  }, { passive: false });
})();


// Pad clicks — session mode + step+note mode
for (let r = 0; r < 4; r++) {
  for (let c = 0; c < 8; c++) {
    (function(row, col) {
      padEl(row, col).addEventListener('mousedown', e => {
        ensureAudio();

        // ── PROJECT MODE ──
        if (projectModeActive) {
          projectPadClick(row, col);
          return;
        }

        // ── MODE SESSION ──
        if (S.mode === 'session') {
          const sessionTi = S.page * 4 + row;
          // Shift + clic sur clip master → éditer les répétitions de colonne
          if (S.shiftHeld && S.tracks[sessionTi].mode === 'master') {
            openColumnRepeatEditor(col);
            return;
          }
          if (S._deleteHeld) {
            sessionDeleteClip(sessionTi, col);
          } else if (S._copyHeld) {
            sessionCopyClip(sessionTi, col);
          } else {
            sessionSelectClip(sessionTi, col);
          }
          return;
        }

        // ── MODE LOOP + bar tenue : éditer les notes de cette bar ──
        if (S.mode === 'loop' && S._loopBarHeld >= 0) {
          const t = S.tracks[S.currentTrack];
          if (t.mode === 'drum') {
            if ((row === 2 || row === 3) && col < 4) {
              const drumPadIdx = (row - 2) * 4 + col;
              saveUndo();
              const clip = activeClipObj();
              const barSteps = clip.drumBars[drumPadIdx][S._loopBarHeld];
              const hasAny = barSteps.some(st => st.on);
              if (hasAny) {
                barSteps.forEach(st => { st.on = false; });
                oledForce('BAR ' + (S._loopBarHeld+1), `Pad ${drumPadIdx+1} effacé`, getDrumPadName(S.currentTrack, drumPadIdx));
              } else {
                barSteps[0] = { on: true, vel: 0.787 };
                oledForce('BAR ' + (S._loopBarHeld+1), `Pad ${drumPadIdx+1} ajouté`, getDrumPadName(S.currentTrack, drumPadIdx));
              }
              triggerDrumPad(drumPadIdx, 0.7);
              illuminateLoopBarNotes(S._loopBarHeld);
            }
          } else {
            // Mélodique : toggle la note dans la bar tenue (step 0 si bar vide, sinon sur tous les steps actifs)
            const note = padNote(row, col);
            if (note < 0) return;
            saveUndo();
            const clip = activeClipObj();
            const barSteps = clip.bars[S._loopBarHeld];
            const activeSteps = barSteps.filter(st => st.on);
            if (activeSteps.length === 0) {
              // Bar vide → ajouter la note sur le step 0
              barSteps[0] = { on: true, note, vel: 0.787, len: 1, extraNotes: [] };
            } else {
              // Toggle la note sur tous les steps actifs
              const alreadyPresent = activeSteps.every(st =>
                st.note === note || (st.extraNotes || []).includes(note)
              );
              if (alreadyPresent) {
                activeSteps.forEach(st => {
                  if (st.note === note) { st.on = false; st.extraNotes = []; }
                  else { st.extraNotes = (st.extraNotes || []).filter(n => n !== note); }
                });
              } else {
                activeSteps.forEach(st => {
                  if (!st.extraNotes) st.extraNotes = [];
                  if (st.note !== note && !st.extraNotes.includes(note)) st.extraNotes.push(note);
                });
              }
            }
            playTrackNote(S.currentTrack, note, 0.7);
            illuminateLoopBarNotes(S._loopBarHeld);
            oledForce('BAR ' + (S._loopBarHeld+1), noteName(note), 'loop edit');
          }
          return;
        }

        // ── MODE NOTE ──

        // Copy/Delete drum pad (col < 4 = zone drum rack)
        const t = S.tracks[S.currentTrack];
        if (t.mode === 'drum' && col < 4) {
          const drumPadIdx = (3 - row) * 4 + col;

          if (S._copyHeld) {
            if (!S._copySource) {
              // Source : mémoriser ce pad
              S._copySource = { type: 'drumpad', padIdx: drumPadIdx };
              // Flash visuel
              const colHex = trackColor(S.currentTrack);
              padEl(row, col).setAttribute('stroke', '#fff');
              padEl(row, col).setAttribute('stroke-width', '2.5');
              oledForce('COPY', `Pad ${drumPadIdx+1} →`, 'choisissez dest.');
            } else if (S._copySource.type === 'drumpad') {
              // Destination : copier
              copyDrumPad(S._copySource.padIdx, drumPadIdx);
              S._copySource = null;
              oledForce('COPY', 'Copy...', '');
              renderPads();
              renderSteps();
            }
            return;
          }

          if (S._deleteHeld) {
            deleteDrumPad(drumPadIdx);
            renderPads();
            return;
          }
        }

        if (anyStepHeld()) {
          const t = S.tracks[S.currentTrack];
          if (t.mode !== 'drum') {
            const note = padNote(row, col);
            if (note < 0) return; // pad sans note (ancienne zone noire vide)
            const bar = currentStepBar();
            const wasEmpty = !clipHasNotes(activeClip()); // avant modification
            heldSteps.forEach(o => o.didAction = true);
            // Appliquer sur TOUS les steps tenus
            for (const idx of heldSteps.keys()) {
              const st = bar[idx];
              if (!st.on) {
                // Step vide → activer avec cette note
                st.on = true; st.note = note; st.vel = 0.787; st.len = st.len || 1; st.extraNotes = [];
              } else if (st.note === note) {
                // Note principale → supprimer le step
                st.on = false; st.extraNotes = [];
              } else {
                // Note secondaire → toggle dans extraNotes
                if (!st.extraNotes) st.extraNotes = [];
                const idx2 = st.extraNotes.indexOf(note);
                if (idx2 >= 0) st.extraNotes.splice(idx2, 1);
                else st.extraNotes.push(note);
              }
            }
            playTrackNote(S.currentTrack, note, 0.7);
            // Si première note d'un clip vide → démarrer en sync
            if (wasEmpty && clipHasNotes(activeClip())) autoStartClipIfFirstNote();
            // Séquence correcte : reset pads → allumer les notes à jour
            clearStepNoteIllumination();   // remet tous les pads à leur état normal
            illuminateHeldStepNotes();     // allume les pads des notes (state déjà mis à jour)
            // Mettre à jour les steps (on/off) sans toucher aux pads
            const bar2 = currentStepBar();
            for (let si = 0; si < 16; si++) setStepAppearance(si, bar2[si].on, false);
            const count = heldSteps.size;
            oled(`${count} STEP${count>1?'S':''}`, noteName(note), `pad edit`);
            return;
          }
        }
        // Clic normal sur pad — ignoré pour les tracks mélodiques (layout clavier supprimé)
        // Seul le mode drum utilise encore les pads via data-drumpad dans enginePanel
        if (S.tracks[S.currentTrack].mode === 'drum') playPad(row, col);
      });
    })(r, c);
  }
}

// Delete : maintenu = active _deleteHeld pour supprimer clips en session
// Plus de clear bar au simple clic (trop dangereux)
// ── Illumination générique boutons (style uniforme) ─────────────
function setBtnLit(id, on, color) {
  const g = svg(id);
  if (!g) return;
  const col = color || '#aaa';
  const offCol = '#888';
  // Main shape (first circle or first rect child)
  const mainCircle = g.querySelector('circle');
  const mainRect = g.querySelector('rect');
  if (mainCircle) {
    mainCircle.setAttribute('fill',         on ? '#1a1a22' : '#222');
    mainCircle.setAttribute('stroke',       on ? col       : '#333');
    mainCircle.setAttribute('stroke-width', on ? '1.5'     : '1');
  } else if (mainRect) {
    mainRect.setAttribute('fill',         on ? '#1a1a22' : '#222');
    mainRect.setAttribute('stroke',       on ? col       : '#333');
    mainRect.setAttribute('stroke-width', on ? '1.5'     : '1');
  }
  // Nested <g> groups with stroke (icon containers) — set group stroke
  g.querySelectorAll('g').forEach(sub => {
    if (sub.getAttribute('stroke')) {
      sub.setAttribute('stroke', on ? col : offCol);
    }
  });
  // All lines
  g.querySelectorAll('line').forEach(l => l.setAttribute('stroke', on ? col : offCol));
  // All paths
  g.querySelectorAll('path').forEach(p => {
    if (p.getAttribute('fill') && p.getAttribute('fill') !== 'none') {
      p.setAttribute('fill', on ? col : offCol);
    }
    if (p.getAttribute('stroke') && p.getAttribute('stroke') !== 'none') {
      p.setAttribute('stroke', on ? col : offCol);
    }
  });
  // Rects inside (not the main rect) — for icons like copy/mute
  g.querySelectorAll('rect').forEach(r => {
    if (r === mainRect) return; // skip main rect
    if (r.getAttribute('stroke') && r.getAttribute('stroke') !== 'none') {
      r.setAttribute('stroke', on ? col : offCol);
    }
  });
  // Small circles inside (like shift dots)
  const allCircles = g.querySelectorAll('circle');
  allCircles.forEach((c, i) => {
    if (i === 0) return; // skip main circle
    if (c.getAttribute('fill') && c.getAttribute('fill') !== 'none') {
      c.setAttribute('fill', on ? col : offCol);
    }
  });
}

function enterMode(m) {
  if (projectModeActive) return;
  S.mode = m;
  if (m === 'session') {
    // Désactiver loop mode si actif
    if (S._loopBarHeld >= 0 || S._loopBar2 >= 0) {
      S._loopBarHeld = -1; S._loopBar2 = -1;
    }
    setBtnLit('btnLoop', false, '#3ddc84');
    hideStepCursor();
    resetDirButtons();
    renderSessionMode();
    updateEncArcs();
    updateSendArcs();
    const t = S.tracks[S.currentTrack];
    oled('SESSION', `Track ${S.currentTrack+1}`, `Clip ${t.activeClip+1}`);
  } else {
    S.currentBar = 0;
    // Cacher les labels de répétitions master (session only)
    for (let c = 0; c < 8; c++) {
      const lbl = document.getElementById(`masterRepLbl_${c}`);
      if (lbl) lbl.style.display = 'none';
    }
    renderPads();
    renderSteps();
    updateEncArcs();
    updateSendArcs();
    const t = S.tracks[S.currentTrack];
    const hasNotes = clipHasNotes(t.clips[t.activeClip]);
    oled('NOTE MODE', trackInfo(), `Clip ${t.activeClip+1}${hasNotes?'':' (vide)'}`);

function renderSessionMode() {
  if (projectModeActive) return;
  const pageOffset = S.page * 4;
  // Cacher les labels de répétitions master si pas sur la page du master
  const masterOnPage = S.tracks.slice(pageOffset, pageOffset + 4).some(t => t.mode === 'master');
  for (let c = 0; c < 8; c++) {
    const lbl = document.getElementById(`masterRepLbl_${c}`);
    if (lbl && !masterOnPage) lbl.style.display = 'none';
  }
  for (let r = 0; r < 4; r++) {
    const ti = pageOffset + r;
    const t = S.tracks[ti];
    const col_hex = t.color;
    for (let c = 0; c < 8; c++) {
      const el = padEl(r, c);
      const clip = t.clips[c];
      const hasNotes = clipHasNotes(clip);
      const isPlaying = t.playingClip === c && S.playing && clipHasNotes(t.clips[c]);
      const isQueued = t.queuedClip === c;
      const isActiveEdit = t.activeClip === c && hasNotes && !S.playing;

      if (hasNotes) {
        if (isPlaying) {
          el.setAttribute('fill', col_hex + 'cc');
          el.setAttribute('stroke', '#fff');
          el.setAttribute('stroke-width', '2');
        } else if (isQueued && t.queuedClip !== -1) {
          // En attente de lancement
          el.setAttribute('fill', col_hex + '66');
          el.setAttribute('stroke', col_hex);
          el.setAttribute('stroke-width', '2');
        } else if (isActiveEdit) {
          // Sélectionné pour édition (séquenceur arrêté)
          el.setAttribute('fill', col_hex + '88');
          el.setAttribute('stroke', '#fff');
          el.setAttribute('stroke-width', '1.5');
        } else {
          // Clip avec notes — inactif, stoppé, ou en lecture sur autre clip
          el.setAttribute('fill', col_hex + '44');
          el.setAttribute('stroke', col_hex + '88');
          el.setAttribute('stroke-width', '0.8');
        }
        el.setAttribute('cursor', 'pointer');
      } else {
        // Clip vide — grisé si sélectionné (activeClip), éteint sinon
        const isActiveEmpty = t.activeClip === c;
        el.setAttribute('fill', isActiveEmpty ? '#2a2a2c' : '#111113');
        el.setAttribute('stroke', isActiveEmpty ? '#555' : '#1a1a1c');
        el.setAttribute('stroke-width', isActiveEmpty ? '1' : '0.5');
        el.setAttribute('cursor', 'pointer');
      }
      ['padlbl','padslbl'].forEach(pfx => {
        const lbl = document.getElementById(`${pfx}_${r}_${c}`);
        if (lbl) lbl.textContent = '';
      });
      // Afficher le nombre de répétitions sur les clips master
      if (t.mode === 'master') {
        const repeats = clip.columnRepeats || 0;
        const lblId = `masterRepLbl_${c}`;
        let lbl = document.getElementById(lblId);
        const padRect = padEl(r, c);
        const px = parseFloat(padRect.getAttribute('x')) + parseFloat(padRect.getAttribute('width')) / 2;
        const py = parseFloat(padRect.getAttribute('y')) + parseFloat(padRect.getAttribute('height')) / 2 + 5;
        if (!lbl) {
          lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          lbl.id = lblId;
          lbl.setAttribute('text-anchor', 'middle');
          lbl.setAttribute('font-family', "'DM Mono',monospace");
          lbl.setAttribute('font-weight', '700');
          lbl.setAttribute('pointer-events', 'none');
          padRect.parentNode.appendChild(lbl);
        }
        lbl.setAttribute('x', px);
        lbl.setAttribute('y', py);
        lbl.setAttribute('font-size', '15');
        lbl.setAttribute('fill', repeats === 0 ? '#555' : '#fff');
        lbl.textContent = repeats === 0 ? '∞' : `×${repeats}`;
        lbl.style.display = '';
      }
    }
  }
  for (let i = 0; i < 16; i++) {
    svg(`step${i}`).setAttribute('fill', '#111113');
    svg(`step${i}`).setAttribute('stroke', '#1a1a1c');
    svg(`sled${i}`).setAttribute('fill', '#1a1a1c');
    // Cacher les labels BPM des steps master
    const bpmTxt = document.getElementById(`stepBpm${i}`);
    if (bpmTxt) bpmTxt.style.display = 'none';
  }
}

function sessionSelectClip(trackIdx, clipIdx) {
  const t = S.tracks[trackIdx];
  const clip = t.clips[clipIdx];
  const hasNotes = clipHasNotes(clip);

  // Toujours mettre à jour activeClip et currentTrack
  t.activeClip = clipIdx;
  S.currentTrack = trackIdx;
  S.currentBar = 0;

  if (!hasNotes) {
    if (S.playing && clipHasNotes(t.clips[t.playingClip])) {
      // Stop quantisé pour cette track
      t.queuedClip = -1;
      oled(`TRACK ${trackIdx+1}`, 'Stop', 'fin de mesure...');
    } else {
      oled(`TRACK ${trackIdx+1}`, `Clip ${clipIdx+1} vide`, '→ mode Note');
    }
  } else {
    if (S.playing) {
      t.queuedClip = clipIdx;
      oled(`TRACK ${trackIdx+1}`, `Clip ${clipIdx+1}`, 'en attente...');
    } else {
      t.playingClip = clipIdx;
      oled(`TRACK ${trackIdx+1}`, `Clip ${clipIdx+1}`, 'sélectionné');
    }
  }
  renderSessionMode();
}

// ── Copier un clip en session : 1er clic = source, 2ème clic = destination ──
function sessionCopyClip(trackIdx, clipIdx) {
  if (!S._copySource) {
    // Premier clic = sélectionner source
    const srcClip = S.tracks[trackIdx].clips[clipIdx];
    if (!clipHasNotes(srcClip)) {
      oled('COPY', 'source vide', 'choisissez un clip');
      return;
    }
    S._copySource = { trackIdx, clipIdx };
    const el = padEl(trackIdx % 4, clipIdx);
    el.setAttribute('stroke', '#fff');
    el.setAttribute('stroke-width', '3');
    oled('COPY', `Clip ${clipIdx+1} T${trackIdx+1}`, 'cliquez destination');
  } else {
    // Deuxième clic = destination
    const { trackIdx: srcTi, clipIdx: srcCi } = S._copySource;
    const srcClip = S.tracks[srcTi].clips[srcCi];
    const dstClip = S.tracks[trackIdx].clips[clipIdx];
    saveUndo(trackIdx);
    dstClip.bars = srcClip.bars.map(bar => bar.map(st => ({...st})));
    dstClip.drumBars = srcClip.drumBars.map(p => p.map(b => b.map(st => ({...st}))));
    dstClip.numBars = srcClip.numBars;
    S._copySource = null;
    oled('COPY', 'Copy...', '');
    renderSessionMode();
  }
}

function copyStep(srcIdx, dstIdx) {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return;
  const bar = currentStepBar();
  const src = bar[srcIdx];
  const dst = bar[dstIdx];
  dst.on = src.on; dst.note = src.note; dst.vel = src.vel;
  dst.len = src.len; dst.prob = src.prob; dst.shift = src.shift;
  dst.extraNotes = src.extraNotes ? [...src.extraNotes] : [];
  oledForce('COPY', `${srcIdx+1} → ${dstIdx+1}`, 'Copy...');
}

// ── Copier le SON d'un pad drum vers un autre (pas le pattern) ──
function copyDrumPad(srcPad, dstPad) {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  // Copier tous les paramètres du pad source vers la destination
  const src = t.drumPads[srcPad];
  const dst = t.drumPads[dstPad];
  dst.mode      = src.mode;
  dst.synthType = src.synthType;
  dst.tune      = src.tune;  dst.decay = src.decay;
  dst.tone      = src.tone;  dst.drive = src.drive;
  dst.buffer    = src.buffer; dst.fileName = src.fileName;
  dst.startPoint = src.startPoint; dst.reverse = src.reverse;
  renderDrumPadSelection();
  updateEncArcs();
  const soundName = getDrumPadName(S.currentTrack, dstPad);
  oledForce('COPY', soundName, `pad ${srcPad+1} → ${dstPad+1}`);
}

// ── Effacer un pad drum (vider son séquenceur) ──
function deleteDrumPad(padIdx) {
  saveUndo();
  const clip = activeClip();
  for (let b = 0; b < 8; b++) {
    clip.drumBars[padIdx][b] = Array.from({length:16}, () => ({on:false, vel:0.787}));
  }
  renderSteps();
  oledForce('DELETE', `Pad ${padIdx+1}`, 'vidé');
}
function sessionDeleteClip(trackIdx, clipIdx) {
  saveUndo(trackIdx);
  S.tracks[trackIdx].clips[clipIdx] = makeClip();
  if (S.tracks[trackIdx].playingClip === clipIdx) {
    S.tracks[trackIdx].playingClip = 0;
  }
  if (S.tracks[trackIdx].queuedClip === clipIdx) {
    S.tracks[trackIdx].queuedClip = null;

  oled(`DELETE`, `Clip ${clipIdx+1}`, `Track ${trackIdx+1}`);
}
// ── Wheel drag → BPM uniquement ──
let wheelDrag = null;
let _wheelLastTap = 0;

svg('wheel').addEventListener('mousedown', e => {
  const now = Date.now();
  
  // Double-tap → reset BPM à 120
  if (now - _wheelLastTap < 350) {
    _wheelLastTap = 0;
    setBpm(120);
    oledForce('BPM', '120', 'RESET');
    svg('wheel').setAttribute('stroke', '#aaa');
    svg('wheel').setAttribute('stroke-width', '2.5');
    setTimeout(() => {
      svg('wheel').setAttribute('stroke', '#3a3a3a');
      svg('wheel').setAttribute('stroke-width', '1.5');
      S._oledLocked = false;
    }, 800);
    e.preventDefault();
    return;
  }
  _wheelLastTap = now;
  
  svg('wheel').setAttribute('stroke', '#aaa');
  svg('wheel').setAttribute('stroke-width', '2.5');
  wheelDrag = { type: 'bpm', y: e.clientY, x: e.clientX, bpm: S.bpm, moved: false };
  S._oledLocked = true;
  // Afficher BPM immédiatement au clic
  oledForce('BPM', `${S.bpm}`, S.playing ? '▶ en lecture' : '■ arrêté');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!wheelDrag) return;
  if (wheelDrag.type === 'bpm') {
    const dy = wheelDrag.y - e.clientY;
    const dx = e.clientX - wheelDrag.x;
    const delta = dy + dx;
    if (Math.abs(delta) > 1) wheelDrag.moved = true;
    
    // Si un step master est maintenu → modifier le BPM de ce step
    const isMaster = S.tracks[S.currentTrack].mode === 'master';
    if (isMaster && anyStepHeld()) {
      const newBpm = Math.max(20, Math.min(300, wheelDrag.bpm + Math.round(delta / 2)));
      const bar = currentStepBar();
      for (const [idx] of heldSteps) {
        bar[idx].note = newBpm;
        bar[idx].on = true;
      }
      renderSteps();
      const stepList = [...heldSteps.keys()];
      oledForce(`STEP ${stepList[0]+1}`, `${newBpm} BPM`, `Bar ${S.currentBar+1}`);
    } else {
      setBpm(wheelDrag.bpm + Math.round(delta / 2));
      oledForce('BPM', `${S.bpm}`, S.playing ? '▶ en lecture' : '■ arrêté');
    }
  }
});
document.addEventListener('mouseup', () => {
  let keepOledLocked = false;

  // Reset encVol ring
  svg('encVol').setAttribute('stroke', '#3a3a3a');
  svg('encVol').setAttribute('stroke-width', '1.5');
  // Reset wheel ring
  svg('wheel').setAttribute('stroke', '#3a3a3a');
  svg('wheel').setAttribute('stroke-width', '1.5');

  // Molette = BPM uniquement, pas d'action spéciale au clic

  // Clic sans drag sur encVol + step tenu → afficher vélocité
  if (volDrag && volDrag.type === 'vel' && !volDrag.moved) {
    const firstIdx = volDrag.stepIdx;
    const bar = currentStepBar();
    const vel = bar[firstIdx]?.vel || 0.8;
    oledForce(`STEP ${firstIdx+1}`, `VÉL: ${Math.round(vel*127)}`, `(${Math.round(vel*100)}%)`);
    keepOledLocked = true;
    setTimeout(() => { S._oledLocked = false; }, 2000);
  }

  wheelDrag = null;
  volDrag = null;
  S._stepsLocked = false;

  // Si des steps sont encore tenus (mouseup hors zone) → les relâcher proprement
  if (heldSteps.size > 0) {
    heldSteps.forEach((obj, idx) => { releaseStep(idx); });
    // updateEncArcs est appelé dans releaseStep via renderSteps
  }

  if (!keepOledLocked) {
    S._oledLocked = false;
    // Refresh OLED to default display after drag release (delayed to ensure all handlers done)
    setTimeout(() => {
      if (S._oledLocked) return; // something else took over
      const t = S.tracks[S.currentTrack];
      if (t.mode === 'drum') {
        oledForce('DRUM', getDrumPadName(S.currentTrack, S.selectedDrumPad), `pad ${S.selectedDrumPad+1}`);
      } else if (t.mode === 'master') {
        oledForce('MASTER', 'Master Track', `BPM ${S.bpm}`);
      } else {
        oledForce('SOUND', getSF2PresetName(S.currentTrack), trackInfo());
      }
    }, 100);
  }
});
// Info clic géré dans le mouseup
// Volume master global (0-1)

function setMasterVolume(v) {
  S.masterVolume = Math.max(0, Math.min(1, v));
  if (masterGain) masterGain.gain.value = S.masterVolume;
  // Rotation visuelle de l'encodeur VOL
  oled('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶' : '■');
}

let volDrag = null;
svg('encVol').addEventListener('mousedown', e => {
  S._oledLocked = true;
  // Light up encVol ring
  svg('encVol').setAttribute('stroke', '#aaa');
  svg('encVol').setAttribute('stroke-width', '2.5');
  if (anyStepHeld()) {
    const firstIdx = heldStepList()[0];
    const bar = currentStepBar();
    const st = bar[firstIdx];
    volDrag = { type: 'vel', y: e.clientY, x: e.clientX, startVel: st.vel || 0.8, stepIdx: firstIdx, moved: false };
    heldSteps.get(firstIdx).didAction = true;
  } else if (S._heldTrack >= 0) {
    volDrag = { type: 'track', y: e.clientY, x: e.clientX, ti: S._heldTrack, startVol: S.tracks[S._heldTrack].volume, moved: false };
  } else {
    volDrag = { type: 'master', y: e.clientY, x: e.clientX, startVol: S.masterVolume, moved: false };
  }
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!volDrag) return;
  const dy = volDrag.y - e.clientY;
  const dx = e.clientX - (volDrag.x || e.clientX);
  const delta = dy + dx;
  if (volDrag.type === 'master') {
    volDrag.moved = true;
    setMasterVolume(volDrag.startVol + delta / 150);
    oledForce('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶' : '■');
  } else if (volDrag.type === 'track') {
    const newVol = Math.max(0, Math.min(1, volDrag.startVol + delta / 150));
    S.tracks[volDrag.ti].volume = newVol;
    oledForce(`VOL T${volDrag.ti+1}`, `${Math.round(newVol * 100)}%`, trackColor(volDrag.ti));
  } else if (volDrag.type === 'vel') {
    // Loop mode : velocity relative sur toute la bar
    if (S.mode === 'loop' && S._loopBarHeld >= 0) {
      const vdelta = (volDrag.y - e.clientY) / 200;
      if (Math.abs(vdelta) > 0.002) {
        volDrag.y = e.clientY; volDrag.moved = true;
        loopBarVelocityDelta(vdelta * 127);
      }
      return;
    }
    const velDelta = delta / 80;
    const newVel = Math.max(0, Math.min(1, volDrag.startVel + velDelta));
    const bar = currentStepBar();
    const st = bar[volDrag.stepIdx];
    st.vel = newVel;
    const col = trackColor(S.currentTrack);
    svg(`sled${volDrag.stepIdx}`).setAttribute('fill', col);
    svg(`sled${volDrag.stepIdx}`).setAttribute('opacity', newVel.toFixed(2));
    oledForce(`STEP ${volDrag.stepIdx+1}`, `VÉL: ${Math.round(newVel*127)}`, `(${Math.round(newVel*100)}%)`);
  }
});

// ── Remet l'état séquenceur à zéro total (nouveau projet vierge) ──

    t.muted       = false;
    t.soloed      = false;
    t.volume      = 0.8;
    t.soundIndex  = 0;

    t.midiOutputId = null;

    t.drumPads     = makeDefaultDrumPads();

    t.playingClip = 0;
    t.queuedClip  = null;
    t.clips       = Array.from({length:8}, () => makeClip());
  });

  recHeld.clear();
  undoStack.history = [];
  undoStack.cursor  = -1;
  undoStack.lastSaveTime = null;
}

// ── Générateur de noms procéduraux ────────────────────────────
const NAME_ADJ = [
  'Dark','Deep','Warm','Cold','Bright','Soft','Hard','Lost','Wild','Calm',
  'Raw','Fast','Slow','Heavy','Light','Sharp','Smooth','Cosmic','Urban','Crystal',
  'Electric','Silent','Frozen','Hollow','Neon','Acid','Dusty','Liquid','Broken','Golden'
];
const NAME_NOUN = [
  'Wave','Pulse','Groove','Dream','Storm','Cloud','Fire','Stone','Ghost','River',
  'Void','Space','Noise','Bloom','Rain','Dust','Light','Shadow','Echo','Spiral',
  'Frog','Mango','Tiger','Monk','Comet','Drift','Phase','Surge','Loop','Core'
];
function generateProjectName() {
  const adj  = NAME_ADJ [Math.floor(Math.random() * NAME_ADJ.length)];
  const noun = NAME_NOUN[Math.floor(Math.random() * NAME_NOUN.length)];
  return `${adj}${noun}`.slice(0, 8);
}

// Palette de couleurs de set — distinctes et lisibles sur fond noir
const SET_COLORS = [
  '#ff6b00','#3399ff','#3ddc84','#cc44ff',
  '#ff3366','#ffcc00','#00cccc','#ff9933',
  '#aa44ff','#44ffaa','#ff4488','#33aaff',
  '#ffaa33','#66ff44','#ff6644','#4466ff'
];
function randomSetColor() {
  return SET_COLORS[Math.floor(Math.random() * SET_COLORS.length)];
}

// ── État du projet courant ─────────────────────────────────────
// currentProject = { slot, name, color } — le slot actif en cours d'édition
var currentProject = null;  // null = pas encore de slot choisi
var autosaveTimer  = null;

// Déclenche un autosave différé (300ms) après chaque modification
function scheduleAutosave() {
  if (!currentProject) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    projectSave(currentProject.slot);
  }, 300);
}

function projectSave(slot) {
  try {
    const data = serializeProject();
    localStorage.setItem(PROJECT_KEY(slot), JSON.stringify(data));
    return true;
  } catch(e) { return false; }
}

function serializeProject() {
  return {
    version: 2,
    bpm: S.bpm,
    masterVolume: S.masterVolume,
    octave: S.octave,
    masterFX: JSON.parse(JSON.stringify(masterFX)),
    tracks: S.tracks.map(t => ({
      mode: t.mode,
      muted: t.muted,
      soloed: t.soloed,
      volume: t.volume,
      octave: t.octave ?? 3,
      pianoOctave: t.pianoOctave ?? 0,
      sendDelay:  t.sendDelay  || 0,
      sendReverb: t.sendReverb || 0,
      soundIndex: t.soundIndex,
      outputMode: t.outputMode,
      midiChannel: t.midiChannel,
      midiOutputId: t.midiOutputId || null,
      drumSoundMap: [...t.drumSoundMap],  // conservé pour compatibilité v2
      drumPads: t.drumPads ? t.drumPads.map(p => ({
        mode: p.mode, synthType: p.synthType,
        tune: p.tune, decay: p.decay, tone: p.tone, drive: p.drive,
        fileName: p.fileName || '', startPoint: p.startPoint || 0, reverse: p.reverse || false,
        volume: p.volume, sendReverb: p.sendReverb, sendDelay: p.sendDelay,
      })) : null,
      activeClip: t.activeClip,
      clips: t.clips.map(clip => {
        // Format sparse : on ne stocke que les steps actifs
        // bars : [[barIdx, stepIdx, {note,vel,len,shift,prob,extraNotes}], ...]
        const bars = [];
        clip.bars.forEach((bar, bi) => {
          bar.forEach((st, si) => {
            if (!st.on) return;
            const s = {v: st.vel};
            if (st.note !== undefined && st.note !== 60) s.n = st.note;
            if (st.len  && st.len  !== 1)   s.l = st.len;
            if (st.shift && st.shift !== 0) s.sh = st.shift;
            if (st.prob !== undefined && st.prob !== 100) s.p = st.prob;
            if (st.extraNotes?.length)      s.e = st.extraNotes;
            bars.push([bi, si, s]);
          });
        });
        // drumBars : [[padIdx, barIdx, stepIdx, {vel,shift,prob}], ...]
        const drumBars = [];
        clip.drumBars.forEach((padSeq, pi) => {
          padSeq.forEach((bar, bi) => {
            bar.forEach((st, si) => {
              if (!st.on) return;
              const s = {v: st.vel};
              if (st.shift && st.shift !== 0) s.sh = st.shift;
              if (st.prob !== undefined && st.prob !== 100) s.p = st.prob;
              drumBars.push([pi, bi, si, s]);
            });
          });
        });
        return {
          nb: clip.numBars,
          ls: clip.loopStart ?? 0,
          le: clip.loopEnd   ?? (clip.numBars - 1),
          cr: clip.columnRepeats || 0,
          b:  bars,
          d:  drumBars,
        };
      }),
    })),
    _meta: {
      savedAt: Date.now(),
      name:  currentProject?.name  || generateProjectName(),
      color: currentProject?.color || randomSetColor(),
    }
  };
}

// Restaure l'état depuis un objet JSON (supporte v1 et v2)
function deserializeProject(data, slot) {
  if (!data || (data.version !== 1 && data.version !== 2)) return false;
  S.bpm = data.bpm ?? 120;
  S.masterVolume = data.masterVolume ?? 0.65;
  S.octave = data.octave ?? 3;
  if (masterGain) masterGain.gain.value = S.masterVolume;

  // Restaurer masterFX
  if (data.masterFX) {
    Object.keys(masterFX).forEach(fxId => {
      if (data.masterFX[fxId]) {
        Object.assign(masterFX[fxId], data.masterFX[fxId]);
      }
    });
    applyMasterFX();
  }

  data.tracks.forEach((td, ti) => {
    if (ti >= 8) return;
    const t = S.tracks[ti];
    t.mode        = td.mode        ?? t.mode;
    t.muted       = td.muted       ?? false;
    t.soloed      = td.soloed      ?? false;
    t.volume      = td.volume      ?? 0.8;
    t.octave      = td.octave      ?? 3;
    t.pianoOctave = td.pianoOctave ?? 0;
    t.sendDelay   = td.sendDelay   ?? 0;
    t.sendReverb  = td.sendReverb  ?? 0;
    t.soundIndex  = td.soundIndex  ?? 0;
    t.outputMode  = td.outputMode  ?? 'sf2';
    t.midiChannel = td.midiChannel ?? (ti + 1);
    t.midiOutputId = td.midiOutputId ?? null;
    t.drumSoundMap = td.drumSoundMap
      ? td.drumSoundMap.slice(0, 8)
      : Array.from({length:8}, (_, i) => i);
    // Restaurer drumPads
    if (td.drumPads && Array.isArray(td.drumPads)) {
      t.drumPads = td.drumPads.slice(0, 8).map((p, i) => {
        const base = makeDrumPad(i);
        return { ...base, ...p, buffer: null }; // buffer non sérialisable
      });
      // Compléter si moins de 8
      while (t.drumPads.length < 8) t.drumPads.push(makeDrumPad(t.drumPads.length));
    } else {
      t.drumPads = makeDefaultDrumPads();
    }
    t.activeClip  = td.activeClip  ?? 0;
    t.playingClip = 0;
    t.queuedClip  = null;

    td.clips.forEach((cd, ci) => {
      if (ci >= 8) return;
      const clip = t.clips[ci];

      if (data.version === 2) {
        // Format sparse v2
        clip.numBars   = cd.nb ?? 1;
        clip.loopStart = cd.ls ?? 0;
        clip.loopEnd   = cd.le ?? (clip.numBars - 1);
        clip.columnRepeats = cd.cr ?? 0;
        // Réinitialiser à vide
        clip.bars = Array.from({length:8}, () =>
          Array.from({length:16}, () => ({on:false, note:60, vel:0.787}))
        );
        clip.drumBars = Array.from({length:8}, () =>
          Array.from({length:8}, () =>
            Array.from({length:16}, () => ({on:false, vel:0.787}))
          )
        );
        // Restituer les steps actifs
        (cd.b || []).forEach(([bi, si, s]) => {
          if (bi < 8 && si < 16) clip.bars[bi][si] = {
            on: true,
            note: s.n ?? 60,
            vel:  s.v ?? 0.787,
            len:  s.l ?? 1,
            shift: s.sh ?? 0,
            prob:  s.p ?? 100,
            extraNotes: s.e ? [...s.e] : [],
          };
        });
        (cd.d || []).forEach(([pi, bi, si, s]) => {
          if (pi < 8 && bi < 8 && si < 16) clip.drumBars[pi][bi][si] = {
            on: true,
            vel:  s.v ?? 0.787,
            shift: s.sh ?? 0,
            prob:  s.p ?? 100,
          };
        });
      } else {
        // Format dense v1 (rétrocompatibilité)
        clip.numBars   = cd.numBars   ?? 1;
        clip.loopStart = cd.loopStart ?? 0;
        clip.loopEnd   = cd.loopEnd   ?? (clip.numBars - 1);
        clip.bars = cd.bars.map(bar =>
          bar.map(st => st.on ? {...st, extraNotes: [...(st.extraNotes||[])]} : {on:false,note:60,vel:0.787})
        );
        clip.drumBars = cd.drumBars.map(padSeq =>
          padSeq.map(bar => bar.map(st => st.on ? {...st} : {on:false,vel:0.787}))
        );
      }
    });
  });

  S.playing = false; S.recording = false;
  S.currentTrack = 0; S.currentBar = 0;
  S.mode = 'note';
  S.octave = S.tracks[0].octave ?? 3;
  heldSteps.clear(); recHeld.clear();

  if (slot !== undefined) {
    currentProject = {
      slot,
      name:  data._meta?.name  || generateProjectName(),
      color: data._meta?.color || randomSetColor(),
    };
  }
  // Mettre à jour les GainNodes sends si déjà créés
  Object.keys(trackSendNodes).forEach(ti => {
    const t = S.tracks[parseInt(ti)];
    const n = trackSendNodes[ti];
    if (n && t) {
      n.dSend.gain.value = t.sendDelay  || 0;
      n.rSend.gain.value = t.sendReverb || 0;
    }
  });
  return true;
}

// Lire un slot
function projectLoad(slot) {
  try {
    const raw = localStorage.getItem(PROJECT_KEY(slot));
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// Effacer un slot
function projectDelete(slot) {
  localStorage.removeItem(PROJECT_KEY(slot));
}

// ── Efface TOUS les labels dynamiques SVG ──────────────────────
function clearAllDynamicLabels() {
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      ['padlbl', 'padslbl', 'prjlbl', 'prjbpm'].forEach(pfx => {
        const el = document.getElementById(`${pfx}_${r}_${c}`);
        if (el) el.textContent = '';
      });
    }
  }
  // Cacher les labels de répétitions master
  for (let c = 0; c < 8; c++) {
    const lbl = document.getElementById(`masterRepLbl_${c}`);
    if (lbl) lbl.style.display = 'none';
  }
  // Cacher les labels BPM des steps
  for (let i = 0; i < 16; i++) {
    const bpmTxt = document.getElementById(`stepBpm${i}`);
    if (bpmTxt) bpmTxt.style.display = 'none';
  }
}

// ── Remet les pads à l'état neutre absolu ──────────────────────
function resetAllPads() {
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const el = padEl(r, c);
      el.setAttribute('fill',           '#111113');
      el.setAttribute('stroke',         '#1a1a1c');
      el.setAttribute('stroke-width',   '0.8');
      el.setAttribute('stroke-dasharray','none');
      el.setAttribute('cursor',         'pointer');
    }
  }
}

// ── Remet les steps à l'état neutre absolu ─────────────────────
function resetAllSteps() {
  for (let i = 0; i < 16; i++) {
    const el  = svg(`step${i}`);
    const led = svg(`sled${i}`);
    el.setAttribute('fill',           '#1e1e20');
    el.setAttribute('stroke',         [0,4,8,12].includes(i) ? '#444' : '#333');
    el.setAttribute('stroke-width',   '0.8');
    el.setAttribute('stroke-dasharray','none');
    led.setAttribute('fill', [0,4,8,12].includes(i) ? '#444' : '#2a2a2a');
  }
}

// PROJECT MODE — pool de 256 projets (16 pages × 32 slots)
// ═══════════════════════════════════════════════════════════════
var projectModeActive = false;
var projectPage = 0; // page courante 0-15
var projectSelected = null; // { slot, row, col } — projet sélectionné en preview
var _projectLastClick = { slot: -1, time: 0 };
const PROJECT_DBLCLICK_MS = 400;

function enterProjectMode() {
  if (S.playing) stopPlay();
  // Désactiver loop mode si actif
  if (S.mode === 'loop') {
    S.mode = 'note';
    S._loopBarHeld = -1; S._loopBar2 = -1;
    setBtnLit('btnLoop', false, '#3ddc84');
  }
  projectModeActive = true;
  projectSelected = null;
  _projectLastClick = { slot: -1, time: 0 };
  S._prevMode = S.mode;
  clearAllDynamicLabels();
  resetAllPads();
  resetAllSteps();
  renderProjectMode();
  renderFXPanel();
  // Griser les encodeurs et boutons track — non pertinents en mode project
  _projectDimControls(true);
  oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'clic=preview · 2x=charger');
  S._oledLocked = true;
}

function exitProjectMode() {
  projectModeActive = false;
  projectSelected = null;
  S._oledLocked = false;
  setBtnLit('btnSets', false, '#aaa');
  _projectDimControls(false);
  clearAllDynamicLabels();
  resetAllPads();
  resetAllSteps();
  renderTrackButtons();
  if (S.mode === 'loop') {

function renderProjectMode() {
  if (!projectModeActive) return;

  // ── 32 pads = 32 slots sur la page courante ──
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const slot     = projectPage * 32 + r * 8 + c; // slot absolu 0-255
      const el       = padEl(r, c);
      const data     = projectLoad(slot);

      el.setAttribute('stroke-dasharray', 'none');
      const isCurrent  = currentProject?.slot === slot;
      const isSelected = projectSelected?.slot === slot;
      if (data) {
        const projCol = data._meta?.color || '#ff6b00';
        el.setAttribute('fill', projCol + (isSelected ? '66' : '44'));
        if (isSelected) {
          el.setAttribute('stroke',       '#fff');
          el.setAttribute('stroke-width', '3');
        } else if (isCurrent) {
          el.setAttribute('stroke',       '#fff');
          el.setAttribute('stroke-width', '2');
        } else {
          el.setAttribute('stroke',       projCol);
          el.setAttribute('stroke-width', '1.5');
        }
      } else {
        el.setAttribute('fill',         '#111113');
        el.setAttribute('stroke',       '#2a2a2a');
        el.setAttribute('stroke-width', '0.8');
      }

      // Nom du projet (tronqué à 7 chars) ou numéro si vide
      const slotInPage = r * 8 + c + 1;
      const projName   = data?._meta?.name;
      let lbl = document.getElementById(`prjlbl_${r}_${c}`);
      if (!lbl) {
        lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lbl.setAttribute('id', `prjlbl_${r}_${c}`);
        lbl.setAttribute('font-family', "'DM Mono',monospace");
        lbl.setAttribute('font-size', projName ? '10' : '13');
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('pointer-events', 'none');
        document.getElementById('moveSVG').appendChild(lbl);
      }
      lbl.setAttribute('x', PAD_X[c] + 29);
      lbl.setAttribute('y', PAD_Y[r] + (projName ? 24 : 28));
      lbl.setAttribute('font-size', projName ? '10' : '13');
      lbl.setAttribute('fill', data ? (isCurrent ? '#fff' : (data._meta?.color || '#ff6b00')) : '#333');
      lbl.textContent = projName ? projName.slice(0, 10) : String(slotInPage);

      // BPM en petit si slot occupé
      let bpmlbl = document.getElementById(`prjbpm_${r}_${c}`);
      if (!bpmlbl) {
        bpmlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        bpmlbl.setAttribute('id', `prjbpm_${r}_${c}`);
        bpmlbl.setAttribute('font-family', "'DM Mono',monospace");
        bpmlbl.setAttribute('font-size', '8');
        bpmlbl.setAttribute('text-anchor', 'middle');
        bpmlbl.setAttribute('pointer-events', 'none');
        document.getElementById('moveSVG').appendChild(bpmlbl);
      }
      bpmlbl.setAttribute('x', PAD_X[c] + 29);
      bpmlbl.setAttribute('y', PAD_Y[r] + 36);
      bpmlbl.setAttribute('fill', data ? (isCurrent ? '#aaa' : '#666') : 'none');
      bpmlbl.textContent = data ? `${data.bpm}` : '';
    }
  }

  // ── 16 steps = 16 pages ──
  for (let i = 0; i < 16; i++) {
    const el  = svg(`step${i}`);
    const led = svg(`sled${i}`);
    el.setAttribute('stroke-dasharray', 'none');
    if (i === projectPage) {
      // Page active
      el.setAttribute('fill',         '#ffffff22');
      el.setAttribute('stroke',       '#fff');
      el.setAttribute('stroke-width', '2');
      led.setAttribute('fill', '#fff');
    } else {
      // Vérifier si la page a au moins un projet
      let hasAny = false;
      for (let s = 0; s < 32; s++) {
        if (projectLoad(i * 32 + s)) { hasAny = true; break; }
      }
      el.setAttribute('fill',         hasAny ? '#ffffff11' : '#111113');
      el.setAttribute('stroke',       hasAny ? '#555'      : '#1a1a1c');
      el.setAttribute('stroke-width', '0.8');
      led.setAttribute('fill', hasAny ? '#555' : '#1a1a1c');
    }
  }
}

}function projectPadClick(row, col) {
  const slot    = projectPage * 32 + row * 8 + col;
  const data    = projectLoad(slot);
  const slotNum = (row * 8 + col) + 1;
  const now     = Date.now();

  if (S._deleteHeld) {
    if (data) {
      if (currentProject?.slot === slot) currentProject = null;
      if (projectSelected?.slot === slot) projectSelected = null;
      projectDelete(slot);
      renderProjectMode();
      oledForce('DELETE', `P${projectPage+1}·${slotNum}`, 'effacé');
    }
    return;
  }

  if (S._copyHeld) {
    if (!S._copySource) {
      if (!data) { oledForce('COPY', 'slot vide', 'choisir source'); return; }
      S._copySource = { type: 'project', slot, data };
      padEl(row, col).setAttribute('stroke', '#fff');
      padEl(row, col).setAttribute('stroke-width', '2.5');
      oledForce('COPY', `P${projectPage+1}·${slotNum} →`, 'choisir dest.');
    } else if (S._copySource.type === 'project') {
      if (slot === S._copySource.slot) { S._copySource = null; renderProjectMode(); return; }
      try {
        const savedProject = currentProject;
        if (deserializeProject(S._copySource.data)) {
          currentProject = { slot, name: S._copySource.data._meta?.name || generateProjectName(), color: S._copySource.data._meta?.color || randomSetColor() };
          localStorage.setItem(PROJECT_KEY(slot), JSON.stringify(serializeProject()));
          currentProject = savedProject;
          // Restaurer l'état du projet courant
          if (savedProject) {
            const savedData = projectLoad(savedProject.slot);
            if (savedData) deserializeProject(savedData, savedProject.slot);
          }
        }
      } catch(e) { console.warn('copy failed:', e); }
      S._copySource = null;
      renderProjectMode();
      oledForce('COPY', 'copié ✓', `→ P${projectPage+1}·${slotNum}`);
    }
    return;
  }

  if (data) {
    // ── Double-clic → charger définitivement et sortir ──
    if (_projectLastClick.slot === slot && now - _projectLastClick.time < PROJECT_DBLCLICK_MS) {
      _projectLastClick = { slot: -1, time: 0 };
      if (deserializeProject(data, slot)) {
        exitProjectMode();
        clearProjectLabels();
        renderTrackButtons();
        renderPads();
        renderSteps();
        renderFXPanel();
        if (S.pianoOpen) buildPiano();
        updateEncArcs();
        updateSendArcs();
        const name = data._meta?.name || `P${projectPage+1}·${slotNum}`;
        oledForce('LOAD', name, `${data.bpm} BPM`);
        setTimeout(() => { S._oledLocked = false; }, 2000);
      }
      return;
    }

    // ── 1er clic → sélectionner + preview (charger dans S sans sortir) ──
    _projectLastClick = { slot, time: now };
    projectSelected = { slot, row, col };
    // Charger le projet en preview dans S
    deserializeProject(data, slot);
    renderProjectMode();
    const name = data._meta?.name || `P${projectPage+1}·${slotNum}`;
    oledForce(name, `${data.bpm} BPM`, '2x=charger · Play=écouter');

  } else {
    // ── Slot vide → créer un nouveau projet vierge ──
    const name  = generateProjectName();
    const color = randomSetColor();
    currentProject = { slot, name, color };
    resetStateToEmpty();
    projectSave(slot);
    exitProjectMode();
    clearProjectLabels();
    renderTrackButtons();
    renderPads();
    renderSteps();
    saveUndo();
    oledForce('NEW', name, `P${projectPage+1}·${slotNum}`);
    setTimeout(() => { S._oledLocked = false; }, 2000);
  }
}
