* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #808080;
  font-family: 'DM Mono', monospace;
  touch-action: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

#device {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  position: relative;
}

#device svg {
  width: 100%;
  height: 100%;
  max-width: 100vw;
  max-height: 100vh;
  display: block;
}

/* SF2 Browser — se positionne par dessus le SVG, mêmes dimensions */
#sf2Browser {
  display: none;
  position: absolute;
  /* Centré comme le SVG avec les mêmes contraintes */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(100vw, calc(100vh * 860 / 461));
  height: min(100vh, calc(100vw * 461 / 860));
  max-width: 100vw;
  max-height: 100vh;
  z-index: 100;
  border-radius: 14px;
  background: #1a1a1c;
  border: 1.5px solid #333;
  font-family: 'DM Mono', monospace;
  color: #eee;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}
#sf2Browser.open { display: flex; }

</style>

<script>
'use strict';

// ── Déclarations globales anticipées (var = hissé, évite const-before-init) ──
// ── Undo/Redo — pile de 3 niveaux ──
const UNDO_MAX = 3;
// undoStack.history = [...snapshots], undoStack.cursor = index courant dans l'historique
// cursor pointe sur l'état courant. cursor-1 = undo, cursor+1 = redo
var undoStack = {
  history: [],   // tableau de snapshots
  cursor: -1,    // position courante (-1 = aucun historique)
  lastSaveTime: null,
  _restoring: false,
};
var _countdownActive = false; // true pendant le décompte
var recHeld = new Map();
var recBlinkTimer = null;
var metronomeTimer = null;
var countdownTimer = null;

// ═══════════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  // Keepalive : oscillateur quasi-silencieux qui empêche Chrome/Android de suspendre le contexte
  if (!window._audioKeepAlive) {
    const osc = actx.createOscillator();
    osc.frequency.value = 1; // 1Hz — infra-basse inaudible
    const g = actx.createGain();
    g.gain.value = 0.0001; // quasi-silencieux mais non-nul (Chrome ignore gain=0)
    osc.connect(g);
    g.connect(actx.destination);
    osc.start();
    window._audioKeepAlive = osc;
  }
  // Initialiser FluidSynth WASM au premier geste
  if (!sf2Ready && !sf2Initializing) initSF2();
}

// ═══════════════════════════════════════════════════════════════
// MOTEUR ARPEGGIATEUR
// ═══════════════════════════════════════════════════════════════
// Rate en subdivisions de step (1/16) : 0=1/1(16) 1=1/2(8) 2=1/4(4) 3=1/8(2) 4=1/16(1) 5=1/32(0.5)
const ARP_RATE_STEPS = [16, 8, 4, 2, 1, 0.5]; // en nombre de steps 1/16

// État par track
const arpState = Array.from({length:8}, () => ({
  heldNotes:   [],
  noteIdx:     0,
  timer:       null,
  startTimer:  null,
  seqStopTimer: null,
  lastNote:    -1,
  octaveIdx:   0,
  fromSeq:     false,
  lastRate:    -1,
}));

function arpIsActive(ti) {
  const slot = trackFX[ti]?.[4]; // index 4 = MIDI CTRL (was Arp)
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  if (arpIdx < 0) return false;
  const s = trackFX[ti][arpIdx];
  return s.active && Math.round(s.params['arpEnabled'] ?? 0) === 1;
}

function arpGetParams(ti) {
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  const slot = trackFX[ti][arpIdx];
  return {
    rate:    Math.round(slot.params['arpRate']    ?? 2),
    mode:    Math.round(slot.params['arpMode']    ?? 0),
    octaves: Math.round(slot.params['arpOctaves'] ?? 1),
  };
}

// Construire la séquence de notes selon mode + octaves
function arpBuildSeq(notes, mode, octaves) {
  if (!notes.length) return [];
  const base = [...notes].sort((a,b) => a-b);
  let seq = [];
  for (let oct = 0; oct < octaves; oct++) {
    base.forEach(n => seq.push(n + oct * 12));
  }
  if (mode === 1) seq = seq.reverse();           // down
  if (mode === 2) {                               // up-down
    const down = seq.slice(1, seq.length-1).reverse();
    seq = [...seq, ...down];
  }
  if (mode === 3) seq = seq.sort(() => Math.random()-0.5); // random
  // mode 4 = order (ordre d'appui) — déjà dans heldNotes dans l'ordre d'appui
  return seq;
}

// Démarrer l'arp sur une track
function arpStart(ti) {
  const st = arpState[ti];
  if (st.timer) { clearInterval(st.timer); st.timer = null; }
  st.noteIdx = 0;
  st.lastRate = -1; // forcer recalcul intervalle
  arpTick(ti); // jouer immédiatement la première note
  const params = arpGetParams(ti);
  const intervalMs = ARP_RATE_STEPS[params.rate] * stepDur() * 1000;
  st.lastRate = params.rate;
  st.timer = setInterval(() => {
    // Relire le rate à chaque tick — si changé, redémarrer l'intervalle
    const p = arpGetParams(ti);
    if (p.rate !== st.lastRate) {
      clearInterval(st.timer);
      st.lastRate = p.rate;
      const newMs = ARP_RATE_STEPS[p.rate] * stepDur() * 1000;
      st.timer = setInterval(() => arpTick(ti), newMs);
    }
    arpTick(ti);
  }, intervalMs);
}

// Jouer la note suivante dans la séquence
function arpTick(ti) {
  const st = arpState[ti];
  const t = S.tracks[ti];
  if (!st.heldNotes.length) { arpStop(ti); return; }
  const params = arpGetParams(ti);
  const seq = arpBuildSeq(st.heldNotes, params.mode, params.octaves);
  if (!seq.length) return;
  // NoteOff de la note précédente
  if (st.lastNote >= 0) {
    if (t.outputMode === 'sf2') sf2NoteOff(ti, st.lastNote);
    else if (t.outputMode === 'midi') {
      const out = getTrackOutput(ti);
      if (out) out.send([0x80 | ((t.midiChannel-1)&0xf), st.lastNote, 0]);
    }
  }
  // Jouer la note courante (index actuel)
  const idx = st.noteIdx % seq.length;
  const note = seq[idx];
  const vel = 0.8;
  if (t.outputMode === 'sf2') sf2NoteOn(ti, note, vel);
  else if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) out.send([0x90 | ((t.midiChannel-1)&0xf), note, Math.round(vel*127)]);
  }
  st.lastNote = note;
  st.noteIdx = (st.noteIdx + 1) % seq.length;
}

// Arrêter l'arp sur une track
function arpStop(ti) {
  const st = arpState[ti];
  if (st.startTimer)   { clearTimeout(st.startTimer);   st.startTimer = null; }
  if (st.seqStopTimer) { clearTimeout(st.seqStopTimer); st.seqStopTimer = null; }
  if (st.timer) { clearInterval(st.timer); st.timer = null; }
  if (st.lastNote >= 0) {
    const t = S.tracks[ti];
    if (t.outputMode === 'sf2') sf2NoteOff(ti, st.lastNote);
    else if (t.outputMode === 'midi') {
      const out = getTrackOutput(ti);
      if (out) out.send([0x80 | ((t.midiChannel-1)&0xf), st.lastNote, 0]);
    }
    st.lastNote = -1;
  }
  st.heldNotes = [];
  st.noteIdx = 0;
}

// Déclencher l'arp depuis le séquenceur (step on)
function arpSeqTrigger(ti, notes, durMs) {
  const st = arpState[ti];
  // Mettre à jour les notes sans redémarrer le timer si déjà en route
  st.heldNotes = [...notes];
  st.fromSeq = true;
  st.noteIdx = 0; // reset séquence sur chaque nouveau step
  if (!st.timer) {
    arpStart(ti);
  }
  // Programmer l'arrêt après durMs
  if (st.seqStopTimer) clearTimeout(st.seqStopTimer);
  st.seqStopTimer = setTimeout(() => {
    if (st.fromSeq) {
      st.heldNotes = [];
      arpStop(ti);
    }
  }, durMs);
}

// NoteOn depuis clavier/MIDI
function arpNoteOn(ti, midi) {
  const st = arpState[ti];
  if (!st.heldNotes.includes(midi)) st.heldNotes.push(midi);
  st.fromSeq = false;
  // Annuler le timer de démarrage précédent
  if (st.startTimer) clearTimeout(st.startTimer);
  // Petit délai pour laisser toutes les notes d'un accord arriver
  st.startTimer = setTimeout(() => {
    st.startTimer = null;
    if (!st.timer) arpStart(ti);
  }, 30);
}

// NoteOff depuis clavier/MIDI
function arpNoteOff(ti, midi) {
  const st = arpState[ti];
  st.heldNotes = st.heldNotes.filter(n => n !== midi);
  if (!st.heldNotes.length) arpStop(ti);
}

// ── js-synthesizer (FluidSynth WASM) engine ──────────────────────────────────
// 4 instances indépendantes — une par track
const jsSynths = [null, null, null, null, null, null, null, null]; // Synthesizer par track
const jsSynthNodes = [null, null, null, null, null, null, null, null]; // AudioNode par track
let sf2Ready       = false;
let sf2Initializing = false;
// Mutex de chargement SF2 : true = chargement en cours, bloquer noteOn
const _sf2LoadingTrack = [false, false, false, false, false, false, false, false];
// Token de chargement : annule un chargement précédent si un nouveau arrive
const _sf2LoadToken = [0, 0, 0, 0, 0, 0, 0, 0];

// Accesseurs de compatibilité (track courante)
function jsSynth_ti(ti)     { return jsSynths[ti]; }
function jsSynthNode_ti(ti) { return jsSynthNodes[ti]; }
// Canal MIDI : chaque instance a son propre canal 0
const SF2_CHANNEL = 0;

// État par track : { sfontId, bank, program, presets, sfName }
const trackSF2 = Array.from({length:8}, () => ({
  sfontId:  -1,
  bank:      0,
  program:   0,
  presets:   [],
  sfName:    '',
}));

// ═══════════════════════════════════════════════════════════════
// SYSTÈME FX PAR TRACK
// ═══════════════════════════════════════════════════════════════
let tuna = null; // instance Tuna initialisée après actx

// Définition des 8 slots FX
// Ordre : Filter Tremolo Compress Chorus / Arp Phaser WahWah Bitcrush
const FX_DEFS = [
  // ── Ligne 1 ──
  {
    id: 'filter', name: 'Filter', color: '#4af',
    params: [
      { name: 'Cutoff', key: 'frequency', min: 20,  max: 20000, def: 18000, log: true  },
      { name: 'Res',    key: 'Q',         min: 0.1, max: 20,    def: 0.7,   log: false },
      { name: 'Type',   key: '_typeIdx',  min: 0,   max: 3,     def: 0,     log: false, labels: ['LP','HP','BP','Notch'], cycle: true },
    ],
    mainParams: [0, 1],
    create: () => {
      const node = actx.createBiquadFilter();
      node.type = 'lowpass'; node.frequency.value = 18000; node.Q.value = 0.7;
      node.input = node; node.output = node;
      const types = ['lowpass','highpass','bandpass','notch'];
      node._typeIdx = 0;

// État FX par track : tableau de 8 slots
// Chaque slot : { active, node, params: {key: value} }
const trackFX = Array.from({length:8}, () =>
  FX_DEFS.map(def => ({
    active: false,
    node: null,
    params: Object.fromEntries(def.params.map(p => [p.key, p.def])),
  }))
);
// Nœuds send delay/reverb par track (créés dans fxRebuildChain, mis à jour en temps réel)
const trackSendNodes = {};

// Page FX courante : 'main' ou index d'effet en édition avancée
let fxPage = 'main';

// Initialiser Tuna après actx
function ensureTuna() {
  if (!tuna && actx) tuna = new Tuna(actx);
}

// Créer/recréer le nœud audio d'un effet et le connecter
function fxCreateNode(ti, slotIdx) {
  const def = FX_DEFS[slotIdx];
  if (!def || !def.create || def.id === 'arp') return null;
  ensureTuna();
  const slot = trackFX[ti][slotIdx];
  if (slot.node) { try { slot.node.output.disconnect(); } catch(e) {} }

  // Effets natifs WebAudio (pas de wrapper Tuna)
  const isNative = def.id === 'filter' || def.id === 'chorus' || def.id === 'tremolo' || def.id === 'phaser' || def.id === 'compressor';

  if (isNative) {
    const node = def.create();
    if (!node) return null;
    // Appliquer les paramètres sauvegardés
    def.params.forEach(p => {
      const v = slot.params[p.key] ?? p.def;
      try {
        if (p.key === '_mix' && node._wetGain) {
          node._mixVal = v;
          node._wetGain.gain.value = v;
          node._dryGain.gain.value = 1 - v;
        } else if (node[p.key] !== undefined) {
          node[p.key] = v;
        }
      } catch(e) {}
    });
    node.bypass = true; // bypassé par défaut
    return node;
  }

  // Effet Tuna — wrapper wet/dry natif WebAudio
  const tunaNode = def.create();
  if (!tunaNode) return null;

  const mixVal  = slot.params['_mix'] ?? 0.5;
  const dryGain = actx.createGain(); dryGain.gain.value = 1 - mixVal;
  const wetGain = actx.createGain(); wetGain.gain.value = mixVal;
  const merger  = actx.createGain();

  // wet path : tuna output → wetGain → merger
  const tunaOut = tunaNode.output || tunaNode;
  tunaOut.connect(wetGain);
  wetGain.connect(merger);
  // dry path : input externe → dryGain → merger
  // (branché dans fxRebuildChain via wrapper.inputDry)
  dryGain.connect(merger);

  const tunaIn = tunaNode.input || tunaNode;
  const wrapper = {
    input:    tunaIn,   // signal wet → tuna
    inputDry: dryGain,  // signal dry → bypass
    output:   merger,
    _tuna:    tunaNode,
    _dry:     dryGain,
    _wet:     wetGain,
    get bypass() { return tunaNode.bypass; },
    set bypass(v) { tunaNode.bypass = v; }
  };

  // Appliquer les paramètres sauvegardés (hors _mix)
  def.params.forEach(p => {
    if (p.key === '_mix') return;
    const v = slot.params[p.key] ?? p.def;
    try {
      const parts = p.key.split('.');
      let t = tunaNode;
      for (let i = 0; i < parts.length - 1; i++) t = t[parts[i]];
      t[parts[parts.length-1]] = v;
    } catch(e) {}
  });

  return wrapper;
}

// Rebuilder la chaîne audio pour la track 0 (canal unique FluidSynth)
// Tous les nœuds FX sont dans la chaîne, bypass = inactif
function fxRebuildChain(ti) {
  if (ti === undefined) ti = S.currentTrack;
  // Track master : pas de chaîne SF2 à reconstruire
  if (S.tracks[ti] && S.tracks[ti].mode === 'master') return;
  const synthNode = jsSynthNodes[ti];
  if (!synthNode || !sf2Ready) return;
  ensureTuna();
  try { synthNode.disconnect(); } catch(e) {}

  const nodes = [];
  for (let si = 0; si < FX_DEFS.length; si++) {
    if (FX_DEFS[si].id === 'arp') continue;
    const slot = trackFX[ti][si];
    if (!slot.active) {
      // Déconnecter le nœud s'il existe et n'est plus actif
      if (slot.node) { try { slot.node.output?.disconnect(); slot.node.input?.disconnect(); } catch(e) {} }
      continue;
    }
    if (!slot.node) slot.node = fxCreateNode(ti, si);
    if (slot.node) nodes.push(slot.node);
  }

  if (nodes.length === 0) {
    synthNode.connect(getMaster());
    return;
  }

  try {
    let current = synthNode;
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      current.connect(n.input === n ? n : (n.input || n));
      if (n.inputDry) current.connect(n.inputDry);
      current = n.output === n ? n : (n.output || n);
    }
    current.connect(getMaster());
    // Sends vers bus Master — toujours créés, gain mis à jour en temps réel
    const t = S.tracks[ti];
    const dSend = actx.createGain();
    const rSend = actx.createGain();
    dSend.gain.value = t.sendDelay  || 0;
    rSend.gain.value = t.sendReverb || 0;
    current.connect(dSend); dSend.connect(getDelayBus());
    current.connect(rSend); rSend.connect(getReverbBus());
    // Stocker les refs pour mise à jour en temps réel (encodeurs enc4/enc5)
    trackSendNodes[ti] = { dSend, rSend };
    console.log(`[FX] Track ${ti+1} chaîne : ${nodes.length} nœuds`);
  } catch(e) {
    console.warn('[FX] Erreur chaîne track', ti, e);
    try { synthNode.connect(getMaster()); } catch(e2) {}
  }
}

// Activer/désactiver un slot FX
function fxToggle(ti, slotIdx) {
  const slot = trackFX[ti][slotIdx];
  const def = FX_DEFS[slotIdx];
  slot.active = !slot.active;
  if (def.id === 'arp') {
    if (!slot.active) {
      arpStop(ti);
      // Reset MIDI CCs to defaults
      midiCtrlReset(ti);
    } else {
      // Apply current MIDI CC values
      midiCtrlApply(ti);
    }
    renderFXPanel();
    return;
  }
  // Créer le nœud si besoin
  if (!slot.node) {
    slot.node = fxCreateNode(ti, slotIdx);
    // Si c'est le premier nœud créé, rebuilder la chaîne
    fxRebuildChain();
  }
  if (slot.node) {
    const active = slot.active;
    // BiquadFilter natif
    if (slot.node.frequency && slot.node.frequency.setValueAtTime) {
      if (!active) {
        slot.node.frequency.setValueAtTime(20000, actx.currentTime);
        slot.node.Q.setValueAtTime(0.001, actx.currentTime);
      } else {
        const freqP = def.params.find(p => p.key === 'frequency');
        const qP = def.params.find(p => p.key === 'Q');
        if (freqP) slot.node.frequency.setValueAtTime(slot.params['frequency'] ?? freqP.def, actx.currentTime);
        if (qP) slot.node.Q.setValueAtTime(slot.params['Q'] ?? qP.def, actx.currentTime);
      }
    }
    // Chorus natif ou tout nœud avec _wetGain
    else if (slot.node._wetGain) {
      const mixVal = slot.params['_mix'] ?? 0.5;
      slot.node._wetGain.gain.setTargetAtTime(active ? mixVal : 0, actx.currentTime, 0.01);
      slot.node._dryGain.gain.setTargetAtTime(active ? 1 - mixVal : 1, actx.currentTime, 0.01);
    }
    // Tuna
    else {
      slot.node.bypass = !active;
    }
    console.log(`[FX] ${def.name} ${active ? 'ON' : 'OFF'}`);
  }
  renderFXPanel();
}

// Modifier un paramètre FX
function fxSetParam(ti, slotIdx, paramKey, value) {
  const slot = trackFX[ti][slotIdx];
  const def = FX_DEFS[slotIdx];
  slot.params[paramKey] = value;

  // Params MIDI CTRL — pas de nœud audio
  if (def.id === 'arp') {
    // Forcer entier pour octaves
    if (paramKey === 'arpOctaves') value = Math.round(value);
    slot.params[paramKey] = value;
    
    // Envoyer les CC MIDI en temps réel si le slot est actif
    if (slot.active) {
      if (paramKey === 'midiRelease') midiCtrlSendCC(ti, 72, Math.round(value));
      if (paramKey === 'midiCutoff')  midiCtrlSendCC(ti, 74, Math.round(value));
      if (paramKey === 'midiReson')   midiCtrlSendCC(ti, 71, Math.round(value));
    }
    
    // Arp ON/OFF toggle
    if (paramKey === 'arpEnabled') {
      value = Math.round(value);
      slot.params[paramKey] = value;
      if (value === 0) arpStop(ti);
    }
    
    if (paramKey === 'arpMode' && arpState[ti].timer) {
      arpState[ti].noteIdx = 0;
    }
    if (paramKey === 'arpRate' && arpState[ti].timer) {
      clearInterval(arpState[ti].timer);
      arpState[ti].timer = null;
      const newMs = ARP_RATE_STEPS[Math.round(value)] * stepDur() * 1000;
      arpState[ti].lastRate = Math.round(value);
      arpState[ti].timer = setInterval(() => arpTick(ti), newMs);
    }
    const paramIdx = def.params.findIndex(p => p.key === paramKey);
    const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
    if (valEl) valEl.textContent = fxFormatVal(def.params[paramIdx], value);
    const valAdv = document.getElementById(`fxadv_${slotIdx}_${paramIdx}`);
    if (valAdv) valAdv.textContent = fxFormatVal(def.params[paramIdx], value);
    return;
  }

  if (!slot.node) return;
  try {
    if (paramKey === '_mix') {
      // Nœud natif avec _wetGain (chorus)
      if (slot.node._wetGain) {
        slot.node._mixVal = value;
        slot.node._wetGain.gain.setTargetAtTime(value, actx.currentTime, 0.01);
        slot.node._dryGain.gain.setTargetAtTime(1 - value, actx.currentTime, 0.01);
      } else if (slot.node._wet) {
        // Wrapper Tuna
        slot.node._wet.gain.setTargetAtTime(value, actx.currentTime, 0.01);
        slot.node._dry.gain.setTargetAtTime(1 - value, actx.currentTime, 0.01);
      }
      console.log(`[FX] ${def.name}.mix = ${value.toFixed(2)}`);
    } else {
      // Accès direct sur le nœud (ou via _tuna pour les wrappers Tuna)
      const parts = paramKey.split('.');
      let target = slot.node._tuna || slot.node;
      for (let i = 0; i < parts.length - 1; i++) target = target[parts[i]];
      const lastKey = parts[parts.length - 1];
      const prop = target[lastKey];
      if (prop && prop.setValueAtTime) {
        prop.setTargetAtTime(value, actx.currentTime, 0.01);
      } else {
        target[lastKey] = value;
      }
      console.log(`[FX] ${def.name}.${paramKey} = ${value.toFixed ? value.toFixed(2) : value}`);
    }
  } catch(e) { console.warn('[FX] setParam error:', paramKey, e); }
  const paramIdx = def.params.findIndex(p => p.key === paramKey);
  if (paramIdx < 0) return;
  // Mettre à jour la valeur texte
  const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
  if (valEl) {
    valEl.textContent = def.id === 'sends'
      ? Math.round(value * 100) + '%'
      : fxFormatVal(def.params[paramIdx], value);
  }
  // Pour Sends : mettre à jour l'arc en temps réel
  if (def.id === 'sends') {
    const START = 135, END = 405;
    const angleFill = START + value * (END - START);
    const sx = fxSlotX(slotIdx), sy = fxSlotY(slotIdx);
    const encR = 15, gap = 18;
    const totalEncW = encR*2*2 + gap;
    const encStartX = sx + (FX_SW - totalEncW) / 2 + encR;
    const cx = encStartX + paramIdx * (encR*2 + gap);
    const cy = sy + 28 + encR + 4;
    let arcEl = document.getElementById(`fxsend_${slotIdx}_${paramIdx}`);
    if (!arcEl && angleFill > START + 0.5) {
      // Créer l'arc dans le groupe du slot
      const sg = document.getElementById(`fxslot_${slotIdx}`);
      if (sg) {
        arcEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arcEl.setAttribute('id', `fxsend_${slotIdx}_${paramIdx}`);
        arcEl.setAttribute('fill', 'none');
        arcEl.setAttribute('stroke', def.color);
        arcEl.setAttribute('stroke-width', '3');
        arcEl.setAttribute('stroke-linecap', 'round');
        arcEl.setAttribute('pointer-events', 'none');
        // Insérer avant la zone de hit (dernier élément)
        sg.insertBefore(arcEl, sg.lastChild);
      }
    }
    if (arcEl) {
      if (angleFill <= START + 0.5) arcEl.setAttribute('d', '');
      else arcEl.setAttribute('d', arcPathFX(cx, cy, encR, START, angleFill));
    }
  }
}

function fxFormatVal(paramDef, val) {
  if (paramDef.labels) {
    const base = paramDef.cycleBase ?? 0;
    return paramDef.labels[Math.round(val) - base] || val+'';
  }
  if (paramDef.log) return val >= 1000 ? (val/1000).toFixed(1)+'k' : Math.round(val)+'';
  if (Number.isInteger(val)) return val+'';
  return parseFloat(val.toFixed(2))+'';
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDU SVG DU PANEL FX
// ─────────────────────────────────────────────────────────────────────────────
const FX_ZONE_X = 190, FX_ZONE_Y = 107, FX_ZONE_W = 510, FX_ZONE_H = 188;
const FX_COLS = 4, FX_ROWS = 2;
const FX_SW = Math.floor(FX_ZONE_W / FX_COLS); // 127
const FX_SH = Math.floor(FX_ZONE_H / FX_ROWS); // 94

function fxSlotX(i) { return FX_ZONE_X + (i % FX_COLS) * FX_SW; }
function fxSlotY(i) { return FX_ZONE_Y + Math.floor(i / FX_COLS) * FX_SH; }

function arcPathFX(cx, cy, r, startDeg, endDeg) {
  const s = (startDeg - 90) * Math.PI/180;
  const e = (endDeg   - 90) * Math.PI/180;
  const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s);
  const x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function buildFXPanel() {
  const g = document.getElementById('enginePanel');
  if (!g) return;
  g.innerHTML = ''; // reset

  // Fond global
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', FX_ZONE_X); bg.setAttribute('y', FX_ZONE_Y);
  bg.setAttribute('width', FX_ZONE_W); bg.setAttribute('height', FX_ZONE_H);
  bg.setAttribute('rx', 6); bg.setAttribute('fill', '#0f0f11');
  bg.setAttribute('stroke', '#252528'); bg.setAttribute('stroke-width', '1');
  g.appendChild(bg);

  // 8 slots
  for (let i = 0; i < 8; i++) {
    const sg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    sg.setAttribute('id', `fxslot_${i}`);
    sg.setAttribute('data-fxslot', i);
    sg.style.cursor = 'pointer';
    g.appendChild(sg);
  }
}

function renderFXPanel() {
  const ti = S.currentTrack;
  const t = S.tracks[ti];
  const isDrum   = t.mode === 'drum';
  const isMaster = t.mode === 'master';
  const showFX   = (S.mode === 'note' || S.mode === 'loop') && !isDrum && !isMaster && !projectModeActive;
  const showDrum = (S.mode === 'note' || S.mode === 'loop') && isDrum && !projectModeActive;
  const showMaster = (S.mode === 'note' || S.mode === 'loop') && isMaster && !projectModeActive;
  const showPanel  = showFX || showDrum || showMaster;

  // Reset fxPage si invalide pour cette track
  if (fxPage !== 'main' && typeof fxPage === 'number') {
    if (!FX_DEFS[fxPage] || isMaster || isDrum) fxPage = 'main';
  }
  const panel = document.getElementById('enginePanel');
  if (!panel) return;
  panel.setAttribute('visibility', showPanel ? 'visible' : 'hidden');

  for (let r = 0; r < 4; r++) {
    const row = document.getElementById(`padRow${r}`);
    if (row) row.setAttribute('visibility', showPanel ? 'hidden' : 'visible');
  }
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 8; c++)
      ['padlbl','padslbl'].forEach(pfx => {
        const lbl = document.getElementById(`${pfx}_${r}_${c}`);
        if (lbl) lbl.setAttribute('visibility', showPanel ? 'hidden' : 'visible');
      });

  if (!showPanel) return;

  if (showDrum)   { renderDrumPadSelection(); return; }
  if (showMaster) { renderMasterPanel(); return; }
  if (fxPage === 'main') renderFXPageMain(ti);
  else renderFXPageAdvanced(ti, fxPage);
}

        { key:'width',    label:'Width',  fmt: v => Math.round(v*100)+'%', min:0, max:1 },
        { key:'predelay', label:'PreDly', fmt: v => Math.round(v*1000)+'ms', min:0, max:0.1 },
      ],
    },
    {
      id:'comp', name:'COMP', slots:[4,5], col:'#ff8',

    },
    {
      id:'lim', name:'LIMIT', slots:[6,7], col:'#f55',
      params: [
        { key:'threshold', label:'Ceil',  fmt: v => Math.round(v)+'dB',  min:-20, max:0 },
        { key:'release',   label:'Rel',   fmt: v => (v*1000).toFixed(0)+'ms', min:0.005, max:1, log:true },
        { key:'knee',      label:'Knee',  fmt: v => Math.round(v)+'dB',  min:0, max:10 },
        { key:'gain',      label:'Gain',  fmt: v => (v>=0?'+':'')+Math.round(v)+'dB', min:-6, max:12 },
      ],
    },
  ];

  const margin = 4, encR = 11;

  MASTER_DEFS.forEach(def => {
    const sg = document.getElementById(`fxslot_${def.slots[0]}`);
    if (!sg) return;
    const x = fxSlotX(def.slots[0]), y = fxSlotY(def.slots[0]);
    const w = FX_SW * 2, h = FX_SH;
    const col = def.col;

    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', x+margin); bg.setAttribute('y', y+margin);

    bg.setAttribute('fill', col+'18'); bg.setAttribute('stroke', col+'88');
    bg.setAttribute('stroke-width', '1.2');
    sg.appendChild(bg);

    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', x+14); nameEl.setAttribute('y', y+19);
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '9'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', col); nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = def.name;
    sg.appendChild(nameEl);

    const nP = def.params.length;
    const colW = (w - margin*2) / nP;
    const yBase = y + 28;

    def.params.forEach((p, pi) => {
      const val = masterFX[def.id][p.key];
      const px  = x + margin + colW*pi + colW/2;

      if (p.type === 'toggle') {
        const tbg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');

          pct = (val - p.min) / (p.max - p.min);

      lbl.textContent = p.label;
      sg.appendChild(lbl);

      const valEl = document.createElementNS('http://www.w3.org/2000/svg','text');

      valEl.setAttribute('text-anchor','middle');
      valEl.setAttribute('font-family',"'DM Mono',monospace");
      valEl.setAttribute('font-size','10');
      valEl.setAttribute('fill', col); valEl.setAttribute('pointer-events','none');
      valEl.textContent = p.fmt(val);
      sg.appendChild(valEl);

      hit.setAttribute('x', px-colW/2+1); hit.setAttribute('y', y+margin+24);
      hit.setAttribute('width', colW-2); hit.setAttribute('height', h-margin-26);
      hit.setAttribute('fill','transparent');
      hit.setAttribute('cursor', p.type==='toggle' ? 'pointer' : 'ns-resize');
      hit.setAttribute('data-mfx', def.id);
      hit.setAttribute('data-mfxp', pi);
      sg.appendChild(hit);
    });
  });
}

function renderFXPageMain(ti) {
  const col = TRACK_COLORS[ti] || '#ff6b00';

  // Nouveau mapping des 8 slots SVG :
  // slot 0→FX[0]=Filter, 1→FX[1]=Tremolo, 2→FX[2]=Compress, 3→FX[3]=Chorus
  // slot 4+5 → FX[4]=Arp (double largeur, tous params en façade)
  // slot 6→FX[5]=Phaser, 7→FX[6]=Bitcrusher   (Sends supprimé)
  const SLOT_MAP = [0, 1, 2, 3, 4, 4, 5, 6]; // FX_DEFS index par slot SVG
  const margin = 5;

  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';

    // Slot 5 = 2e moitié de l'Arp → déjà dessiné dans slot 4, on le laisse vide
    if (i === 5) continue;

    const defIdx = SLOT_MAP[i];
    const def    = FX_DEFS[defIdx];
    if (!def) continue;
    const slot   = trackFX[ti][defIdx];
    const active = slot.active;
    const sx = fxSlotX(i), sy = fxSlotY(i);
    const isArp  = (def.id === 'arp'); // dessiné en double-largeur

    const w = isArp ? FX_SW * 2 : FX_SW; // Arp = 2 slots de large

    // Fond
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+margin); bg.setAttribute('y', sy+margin);
    bg.setAttribute('width', w-margin*2); bg.setAttribute('height', FX_SH-margin*2);
    bg.setAttribute('rx', 5);
    bg.setAttribute('fill',   active ? (def.color+'22') : '#141416');
    bg.setAttribute('stroke', active ? def.color        : '#2a2a2e');
    bg.setAttribute('stroke-width', active ? '1.5' : '0.5');
    sg.appendChild(bg);

    // Nom + LED
    const cx = sx + w/2;
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', cx); nameEl.setAttribute('y', sy + 20);
    nameEl.setAttribute('text-anchor', 'middle');
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '12'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', active ? def.color : '#555');
    nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = def.name.toUpperCase();
    sg.appendChild(nameEl);

    const led = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    led.setAttribute('cx', sx + w - 14); led.setAttribute('cy', sy + 14);
    led.setAttribute('r', 4);
    led.setAttribute('fill',   active ? def.color : '#222');
    led.setAttribute('stroke', active ? def.color : '#333');
    led.setAttribute('pointer-events', 'none');
    sg.appendChild(led);

    if (isArp) {
      // ── MIDI CTRL double-slot : 4 indicateurs read-only ──
      const mainP = def.mainParams || [4, 5, 6, 0]; // Release, Cutoff, Resonance, ARP
      const colW  = w / 4;

      // Zone de toggle sur le fond du slot
      const toggleHit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      toggleHit.setAttribute('x', sx + margin); toggleHit.setAttribute('y', sy + margin);
      toggleHit.setAttribute('width', w - margin*2); toggleHit.setAttribute('height', FX_SH - margin*2);
      toggleHit.setAttribute('rx', 5); toggleHit.setAttribute('fill', 'transparent');
      toggleHit.setAttribute('cursor', 'pointer');
      toggleHit.setAttribute('data-fxslot', defIdx);
      sg.appendChild(toggleHit);

      mainP.forEach((pi, col) => {
        const p   = def.params[pi];
        const val = slot.params[p.key] ?? p.def;
        const px  = sx + colW * col + colW/2;

        // Nom du param
        const pname = document.createElementNS('http://www.w3.org/2000/svg', 'text');

        pval.textContent = fxFormatVal(p, val);
        sg.appendChild(pval);

    } else {
      // ── Slot standard (1 slot) : 2 params principaux ──
      const mainP = def.mainParams || [0, 1];
      mainP.forEach((pi, row) => {
        if (pi >= def.params.length) return;
        const p   = def.params[pi];
        const val = slot.params[p.key] ?? p.def;
        const py  = sy + 38 + row * 22;

        const pname = document.createElementNS('http://www.w3.org/2000/svg', 'text');

        pname.setAttribute('pointer-events', 'none');
        pname.textContent = p.name;
        sg.appendChild(pname);

        const pval = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pval.setAttribute('id', `fxpv_${defIdx}_${pi}`);
        pval.setAttribute('x', sx + FX_SW - 10); pval.setAttribute('y', py);
        pval.setAttribute('text-anchor', 'end');
        pval.setAttribute('font-family', "'DM Mono',monospace");

        pval.setAttribute('fill', active ? def.color : '#444');

        sg.appendChild(pval);
      });

      const hint = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      hint.setAttribute('x', sx + FX_SW/2); hint.setAttribute('y', sy + FX_SH - 8);
      hint.setAttribute('text-anchor', 'middle');
      hint.setAttribute('font-family', "'DM Mono',monospace");
      hint.setAttribute('font-size', '10');
      hint.setAttribute('fill', '#333');
      hint.setAttribute('pointer-events', 'none');
      hint.textContent = 'long press = edit';
      sg.appendChild(hint);

      // Zone de clic
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', sx+margin); hit.setAttribute('y', sy+margin);
      hit.setAttribute('width', FX_SW-margin*2); hit.setAttribute('height', FX_SH-margin*2);
      hit.setAttribute('rx', 5); hit.setAttribute('fill', 'transparent');
      hit.setAttribute('data-fxslot', defIdx);
      sg.appendChild(hit);
    }
  }
}


function renderFXPageAdvanced(ti, slotIdx) {

  const nParams = def.params.length;

  // 7 slots params + 1 slot retour

    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';
    const sx = fxSlotX(i), sy = fxSlotY(i);
    const pad = 5;

    if (i === 7) {
      // Slot retour ←
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#1a1a1e');
      bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);

      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      arrow.setAttribute('x', sx + FX_SW/2); arrow.setAttribute('y', sy + FX_SH/2 + 8);
      arrow.setAttribute('text-anchor', 'middle');
      arrow.setAttribute('font-family', "'DM Mono',monospace");
      arrow.setAttribute('font-size', '45'); arrow.setAttribute('fill', '#555');
      arrow.setAttribute('pointer-events', 'none');
      arrow.textContent = '←';
      sg.appendChild(arrow);

      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
      hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
      hit.setAttribute('fill', 'transparent'); hit.setAttribute('data-fxback', '1');
      sg.appendChild(hit);
      continue;
    }

    if (i >= nParams) {
      // Slot vide
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#0d0d0f');
      bg.setAttribute('stroke', '#1a1a1a'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);
      continue;
    }

    // Slot paramètre
    const p = def.params[i];
    const val = slot.params[p.key] ?? p.def;
    const pct = p.log
      ? Math.log(val/p.min) / Math.log(p.max/p.min)
      : (val - p.min) / (p.max - p.min);

    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
    bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
    bg.setAttribute('rx', 5); bg.setAttribute('fill', '#141416');
    bg.setAttribute('stroke', def.color+'55'); bg.setAttribute('stroke-width', '0.5');
    sg.appendChild(bg);

    // Barre de valeur verticale
    const barH = Math.round(pct * (FX_SH - pad*2 - 30));
    const barBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    barBg.setAttribute('x', sx+pad+8); barBg.setAttribute('y', sy+pad+10);
    barBg.setAttribute('width', 6); barBg.setAttribute('height', FX_SH-pad*2-30);
    barBg.setAttribute('rx', 3); barBg.setAttribute('fill', '#1e1e22');
    sg.appendChild(barBg);
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('id', `fxbar_${slotIdx}_${i}`);
    const barTop = sy + pad + 10 + (FX_SH-pad*2-30) - barH;
    bar.setAttribute('x', sx+pad+8); bar.setAttribute('y', String(barTop));
    bar.setAttribute('width', 6); bar.setAttribute('height', String(barH));
    bar.setAttribute('rx', 3); bar.setAttribute('fill', def.color);
    bar.setAttribute('pointer-events', 'none');
    sg.appendChild(bar);

    // Nom
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', sx+pad+20); nameEl.setAttribute('y', sy+22);
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '13'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', def.color); nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = p.name;
    sg.appendChild(nameEl);

    // Valeur
    const valEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    valEl.setAttribute('id', `fxadv_${slotIdx}_${i}`);
    valEl.setAttribute('x', sx + FX_SW - 10); valEl.setAttribute('y', sy + FX_SH - 10);
    valEl.setAttribute('text-anchor', 'end');
    valEl.setAttribute('font-family', "'DM Mono',monospace");
    valEl.setAttribute('font-size', '14'); valEl.setAttribute('fill', '#ccc');
    valEl.setAttribute('pointer-events', 'none');
    valEl.textContent = fxFormatVal(p, val);
    sg.appendChild(valEl);

    // Zone drag
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
    hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('data-fxparam', i);
    hit.setAttribute('data-fxslotadv', slotIdx);
    sg.appendChild(hit);
  }
}

// ── Events FX panel ────────────────────────────────────────────
let _fxPressTimer = null;
let _fxDrag = null;

function fxHandleDown(e) {
  const panel = document.getElementById('enginePanel');
  if (!panel || panel.getAttribute('visibility') === 'hidden') return false;

  let el = e.target;
  for (let n = el; n && n !== document; n = n.parentNode) {
    if (!n.getAttribute) continue;

    // ── Master FX : drag param ────────────────────────────────
    if (n.getAttribute('data-mfx') !== null && n.getAttribute('data-mfxp') !== null) {
      const fxId  = n.getAttribute('data-mfx');
      const pi    = parseInt(n.getAttribute('data-mfxp'));
      const DEFS_MAP = {
        delay:  [ {key:'syncDiv',min:0,max:6,step:1,log:false,def:4}, {key:'sync',type:'toggle',def:true}, {key:'feedback',min:0,max:0.95,log:false,def:0.35}, {key:'filter',min:200,max:16000,log:true,def:4000} ],
        reverb: [ {key:'roomSize',min:0,max:1,log:false,def:0.85}, {key:'damp',min:0,max:1,log:false,def:0.35}, {key:'width',min:0,max:1,log:false,def:0.75}, {key:'predelay',min:0,max:0.1,log:false,def:0.028} ],
        comp:   [ {key:'threshold',min:-60,max:0,log:false,def:-18}, {key:'ratio',min:1,max:20,log:false,def:3}, {key:'attack',min:0.0005,max:1,log:true,def:0.010}, {key:'release',min:0.01,max:1,log:true,def:0.15} ],
        lim:    [ {key:'threshold',min:-20,max:0,log:false,def:-1}, {key:'release',min:0.005,max:1,log:true,def:0.05}, {key:'knee',min:0,max:10,log:false,def:2}, {key:'gain',min:-6,max:12,log:false,def:0} ],
      };
      const pDef = DEFS_MAP[fxId]?.[pi];
      if (!pDef) return false;
      if (pDef.type === 'toggle') {
        masterFX[fxId][pDef.key] = !masterFX[fxId][pDef.key];
        if (fxId === 'delay' && pDef.key === 'sync') updateDelayTime();
        applyMasterFX();
        renderMasterPanel();
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxDrag = {
        isMaster: true, fxId, pi, pDef,
        startY: e.clientY, startX: e.clientX,
        // En mode free pour syncDiv, startVal = delay.time (secondes), pas l'index
        startVal: (fxId === 'delay' && pDef.key === 'syncDiv' && !masterFX.delay.sync)
          ? masterFX.delay.time
          : masterFX[fxId][pDef.key]
      };
      S._oledLocked = true;
      e.stopPropagation(); e.preventDefault();
      return true;
    }

    // Retour depuis page avancée
    if (n.getAttribute('data-fxback')) {
      // Flash blanc bref sur le slot 7 (retour)
      const sg = document.getElementById('fxslot_7');
      if (sg) {
        const bg = sg.querySelector('rect');
        if (bg) {
          bg.setAttribute('stroke', '#fff');
          bg.setAttribute('stroke-width', '2');
          setTimeout(() => { bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5'); }, 150);
        }
      }
      setTimeout(() => {
        fxPage = 'main';
        renderFXPanel();
      }, 120);
      e.stopPropagation(); e.preventDefault();
      return true;
    }
    // Clic sur un pad drum (mode drum uniquement)
    if (n.getAttribute('data-drumpad') !== null) {
      const padIdx = parseInt(n.getAttribute('data-drumpad'));
      const t = S.tracks[S.currentTrack];
      if (t.mode === 'drum') {
        ensureAudio();
        if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
        S.selectedDrumPad = padIdx;
        triggerDrumPad(padIdx, 0.85);
        renderSteps();
        renderDrumPadSelection();
        updateEncArcs();
        updateSendArcs();
        oled('DRUM', getDrumPadName(S.currentTrack, padIdx), `pad ${padIdx+1} · seq`);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
    }
    // Drag paramètre avancé
    if (n.getAttribute('data-fxparam') !== null) {
      const paramIdx = parseInt(n.getAttribute('data-fxparam'));
      const slotIdx  = parseInt(n.getAttribute('data-fxslotadv') ?? n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) return false;
      const slot = trackFX[S.currentTrack][slotIdx];
      const p = def.params[paramIdx];
      if (!p) return false;

      // Arp en page principale → cycle sur clic (pas drag)
      if (def.id === 'arp' && fxPage === 'main') {
        const cur = slot.params[p.key] ?? p.def;
        const base = p.cycleBase ?? p.min;
        const next = ((Math.round(cur - base) + 1) % (Math.round(p.max - base) + 1)) + base;
        fxSetParam(S.currentTrack, slotIdx, p.key, next);
        renderFXPageMain(S.currentTrack);
        e.stopPropagation(); e.preventDefault();
        return true;
      }

      // Param cyclable → clic simple pour cycler
      if (p.cycle) {
        const cur = slot.params[p.key] ?? p.def;
        const base = p.cycleBase ?? 0;
        const next = ((Math.round(cur) - base + 1) % (Math.round(p.max) - base + 1)) + base;
        fxSetParam(S.currentTrack, slotIdx, p.key, next);
        if (fxPage === 'main') renderFXPageMain(S.currentTrack);
        else renderFXPageAdvanced(S.currentTrack, slotIdx);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxDrag = { slotIdx, paramIdx, p, ti: S.currentTrack, startY: e.clientY, startX: e.clientX, startVal: slot.params[p.key] ?? p.def };
      e.stopPropagation(); e.preventDefault();
      return true;
    }
    // Slot page principale — long press = page avancée (pas pour l'Arp, pas pour le Master)
    if (n.getAttribute('data-fxslot') !== null && fxPage === 'main' && n.getAttribute('data-fxparam') === null) {
      // Bloquer complètement sur la piste Master
      if (S.tracks[S.currentTrack].mode === 'master') return false;
      const slotIdx = parseInt(n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) return false;
      if (def.id === 'arp') {
        // MIDI CTRL : clic court = toggle on/off, clic long = page avancée
        _fxPressTimer = setTimeout(() => {
          _fxPressTimer = null;
          fxPage = slotIdx;
          renderFXPanel();
        }, 500);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxPressTimer = setTimeout(() => {
        _fxPressTimer = null;
        fxPage = slotIdx;
        renderFXPanel();
      }, 500);
      e.stopPropagation(); e.preventDefault();
      return true;
    }
  }
  return false;
}

function fxHandleUp(e) {
  if (_fxDrag?.isMaster) {
    _fxDrag = null;
    S._oledLocked = false;
    return;
  }
  if (_fxPressTimer !== null) {
    clearTimeout(_fxPressTimer);
    // Court appui = toggle
    let el = e.target;
    for (let n = el; n && n !== document; n = n.parentNode) {
      if (!n.getAttribute) continue;
      // Ne pas toggler si c'est une zone de param (encodeur Arp)
      if (n.getAttribute('data-fxslot') !== null && n.getAttribute('data-fxparam') === null && fxPage === 'main') {
        if (S.tracks[S.currentTrack].mode === 'master') break;
        const slotIdx = parseInt(n.getAttribute('data-fxslot'));
        const def = FX_DEFS[slotIdx];
        if (!def) break;
        fxToggle(S.currentTrack, slotIdx);
        renderFXPageMain(S.currentTrack);
        _fxPressTimer = null;
        return;
      }
    }
    _fxPressTimer = null;
  }
  _fxDrag = null;
}

function fxHandleMove(e) {
  if (!_fxDrag) return;

  // ── Master FX drag ──────────────────────────────────────────
  if (_fxDrag.isMaster) {
    const { fxId, pi, pDef } = _fxDrag;
    const dy = _fxDrag.startY - e.clientY;
    const dx = e.clientX - (_fxDrag.startX || e.clientX);
    const delta = dy + dx;
    const range = pDef.max - pDef.min;
    let newVal;
    if (pDef.step && fxId === 'delay' && pDef.key === 'syncDiv' && !masterFX.delay.sync) {
      // Mode free : syncDiv contrôle le temps en ms (10ms → 2000ms) de façon continue
      const freeRange = 1.99; // secondes
      newVal = Math.max(0.01, Math.min(2.0, _fxDrag.startVal + delta / 150 * freeRange));
      masterFX.delay.time = newVal;
      if (_masterNodes) _masterNodes.delayNode.delayTime.value = newVal;
      const valEl2 = document.getElementById(`mfx_val_delay_0`);
      if (valEl2) valEl2.textContent = (newVal * 1000).toFixed(0) + 'ms';
      const arcEl2 = document.getElementById(`mfx_arc_delay_0`);
      if (arcEl2) {
        const pct2 = Math.log(newVal / 0.01) / Math.log(2.0 / 0.01);
        const CIRC = 2 * Math.PI * 11;
        const filled = Math.max(0, Math.min(1, pct2)) * CIRC * 0.75;
        arcEl2.setAttribute('stroke-dasharray', `${filled} ${CIRC - filled}`);
      }
      oledForce('MASTER', 'DELAY TIME', (newVal * 1000).toFixed(0) + 'ms');
      return;
    }
    if (pDef.step) {
      // Param discret : 20px par step
      newVal = Math.round(_fxDrag.startVal + delta / 20);
    } else if (pDef.log) {
      const logRange = Math.log(pDef.max / pDef.min);
      newVal = _fxDrag.startVal * Math.exp(delta / 100 * logRange);
    } else {
      newVal = _fxDrag.startVal + (delta / 150) * range;
    }
    newVal = Math.max(pDef.min, Math.min(pDef.max, newVal));
    if (pDef.step) newVal = Math.round(newVal);
    masterFX[fxId][pDef.key] = newVal;
    if (fxId === 'delay') updateDelayTime();
    applyMasterFX();

    // Formatters complets pour tous les params
    const DEFS_FMT = {
      delay:  [
        v => masterFX.delay.sync ? DELAY_SYNC_DIVS[Math.round(Math.max(0,Math.min(6,v)))].label : (masterFX.delay.time*1000).toFixed(0)+'ms',
        null,
        v => Math.round(v*100)+'%',
        v => v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'Hz'
      ],
      reverb: [ v => Math.round(v*100)+'%', v => Math.round(v*100)+'%', v => Math.round(v*100)+'%', v => Math.round(v*1000)+'ms' ],
      comp:   [ v => Math.round(v)+'dB', v => Math.round(v)+':1', v => v<0.01?(v*1000).toFixed(1)+'ms':(v*1000).toFixed(0)+'ms', v => (v*1000).toFixed(0)+'ms' ],
      lim:    [ v => Math.round(v)+'dB', v => (v*1000).toFixed(0)+'ms', v => Math.round(v)+'dB', v => (v>=0?'+':'')+Math.round(v)+'dB' ],
    };
    const fmt = DEFS_FMT[fxId]?.[pi];
    const valEl = document.getElementById(`mfx_val_${fxId}_${pi}`);
    if (valEl && fmt) valEl.textContent = fmt(newVal);

    // Arc mise à jour — y compris pour les params step (syncDiv)
    const arcEl = document.getElementById(`mfx_arc_${fxId}_${pi}`);
    if (arcEl) {
      const pmin=pDef.min, pmax=pDef.max;
      let pct;
      if (pDef.step) {
        pct = (pmax - pmin) > 0 ? (newVal - pmin) / (pmax - pmin) : 0;
      } else if (pDef.log) {
        pct = Math.log(Math.max(newVal,pmin)/pmin)/Math.log(pmax/pmin);
      } else {
        pct = (newVal-pmin)/(pmax-pmin);
      }
      pct = Math.max(0, Math.min(1, pct));
      const CIRC = 2 * Math.PI * 11;
      const filled = pct * CIRC * 0.75;
      arcEl.setAttribute('stroke-dasharray', `${filled} ${CIRC - filled}`);
    }
    oledForce('MASTER', (fxId+' '+pDef.key).toUpperCase(), valEl?.textContent || '');
    return;
  }

  const { slotIdx, paramIdx, p, ti } = _fxDrag;
  const dy = _fxDrag.startY - e.clientY;
  const dx = e.clientX - (_fxDrag.startX || e.clientX);
  const delta = dy + dx;
  const range = p.max - p.min;
  let newVal;
  if (p.log) {
    const logRange = Math.log(p.max / p.min);
    newVal = _fxDrag.startVal * Math.exp(delta / 100 * logRange);
  } else {
    const sensitivity = 150;
    newVal = _fxDrag.startVal + (delta / sensitivity) * range;
  }
  newVal = Math.max(p.min, Math.min(p.max, newVal));
  if (Number.isInteger(p.def) && Number.isInteger(p.min) && Number.isInteger(p.max) && (p.max - p.min) > 1) {
    newVal = Math.round(newVal);
  }
  fxSetParam(ti, slotIdx, p.key, newVal);

  // Mettre à jour visuellement selon la page courante
  if (fxPage === 'main') {
    // Page principale : mettre à jour l'arc de l'Arp si c'est un param Arp
    const arcEl = document.getElementById(`fxpv_arc_${slotIdx}_${paramIdx}`);
    if (arcEl) {
      const START = 135, END = 405;
      const pct2 = (newVal - p.min) / (p.max - p.min);
      const angleFill = START + pct2 * (END - START);
      arcEl.setAttribute('d', arcPathFX(
        parseFloat(arcEl.getAttribute('cx') || 0),
        parseFloat(arcEl.getAttribute('cy') || 0),
        16, START, angleFill
      ));
    }
    // Mettre à jour le texte valeur
    const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
    if (valEl) valEl.textContent = fxFormatVal(p, newVal);
    return;
  }

  // Page avancée : barre verticale
  const pct = p.log
    ? Math.log(newVal/p.min) / Math.log(p.max/p.min)
    : (newVal - p.min) / (p.max - p.min);
  const barEl = document.getElementById(`fxbar_${slotIdx}_${paramIdx}`);
  const totalH = FX_SH - 5*2 - 30;
  const barH = Math.round(pct * totalH);
  if (barEl) {
    const sy = fxSlotY(paramIdx);
    barEl.setAttribute('height', String(barH));
    barEl.setAttribute('y', String(sy + 5 + 10 + totalH - barH));
  }
  const valEl2 = document.getElementById(`fxadv_${slotIdx}_${paramIdx}`);
  if (valEl2) valEl2.textContent = fxFormatVal(p, newVal);
}

// Brancher sur les events document
document.addEventListener('mousedown', e => { fxHandleDown(e); });
document.addEventListener('mousemove', e => { fxHandleMove(e); });
document.addEventListener('mouseup',   e => { fxHandleUp(e); });

// ── Double-clic sur params FX et Master → reset ───────────────
document.addEventListener('dblclick', e => {
  const panel = document.getElementById('enginePanel');
  if (!panel || panel.getAttribute('visibility') === 'hidden') return;
  // Ignorer si on est sur la piste Master ou drum (pas de params FX à resetter)
  const curT = S.tracks[S.currentTrack];
  if (curT.mode === 'master' && !e.target.closest('[data-mfx]')) return;

  let el = e.target;
  for (let n = el; n && n !== document; n = n.parentNode) {
    if (!n.getAttribute) continue;
    // Ignorer les drum pads
    if (n.getAttribute('data-drumpad') !== null) return;

    // Param FX piste (page principale ou avancée)
    if (n.getAttribute('data-fxparam') !== null) {
      const paramIdx = parseInt(n.getAttribute('data-fxparam'));
      const slotIdx  = parseInt(n.getAttribute('data-fxslotadv') ?? n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) break;
      const slot = trackFX[S.currentTrack][slotIdx];
      const p = def.params[paramIdx];
      if (!p) break;
      fxSetParam(S.currentTrack, slotIdx, p.key, p.def);
      if (fxPage === 'main') renderFXPageMain(S.currentTrack);
      else renderFXPageAdvanced(S.currentTrack, slotIdx);
      oledForce('RESET', p.name, def.name);
      e.preventDefault(); e.stopPropagation();
      return;
    }

    // Param Master FX
    if (n.getAttribute('data-mfx') !== null && n.getAttribute('data-mfxp') !== null) {
      const fxId = n.getAttribute('data-mfx');
      const pi   = parseInt(n.getAttribute('data-mfxp'));
      const MASTER_DEFS = {
        delay:  [ {key:'syncDiv',def:4}, {key:'sync'}, {key:'feedback',def:0.35}, {key:'filter',def:4000} ],
        reverb: [ {key:'roomSize',def:0.85}, {key:'damp',def:0.35}, {key:'width',def:0.75}, {key:'predelay',def:0.028} ],
        comp:   [ {key:'threshold',def:-18}, {key:'ratio',def:3}, {key:'attack',def:0.010}, {key:'release',def:0.15} ],
        lim:    [ {key:'threshold',def:-1}, {key:'release',def:0.05}, {key:'knee',def:2}, {key:'gain',def:0} ],
      };
      const pd = MASTER_DEFS[fxId]?.[pi];
      if (!pd || pd.def === undefined) break;
      masterFX[fxId][pd.key] = pd.def;
      if (fxId === 'delay') updateDelayTime();
      applyMasterFX();
      renderMasterPanel();
      oledForce('RESET', fxId.toUpperCase(), pd.key);
      e.preventDefault(); e.stopPropagation();
      return;
    }
    break;
  }
});

// Preview : timer noteOff pour le browsing de presets
let previewTimer = null;
const PREVIEW_NOTE = 60; // C4

async function initSF2() {
  if (sf2Ready || sf2Initializing) return;
  sf2Initializing = true;
  ensureAudio();
  try {
    await JSSynth.Synthesizer.waitForWasmInitialized();
    // Créer des instances FluidSynth uniquement pour les tracks mélodiques (pas drum ni master)
    let instanceCount = 0;
    for (let ti = 0; ti < 8; ti++) {
      if (TRACK_MODES[ti] === 'drum' || TRACK_MODES[ti] === 'master') {
        jsSynths[ti] = null;
        jsSynthNodes[ti] = null;
        console.log(`[SF2] Track ${ti+1} (${TRACK_MODES[ti]}) — pas de FluidSynth`);
        continue;
      }
      const synth = new JSSynth.Synthesizer();
      await synth.init(actx.sampleRate, [
        ['synth.sample-rate', actx.sampleRate],
        ['synth.gain', 0.8],
        ['synth.polyphony', 32],
      ]);
      const node = synth.createAudioNode(actx, 2048);
      jsSynths[ti]     = synth;
      jsSynthNodes[ti] = node;
      instanceCount++;
      console.log(`[SF2] Instance T${ti+1} prête`);
    }
    sf2Ready = true;
    sf2Initializing = false;
    console.log(`[SF2] FluidSynth WASM prêt — ${instanceCount} instances`);
    // Construire les chaînes FX (une par track)
    setTimeout(() => { for (let ti = 0; ti < 8; ti++) fxRebuildChain(ti); }, 100);
  } catch(e) {
    sf2Initializing = false;
    console.error('[SF2] Init failed:', e);
  }
}

// Cache persistant par track : sf2BankCache[ti][fileName] = { sfontId, presets }
const sf2BankCache = [{},{},{},{},{},{},{},{}];
// Cache temporaire par track (browsing)
const sf2TempBank = [null, null, null, null, null, null, null, null]; // { name, sfontId, presets }

// Décharger une SF2 d'une instance si plus utilisée sur cette track
function sf2MaybeUnload(ti, name) {
  if (!name || !sf2BankCache[ti][name]) return;
  try { jsSynths[ti].unloadSFont(sf2BankCache[ti][name].sfontId); } catch(e) {}
  delete sf2BankCache[ti][name];
  console.log(`[SF2] Track ${ti+1} déchargé : ${name}`);
}

// Charger une SF2 sur l'instance de la track ti
async function sf2LoadBank(ti, arrayBuffer, fileName) {
  if (!sf2Ready) await initSF2();
  const ts = trackSF2[ti];
  const oldName = ts.sfName;

  let sfontId, presets;

  if (sf2BankCache[ti][fileName]) {
    sfontId = sf2BankCache[ti][fileName].sfontId;
    presets = sf2BankCache[ti][fileName].presets;
    console.log(`[SF2] Track ${ti+1} : ${fileName} (cache) — ${presets.length} presets`);
  } else if (sf2TempBank[ti] && sf2TempBank[ti].name === fileName) {
    sfontId = sf2TempBank[ti].sfontId;
    presets = sf2TempBank[ti].presets;
    sf2BankCache[ti][fileName] = { sfontId, presets };
    sf2TempBank[ti] = null;
    console.log(`[SF2] Track ${ti+1} : ${fileName} (promu) — ${presets.length} presets`);
  } else {
    sfontId = await jsSynths[ti].loadSFont(arrayBuffer);
    presets = sf2GetPresets(ti, sfontId);
    sf2BankCache[ti][fileName] = { sfontId, presets };
    console.log(`[SF2] Track ${ti+1} : ${fileName} — ${presets.length} presets`);
  }

  ts.sfName  = fileName;
  ts.sfontId = sfontId;
  ts.presets = presets;

  if (ts.presets.length > 0) {
    ts.bank    = ts.presets[0].bank;
    ts.program = ts.presets[0].program;
    jsSynths[ti].midiProgramSelect(SF2_CHANNEL, ts.sfontId, ts.bank, ts.program);
  }

  if (oldName && oldName !== fileName) sf2MaybeUnload(ti, oldName);
  return ts.presets;
}

// Lire la liste des presets via getSFontObject
function sf2GetPresets(ti, sfontId) {
  const presets = [];
  try {
    const sf = jsSynths[ti].getSFontObject(sfontId);
    if (sf) {
      for (const preset of sf.getPresetIterable()) {
        presets.push({
          bank:    preset.bankNum,
          program: preset.num,
          name:    preset.name || `Bank${preset.bankNum} P${preset.num}`
        });
      }
      presets.sort((a,b) => a.bank !== b.bank ? a.bank-b.bank : a.program-b.program);
    }
  } catch(e) {
    console.warn('[SF2] getPresets error:', e);
  }
  return presets;
}

// Changer de preset sur une track + preview
function sf2SelectPreset(ti, presetIdx) {
  const ts = trackSF2[ti];
  if (!ts.presets.length || ts.sfontId < 0 || !jsSynths[ti]) return;
  const preset = ts.presets[Math.max(0, Math.min(presetIdx, ts.presets.length - 1))];
  ts.bank    = preset.bank;
  ts.program = preset.program;
  jsSynths[ti].midiProgramSelect(SF2_CHANNEL, ts.sfontId, preset.bank, preset.program);
  sf2PreviewNote(ti);
  return preset;
}

function sf2PreviewNote(ti) {
  if (!sf2Ready || !jsSynths[ti]) return;
  jsSynths[ti].midiNoteOff(SF2_CHANNEL, PREVIEW_NOTE);
  clearTimeout(previewTimer);
  jsSynths[ti].midiNoteOn(SF2_CHANNEL, PREVIEW_NOTE, 100);
  previewTimer = setTimeout(() => { if (jsSynths[ti]) jsSynths[ti].midiNoteOff(SF2_CHANNEL, PREVIEW_NOTE); }, 1000);
}

function sf2NoteOn(trackIdx, midi, velocity) {
  if (!sf2Ready || !jsSynths[trackIdx]) return;
  if (_sf2LoadingTrack[trackIdx]) return; // preset en cours de chargement — ignorer
  ensureAudio();
  const vel = Math.max(1, Math.min(127, Math.round(velocity * 127)));
  jsSynths[trackIdx].midiNoteOn(SF2_CHANNEL, midi, vel);
}

function sf2NoteOff(trackIdx, midi) {
  if (!sf2Ready || !jsSynths[trackIdx]) return;

function sf2AllNotesOff(trackIdx) {

// ── MIDI CTRL — envoyer des CC FluidSynth ──
function midiCtrlSendCC(ti, cc, value) {
  if (!sf2Ready || !jsSynths[ti]) return;
  const synth = jsSynths[ti];
  try {
    if (cc === 74) {
      // Cutoff : value 0-127, 127=original SF2, 0=très fermé
      // Generator 8 est additif → offset négatif pour fermer le filtre
      // 127 = offset 0 (pas de changement), 0 = offset -9000 cents (très sombre)
      const offset = -((127 - value) / 127) * 9000;
      synth.setGenerator(SF2_CHANNEL, 8, offset);
      return;
    } else if (cc === 71) {
      // Resonance : value 0-127, 0=flat, 127=max resonance
      // Generator 9 est additif → offset positif pour ajouter de la résonance
      // Limiter à 200cB max pour éviter la coupure du son
      const offset = (value / 127) * 200;
      synth.setGenerator(SF2_CHANNEL, 9, offset);
      return;
    } else if (cc === 72) {
      // Release : value 0-127, 0=original SF2, 127=très long
      // Generator 38 est additif en timecents
      // 0 = offset 0 (pas de changement), 127 = +8000 (très long)
      const offset = (value / 127) * 8000;
      synth.setGenerator(SF2_CHANNEL, 38, offset);
      return;
    }
  } catch(e) {
    // setGenerator non disponible → fallback CC MIDI
  }
  synth.midiControl(SF2_CHANNEL, cc, Math.max(0, Math.min(127, Math.round(value))));
}

function midiCtrlApply(ti) {
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  if (arpIdx < 0) return;
  const slot = trackFX[ti][arpIdx];
  if (!slot || !slot.active) return;
  midiCtrlSendCC(ti, 72, Math.round(slot.params['midiRelease'] ?? 0));
  midiCtrlSendCC(ti, 74, Math.round(slot.params['midiCutoff']  ?? 127));
  midiCtrlSendCC(ti, 71, Math.round(slot.params['midiReson']   ?? 0));
}

function midiCtrlReset(ti) {
  if (!sf2Ready || !jsSynths[ti]) return;
  const synth = jsSynths[ti];
  try {
    synth.setGenerator(SF2_CHANNEL, 8, 0);   // Cutoff → original SF2
    synth.setGenerator(SF2_CHANNEL, 9, 0);   // Resonance → original SF2
    synth.setGenerator(SF2_CHANNEL, 38, 0);  // Release → original SF2
  } catch(e) {
    synth.midiControl(SF2_CHANNEL, 74, 127);
    synth.midiControl(SF2_CHANNEL, 71, 0);
    synth.midiControl(SF2_CHANNEL, 72, 64);
  }
}

function sf2GetTrackName(ti) {
  const ts = trackSF2[ti];
  if (ts.sfontId < 0) return 'No SF2';
  if (!ts.presets.length) return ts.sfName.replace('.sf2','').slice(0,12);
  const preset = ts.presets.find(p => p.bank === ts.bank && p.program === ts.program);
  return preset ? preset.name.slice(0,12) : ts.sfName.replace('.sf2','').slice(0,12);
}

// Alias pour compatibilité

// ── Routeur central : joue une note sur la track selon son outputMode ────────
function playTrackNote(ti, midi, vel) {
  const t = S.tracks[ti];
  if (t.outputMode === 'sf2') {
    sf2NoteOn(ti, midi, vel);
  } else if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      const velByte = Math.max(1, Math.min(127, Math.round(vel * 127)));
      out.send([0x90 | mch, midi & 0x7f, velByte]);
      setTimeout(() => out.send([0x80 | mch, midi & 0x7f, 0]), 300);
    }
  } else {
    getSound(ti).fn(midi, vel);
  }
}

// ═══════════════════════════════════════════════════════════════
// MASTER BUS — Reverb (Freeverb) + Delay + Compressor + Limiter
// ═══════════════════════════════════════════════════════════════

let masterGain   = null;  // gain de volume master → chaîne effets → destination
let masterBusOut = null;  // sortie finale après toute la chaîne

// ── Paramètres Master (état) ──────────────────────────────────
const masterFX = {
  delay: {
    time:     0.375,   // sera recalculé par updateDelayTime au premier setBpm
    feedback: 0.35,
    filter:   4000,
    sync:     true,
    syncDiv:  4,       // 1/8d — dotted eighth
  },
  reverb: {
    roomSize: 0.85,
    damp:     0.35,
    width:    0.75,
    predelay: 0.028,   // 28ms
  },
  comp: {
    threshold: -18,
    ratio:     3,
    attack:    0.010,  // 10ms — laisse les transitoires
    release:   0.15,   // 150ms
  },
  lim: {
    threshold: -1,
    release:   0.05,   // 50ms
    knee:      2,
    gain:      0,
  },
};

const DELAY_SYNC_DIVS = [
  { label:'1/32', beats: 0.125 },
  { label:'1/16', beats: 0.25  },
  { label:'1/8',  beats: 0.5   },
  { label:'1/8d', beats: 0.75  },
  { label:'1/4',  beats: 1.0   },
  { label:'1/4d', beats: 1.5   },
  { label:'1/2',  beats: 2.0   },
];

// ── Nœuds audio Master ────────────────────────────────────────
let _masterNodes = null;

function getMasterNodes() {
  if (_masterNodes) return _masterNodes;
  ensureAudio();

  const input = actx.createGain(); input.gain.value = 1;

  // ── DELAY send ────────────────────────────────────────────
  const delayBusIn  = actx.createGain();
  const delayNode   = actx.createDelay(4.0);
  const delayFB     = actx.createGain();
  const delayFilter = actx.createBiquadFilter();
  const delayWet    = actx.createGain();
  delayFilter.type = 'lowpass';
  delayFilter.frequency.value = masterFX.delay.filter;
  delayFB.gain.value = masterFX.delay.feedback;
  delayNode.delayTime.value = masterFX.delay.time;
  delayWet.gain.value = 1.0;  // ouvert — le niveau est contrôlé par les sends de chaque track
  delayBusIn.connect(delayNode);
  delayNode.connect(delayFilter);
  delayFilter.connect(delayFB);
  delayFB.connect(delayNode);
  delayFilter.connect(delayWet);

  // ── REVERB send ───────────────────────────────────────────
  const reverbBusIn  = actx.createGain();
  const reverbPre    = actx.createDelay(0.5);   // predelay
  const reverbWet    = actx.createGain();
  reverbPre.delayTime.value = masterFX.reverb.predelay;
  reverbWet.gain.value = 1.0; // ouvert — le niveau est contrôlé par les sends de chaque track
  const freeverb = createFreeverb();
  reverbBusIn.connect(reverbPre);
  reverbPre.connect(freeverb.input);
  freeverb.output.connect(reverbWet);

  // ── COMPRESSEUR insert (toujours actif) ───────────────────
  const comp = actx.createDynamicsCompressor();
  comp.threshold.value = masterFX.comp.threshold;
  comp.ratio.value     = masterFX.comp.ratio;
  comp.attack.value    = masterFX.comp.attack;
  comp.release.value   = Math.min(1, masterFX.comp.release);
  comp.knee.value      = 6;

  // ── LIMITEUR insert (toujours actif) + makeup gain ────────
  const lim = actx.createDynamicsCompressor();
  lim.threshold.value = masterFX.lim.threshold;
  lim.ratio.value     = 20;
  lim.attack.value    = 0.001;
  lim.release.value   = Math.min(1, masterFX.lim.release);
  lim.knee.value      = masterFX.lim.knee;
  const limGain = actx.createGain();
  limGain.gain.value  = Math.pow(10, masterFX.lim.gain / 20);

  // ── MASTER GAIN ───────────────────────────────────────────
  masterGain = actx.createGain();
  masterGain.gain.value = (typeof S !== 'undefined' && S.masterVolume) ? S.masterVolume : 0.65;

  // ── CÂBLAGE : input → masterGain → mixBus → comp → lim → limGain → destination
  const mixBus = actx.createGain(); mixBus.gain.value = 1;
  input.connect(masterGain);
  masterGain.connect(mixBus);
  delayWet.connect(mixBus);
  reverbWet.connect(mixBus);
  mixBus.connect(comp);
  comp.connect(lim);
  lim.connect(limGain);
  limGain.connect(actx.destination);

  _masterNodes = {
    input, masterGain, mixBus,
    delayBusIn, delayNode, delayFB, delayFilter, delayWet,
    reverbBusIn, reverbPre, freeverb, reverbWet,
    comp, lim, limGain,
  };
  return _masterNodes;
}

function getMaster() {
  return getMasterNodes().input;
}

function getDelayBus()  { return getMasterNodes().delayBusIn; }
function getReverbBus() { return getMasterNodes().reverbBusIn; }

// ── FREEVERB ─────────────────────────────────────────────────
// Implémentation de l'algorithme Freeverb de Jezar at Dreampoint
// Réseau de 8 filtres comb + 4 allpass en stéréo
function createFreeverb() {
  // Reverb algorithmique style Schroeder/Gardner
  // Modifiable en temps réel sans reconstruire de buffer
  const input  = actx.createGain();
  const output = actx.createGain();
  output.gain.value = 1;

  const sr = actx.sampleRate;
  const room = masterFX.reverb.roomSize;
  const dmp  = masterFX.reverb.damp;

  // 8 filtres comb en parallèle (L+R légèrement différents pour la stéréo)
  const COMB_MS  = [29.7, 37.1, 41.1, 43.7, 47.1, 53.5, 59.1, 61.3];
  const combs = COMB_MS.map((ms, i) => {
    const spread = (i % 2 === 0) ? 0 : 1.3; // spread stéréo léger
    const delay  = actx.createDelay(0.2);
    const fb     = actx.createGain();
    const damp   = actx.createGain();   // simple gain pour le damping haute fréq simulé
    delay.delayTime.value = (ms + spread) / 1000;
    fb.gain.value         = Math.min(0.93, 0.7 + room * 0.25);
    damp.gain.value       = 1 - dmp * 0.6;
    input.connect(delay);
    delay.connect(damp);
    damp.connect(fb);
    fb.connect(delay);   // boucle feedback
    damp.connect(output);
    return { delay, fb, damp };
  });

  // 4 allpass en série pour diffuser
  const ALLPASS_MS = [5.0, 1.7, 10.0, 3.5];
  let chain = output;
  const allpasses = ALLPASS_MS.map(ms => {
    const ap = actx.createDelay(0.05);
    ap.delayTime.value = ms / 1000;
    chain.connect(ap);
    chain = ap;
    return ap;
  });

  // Sortie finale avec contrôle de width (volume du wet)
  const wetOut = actx.createGain();
  wetOut.gain.value = masterFX.reverb.width;
  chain.connect(wetOut);

  return {
    input,
    output: wetOut,
    setRoomSize(v) {
      // Modifie le gain feedback de tous les combs — instantané, zéro coupure
      const fg = Math.min(0.93, 0.7 + v * 0.25);
      combs.forEach(c => c.fb.gain.value = fg);
    },
    setDamp(v) {
      // Modifie le gain de damping — instantané
      const dg = 1 - v * 0.6;
      combs.forEach(c => c.damp.gain.value = Math.max(0.1, dg));
    },
    setWidth(v) {
      wetOut.gain.value = v;
    },
    flush() {
      // Coupe le feedback de tous les combs → vide les boucles instantanément
      // Restaure les valeurs correctes 100ms après (le temps que les buffers se vident)
      const savedFB = combs.map(c => c.fb.gain.value);
      combs.forEach(c => { c.fb.gain.value = 0; });
      setTimeout(() => {
        combs.forEach((c, i) => { c.fb.gain.value = savedFB[i]; });
      }, 100);
    },
  };
}

// ── Appliquer les paramètres Master aux nœuds audio ──────────
function applyMasterFX() {
  if (!_masterNodes) return;
  const n = _masterNodes, fx = masterFX;

  // Direct .value assignment — évite l'accumulation d'événements schedulés
  // qui causent l'instabilité du BiquadFilterNode
  n.delayFB.gain.value = Math.max(0, Math.min(0.99, fx.delay.feedback));
  n.delayFilter.frequency.value = Math.max(20, Math.min(20000, fx.delay.filter));
  if (n.reverbPre) n.reverbPre.delayTime.value = Math.max(0, Math.min(0.5, fx.reverb.predelay));
  if (n.freeverb)  {
    n.freeverb.setRoomSize(fx.reverb.roomSize);
    n.freeverb.setDamp(fx.reverb.damp);
    if (n.freeverb.setWidth) n.freeverb.setWidth(fx.reverb.width);
  }
  n.comp.threshold.value = fx.comp.threshold;
  n.comp.ratio.value     = Math.max(1, fx.comp.ratio);
  n.comp.attack.value    = Math.max(0, Math.min(1, fx.comp.attack));
  n.comp.release.value   = Math.max(0, Math.min(1, fx.comp.release));
  n.lim.threshold.value  = fx.lim.threshold;
  n.lim.release.value    = Math.max(0, Math.min(1, fx.lim.release));
  n.lim.knee.value       = Math.max(0, Math.min(40, fx.lim.knee));
  if (n.limGain) n.limGain.gain.value = Math.pow(10, (fx.lim.gain || 0) / 20);
}

// ── Sync delay au BPM ─────────────────────────────────────────
function updateDelayTime() {
  if (!masterFX.delay.sync) return;
  const beatSec = 60 / S.bpm;
  const div = DELAY_SYNC_DIVS[masterFX.delay.syncDiv];
  masterFX.delay.time = beatSec * div.beats;
  if (_masterNodes) {
    _masterNodes.delayNode.delayTime.setTargetAtTime(masterFX.delay.time, actx.currentTime, 0.005);
  }
}

// Fabrique un pad drum vide
function makeDrumPad(typeIdx) {
  const typeName = DRUM_SYNTH_TYPES[typeIdx] || 'Kick';
  const defs = DRUM_SYNTH_DEFAULTS[typeName] || DRUM_SYNTH_DEFAULTS['Kick'];
  return {
    mode:       'synth',       // 'synth' | 'sample'
    synthType:  typeName,
    tune:       defs.tune,     // demi-tons -12..+12

    tone:       defs.tone,     // timbre 0..1
    drive:      defs.drive,    // 0..1
    // sample
    buffer:     null,
    fileName:   '',
    startPoint: 0,             // 0..1
    reverse:    false,
    // commun
    volume:     0.85,
    sendReverb: 0,
    sendDelay:  0,
