}

// Initialisation par track drum (index 0..7 → les 8 types)
function makeDefaultDrumPads() {
  return Array.from({length:8}, (_, i) => makeDrumPad(i));
}

// ── Filtre Tone unifié — même comportement synth ET sample ──────
// tone 0   → LP 200Hz  (très sombre)
// tone 0.5 → LP 8kHz   (neutre/ouvert)
// tone 1   → LP 18kHz + résonance Q=12 (brillant / acide)

// Pré-générer des buffers de bruit pour éviter les allocations à chaque hit
var _noiseBuffers = {};
function getNoiseBuffer(durationSec) {
  const key = Math.round(durationSec * 100); // arrondi au centième
  if (_noiseBuffers[key]) return _noiseBuffers[key];
  const len = Math.round(actx.sampleRate * durationSec);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  _noiseBuffers[key] = buf;
  // Limiter le cache à 50 entrées
  const keys = Object.keys(_noiseBuffers);
  if (keys.length > 50) delete _noiseBuffers[keys[0]];
  return buf;
}

// Nettoyage des nœuds audio : WebAudio garbage-collecte automatiquement
// les nœuds dont la source est terminée (stop() appelé).
// On ne fait PAS de disconnect() car ça crée des clics.
// Les nœuds seront GC quand leur source BufferSource/Oscillator est stoppée.

function applyToneFilter(inputNode, tone, dest) {
  const t   = actx.currentTime;
  const f   = actx.createBiquadFilter();
  f.type    = 'lowpass';
  // Fréquence : courbe exponentielle 200Hz → 18000Hz
  const freq = 200 * Math.pow(90, Math.max(0, Math.min(1, tone)));
  f.frequency.setValueAtTime(freq, t);
  // Résonance : nulle jusqu'à 50%, puis monte jusqu'à Q=12 à 100%
  const q = tone > 0.5 ? Math.pow((tone - 0.5) * 2, 1.5) * 12 : 0.1;
  f.Q.setValueAtTime(q, t);
  inputNode.connect(f);
  f.connect(dest);
  return f;
}

// ── Synthèse paramétrique par type ──────────────────────────────

function drumSynth(pad, vel, dest) {
  const t   = actx.currentTime;
  const type = pad.synthType;
  const tuneRatio = Math.pow(2, (pad.tune || 0) / 12);
  const decSec    = 0.05 + (pad.decay || 0.5) * 1.95;
  const tone      = Math.max(0, Math.min(1, pad.tone ?? 0.5));
  const drv       = Math.max(0, Math.min(1, pad.drive || 0));

  const masterOut = dest || getMaster();

  // Nœud intermédiaire : synth → drive → tone filter → dest
  function buildChain(sourceNode) {
    const g = actx.createGain();
    g.gain.value = 1;
    sourceNode.connect(g);
    let node = g;
    if (drv > 0.02) {
      const ws = actx.createWaveShaper();
      const k  = drv * 80, n = 256, c = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        c[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
      }
      ws.curve = c; ws.oversample = '2x';
      node.connect(ws); node = ws;
    }
    applyToneFilter(node, tone, masterOut);
  }

  function noiseSrc(durSec) {
    const buf = getNoiseBuffer(Math.max(0.01, durSec));
    const s = actx.createBufferSource();
    s.buffer = buf;
    return s;
  }

  if (type === 'Kick') {
    const o = actx.createOscillator(), g = actx.createGain();
    const f0 = 150 * tuneRatio, f1 = 30 * tuneRatio;
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f1, t + decSec * 0.3);
    g.gain.setValueAtTime(vel, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Snare') {
    // Bruit
    const s = noiseSrc(decSec * 0.8), gn = actx.createGain();
    gn.gain.setValueAtTime(vel * 0.7, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.8);
    gn.gain.linearRampToValueAtTime(0, t + decSec * 0.8 + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);
    // Corps
    const o = actx.createOscillator(), og = actx.createGain();
    o.type = 'triangle'; o.frequency.value = 180 * tuneRatio;
    og.gain.setValueAtTime(vel * 0.4, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.4);
    og.gain.linearRampToValueAtTime(0, t + decSec * 0.4 + 0.02);
    o.connect(og); buildChain(og);
    o.start(t); o.stop(t + decSec * 0.4 + 0.04);

  } else if (type === 'Clap') {
    [0, 0.008, 0.018].forEach(dly => {
      const len2 = Math.round(actx.sampleRate * Math.max(0.04, decSec * 0.5));
      const buf2 = actx.createBuffer(1, len2, actx.sampleRate);
      const d2   = buf2.getChannelData(0);
      for (let i = 0; i < len2; i++) d2[i] = Math.random() * 2 - 1;
      const s2 = actx.createBufferSource(), g2 = actx.createGain();
      s2.buffer = buf2;
      g2.gain.setValueAtTime(vel * 0.55, t + dly);
      g2.gain.exponentialRampToValueAtTime(0.001, t + dly + decSec * 0.6);
    g2.gain.linearRampToValueAtTime(0, t + dly + decSec * 0.6 + 0.02);
      s2.connect(g2); buildChain(g2); s2.start(t + dly);
    });

  } else if (type === 'HH Cl') {
    const len3 = Math.round(actx.sampleRate * Math.max(0.02, decSec * 0.4));
    const buf3 = actx.createBuffer(1, len3, actx.sampleRate);
    const d3   = buf3.getChannelData(0);
    for (let i = 0; i < len3; i++) d3[i] = Math.random() * 2 - 1;
    const s3 = actx.createBufferSource(), g3 = actx.createGain();
    s3.buffer = buf3;
    g3.gain.setValueAtTime(vel * 0.5, t);
    g3.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.4);
    g3.gain.linearRampToValueAtTime(0, t + decSec * 0.4 + 0.02);
    s3.connect(g3); buildChain(g3); s3.start(t);

  } else if (type === 'HH Op') {
    const len4 = Math.round(actx.sampleRate * Math.max(0.05, decSec));
    const buf4 = actx.createBuffer(1, len4, actx.sampleRate);
    const d4   = buf4.getChannelData(0);
    for (let i = 0; i < len4; i++) d4[i] = Math.random() * 2 - 1;
    const s4 = actx.createBufferSource(), g4 = actx.createGain();
    s4.buffer = buf4;
    g4.gain.setValueAtTime(vel * 0.45, t);
    g4.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g4.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    s4.connect(g4); buildChain(g4); s4.start(t);

  } else if (type === 'Rim') {
    const o5 = actx.createOscillator(), g5 = actx.createGain();
    o5.type = 'triangle'; o5.frequency.value = 1600 * tuneRatio;
    g5.gain.setValueAtTime(vel * 0.45, t);
    g5.gain.exponentialRampToValueAtTime(0.001, t + Math.max(0.04, decSec * 0.5));
    o5.connect(g5); buildChain(g5);
    o5.start(t); o5.stop(t + decSec * 0.5 + 0.05);

  } else if (type === 'Tom Hi') {
    const o6 = actx.createOscillator(), g6 = actx.createGain();
    o6.type = 'sine';
    o6.frequency.setValueAtTime(220 * tuneRatio, t);
    o6.frequency.exponentialRampToValueAtTime(90 * tuneRatio, t + decSec);
    g6.gain.setValueAtTime(vel, t);
    g6.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g6.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o6.connect(g6); buildChain(g6);
    o6.start(t); o6.stop(t + decSec + 0.05);

  } else if (type === 'Tom Lo') {
    const o7 = actx.createOscillator(), g7 = actx.createGain();
    o7.type = 'sine';
    o7.frequency.setValueAtTime(100 * tuneRatio, t);
    o7.frequency.exponentialRampToValueAtTime(42 * tuneRatio, t + decSec);
    g7.gain.setValueAtTime(vel, t);
    g7.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g7.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o7.connect(g7); buildChain(g7);
    o7.start(t); o7.stop(t + decSec + 0.05);

  } else if (type === 'Tom Mid') {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(160 * tuneRatio, t);
    o.frequency.exponentialRampToValueAtTime(65 * tuneRatio, t + decSec);
    g.gain.setValueAtTime(vel, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Crash') {
    // Bruit long filtré haut + composante métallique
    const len = Math.round(actx.sampleRate * Math.max(0.1, decSec));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.6, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    gn.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);
    // Composante métallique
    const o = actx.createOscillator(), og = actx.createGain();
    o.type = 'square'; o.frequency.value = 3200 * tuneRatio;
    og.gain.setValueAtTime(vel * 0.15, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.6);
    og.gain.linearRampToValueAtTime(0, t + decSec * 0.6 + 0.02);
    o.connect(og); buildChain(og);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Ride') {
    // Bruit medium + sinusoïde métallique haute
    const len = Math.round(actx.sampleRate * Math.max(0.1, decSec * 0.8));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.35, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.8);
    gn.gain.linearRampToValueAtTime(0, t + decSec * 0.8 + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);
    const o = actx.createOscillator(), og = actx.createGain();
    o.type = 'triangle'; o.frequency.value = 4800 * tuneRatio;
    og.gain.setValueAtTime(vel * 0.2, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    og.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(og); buildChain(og);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Shaker') {
    // Burst de bruit très court, filtré haut
    const len = Math.round(actx.sampleRate * Math.max(0.01, decSec * 0.3));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.4, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.3);
    gn.gain.linearRampToValueAtTime(0, t + decSec * 0.3 + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);

  } else if (type === 'Tamb') {
    // Bruit + cliquetis métalliques (multi-burst)
    [0, 0.005, 0.012].forEach(dly => {
      const len = Math.round(actx.sampleRate * Math.max(0.03, decSec * 0.5));
      const buf = actx.createBuffer(1, len, actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const s = actx.createBufferSource(), g = actx.createGain();
      s.buffer = buf;
      g.gain.setValueAtTime(vel * 0.35, t + dly);
      g.gain.exponentialRampToValueAtTime(0.001, t + dly + decSec * 0.5);
    g.gain.linearRampToValueAtTime(0, t + dly + decSec * 0.5 + 0.02);
      s.connect(g); buildChain(g); s.start(t + dly);
    });
    const o = actx.createOscillator(), og = actx.createGain();
    o.type = 'square'; o.frequency.value = 5500 * tuneRatio;
    og.gain.setValueAtTime(vel * 0.1, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.4);
    og.gain.linearRampToValueAtTime(0, t + decSec * 0.4 + 0.02);
    o.connect(og); buildChain(og);
    o.start(t); o.stop(t + decSec * 0.4 + 0.04);

  } else if (type === 'Conga') {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(280 * tuneRatio, t);
    o.frequency.exponentialRampToValueAtTime(180 * tuneRatio, t + decSec * 0.3);
    g.gain.setValueAtTime(vel * 0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Bongo') {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(420 * tuneRatio, t);
    o.frequency.exponentialRampToValueAtTime(280 * tuneRatio, t + decSec * 0.2);
    g.gain.setValueAtTime(vel * 0.85, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Maracas') {
    // Micro-burst de bruit
    const len = Math.round(actx.sampleRate * Math.max(0.005, decSec * 0.15));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.35, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.15);
    gn.gain.linearRampToValueAtTime(0, t + decSec * 0.15 + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);

  } else if (type === 'Woodblk') {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'triangle'; o.frequency.value = 900 * tuneRatio;
    g.gain.setValueAtTime(vel * 0.6, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + Math.max(0.03, decSec * 0.3));
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec * 0.3 + 0.04);

  } else if (type === 'Triangle') {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = 6000 * tuneRatio;
    g.gain.setValueAtTime(vel * 0.3, t);
    g.gain.setValueAtTime(vel * 0.3, t + 0.001);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Snap') {
    // Burst de bruit très court
    const len = Math.round(actx.sampleRate * Math.max(0.005, decSec * 0.12));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.6, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec * 0.12);
    gn.gain.linearRampToValueAtTime(0, t + decSec * 0.12 + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);
    // Petit clic tonal
    const o = actx.createOscillator(), og = actx.createGain();
    o.type = 'sine'; o.frequency.value = 1800 * tuneRatio;
    og.gain.setValueAtTime(vel * 0.3, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
    og.gain.linearRampToValueAtTime(0, t + 0.02 + 0.02);
    o.connect(og); buildChain(og);
    o.start(t); o.stop(t + 0.06);

  } else if (type === 'Zap') {
    // Pitch bend descendant rapide
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(2000 * tuneRatio, t);
    o.frequency.exponentialRampToValueAtTime(50 * tuneRatio, t + decSec);
    g.gain.setValueAtTime(vel * 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    g.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + decSec + 0.04);

  } else if (type === 'Noise') {
    // Bruit blanc pur
    const len = Math.round(actx.sampleRate * Math.max(0.05, decSec));
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const s = actx.createBufferSource(), gn = actx.createGain();
    s.buffer = buf;
    gn.gain.setValueAtTime(vel * 0.4, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + decSec);
    gn.gain.linearRampToValueAtTime(0, t + decSec + 0.02);
    s.connect(gn); buildChain(gn); s.start(t);

  } else if (type === 'Click') {
    // Impulsion ultra-courte
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = 'sine'; o.frequency.value = 2500 * tuneRatio;
    g.gain.setValueAtTime(vel * 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + Math.max(0.005, decSec * 0.08));
    o.connect(g); buildChain(g);
    o.start(t); o.stop(t + 0.06);
  }
}

// ── Lecture sample ───────────────────────────────────────────────

function drumSample(pad, vel, dest) {
  if (!pad.buffer) return;
  const t         = actx.currentTime;
  const tuneRatio = Math.pow(2, (pad.tune || 0) / 12);
  const tone      = Math.max(0, Math.min(1, pad.tone ?? 0.5));
  const drv       = Math.max(0, Math.min(1, pad.drive || 0));
  const masterOut = dest || getMaster();

  const s = actx.createBufferSource();
  s.buffer = pad.buffer;
  // Reverse : on joue à l'envers via playbackRate négatif n'est pas supporté — on utilise l'offset
  s.playbackRate.value = tuneRatio;

  const startSec = (pad.startPoint || 0) * pad.buffer.duration;

  // Gain
  const g = actx.createGain();
  g.gain.value = vel;
  s.connect(g);

  // Drive
  let node = g;
  if (drv > 0.02) {
    const ws = actx.createWaveShaper();
    const k  = drv * 80, n = 256, c = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      c[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
    }
    ws.curve = c; ws.oversample = '2x';
    node.connect(ws); node = ws;
  }

  // Tone filter — identique synth
  applyToneFilter(node, tone, masterOut);

  s.start(t, startSec);
}

// ── Déclencheur unifié ───────────────────────────────────────────
// Retourne un AudioNode gainPad pour les sends individuels

function drumPadPlay(ti, padIdx, vel) {
  const t  = S.tracks[ti];
  const pads = t.drumPads;
  if (!pads || !pads[padIdx]) return;
  const pad = pads[padIdx];
  const vol = (pad.volume || 0.85) * t.volume;

  const padGain = actx.createGain();
  padGain.gain.value = vol;
  padGain.connect(getMaster());

  // Sends vers bus delay et reverb du Master
  const sendRev = pad.sendReverb || 0;
  const sendDly = pad.sendDelay  || 0;
  if (sendDly > 0.01) {
    const dSend = actx.createGain();
    dSend.gain.value = sendDly;
    padGain.connect(dSend);
    dSend.connect(getDelayBus());
  }
  if (sendRev > 0.01) {
    const rSend = actx.createGain();
    rSend.gain.value = sendRev;
    padGain.connect(rSend);
    rSend.connect(getReverbBus());
  }

  if (pad.mode === 'sample' && pad.buffer) {
    drumSample(pad, vel, padGain);
  } else {
    drumSynth(pad, vel, padGain);
  }
}

// ── Fabrique un clip vide ──
function makeClip() {
  return {
    numBars: 1,
    loopStart: 0,
    loopEnd: 0,
    stretchState: 0,
    originalBars: null,
    originalDrumBars: null,
    originalNumBars: 1,

    drumBars: Array.from({length:16}, () =>
      Array.from({length:8}, () =>
        Array.from({length:16}, () => ({on:false, vel:0.787}))
      )
    ),
    bars: Array.from({length:8}, () =>
      Array.from({length:16}, () => ({on:false, note:60, vel:0.787}))
    ),
  };
}

// ── Vérifie si un clip a au moins une note ──
function clipHasNotes(clip) {
  if (!clip) return false;
  for (const bar of clip.bars) {
    if (bar.some(st => st.on)) return true;
  }
  for (const padSeq of clip.drumBars) {
    for (const bar of padSeq) {
      if (bar.some(st => st.on)) return true;
    }
  }
  return false;
}

    soundIndex: 0,
    outputMode: 'sf2',
    midiChannel: i + 1,
    midiOutputId: null,
    clips: Array.from({length:8}, () => makeClip()),
    activeClip: 0,
    playingClip: 0,
    queuedClip: null,
    _stopped: false,
    drumSoundMap: Array.from({length:8}, (_,j) => j),
    drumPads: null,
    sendReverb: 0,
    sendDelay:  0,
    octave: 3,        // registre pad matrix par track (default = 3 = C3)
    pianoOctave: 0,   // décalage piano widget par track (-2 à +3)
  })),
  currentBar: 0,
  playingBar: 0,
  _loopHeld: false,
  _loopBarHeld: -1,   // bar tenu en loop mode (-1=aucun)
  _loopBar2: -1,      // 2ème bar tenu pour définir la région
  _loopComboFired: false,
  _oledLocked: false,
  _trackVisToken: 0,  // incrémenté à chaque changement de track pour invalider les setTimeout visuels
  _stepsLocked: false,
  _mHeld: false,
  masterVolume: 0.65,
};

// Helper : nom du pad drum pour l'OLED
function getDrumPadName(ti, padIdx) {
  const t = S.tracks[ti];
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  const pad = t.drumPads[padIdx];
  if (!pad) return '—';
  if (pad.mode === 'sample' && pad.fileName)
    return pad.fileName.replace(/\.[^.]+$/, '').slice(0, 12);
  return pad.synthType || '—';
}
function activeClip(ti)  { const t = S.tracks[ti ?? S.currentTrack]; return t.clips[t.activeClip]; }
function playingClip(ti) { const t = S.tracks[ti ?? S.currentTrack]; return t.clips[t.playingClip]; }

// Démarre automatiquement le clip actif si c'était vide avant la première note
function autoStartClipIfFirstNote(ti) {
  const t = S.tracks[ti ?? S.currentTrack];
  const clipIdx = t.activeClip;
  if (!S.playing) return;
  // Lancer ce clip en sync (quantisé) si pas déjà en lecture
  if (t.playingClip !== clipIdx || !clipHasNotes(t.clips[t.playingClip])) {
    t.queuedClip = clipIdx;
  }
}

// Scheduler
let schedTimer = null, nextTime = 0, globalTick = 0;

function stepDur() { return 60 / S.bpm / 4; }

function getSound(ti) {
  const t = S.tracks[ti];
  if (t.mode === 'master') return { name: 'MASTER', fn: () => {} };
  if (t.mode === 'drum')   return { name: getDrumPadName(ti, S.selectedDrumPad), fn: () => {} };
  if (t.outputMode === 'sf2') return { name: sf2GetTrackName(ti), fn: () => {} };
  return { name: `MIDI ${t.midiChannel}`, fn: () => {} };
}

// Calcule la longueur de la région de loop d'un clip (en steps)
function clipLoopSteps(clip) {
  const start = clip.loopStart ?? 0;
  const end   = clip.loopEnd   ?? (clip.numBars - 1);
  return Math.max(1, end - start + 1) * 16;
}

// Tick par track — chaque track tourne indépendamment sur sa région
// trackTick[ti] = position dans la région de loop (0..loopSteps-1)
let trackTick = [0, 0, 0, 0, 0, 0, 0, 0];

// Song mode — auto-avancement des colonnes
let _songColumnRepeatCount = 0; // compteur de répétitions de la colonne courante
let _songCurrentColumn = 0;     // colonne session en cours (0-7)

function scheduler() {
  while (nextTime < actx.currentTime + 0.12) {
    const anySolo = S.tracks.some(t => t.soloed);

    // Switch quantisé : au début de la région de chaque track
    for (let ti = 0; ti < 8; ti++) {
      const t = S.tracks[ti];
      const clip = playingClip(ti);
      const loopSteps = clipLoopSteps(clip);
      if (trackTick[ti] % loopSteps === 0 && t.queuedClip !== null) {
        if (t.queuedClip === -1) {
          t.playingClip = t.activeClip;
        } else {
          t.playingClip = t.queuedClip;
        }
        t.queuedClip = null;
        if (S.mode === 'session') {
          const delay = Math.max(0, (nextTime - actx.currentTime) * 1000);
          setTimeout(() => { if (S.mode === 'session') renderSessionMode(); }, delay);
        }
      }
    }

    // ── Song mode : auto-avancement des colonnes via piste master ──
    const masterTi = S.tracks.findIndex(t => t.mode === 'master');
    if (masterTi >= 0) {
      const masterT = S.tracks[masterTi];
      const masterClip = playingClip(masterTi);
      const masterLoopSteps = clipLoopSteps(masterClip);
      // Détecter le début d'un nouveau cycle de la colonne master
      if (trackTick[masterTi] > 0 && trackTick[masterTi] % masterLoopSteps === 0) {
        const repeats = masterClip.columnRepeats || 0;
        if (repeats > 0) {
          _songColumnRepeatCount++;
          if (_songColumnRepeatCount >= repeats) {
            // Passer à la colonne suivante
            _songColumnRepeatCount = 0;
            const nextCol = _songCurrentColumn + 1;
            // Vérifier si la colonne suivante a des clips (hors master)
            const hasContent = S.tracks.some((t, i) => {
              if (t.mode === 'master') return false;
              return clipHasNotes(t.clips[nextCol]);
            });
            if (nextCol < 8 && hasContent) {
              _songCurrentColumn = nextCol;
              // Lancer tous les clips de la nouvelle colonne
              for (let ti2 = 0; ti2 < 8; ti2++) {
                const t2 = S.tracks[ti2];
                if (clipHasNotes(t2.clips[nextCol])) {
                  t2.queuedClip = nextCol;
                } else if (t2.mode !== 'master') {
                  t2.queuedClip = -1; // stopper les tracks sans clip sur cette colonne
                }
              }
              // Master aussi
              masterT.playingClip = nextCol;
              masterT.activeClip = nextCol;
              trackTick[masterTi] = 0;
              if (S.mode === 'session') {
                setTimeout(() => renderSessionMode(), 50);
              }
            } else {
              // Pas de contenu sur la colonne suivante → arrêter la lecture
              togglePlay();
            }
          }
        }
      }
    }

    for (let ti = 0; ti < 8; ti++) {
      const t = S.tracks[ti];
      if (t.mode === 'master') {
        // Master = automation BPM
        const clip = playingClip(ti);
        const loopStart = clip.loopStart ?? 0;
        const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
        const loopLen   = Math.max(1, loopEnd - loopStart + 1);
        const loopSteps = loopLen * 16;
        const posInLoop = trackTick[ti] % loopSteps;
        const bar  = loopStart + Math.floor(posInLoop / 16);
        const step = posInLoop % 16;
        const masterBar = clip.bars[bar];
        if (masterBar && masterBar[step] && masterBar[step].on) {
          const newBpm = masterBar[step].note;
          if (newBpm >= 20 && newBpm <= 300 && newBpm !== S.bpm) {
            setBpm(newBpm);
          }
        }
        trackTick[ti]++;
        continue;
      }
      if (t.muted || (anySolo && !t.soloed)) continue;
      const clip = playingClip(ti);
      const loopStart = clip.loopStart ?? 0;
      const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
      const loopLen   = Math.max(1, loopEnd - loopStart + 1);
      const loopSteps = loopLen * 16;
      const posInLoop = trackTick[ti] % loopSteps;
      const bar  = loopStart + Math.floor(posInLoop / 16);
      const step = posInLoop % 16;

      if (bar > loopEnd || bar >= clip.numBars) continue;

      if (t.mode === 'drum') {
        for (let padIdx = 0; padIdx < 8; padIdx++) {
          const st = clip.drumBars[padIdx][bar][step];
          if (!st.on) continue;
          const prob = st.prob !== undefined ? st.prob : 100;
          if (Math.random() * 100 > prob) continue;
          const dShift = st.shift || 0;
          const dNoteTime = nextTime + dShift * stepDur();
          const dDelayMs = Math.max(0, (dNoteTime - actx.currentTime) * 1000);
          const capVol = st.vel * t.volume;
          const capTi = ti, capPad = padIdx;
          if (t.outputMode === 'midi') {
            const durMs = Math.max(20, stepDur() * 1000 * 0.5);
            setTimeout(() => {
              if (!S.playing) return;
              midiOutDrum(capTi, capPad, capVol, durMs);
            }, dDelayMs);
          } else {
            setTimeout(() => {
              if (!S.playing) return;
              drumPadPlay(capTi, capPad, capVol);
            }, dDelayMs);
          }
          setTimeout(() => {
            if (!S.playing) return;
            if (capTi !== S.currentTrack) return;
            flashDrumPadRT(capPad);
          }, dDelayMs);
        }
      } else {
        const st = clip.bars[bar][step];
        if (st.on) {
          const prob = st.prob !== undefined ? st.prob : 100;
          if (Math.random() * 100 <= prob) {
            const shift = st.shift || 0;
            const noteTime = nextTime + shift * stepDur();
            const playDelayMs = Math.max(0, (noteTime - actx.currentTime) * 1000);
            const capNotes = [st.note, ...(st.extraNotes || [])];
            const capLen = st.len || 1, capTi = ti;
            const durMs = capLen * stepDur() * 1000 * 0.9;
            const capVisToken = S._trackVisToken; // token au moment du scheduling
            if (t.outputMode === 'midi') {
              setTimeout(() => {
                if (!S.playing) return;
                capNotes.forEach(n => midiOutNote(capTi, n, st.vel * t.volume, durMs));
              }, playDelayMs);
            } else if (t.outputMode === 'sf2') {
              const arpDurMs = capLen * stepDur() * 1000 * 0.98; // presque pleine durée pour l'arp
              setTimeout(() => {
                if (!S.playing) return;
                if (arpIsActive(capTi)) {
                  arpSeqTrigger(capTi, capNotes, arpDurMs);
                } else {
                  capNotes.forEach(n => sf2NoteOn(capTi, n, st.vel * t.volume));
                  setTimeout(() => capNotes.forEach(n => sf2NoteOff(capTi, n)), durMs);
                }
              }, playDelayMs);
            } else {
              const capVol = st.vel * t.volume;
              setTimeout(() => {
                if (!S.playing) return;
                playTrackNote(capTi, st.note, capVol);
                (st.extraNotes || []).forEach(n => playTrackNote(capTi, n, capVol));
              }, playDelayMs);
            }
            const offDelayMs = playDelayMs + capLen * stepDur() * 1000;
            setTimeout(() => {
              // N'illuminer que si on est encore sur la même track et même génération
              if (!S.playing || capTi !== S.currentTrack) return;
              if (S._trackVisToken !== capVisToken) return;
              illuminateMeloPadsRT(capNotes, true);
              if (S.pianoOpen) illuminatePianoRT(capNotes, true);
            }, playDelayMs);
            setTimeout(() => {
              // Éteindre seulement si le token est encore valide (même track, pas changé)
              if (S._trackVisToken !== capVisToken) return;
              illuminateMeloPadsRT(capNotes, false);
              if (S.pianoOpen) illuminatePianoRT(capNotes, false);
            }, offDelayMs);
          }
        }
      }
    }

    // ── Playhead visuel — toujours mis à jour pour la currentTrack ──
    // Calculé séparément pour ne jamais être bloqué par mute/solo/notes
    {
      const t  = S.tracks[S.currentTrack];
      const clip = playingClip(S.currentTrack);
      const loopStart = clip.loopStart ?? 0;
      const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
      const loopLen   = Math.max(1, loopEnd - loopStart + 1);
      const loopSteps = loopLen * 16;
      const posInLoop = trackTick[S.currentTrack] % loopSteps;
      const capBar    = loopStart + Math.floor(posInLoop / 16);
      const capStep   = posInLoop % 16;
      const delay     = Math.max(0, (nextTime - actx.currentTime) * 1000);
      setTimeout(() => {
        if (!S.playing) return;
        if (projectModeActive) return; // project mode = pas de rendu visuel séquenceur
        const prevBar = S.playingBar;
        S.playingBar = capBar;
        if (S.mode === 'loop') {
          if (capBar !== prevBar || capStep === 0) renderLoopMode();
          updateBarIndicator();
        } else if (S.mode !== 'session') {
          S.currentBar = capBar;
          highlightStep(capStep);
          updateBarIndicator();
        }
      }, delay);
    }

    // Avancer tous les ticks
    for (let ti = 0; ti < 8; ti++) trackTick[ti]++;
    nextTime += stepDur();
    globalTick++;
  }
}

// Illumine un pad drum pendant la lecture temps réel
function flashDrumPadRT(drumPadIdx) {
  flashDrumPadNew(drumPadIdx);
}

function flashDrumPadNew(padIdx) {
  if (projectModeActive) return;
  if (S.mode === 'session') return;
  if (S.tracks[S.currentTrack].mode !== 'drum') return;
  if (padIdx < 0 || padIdx > 7) return;
  const slotToPad = [4,5,6,7,0,1,2,3];
  const slotIdx = slotToPad.indexOf(padIdx);
  if (slotIdx < 0) return;
  const sg = document.getElementById(`fxslot_${slotIdx}`);
  if (!sg) return;
  const col_hex = trackColor(S.currentTrack);
  const bg = sg.querySelector('rect');
  if (bg) {
    bg.setAttribute('fill', col_hex + 'bb');
    bg.setAttribute('stroke', '#fff');
    bg.setAttribute('stroke-width', '2');
    setTimeout(() => {
      if (!projectModeActive && S.mode !== 'session') renderDrumPadSelection();
    }, 120);
  }
}

function illuminateMeloPadsRT(notes, on) {
  if (projectModeActive) return;
  if (S.mode === 'session') return; // session gère son propre affichage
  const col_hex = trackColor(S.currentTrack);
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const n = padNote(r, c);
      if (n < 0) continue;
      if (notes.includes(n)) {
        const el = padEl(r, c);
        if (on) {
          el.setAttribute('fill', col_hex + 'ee');
          el.setAttribute('stroke', '#fff');
          el.setAttribute('stroke-width', '2');
        } else {
          renderPadAppearance(r, c);
        }
      }
    }
  }
}

// Met à jour l'affichage bar sur l'OLED
// ── OLED avec défilement automatique si texte trop long ──
// L'écran OLED fait 121px de large, les 3 lignes ont des tailles différentes
// On utilise du CSS animation pour le défilement
const oledScrollTimers = {};

function oledSetLine(elId, text, maxWidth) {
  const el = svg(elId);
  if (!el) return;
  // Arrêter tout défilement en cours
  clearTimeout(oledScrollTimers[elId]);
  if (oledScrollTimers[elId + '_loop']) {
    clearTimeout(oledScrollTimers[elId + '_loop']);
  }
  el.style.transition = 'none';
  el.style.transform = 'translateX(0)';
  el.textContent = text;

  requestAnimationFrame(() => {
    try {
      const len = el.getComputedTextLength ? el.getComputedTextLength() : 0;
      if (len > maxWidth && text.length > 0) {
        const shift = -(len - maxWidth + 4);
        const duration = Math.max(1.5, (len / maxWidth) * 2.5);

        function doScroll() {
          // Pause initiale → défilement → pause → retour → recommence
          el.style.transition = 'none';
          el.style.transform = 'translateX(0)';
          oledScrollTimers[elId] = setTimeout(() => {
            el.style.transition = `transform ${duration}s linear`;
            el.style.transform = `translateX(${shift}px)`;
            // Pause en fin, retour rapide, puis reboucle
            oledScrollTimers[elId + '_loop'] = setTimeout(() => {
              el.style.transition = 'none';
              el.style.transform = 'translateX(0)';
              // Re-lancer après une pause
              oledScrollTimers[elId] = setTimeout(doScroll, 600);
            }, duration * 1000 + 800);
          }, 900);
        }
        doScroll();
      } else {
        el.style.transition = 'none';
        el.style.transform = 'translateX(0)';
      }
    } catch(e) {}
  });
}

S._oledLocked = false;

function oled(top, main, sub) {
  if (S._oledLocked) return;
  oledSetLine('oTop',  top  || '', 111);
  oledSetLine('oMain', main || '', 108);
  oledSetLine('oSub',  sub  || '', 111);
}

function oledForce(top, main, sub) {
  oledSetLine('oTop',  top  || '', 111);
  oledSetLine('oMain', main || '', 108);
  oledSetLine('oSub',  sub  || '', 111);
}

function updateBarIndicator() {
  if (S._oledLocked) return;
  const clip = activeClip();
  const loopStart = clip.loopStart ?? 0;
  const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
  const regionLen = loopEnd - loopStart + 1;
  const relPos    = S.currentBar - loopStart + 1; // position relative dans la région (1-based)
  svg('oSub').textContent = `BAR ${relPos}/${regionLen} · BPM ${S.bpm}`;
}

let sessionRefreshTimer = null;

function startPlay() {
  ensureAudio();
  if (S.recording) saveUndo();
  S.playing = true;
  globalTick = 0;
  trackTick = [0, 0, 0, 0, 0, 0, 0, 0];
  // Reset song mode
  _songColumnRepeatCount = 0;
  // Déterminer la colonne de départ (basée sur le playingClip du master)
  const masterTi = S.tracks.findIndex(t => t.mode === 'master');
  _songCurrentColumn = masterTi >= 0 ? S.tracks[masterTi].playingClip : 0;
  nextTime = actx.currentTime + 0.05;
  schedTimer = setInterval(scheduler, 25);
  if (S.mode === 'session') {
    sessionRefreshTimer = setInterval(() => { if (S.mode === 'session') renderSessionMode(); }, 100);
  }
  svg('playIcon').setAttribute('fill', '#3ddc84');
  svg('btnPlay').querySelector('rect').setAttribute('stroke', '#3ddc84');
  if (S.mode === 'loop') {
    const clip = activeClipObj();
    const lo = clip.loopStart ?? 0;
    const hi = clip.loopEnd   ?? (clip.numBars - 1);
    const len = hi - lo + 1;
    oled('▶ LOOP', `${S.bpm} BPM`, `${len} bar${len>1?'s':''} (${lo+1}→${hi+1})`);
  } else {
    oled('▶ PLAYING', `${S.bpm} BPM`, trackInfo());
  }
  status('Playing…');
}

function stopPlay() {
  recHeld.clear();
  metronomeStop();
  S.playing = false;
  clearInterval(schedTimer);
  clearInterval(sessionRefreshTimer);
  sessionRefreshTimer = null;
  S.tracks.forEach(t => { t.queuedClip = null; });
  // Arrêter tous les arps
  for (let ti = 0; ti < 8; ti++) arpStop(ti);
  // Envoyer allNotesOff sur toutes les tracks
  S.tracks.forEach((t, ti) => {
    if (t.outputMode === 'midi') midiAllNotesOff(ti);
    if (t.outputMode === 'sf2' && sf2Ready && jsSynths[ti]) {
      // allSoundOff (CC120) coupe immédiatement sans release → pas de clic traînant
      jsSynths[ti].midiControl(SF2_CHANNEL, 120, 0);
    }
  });
  // Rampdown reverb + delay master pour éviter le gel Chrome Android
  // (les boucles comb de la freeverb continuent de résonner ~10s → Chrome gèle → pop)
  if (_masterNodes) {
    const t0 = actx.currentTime;
    _masterNodes.reverbWet.gain.setTargetAtTime(0, t0, 0.4);   // décroît en ~1.5s
    _masterNodes.delayWet.gain.setTargetAtTime(0, t0, 0.4);
    // Vider les boucles comb de la freeverb instantanément
    if (_masterNodes.freeverb?.flush) _masterNodes.freeverb.flush();
    // Restaurer les gains après que la queue soit éteinte
    setTimeout(() => {
      if (_masterNodes) {
        _masterNodes.reverbWet.gain.cancelScheduledValues(0);
        _masterNodes.reverbWet.gain.value = 1.0;
        _masterNodes.delayWet.gain.cancelScheduledValues(0);
        _masterNodes.delayWet.gain.value  = 1.0;
      }
    }, 3000);
  }
  if (projectModeActive) {
    // En project mode : ne rien re-rendre, juste restaurer le rendu projet
    renderProjectMode();
  } else if (S.mode === 'session') {
    renderSessionMode();
  } else if (S.mode === 'loop') {
    renderLoopMode();
  } else {
    const bar = currentStepBar();
    for (let i = 0; i < 16; i++) setStepAppearance(i, bar[i].on, false);
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 8; c++) renderPadAppearance(r, c);
  }
  svg('playIcon').setAttribute('fill', '#888');
  svg('btnPlay').querySelector('rect').setAttribute('stroke', '#444');
  if (projectModeActive) {
    oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'clic=load · vide=save');
  } else if (S.mode === 'loop') {
    const clip = activeClipObj();
    const lo = clip.loopStart ?? 0;
    const hi = clip.loopEnd   ?? (clip.numBars - 1);
    const len = hi - lo + 1;
    oled('LOOP MODE', trackInfo(), `${len} bar${len>1?'s':''} (${lo+1}→${hi+1})`);
  } else {
    oled('■ STOPPED', `${S.bpm} BPM`, trackInfo());
  }
  status('Stopped');
  if (S.recording) { saveUndoAfter(); renderSteps(); }
}

function togglePlay() {
  if (S.playing) { stopPlay(); return; }
  // Si décompte en cours → tout annuler (lecture + record)
  if (_countdownActive) {
    if (countdownTimer) { clearTimeout(countdownTimer); countdownTimer = null; }
    _countdownActive = false;
    // Désarmer le record proprement
    S.recording = false;
    metronomeStop();
    clearInterval(recBlinkTimer); recBlinkTimer = null;
    const dot = svg('recDot');
    const circle = dot?.parentElement?.querySelector('circle');
    dot?.setAttribute('fill', '#882222');
    circle?.setAttribute('stroke', '#3a3a3a');
    recHeld.clear();
    // Reset play visuel
    svg('playIcon').setAttribute('fill', '#888');
    svg('btnPlay').querySelector('rect').setAttribute('stroke', '#444');
    S._oledLocked = false;
    oled('STOP', 'Annulé', trackInfo());
    return;
  }
  // Si Record actif → décompte 1 mesure avant de lancer
  if (S.recording) {
    startCountdown(() => startPlay());
  } else {
    startPlay();
  }
}

// ── Métronome ──────────────────────────────────────────────────

function sndMetronome(strong) {
  // Click court : fort sur le 1, léger sur 2/3/4
  const t = actx.currentTime;
  const freq = strong ? 1800 : 1200;
  const gain = strong ? 0.55 : 0.32;
  const dur  = strong ? 0.025 : 0.018;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, t + dur);
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g);
  g.connect(getMaster());
  o.start(t);
  o.stop(t + dur + 0.01);
}

function metronomeStart() {
  metronomeStop();
  let beat = 0;
  function tick() {
    if (!metronomeTimer) return; // arrêté
    sndMetronome(beat % 4 === 0);
    beat++;
    // Recalculer le tempo à chaque battement → suit les changements en temps réel
    metronomeTimer = setTimeout(tick, stepDur() * 4 * 1000);
  }
  // Démarrage immédiat
  metronomeTimer = true; // flag "actif" pour le premier tick
  tick();
}

function metronomeStop() {
  clearTimeout(metronomeTimer);
  metronomeTimer = null;
}

// ── Décompte avant enregistrement ─────────────────────────────

function startCountdown(onDone) {
  ensureAudio();
  if (countdownTimer) { clearTimeout(countdownTimer); }
  let count = 4;
  oled('⏺ REC', `${count}`, 'décompte...');
  sndMetronome(true);

  // Pré-initialiser nextTime pour que recQuantizeStep puisse fonctionner
  // On simule que le step 0 commence dans exactement 1 mesure = 4 beats = 16 steps
  const beatDur = stepDur() * 4;
  const measDur = beatDur * 4; // 1 mesure = 4 beats
  nextTime = actx.currentTime + measDur + stepDur(); // step 0 démarre dans 1 mesure
  globalTick = 0;
  _countdownActive = true; // activer la capture des notes pendant le décompte

  function cdTick() {
    count--;
    // Mettre à jour nextTime à chaque beat du décompte
    nextTime = actx.currentTime + count * beatDur + stepDur();
    if (count > 0) {
      oled('⏺ REC', `${count}`, 'décompte...');
      sndMetronome(false);
      countdownTimer = setTimeout(cdTick, beatDur * 1000);
    } else {
      countdownTimer = null;
      _countdownActive = false;
      onDone();
      metronomeStart();
    }
  }
  countdownTimer = setTimeout(cdTick, beatDur * 1000);
}

// Feature 3 — Tap Tempo
const tapTimes = [];
function tapTempoHit() {
  const now = performance.now();
  tapTimes.push(now);
  if (tapTimes.length > 8) tapTimes.shift();
  if (tapTimes.length < 2) {
    oled('TAP TEMPO', '…', 'encore une fois');
    return;
  }
  const intervals = [];
  for (let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
  const avg = intervals.reduce((a,b)=>a+b,0) / intervals.length;
  setBpm(Math.round(60000 / avg));
  oled('TAP TEMPO', `${S.bpm} BPM`, `${tapTimes.length} taps`);
  status(`Tap tempo: ${S.bpm} BPM`);
}

// ── Undo/Redo (déclaré avant renderSteps qui l'appelle) ──
function snapshotClip(trackIdx) {
  const ti = trackIdx ?? S.currentTrack;
  const t = S.tracks[ti];
  const clip = t.clips[t.activeClip];
  return {
    ti, clipIdx: t.activeClip,
    bars: clip.bars.map(bar => bar.map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))),
    drumBars: clip.drumBars.map(p => p.map(b => b.map(st => ({...st})))),
    numBars: clip.numBars,
    loopStart: clip.loopStart ?? 0,
    loopEnd:   clip.loopEnd   ?? (clip.numBars - 1),
    drumSoundMap: [...t.drumSoundMap],
    drumPads: t.drumPads ? t.drumPads.map(p => ({...p, buffer: p.buffer})) : null,
  };
}

function saveUndo(trackIdx) {
  if (undoStack._restoring) return;
  const now = Date.now();
  if (undoStack.lastSaveTime && (now - undoStack.lastSaveTime) < 80) return;

  const snap = snapshotClip(trackIdx);
  undoStack.history = undoStack.history.slice(0, undoStack.cursor + 1);
  undoStack.history.push(snap);
  if (undoStack.history.length > UNDO_MAX + 1) undoStack.history.shift();
  undoStack.cursor = undoStack.history.length - 1;
  undoStack.lastSaveTime = now;

  // Autosave différé — sauvegarde le projet courant 300ms après la dernière modif
  scheduleAutosave();
}

// saveUndoAfter n'est plus nécessaire avec la pile — conservé comme no-op pour compatibilité
function saveUndoAfter() {}

function restoreSnapshot(snap) {
  if (!snap) return;
  const t = S.tracks[snap.ti];
  const clip = t.clips[snap.clipIdx];
  clip.bars = snap.bars.map(bar => bar.map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []})));
  clip.drumBars = snap.drumBars.map(p => p.map(b => b.map(st => ({...st}))));
  clip.numBars = snap.numBars;
  clip.loopStart = snap.loopStart ?? 0;
  clip.loopEnd   = snap.loopEnd   ?? (snap.numBars - 1);
  t.drumSoundMap = [...snap.drumSoundMap];
  if (snap.drumPads) t.drumPads = snap.drumPads.map(p => ({...p}));
  S.currentTrack = snap.ti;
  t.activeClip = snap.clipIdx;
  S.currentBar = Math.min(S.currentBar, snap.numBars - 1);
  undoStack.lastSaveTime = null;
  undoStack._restoring = true;
  heldSteps.clear();
  recHeld.clear();
  clearStepNoteIllumination();
  renderPads();
  renderSteps();
  renderTrackButtons();
  if (S.pianoOpen) { illuminatePianoNotes(); updatePianoOctaveIndicators(); }
  updateEncArcs();
  undoStack._restoring = false;
}

function doUndo() {
  // On peut undo si cursor > 0 (il y a un état antérieur dans la pile)
  if (undoStack.cursor <= 0 || undoStack.history.length < 2) {
    oledForce('UNDO', 'rien à annuler', '');
    setTimeout(() => S._oledLocked = false, 1500);
    return;
  }
  undoStack.cursor--;
  restoreSnapshot(undoStack.history[undoStack.cursor]);
  const remaining = undoStack.cursor;
  oledForce('UNDO', 'annulé', remaining > 0 ? `encore ${remaining}` : 'début');
  setTimeout(() => S._oledLocked = false, 1200);
}

function doRedo() {
  if (undoStack.cursor >= undoStack.history.length - 1) {
    oledForce('REDO', 'rien à rétablir', '');
    setTimeout(() => S._oledLocked = false, 1500);
    return;
  }
  undoStack.cursor++;
  restoreSnapshot(undoStack.history[undoStack.cursor]);
  const remaining = undoStack.history.length - 1 - undoStack.cursor;
  oledForce('REDO', 'rétabli', remaining > 0 ? `encore ${remaining}` : 'fin');
  setTimeout(() => S._oledLocked = false, 1200);
}

function renderPads() {
  if (projectModeActive) return;
  if (S.mode === 'session') { renderSessionMode(); return; }
  const ti = S.currentTrack;
  const t = S.tracks[ti];
  const col = trackColor(ti);

  if (t.mode === 'drum') {
    if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
    renderDrumPadSelection();
    return;
  }

  // Mode mélodique — layout piano
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const el = padEl(r, c);
      const isWhiteRow = (r === 3 || r === 1);
      const isBlackRow = (r === 2 || r === 0);
      const isBlackCol = BLACK_COLS.includes(c);

      if (isWhiteRow) {
        const isTonic = (c === 0 || c === 7);
        el.setAttribute('fill', isTonic ? col + '40' : col + '25');
        el.setAttribute('stroke', col + '66');
        el.setAttribute('stroke-width', '0.8');
        el.setAttribute('cursor', 'pointer');
      } else if (isBlackRow && isBlackCol) {
        const darkCol = darkenColor(col);
        el.setAttribute('fill', darkCol);
        el.setAttribute('stroke', col + '55');
        el.setAttribute('stroke-width', '0.8');
        el.setAttribute('cursor', 'pointer');
      } else {
        el.setAttribute('fill', '#0e0e10');
        el.setAttribute('stroke', '#1a1a1c');
        el.setAttribute('stroke-width', '0.5');
        el.setAttribute('cursor', 'default');
        ['padlbl','padslbl'].forEach(pfx => {
          const lbl = document.getElementById(`${pfx}_${r}_${c}`);
          if (lbl) lbl.textContent = '';
        });
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// LAYOUT PIANO
// ═══════════════════════════════════════════════════════════════
// Touches blanches (rangées 3 et 1) : C D E F G A B C
const WHITE_KEYS  = [0, 2, 4, 5, 7, 9, 11, 12];
const WHITE_NOTE_NAMES = ['C','D','E','F','G','A','B','C'];

// Touches noires (rangées 2 et 0), colonnes 1,2,4,5,6
// Col 0=vide(entre B-C), 1=C#, 2=D#, 3=vide(entre E-F), 4=F#, 5=G#, 6=A#, 7=vide(entre B-C)
const BLACK_KEYS = { 1:1, 2:3, 4:6, 5:8, 6:10 }; // col → demi-ton depuis C
const BLACK_NOTE_NAMES = { 1:'C#', 2:'D#', 4:'F#', 5:'G#', 6:'A#' };
const BLACK_COLS = [1, 2, 4, 5, 6];

function darkenColor(hex) {
  // Assombrit une couleur hex de ~50%
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const dr = Math.round(r * 0.35).toString(16).padStart(2,'0');
  const dg = Math.round(g * 0.35).toString(16).padStart(2,'0');
  const db = Math.round(b * 0.35).toString(16).padStart(2,'0');
  return `#${dr}${dg}${db}`;
}

function padNote(row, col) {
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return 36 + col;

  if (row === 3) return S.octave * 12 + WHITE_KEYS[col];
  if (row === 1) return (S.octave + 1) * 12 + WHITE_KEYS[col];
  if (row === 2) {
    if (!BLACK_COLS.includes(col)) return -1; // pas de touche noire ici
    return S.octave * 12 + BLACK_KEYS[col];
  }
  if (row === 0) {
    if (!BLACK_COLS.includes(col)) return -1;
    return (S.octave + 1) * 12 + BLACK_KEYS[col];
  }
  return -1;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function selectTrack(ti) {
  const prevTi = S.currentTrack;
  const prev   = S.tracks[prevTi];
  // Sauvegarder l'octave courante dans la track précédente
  prev.octave = S.octave;
  prev.pianoOctave = S.pianoOctave;
  if (ti !== prevTi) {
    if (prev.outputMode === 'midi') midiAllNotesOff(prevTi);
    if (prev.outputMode === 'sf2')  sf2AllNotesOff(prevTi);
  }
  midiState.heldNotes.clear();
  S._trackVisToken++;

  // Sync page avec la track sélectionnée
  S.page = Math.floor(ti / 4);

  // Restaurer l'octave de la nouvelle track
  S.octave = S.tracks[ti].octave ?? 3;
  S.pianoOctave = S.tracks[ti].pianoOctave ?? 0;
  if (S.pianoOpen) buildPiano(); // reconstruire le piano avec le bon registre

  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 8; c++)
      renderPadAppearance(r, c);
  if (S.pianoOpen) {
    document.querySelectorAll('[id^="pk_"]').forEach(el => {
      const h = parseFloat(el.getAttribute('height'));
      const isBlack = h < PK_WH * 0.8;
      el.setAttribute('fill', isBlack ? '#1a1a1a' : '#d0d0d0');
      el.setAttribute('stroke', isBlack ? '#000' : '#888');
    });
  }

  S.currentTrack = ti;
  const t = S.tracks[ti];
  const isMaster = t.mode === 'master';

  // Sur la piste Master : désactiver loop mode mais afficher les steps (BPM automation)
  if (isMaster) {
    if (S.mode === 'loop') {
      S.mode = 'note';
      S._loopBarHeld = -1; S._loopBar2 = -1;
      setBtnLit('btnLoop', false, '#3ddc84');
    }
  }

  if (S.mode === 'session' && !S._mHeld && !heldKeys.has('Numpad6')) {
    S.currentBar = 0;
    // Rester en mode session — juste changer la track active
    renderTrackButtons();
    renderSessionMode();
    oled('SESSION', `Track ${ti+1}`, `Clip ${t.activeClip+1}`);
  } else if (S.mode !== 'session') {
    renderTrackButtons();
    renderPads();
    renderSteps();
    oled(`TRACK ${ti+1}`, getSound(ti).name, isMaster ? 'MASTER BUS' : t.mode.toUpperCase());
  }
  if (S.mode === 'session') {
    renderTrackButtons();
    renderSessionMode(); // re-render session grid with new track highlighted
  }
  if (S.pianoOpen && !isMaster) { illuminatePianoNotes(); }
  updateEncArcs();
  updateSendArcs();
  renderFXPanel();
  renderTrackButtons();
  // Mettre à jour l'affichage de l'octave du clavier
  if (S.pianoOpen && typeof updatePianoOctaveIndicators === 'function') {
    updatePianoOctaveIndicators();
  }
  const octStr = octaveRegistre() === 0 ? '0' : (octaveRegistre() > 0 ? '+' + octaveRegistre() : '' + octaveRegistre());
  const octDisp = document.getElementById('octaveDisplay');
  if (octDisp) octDisp.textContent = octStr;
}

function toggleStep(i) {
  saveUndo();
  ensureAudio();
  const t = S.tracks[S.currentTrack];
  const wasEmpty = !clipHasNotes(activeClip()); // vérifier AVANT d'ajouter
  activeClip().stretchState = 0;
  activeClip().originalBars = null;
  activeClip().originalDrumBars = null;
  const bar = currentStepBar();
  const st = bar[i];
  st.on = !st.on;
  if (st.on) {
    st.vel = 0.787;
    st.extraNotes = [];
    if (t.mode === 'master') {
      // Master : stocker le BPM actuel
      st.note = S.bpm;
      oled(`STEP ${i+1}`, `${S.bpm} BPM`, `Bar ${S.currentBar+1}`);
    } else if (t.mode === 'drum') {
      triggerDrumPad(S.selectedDrumPad, 0.65);
      oled(`STEP ${i+1}`, `ON · ${getDrumPadName(S.currentTrack, S.selectedDrumPad)}`, `pad ${S.selectedDrumPad+1}`);
    } else {
      st.note = 60;
      playTrackNote(S.currentTrack, st.note, 0.65);
      oled(`STEP ${i+1}`, `ON · ${noteName(st.note)}`, trackInfo());
    }
    // Si c'était la première note d'un clip vide → démarrer en sync
    if (wasEmpty) autoStartClipIfFirstNote();
  } else {
    oled(`STEP ${i+1}`, 'OFF', trackInfo());
  }
  setStepAppearance(i, st.on, false);
  renderSteps(); // mettre à jour le texte BPM sur master
}

function playPad(row, col) {
  ensureAudio();
  const ti = S.currentTrack;
  const t = S.tracks[ti];

  if (t.mode === 'drum') {
    // En mode drum les pads SVG sont cachés — les clics passent par data-drumpad dans fxHandleDown
    // Ce code ne devrait plus être atteint, mais on le garde en sécurité
    return;
  }

  // Mode mélodique
  const note = padNote(row, col);
  recNoteOn(note, 0.85);
  if (note < 0) return;

  if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      out.send([0x90 | mch, note & 0x7f, 108]);
      setTimeout(() => { if (out.state === 'connected') out.send([0x80 | mch, note & 0x7f, 0]); }, 300);
    }
  } else if (t.outputMode === 'sf2') {
    sf2NoteOn(ti, note, 0.85);
    // NoteOff sur mouseup global — stocker la note pour le relâchement
    _padHeldNote = { ti, note };
  } else {
    playTrackNote(ti, note, 0.85);
  }
  flashPad(row, col);
  oled('PAD', noteName(note), trackInfo());

  if (S.recording && S.playing) {
    const step = (globalTick - 1) % 16;
    const st = activeClip().bars[S.currentBar][step];
    if (!st.on) {
      st.on = true; st.note = note; st.vel = 0.85;
      setStepAppearance(step, true, false);
    }
  }
}

function renderDrumPadSelection() {
  if (projectModeActive) return;
  const ti = S.currentTrack;
  const t  = S.tracks[ti];
  if (t.mode !== 'drum') return;
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  const col = trackColor(ti);

  // Les 8 pads occupent exactement la zone FX (même layout que les slots d'effets)
  // Slot i → pad mapping : slots 0..3 = pads 4..7 (rangée haute), slots 4..7 = pads 0..3 (rangée basse)
  // Ainsi pads 0..3 (Kick/Snare/Clap/HH Cl) sont en BAS, pads 4..7 en haut
  const slotToPad = [4, 5, 6, 7,  0, 1, 2, 3];

  // Afficher le panel drum par dessus les pads (même visibility que enginePanel)
  const panel = document.getElementById('enginePanel');

  for (let slotIdx = 0; slotIdx < 8; slotIdx++) {
    const padIdx = slotToPad[slotIdx];
    const pad    = t.drumPads[padIdx];
    const sg     = document.getElementById(`fxslot_${slotIdx}`);
    if (!sg) continue;
    sg.innerHTML = '';

    const sx = fxSlotX(slotIdx), sy = fxSlotY(slotIdx);
    const pw = FX_SW, ph = FX_SH;
    const margin = 4;
    const isSelected = padIdx === S.selectedDrumPad;

    // Fond
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx + margin); bg.setAttribute('y', sy + margin);
    bg.setAttribute('width', pw - margin*2); bg.setAttribute('height', ph - margin*2);
    bg.setAttribute('rx', 6);
    bg.setAttribute('fill',   isSelected ? col + '33' : '#141416');
    bg.setAttribute('stroke', isSelected ? col        : '#2a2a2e');
    bg.setAttribute('stroke-width', isSelected ? '1.8' : '0.6');
    sg.appendChild(bg);

    // Nom du pad (centré)
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', sx + pw/2);
    nameEl.setAttribute('y', sy + ph/2 + 2);
    nameEl.setAttribute('text-anchor', 'middle');
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '17');
    nameEl.setAttribute('font-weight', isSelected ? '500' : '400');
    nameEl.setAttribute('fill', isSelected ? col : '#666');
    nameEl.setAttribute('pointer-events', 'none');
    const padName = (pad.mode === 'sample' && pad.fileName)
      ? pad.fileName.replace(/\.[^.]+$/, '').slice(0, 10)
      : (pad.synthType || '—');
    nameEl.textContent = padName;
    sg.appendChild(nameEl);

    // Numéro du pad (petit, coin haut gauche)
    const numEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    numEl.setAttribute('x', sx + margin + 6);
    numEl.setAttribute('y', sy + margin + 12);
    numEl.setAttribute('font-family', "'DM Mono',monospace");
    numEl.setAttribute('font-size', '14');
    numEl.setAttribute('fill', isSelected ? col + 'cc' : '#333');
    numEl.setAttribute('pointer-events', 'none');
    numEl.textContent = String(padIdx + 1);
    sg.appendChild(numEl);

    // LED selected (petit point en haut à droite)
    if (isSelected) {
      const led = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      led.setAttribute('cx', sx + pw - margin - 6);
      led.setAttribute('cy', sy + margin + 6);
      led.setAttribute('r', '3.5');
      led.setAttribute('fill', col);
      led.setAttribute('pointer-events', 'none');
      sg.appendChild(led);
    }

    // Zone de hit transparente avec data-drumpad
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', sx + margin); hit.setAttribute('y', sy + margin);
    hit.setAttribute('width', pw - margin*2); hit.setAttribute('height', ph - margin*2);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('cursor', 'pointer');
    hit.setAttribute('data-drumpad', padIdx);
    sg.appendChild(hit);
  }

  // S'assurer que le panel est visible et les pads SVG cachés
  if (panel) panel.setAttribute('visibility', 'visible');
  for (let r = 0; r < 4; r++) {
    const row = document.getElementById(`padRow${r}`);
    if (row) row.setAttribute('visibility', 'hidden');
  }
}

// ── Synchronise loopStart/loopEnd après changement de numBars ──
// Appelé quand numBars change hors loop mode (duplicate, stretch, addBar...)
function syncLoopRegion(clip) {
  if (clip.loopStart === undefined) clip.loopStart = 0;
  if (clip.loopEnd   === undefined) clip.loopEnd   = clip.numBars - 1;
  // Clamper dans les bornes
  clip.loopStart = Math.max(0, Math.min(clip.numBars - 1, clip.loopStart));
  clip.loopEnd   = Math.max(clip.loopStart, Math.min(clip.numBars - 1, clip.loopEnd));
}

// ── Loop + + : dupliquer le pattern (étendre à N×2 bars) ──
function duplicatePattern() {
  const t = S.tracks[S.currentTrack];
  if (activeClip().numBars >= 8) { status('Max 8 bars'); return; }
  const srcCount = activeClip().numBars;
  const newCount = Math.min(8, srcCount * 2);
  if (t.mode === 'drum') {
    activeClip().drumBars.forEach(padSeq => {
      for (let b = srcCount; b < newCount; b++)
        padSeq[b] = padSeq[b % srcCount].map(st => ({...st}));
    });
  } else {
    for (let b = srcCount; b < newCount; b++)
      activeClip().bars[b] = activeClip().bars[b % srcCount].map(st => ({...st}));
  }
  activeClip().numBars = newCount;
  activeClip().loopEnd = newCount - 1; // étendre la région aussi
  syncLoopRegion(activeClip());
  renderSteps();
  oled('DUPLICATE', `${srcCount}→${newCount} bars`, trackInfo());
  status(`Pattern dupliqué → ${newCount} bars`);
}

// ── Loop + − : diviser la longueur du pattern par 2 ──
function halvePattern() {
  const t = S.tracks[S.currentTrack];
  if (activeClip().numBars <= 1) { status('Min 1 bar'); return; }
  const newCount = Math.max(1, Math.floor(activeClip().numBars / 2));
  activeClip().numBars = newCount;
  S.currentBar = Math.min(S.currentBar, newCount - 1);
  syncLoopRegion(activeClip());
  renderSteps();
  oled('HALVE', `→ ${newCount} bar${newCount>1?'s':''}`, trackInfo());
  status(`Pattern divisé → ${newCount} bars`);
}

// ── Sauvegarde de l'original (appelé avant tout stretch/compress) ──
function snapshotOriginal(t) {
  if (activeClip().originalBars !== null) return; // déjà sauvegardé
  activeClip().originalBars = activeClip().bars.map(bar => bar.map(st => ({...st})));
  activeClip().originalDrumBars = activeClip().drumBars.map(padSeq => padSeq.map(bar => bar.map(st => ({...st}))));
  activeClip().originalNumBars = activeClip().numBars;
}

// ── Applique un stretch ×2 de l'original → destination ──
function applyStretchFromOriginal(t) {
  const oldBars = activeClip().originalNumBars;
  const newBars = Math.min(8, oldBars * 2);
  if (t.mode === 'drum') {
    activeClip().drumBars.forEach((padSeq, pi) => {
      const snap = activeClip().originalDrumBars[pi];
      for (let b = 0; b < newBars; b++)
        padSeq[b] = Array.from({length:16}, () => ({on:false, vel:0.787}));
      for (let b = 0; b < oldBars; b++) {
        for (let s = 0; s < 16; s++) {
          const st = snap[b][s];
          if (!st.on) continue;
          const newG = (b * 16 + s) * 2;
          if (newG >= newBars * 16) continue;
          padSeq[Math.floor(newG/16)][newG%16] = {...st};
        }
      }
    });
  } else {
    for (let b = 0; b < newBars; b++)
      activeClip().bars[b] = Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
    for (let b = 0; b < oldBars; b++) {
      for (let s = 0; s < 16; s++) {
        const st = activeClip().originalBars[b][s];
        if (!st.on) continue;
        const newG = (b * 16 + s) * 2;
        if (newG >= newBars * 16) continue;
        const nb = Math.floor(newG/16), ns = newG%16;
        activeClip().bars[nb][ns] = {...st, len: Math.min(16 - ns, (st.len||1) * 2)};
      }
    }
  }
  activeClip().numBars = newBars;
  activeClip().loopEnd = newBars - 1;
  syncLoopRegion(activeClip());
}

// ── Applique un compress ×2 de l'original → destination ──
function applyCompressFromOriginal(t) {
  const oldBars = activeClip().originalNumBars;
  const newBars = Math.max(1, Math.floor(oldBars / 2));
  const useNewBars = oldBars > 1 ? newBars : 1;
  if (t.mode === 'drum') {
    activeClip().drumBars.forEach((padSeq, pi) => {
      const snap = activeClip().originalDrumBars[pi];
      for (let b = 0; b < useNewBars; b++)
        padSeq[b] = Array.from({length:16}, () => ({on:false, vel:0.787}));
      for (let b = 0; b < oldBars; b++) {
        for (let s = 0; s < 16; s++) {
          const st = snap[b][s];
          if (!st.on) continue;
          const newG = Math.floor((b * 16 + s) / 2);
          if (newG >= useNewBars * 16) continue;
          const nb = Math.floor(newG/16), ns = newG%16;
          if (!padSeq[nb][ns].on) padSeq[nb][ns] = {...st};
        }
      }
    });
  } else {
    for (let b = 0; b < useNewBars; b++)
      activeClip().bars[b] = Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
    for (let b = 0; b < oldBars; b++) {
      for (let s = 0; s < 16; s++) {
        const st = activeClip().originalBars[b][s];
        if (!st.on) continue;
        const newG = Math.floor((b * 16 + s) / 2);
        if (newG >= useNewBars * 16) continue;
        const nb = Math.floor(newG/16), ns = newG%16;
        if (!activeClip().bars[nb][ns].on)
          activeClip().bars[nb][ns] = {...st, len: Math.max(1, Math.floor((st.len||1)/2))};
      }
    }
  }
  activeClip().numBars = useNewBars;
  activeClip().loopEnd = useNewBars - 1;
  syncLoopRegion(activeClip());
}

// ── Restore l'original ──
function restoreOriginal(t) {
  activeClip().bars = activeClip().originalBars.map(bar => bar.map(st => ({...st})));
  activeClip().drumBars = activeClip().originalDrumBars.map(padSeq => padSeq.map(bar => bar.map(st => ({...st}))));
  activeClip().numBars = activeClip().originalNumBars;
  activeClip().loopEnd = activeClip().originalNumBars - 1;
  syncLoopRegion(activeClip());
}

// ── Loop + → : stretch ×2 (limité à +1 depuis l'original) ──
function stretchPattern() {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (activeClip().stretchState >= 1) { status('Déjà au maximum stretch ×2'); oled('STRETCH', 'max atteint', '←=original/compress'); return; }
  snapshotOriginal(t);
  if (activeClip().stretchState === -1) {
    // Compressé → revenir à l'original
    restoreOriginal(t);
    activeClip().stretchState = 0;
    oled('STRETCH', 'retour original', trackInfo());
    status('Pattern restauré (original)');
  } else {
    // Original → stretchée
    applyStretchFromOriginal(t);
    activeClip().stretchState = 1;
    oled('STRETCH ×2', `${activeClip().originalNumBars}→${activeClip().numBars} bars`, '2× plus lent');
    status(`Stretch ×2 → ${activeClip().numBars} bars`);
  }
  S.currentBar = Math.min(S.currentBar, activeClip().numBars - 1);
  renderSteps();
}

// ── Loop + ← : compress ×2 (limité à -1 depuis l'original) ──
function compressPattern() {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (activeClip().stretchState <= -1) { status('Déjà au maximum compress ×2'); oled('COMPRESS', 'max atteint', '→=original/stretch'); return; }
  snapshotOriginal(t);
  if (activeClip().stretchState === 1) {
    // Stretchée → revenir à l'original
    restoreOriginal(t);
    activeClip().stretchState = 0;
    oled('COMPRESS', 'retour original', trackInfo());
    status('Pattern restauré (original)');
  } else {
    // Original → compressée
    applyCompressFromOriginal(t);
    activeClip().stretchState = -1;
    oled('COMPRESS ×2', `${activeClip().originalNumBars}→${activeClip().numBars} bar${activeClip().numBars>1?'s':''}`, '2× plus rapide');
    status(`Compress ×2 → ${activeClip().numBars} bars`);
  }
  S.currentBar = Math.min(S.currentBar, activeClip().numBars - 1);
  renderSteps();
}

// Alias pour compatibilité (Shift+D, Numpad8)
function doublePattern() { saveUndo(); duplicatePattern(); }

function copyTrack(src, dst) {
  const sc = activeClip(src), dc = activeClip(dst);
  dc.bars = sc.bars.map(bar => bar.map(st => ({...st})));
  dc.drumBars = sc.drumBars.map(padSeq => padSeq.map(bar => bar.map(st => ({...st}))));
  S.tracks[dst].soundIndex = S.tracks[src].soundIndex;
  dc.numBars = sc.numBars;
  dc.loopStart = sc.loopStart ?? 0;
  dc.loopEnd   = sc.loopEnd   ?? (sc.numBars - 1);
  status(`Track ${src+1} → Track ${dst+1} copied`);
}

function changeSoundArrow(delta) {
  const t = S.tracks[S.currentTrack];
  const ti = S.currentTrack;
  if (t.outputMode === 'sf2') {
    const ts = trackSF2[ti];
    if (!ts.presets.length) {
      oled('SOUND', 'No SF2', 'Shift+track pour charger');
      return;
    }
    const cur = ts.presets.findIndex(p => p.bank === ts.bank && p.program === ts.program);
    const newIdx = Math.max(0, Math.min(ts.presets.length - 1, (cur < 0 ? 0 : cur) + delta));
    const preset = sf2SelectPreset(ti, newIdx);
    oled('SOUND', preset.name.slice(0,14), trackInfo());
    status(`Sound: ${preset.name}`);
    return;
  }
  // drum track
  t.soundIndex = (t.soundIndex + delta + DRUM_SOUNDS.length) % DRUM_SOUNDS.length;
  const snd = getSound(ti);
  oled('SOUND', snd.name, trackInfo());
  status(`Sound: ${snd.name}`);
}

function setBpm(v) {
  S.bpm = Math.max(40, Math.min(240, Math.round(v)));
  svg('oSub').textContent = `BPM ${S.bpm} · ${S.playing ? '▶' : '■'}`;
  status(`BPM: ${S.bpm}`);
  if (masterFX.delay.sync) updateDelayTime();
}

function navBar(delta) {
  const clip = activeClip();
  const loopStart = clip.loopStart ?? 0;
  const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
  const regionLen = loopEnd - loopStart + 1;
  S.currentBar = Math.max(loopStart, Math.min(loopEnd, S.currentBar + delta));
  const relPos = S.currentBar - loopStart + 1;
  renderSteps();
  oled(`BAR ${relPos}/${regionLen}`, trackInfo(), `BPM ${S.bpm}`);
  status(`Bar ${relPos} / ${regionLen}`);
}

function addBar() {
  if (activeClip().numBars >= 8) { status('Max 8 bars'); return; }
  activeClip().numBars++;
  activeClip().loopEnd = activeClip().numBars - 1;
  S.currentBar = activeClip().numBars - 1;
  syncLoopRegion(activeClip());
  renderSteps();
  const clip = activeClip();
  const loopStart = clip.loopStart ?? 0;
  const loopEnd   = clip.loopEnd;
  const regionLen = loopEnd - loopStart + 1;
  const relPos    = S.currentBar - loopStart + 1;
  oled(`BAR ${relPos}/${regionLen}`, `+1 bar`, trackInfo());
  status(`Clip étendu → ${clip.numBars} bar${clip.numBars>1?'s':''}`);
}

function removeBar() {
  if (activeClip().numBars <= 1) { status('Min 1 bar'); return; }
  activeClip().bars[activeClip().numBars - 1].forEach(st => { st.on = false; });
  activeClip().drumBars.forEach(padSeq => {
    padSeq[activeClip().numBars - 1].forEach(st => { st.on = false; });
  });
  activeClip().numBars--;
  S.currentBar = Math.min(S.currentBar, activeClip().numBars - 1);
  syncLoopRegion(activeClip());
  renderSteps();
  const clip = activeClip();
  const loopStart = clip.loopStart ?? 0;
  const loopEnd   = clip.loopEnd   ?? (clip.numBars - 1);
  const regionLen = loopEnd - loopStart + 1;
  const relPos    = Math.max(1, S.currentBar - loopStart + 1);
  oled(`BAR ${relPos}/${regionLen}`, `-1 bar`, trackInfo());
  status(`Clip réduit → ${clip.numBars} bar${clip.numBars>1?'s':''}`);
}
