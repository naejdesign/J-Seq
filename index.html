      hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
      hit.setAttribute('fill', 'transparent'); hit.setAttribute('data-fxback', '1');
      sg.appendChild(hit);
      continue;
    }

    if (i >= nParams) {
      // Slot vide
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#0d0d0f');
      bg.setAttribute('stroke', '#1a1a1a'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);
      continue;
    }

    // Slot paramètre
    const p = visibleParams[i];
    const val = slot.params[p.key] ?? p.def;
    const pct = p.log
      ? Math.log(val/p.min) / Math.log(p.max/p.min)
      : (val - p.min) / (p.max - p.min);

    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
    bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
    bg.setAttribute('rx', 5); bg.setAttribute('fill', '#141416');
    bg.setAttribute('stroke', def.color+'55'); bg.setAttribute('stroke-width', '0.5');
    sg.appendChild(bg);

    // Barre de valeur verticale
    const barH = Math.round(pct * (FX_SH - pad*2 - 30));
    const barBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    barBg.setAttribute('x', sx+pad+8); barBg.setAttribute('y', sy+pad+10);
    barBg.setAttribute('width', 6); barBg.setAttribute('height', FX_SH-pad*2-30);
    barBg.setAttribute('rx', 3); barBg.setAttribute('fill', '#1e1e22');
    sg.appendChild(barBg);
    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('id', `fxbar_${slotIdx}_${i}`);
    const barTop = sy + pad + 10 + (FX_SH-pad*2-30) - barH;
    bar.setAttribute('x', sx+pad+8); bar.setAttribute('y', String(barTop));
    bar.setAttribute('width', 6); bar.setAttribute('height', String(barH));
    bar.setAttribute('rx', 3); bar.setAttribute('fill', def.color);
    bar.setAttribute('pointer-events', 'none');
    sg.appendChild(bar);

    // Nom
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', sx+pad+20); nameEl.setAttribute('y', sy+22);
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '13'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', def.color); nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = p.name;
    sg.appendChild(nameEl);

    // Valeur
    const valEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    valEl.setAttribute('id', `fxadv_${slotIdx}_${i}`);
    valEl.setAttribute('x', sx + FX_SW - 10); valEl.setAttribute('y', sy + FX_SH - 10);
    valEl.setAttribute('text-anchor', 'end');
    valEl.setAttribute('font-family', "'DM Mono',monospace");
    valEl.setAttribute('font-size', '14'); valEl.setAttribute('fill', '#ccc');
    valEl.setAttribute('pointer-events', 'none');
    valEl.textContent = fxFormatVal(p, val);
    sg.appendChild(valEl);

    // Zone drag
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
    hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('data-fxparam', i);
    hit.setAttribute('data-fxslotadv', slotIdx);
    sg.appendChild(hit);
  }
}

// ── Events FX panel ────────────────────────────────────────────
let _fxPressTimer = null;
let _fxDrag = null;
let _fxLastTap = {}; // double-tap reset sur encodeurs FX et master
let _reverbRebuildTimer = null;

function fxHandleDown(e) {
  const panel = document.getElementById('enginePanel');
  if (!panel || panel.getAttribute('visibility') === 'hidden') return false;

  // Page avancée drum active → router vers son handler
  if (typeof drumAdvPage !== 'undefined' && drumAdvPage !== null
      && S.tracks[S.currentTrack]?.mode === 'drum') {
    return drumAdvHandleDown(e);
  }

  const now = Date.now();
  const isJunoxTrack = S.tracks[S.currentTrack]?.outputMode === 'junox';

  let el = e.target;
  for (let n = el; n && n !== document; n = n.parentNode) {
    if (!n.getAttribute) continue;

    // ── JUNOX : retour depuis page avancée ────────────────────
    if (n.getAttribute('data-junoxback')) {
      const sg = document.getElementById('fxslot_7');
      if (sg) {
        const bg = sg.querySelector('rect');
        if (bg) {
          bg.setAttribute('stroke', '#fff'); bg.setAttribute('stroke-width', '2');
          setTimeout(() => { bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5'); }, 150);
        }
      }
      setTimeout(() => {
        junoxPage = 'main';
        renderFXPanel();
        S._oledLocked = false;
        oled('SOUND', getTrackSoundName(S.currentTrack), trackInfo());
      }, 120);
      e.stopPropagation(); e.preventDefault();
      return true;
    }

    // ── JUNOX : drag param (page avancée) ────────────────────
    if (n.getAttribute('data-junoxparam') !== null) {
      const paramIdx = parseInt(n.getAttribute('data-junoxparam'));
      const secIdx   = parseInt(n.getAttribute('data-junoxsecadv'));
      const sec = JUNOX_SECTIONS[secIdx];
      if (!sec) return false;
      const p = sec.params[paramIdx];
      if (!p) return false;

      // Param cyclable → tap pour cycler
      if (p.cycle) {
        const ti = S.currentTrack;
        const patch  = junoxPatches[ti];
        let rawVal;
        if (p.key === '_poly')        rawVal = junoxRuntime[ti]?.poly         ?? p.def;
        else if (p.key === '_notePrio')    rawVal = junoxRuntime[ti]?.notePrio    ?? p.def;
        else if (p.key === '_subOct')      rawVal = junoxRuntime[ti]?.subOct      ?? p.def;
        else if (p.key === '_noiseType')   rawVal = junoxRuntime[ti]?.noiseType   ?? p.def;
        else if (p.key === '_dlyTime')     rawVal = junoxRuntime[ti]?.dlyTime     ?? p.def;
        else if (p.key === '_dlyFeedback') rawVal = junoxRuntime[ti]?.dlyFeedback ?? p.def;
        else if (p.key === '_dlyMix')      rawVal = junoxRuntime[ti]?.dlyMix      ?? p.def;
        else if (p.key === '_revLevel')    rawVal = junoxRuntime[ti]?.revLevel     ?? p.def;
        else if (p.key === '_satDrive')    rawVal = junoxRuntime[ti]?.satDrive     ?? p.def;
        else if (p.key === '_satType')     rawVal = junoxRuntime[ti]?.satType      ?? p.def;
        else if (p.key === '_arpEnabled')  rawVal = junoxRuntime[ti]?.arpEnabled   ?? p.def;
        else if (p.key === '_arpRate')     rawVal = junoxRuntime[ti]?.arpRate      ?? p.def;
        else if (p.key === '_arpMode')     rawVal = junoxRuntime[ti]?.arpMode      ?? p.def;
        else if (p.key === '_arpOctaves')  rawVal = junoxRuntime[ti]?.arpOctaves   ?? p.def;
        else rawVal = patch ? junoxGetPatchVal(patch, p.key) : p.def;
        const uiVal  = junoxUiVal(p, rawVal !== undefined ? rawVal : p.def);
        let nextUi;
        if (p.cycleVals) {
          const idx = Math.round(uiVal);
          nextUi = (idx + 1) % p.cycleVals.length;
        } else {
          const base = p.min;
          nextUi = ((Math.round(uiVal) - base + 1) % (Math.round(p.max) - base + 1)) + base;
        }
        junoxSetParam(ti, secIdx, p.key, nextUi);
        renderJunoxPageAdvanced(ti, secIdx);
        const displayVal = p.cycleVals
          ? (p.fmtIsIndex ? p.fmt(nextUi) : p.fmt(p.cycleVals[nextUi] ?? nextUi))
          : p.fmt(nextUi);
        oledForce(sec.name, p.name, displayVal);
        e.stopPropagation(); e.preventDefault();
        return true;
      }

      // Double-tap → reset
      const tapKey = `junox_${secIdx}_${paramIdx}`;
      if (_fxLastTap[tapKey] && now - _fxLastTap[tapKey] < 350) {
        _fxLastTap[tapKey] = 0;
        junoxSetParam(S.currentTrack, secIdx, p.key, p.def);
        renderJunoxPageAdvanced(S.currentTrack, secIdx);
        oledForce('RESET', p.name, sec.name);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxLastTap[tapKey] = now;

      const patch2 = junoxPatches[S.currentTrack];
      let rawValDrag;
      if (p.key === '_notePrio') rawValDrag = junoxRuntime[S.currentTrack]?.notePrio ?? p.def;
      else if (p.key === '_poly')        rawValDrag = junoxRuntime[S.currentTrack]?.poly         ?? p.def;
      else if (p.key === '_notePrio')    rawValDrag = junoxRuntime[S.currentTrack]?.notePrio      ?? p.def;
      else if (p.key === '_subOct')      rawValDrag = junoxRuntime[S.currentTrack]?.subOct        ?? p.def;
      else if (p.key === '_noiseType')   rawValDrag = junoxRuntime[S.currentTrack]?.noiseType     ?? p.def;
      else if (p.key === '_dlyTime')     rawValDrag = junoxRuntime[S.currentTrack]?.dlyTime       ?? p.def;
      else if (p.key === '_dlyFeedback') rawValDrag = junoxRuntime[S.currentTrack]?.dlyFeedback   ?? p.def;
      else if (p.key === '_dlyMix')      rawValDrag = junoxRuntime[S.currentTrack]?.dlyMix        ?? p.def;
      else if (p.key === '_revLevel')    rawValDrag = junoxRuntime[S.currentTrack]?.revLevel       ?? p.def;
      else if (p.key === '_satDrive')    rawValDrag = junoxRuntime[S.currentTrack]?.satDrive       ?? p.def;
      else if (p.key === '_satType')     rawValDrag = junoxRuntime[S.currentTrack]?.satType        ?? p.def;
      else if (p.key === '_arpEnabled')  rawValDrag = junoxRuntime[S.currentTrack]?.arpEnabled     ?? p.def;
      else if (p.key === '_arpRate')     rawValDrag = junoxRuntime[S.currentTrack]?.arpRate        ?? p.def;
      else if (p.key === '_arpMode')     rawValDrag = junoxRuntime[S.currentTrack]?.arpMode        ?? p.def;
      else if (p.key === '_arpOctaves')  rawValDrag = junoxRuntime[S.currentTrack]?.arpOctaves     ?? p.def;
      else rawValDrag = patch2 ? junoxGetPatchVal(patch2, p.key) : p.def;
      const startUiVal = junoxUiVal(p, rawValDrag !== undefined ? rawValDrag : p.def);
      _fxDrag = { isJunox: true, secIdx, paramIdx, p, ti: S.currentTrack,
                  startY: e.clientY, startX: e.clientX, startVal: startUiVal };
      S._oledLocked = true;
      e.stopPropagation(); e.preventDefault();
      return true;
    }

    // ── JUNOX : slot page principale → tap = page avancée (immédiat)
    if (n.getAttribute('data-junoxslot') !== null) {
      const secIdx = parseInt(n.getAttribute('data-junoxslot'));
      if (secIdx >= JUNOX_SECTIONS.length) return false;
      // Flash visuel immédiat
      const sg = document.getElementById(`fxslot_${secIdx}`);
      if (sg) {
        const bg = sg.querySelector('rect');
        if (bg) {
          const origStroke = bg.getAttribute('stroke');
          bg.setAttribute('stroke', '#fff'); bg.setAttribute('stroke-width', '2');
          setTimeout(() => { bg.setAttribute('stroke', origStroke); bg.setAttribute('stroke-width', '1'); }, 120);
        }
      }
      setTimeout(() => {
        junoxPage = secIdx;
        renderFXPanel();
        S._oledLocked = true;
        oledForce(JUNOX_SECTIONS[secIdx].name, junoxPatches[S.currentTrack]?.name || 'Junox', 'params');
      }, 80);
      e.stopPropagation(); e.preventDefault();
      return true;
    }

    // ── Master FX : drag param ────────────────────────────────
    if (n.getAttribute('data-mfx') !== null && n.getAttribute('data-mfxp') !== null) {
      const fxId  = n.getAttribute('data-mfx');
      const pi    = parseInt(n.getAttribute('data-mfxp'));
      const DEFS_MAP = {
        delay:  [ {key:'syncDiv',min:0,max:6,step:1,log:false,def:4}, {key:'sync',type:'toggle',def:true}, {key:'feedback',min:0,max:0.95,log:false,def:0.35}, {key:'filter',min:200,max:16000,log:true,def:4000} ],
        reverb: [ {key:'type',type:'typesel'}, {key:'decay',min:0.2,max:20.0,log:false,def:4.0}, {key:'brightness',min:0,max:1,log:false,def:0.55}, {key:'predelay',min:0,max:0.1,log:false,def:0.0} ],
        comp:   [ {key:'threshold',min:-60,max:0,log:false,def:-18}, {key:'ratio',min:1,max:20,log:false,def:3}, {key:'attack',min:0.0005,max:1,log:true,def:0.010}, {key:'release',min:0.01,max:1,log:true,def:0.15} ],
        lim:    [ {key:'threshold',min:-20,max:0,log:false,def:-1}, {key:'release',min:0.005,max:1,log:true,def:0.05}, {key:'knee',min:0,max:10,log:false,def:2}, {key:'gain',min:-6,max:12,log:false,def:0} ],
      };
      const pDef = DEFS_MAP[fxId]?.[pi];
      if (!pDef) return false;
      if (pDef.type === 'toggle') {
        masterFX[fxId][pDef.key] = !masterFX[fxId][pDef.key];
        if (fxId === 'delay' && pDef.key === 'sync') updateDelayTime();
        applyMasterFX();
        renderMasterPanel();
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      // Double-tap → reset à la valeur par défaut
      const tapKey = `mfx_${fxId}_${pi}`;
      if (_fxLastTap[tapKey] && now - _fxLastTap[tapKey] < 350) {
        _fxLastTap[tapKey] = 0;
        if (pDef.def !== undefined) {
          masterFX[fxId][pDef.key] = pDef.def;
          if (fxId === 'delay') updateDelayTime();
          if (fxId === 'reverb') applyMasterFX();
          else applyMasterFX();
          renderMasterPanel();
          oledForce('RESET', pDef.key.toUpperCase(), fxId.toUpperCase());
        }
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxLastTap[tapKey] = now;
      _fxDrag = {
        isMaster: true, fxId, pi, pDef,
        startY: e.clientY, startX: e.clientX,
        startVal: (fxId === 'delay' && pDef.key === 'syncDiv' && !masterFX.delay.sync)
          ? masterFX.delay.time
          : masterFX[fxId][pDef.key]
      };
      S._oledLocked = true;
      e.stopPropagation(); e.preventDefault();
      return true;
    }

    // Retour depuis page avancée
    if (n.getAttribute('data-fxback')) {
      if (isJunoxTrack) return false;
      const sg = document.getElementById('fxslot_7');
      if (sg) {
        const bg = sg.querySelector('rect');
        if (bg) {
          bg.setAttribute('stroke', '#fff');
          bg.setAttribute('stroke-width', '2');
          setTimeout(() => { bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5'); }, 150);
        }
      }
      setTimeout(() => {
        fxPage = 'main';
        renderFXPanel();
      }, 120);
      e.stopPropagation(); e.preventDefault();
      return true;
    }
    // Clic sur un pad drum (mode drum uniquement)
    if (n.getAttribute('data-drumpad') !== null) {
      const padIdx = parseInt(n.getAttribute('data-drumpad'));
      const t = S.tracks[S.currentTrack];
      if (t.mode === 'drum') {
        ensureAudio();
        if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
        // Shift + tap → page avancée
        if (S.shiftHeld) {
          S.selectedDrumPad = padIdx;
          renderDrumPadAdvanced(padIdx);
          e.stopPropagation(); e.preventDefault();
          return true;
        }
        S.selectedDrumPad = padIdx;
        S._heldDrumPad = padIdx; // maintenu → encVol règle son volume
        triggerDrumPad(padIdx, 0.85);
        renderSteps();
        renderDrumPadSelection();
        updateEncArcs();
        updateSendArcs();
        oled('DRUM', getDrumPadName(S.currentTrack, padIdx), `pad ${padIdx+1} · seq`);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
    }
    // Drag paramètre avancé
    if (n.getAttribute('data-fxparam') !== null) {
      if (isJunoxTrack) return false;
      const paramIdx = parseInt(n.getAttribute('data-fxparam'));
      const slotIdx  = parseInt(n.getAttribute('data-fxslotadv') ?? n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) return false;
      const slot = trackFX[S.currentTrack][slotIdx];
      const p = def.params[paramIdx];
      if (!p) return false;

      // Arp en page principale → cycle sur clic (pas drag)
      if (def.id === 'arp' && fxPage === 'main') {
        const cur = slot.params[p.key] ?? p.def;
        const base = p.cycleBase ?? p.min;
        const next = ((Math.round(cur - base) + 1) % (Math.round(p.max - base) + 1)) + base;
        fxSetParam(S.currentTrack, slotIdx, p.key, next);
        renderFXPageMain(S.currentTrack);
        e.stopPropagation(); e.preventDefault();
        return true;
      }

      // Param cyclable → clic simple pour cycler
      if (p.cycle) {
        const cur = slot.params[p.key] ?? p.def;
        const base = p.cycleBase ?? 0;
        const next = ((Math.round(cur) - base + 1) % (Math.round(p.max) - base + 1)) + base;
        fxSetParam(S.currentTrack, slotIdx, p.key, next);
        if (fxPage === 'main') renderFXPageMain(S.currentTrack);
        else renderFXPageAdvanced(S.currentTrack, slotIdx);
        e.stopPropagation(); e.preventDefault();
        return true;
      }

      // Double-tap → reset à la valeur par défaut
      const tapKeyFX = `fx_${slotIdx}_${paramIdx}`;
      if (_fxLastTap[tapKeyFX] && now - _fxLastTap[tapKeyFX] < 350) {
        _fxLastTap[tapKeyFX] = 0;
        if (p.def !== undefined) {
          fxSetParam(S.currentTrack, slotIdx, p.key, p.def);
          if (fxPage === 'main') renderFXPageMain(S.currentTrack);
          else renderFXPageAdvanced(S.currentTrack, slotIdx);
          oledForce('RESET', p.name || p.key, def.name);
        }
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxLastTap[tapKeyFX] = now;

      _fxDrag = { slotIdx, paramIdx, p, ti: S.currentTrack, startY: e.clientY, startX: e.clientX, startVal: slot.params[p.key] ?? p.def };
      e.stopPropagation(); e.preventDefault();
      return true;
    }
    // Slot page principale — long press = page avancée (pas pour l'Arp, pas pour le Master, pas pour le Drum)
    if (n.getAttribute('data-fxslot') !== null && fxPage === 'main' && n.getAttribute('data-fxparam') === null) {
      // Bloquer sur piste Master, Drum et Junox
      const curMode = S.tracks[S.currentTrack].mode;
      if (curMode === 'master' || curMode === 'drum') return false;
      if (S.tracks[S.currentTrack].outputMode === 'junox') return false;
      const slotIdx = parseInt(n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) return false;
      if (def.id === 'arp') {
        // MIDI CTRL : clic court = toggle on/off, clic long = page avancée
        _fxPressTimer = setTimeout(() => {
          _fxPressTimer = null;
          fxPage = slotIdx;
          renderFXPanel();
        }, 500);
        e.stopPropagation(); e.preventDefault();
        return true;
      }
      _fxPressTimer = setTimeout(() => {
        _fxPressTimer = null;
        fxPage = slotIdx;
        renderFXPanel();
      }, 500);
      e.stopPropagation(); e.preventDefault();
      return true;
    }
  }
  return false;
}

function fxHandleUp(e) {
  // Ignorer si le clic vient d'un pad drum — géré par son propre handler
  let el = e.target;
  for (let n = el; n && n !== document; n = n.parentNode) {
    if (n.getAttribute && n.getAttribute('data-drumpad') !== null) {
      _fxPressTimer !== null && clearTimeout(_fxPressTimer);
      _fxPressTimer = null;
      _fxDrag = null;
      return;
    }
  }
  // Junox drag → libérer mais garder l'OLED sur le nom de la section
  if (_fxDrag?.isJunox) {
    const { secIdx } = _fxDrag;
    _fxDrag = null;
    S._oledLocked = true;
    const sec = JUNOX_SECTIONS[secIdx];
    if (sec) oledForce(sec.name, junoxPatches[S.currentTrack]?.name || 'Junox', 'params');
    return;
  }
  if (_fxDrag?.isMaster) {
    _fxDrag = null;
    S._oledLocked = false;
    return;
  }
  if (_fxPressTimer !== null) {
    clearTimeout(_fxPressTimer);
    // Rechercher le slot cliqué pour toggler les FX SF2 (pas Junox)
    let el2 = e.target;
    for (let n = el2; n && n !== document; n = n.parentNode) {
      if (!n.getAttribute) continue;
      // junoxslot : la navigation est déjà faite dans fxHandleDown (tap immédiat)
      if (n.getAttribute('data-junoxslot') !== null) {
        _fxPressTimer = null;
        return;
      }
      // Ne pas toggler si c'est une zone de param (encodeur Arp)
      if (n.getAttribute('data-fxslot') !== null && n.getAttribute('data-fxparam') === null && fxPage === 'main') {
        if (S.tracks[S.currentTrack].mode === 'master') break;
        if (S.tracks[S.currentTrack].outputMode === 'junox') break;
        const slotIdx = parseInt(n.getAttribute('data-fxslot'));
        const def = FX_DEFS[slotIdx];
        if (!def) break;
        fxToggle(S.currentTrack, slotIdx);
        renderFXPageMain(S.currentTrack);
        _fxPressTimer = null;
        return;
      }
    }
    _fxPressTimer = null;
  }
  _fxDrag = null;
}

function fxHandleMove(e) {
  if (!_fxDrag) return;

  // ── Master FX drag ──────────────────────────────────────────
  if (_fxDrag.isMaster) {
    const { fxId, pi, pDef } = _fxDrag;
    const dy = _fxDrag.startY - e.clientY;
    const dx = e.clientX - (_fxDrag.startX || e.clientX);
    const delta = dy + dx;
    const range = pDef.max - pDef.min;
    let newVal;
    if (pDef.step && fxId === 'delay' && pDef.key === 'syncDiv' && !masterFX.delay.sync) {
      // Mode free : syncDiv contrôle le temps en ms (10ms → 2000ms) de façon continue
      const freeRange = 1.99; // secondes
      newVal = Math.max(0.01, Math.min(2.0, _fxDrag.startVal + delta / 150 * freeRange));
      masterFX.delay.time = newVal;
      if (_masterNodes) _masterNodes.delayNode.delayTime.value = newVal;
      const valEl2 = document.getElementById(`mfx_val_delay_0`);
      if (valEl2) valEl2.textContent = (newVal * 1000).toFixed(0) + 'ms';
      const arcEl2 = document.getElementById(`mfx_arc_delay_0`);
      if (arcEl2) {
        const pct2 = Math.log(newVal / 0.01) / Math.log(2.0 / 0.01);
        const CIRC = 2 * Math.PI * 11;
        const filled = Math.max(0, Math.min(1, pct2)) * CIRC * 0.75;
        arcEl2.setAttribute('stroke-dasharray', `${filled} ${CIRC - filled}`);
      }
      oledForce('MASTER', 'DELAY TIME', (newVal * 1000).toFixed(0) + 'ms');
      return;
    }
    if (pDef.step) {
      // Param discret : 20px par step
      newVal = Math.round(_fxDrag.startVal + delta / 20);
    } else if (pDef.log) {
      const logRange = Math.log(pDef.max / pDef.min);
      newVal = _fxDrag.startVal * Math.exp(delta / 100 * logRange);
    } else {
      newVal = _fxDrag.startVal + (delta / 150) * range;
    }
    newVal = Math.max(pDef.min, Math.min(pDef.max, newVal));
    if (pDef.step) newVal = Math.round(newVal);
    masterFX[fxId][pDef.key] = newVal;
    if (fxId === 'delay') updateDelayTime();

    // Pour la reverb : brightness est instantané, decay est debounced
    if (fxId === 'reverb' && _masterNodes?.convReverb) {
      if (pDef.key === 'brightness') {
        _masterNodes.convReverb.setBrightness(newVal);
      } else if (pDef.key === 'predelay') {
        _masterNodes.reverbPre.delayTime.value = Math.max(0, Math.min(0.5, newVal));
      } else {
        // size/decay : debounce 200ms pour éviter rebuild à chaque pixel
        clearTimeout(_reverbRebuildTimer);
        _reverbRebuildTimer = setTimeout(() => {
          if (_masterNodes?.convReverb) _masterNodes.convReverb.rebuild();
        }, 200);
      }
    } else {
      applyMasterFX();
    }

    // Formatters complets pour tous les params
    const DEFS_FMT = {
      delay:  [
        v => masterFX.delay.sync ? DELAY_SYNC_DIVS[Math.round(Math.max(0,Math.min(6,v)))].label : (masterFX.delay.time*1000).toFixed(0)+'ms',
        null,
        v => Math.round(v*100)+'%',
        v => v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'Hz'
      ],
      reverb: [ null, v => v.toFixed(1)+'s', v => Math.round(v*100)+'%', v => (v*1000).toFixed(1)+'ms' ],
      comp:   [ v => Math.round(v)+'dB', v => Math.round(v)+':1', v => v<0.01?(v*1000).toFixed(1)+'ms':(v*1000).toFixed(0)+'ms', v => (v*1000).toFixed(0)+'ms' ],
      lim:    [ v => Math.round(v)+'dB', v => (v*1000).toFixed(0)+'ms', v => Math.round(v)+'dB', v => (v>=0?'+':'')+Math.round(v)+'dB' ],
    };
    const fmt = DEFS_FMT[fxId]?.[pi];
    const valEl = document.getElementById(`mfx_val_${fxId}_${pi}`);
    if (valEl && fmt) valEl.textContent = fmt(newVal);

    // Arc mise à jour — y compris pour les params step (syncDiv)
    const arcEl = document.getElementById(`mfx_arc_${fxId}_${pi}`);
    if (arcEl) {
      const pmin=pDef.min, pmax=pDef.max;
      let pct;
      if (pDef.step) {
        pct = (pmax - pmin) > 0 ? (newVal - pmin) / (pmax - pmin) : 0;
      } else if (pDef.log) {
        pct = Math.log(Math.max(newVal,pmin)/pmin)/Math.log(pmax/pmin);
      } else {
        pct = (newVal-pmin)/(pmax-pmin);
      }
      pct = Math.max(0, Math.min(1, pct));
      const CIRC = 2 * Math.PI * 11;
      const filled = pct * CIRC * 0.75;
      arcEl.setAttribute('stroke-dasharray', `${filled} ${CIRC - filled}`);
    }
    oledForce('MASTER', (fxId+' '+pDef.key).toUpperCase(), valEl?.textContent || '');
    return;
  }

  // ── Junox drag ───────────────────────────────────────────────
  if (_fxDrag.isJunox) {
    const { secIdx, paramIdx, p, ti } = _fxDrag;
    const dy = _fxDrag.startY - e.clientY;
    const dx = e.clientX - (_fxDrag.startX || e.clientX);
    const delta = dy + dx;

    const uiMax = p.cycleVals ? p.cycleVals.length - 1 : p.max;
    const uiMin = p.cycleVals ? 0 : p.min;
    let newUiVal = _fxDrag.startVal + (delta / 150) * (uiMax - uiMin);
    newUiVal = Math.max(uiMin, Math.min(uiMax, newUiVal));
    // Params cyclables : arrondir à l'entier
    if (p.cycle) newUiVal = Math.round(newUiVal);

    junoxSetParam(ti, secIdx, p.key, newUiVal);

    // Mettre à jour barre verticale
    const pct = (newUiVal - uiMin) / (uiMax - uiMin || 1);
    const totalH = FX_SH - 5*2 - 30;
    const barH = Math.max(0, Math.round(pct * totalH));
    const barEl = document.getElementById(`junoxbar_${secIdx}_${paramIdx}`);
    if (barEl) {
      const sy = fxSlotY(paramIdx);
      barEl.setAttribute('height', String(barH));
      barEl.setAttribute('y', String(sy + 5 + 10 + totalH - barH));
    }
    const displayVal = p.cycleVals
      ? (p.fmtIsIndex ? p.fmt(Math.round(newUiVal)) : p.fmt(p.cycleVals[Math.round(newUiVal)] ?? newUiVal))
      : p.fmt(newUiVal);
    const valEl = document.getElementById(`junoxval_${secIdx}_${paramIdx}`);
    if (valEl) valEl.textContent = displayVal;
    oledForce(JUNOX_SECTIONS[secIdx].name, p.name, displayVal);
    return;
  }

  const { slotIdx, paramIdx, p, ti } = _fxDrag;
  const dy = _fxDrag.startY - e.clientY;
  const dx = e.clientX - (_fxDrag.startX || e.clientX);
  const delta = dy + dx;
  const range = p.max - p.min;
  let newVal;
  if (p.log) {
    const logRange = Math.log(p.max / p.min);
    newVal = _fxDrag.startVal * Math.exp(delta / 100 * logRange);
  } else {
    const sensitivity = 150;
    newVal = _fxDrag.startVal + (delta / sensitivity) * range;
  }
  newVal = Math.max(p.min, Math.min(p.max, newVal));
  if (Number.isInteger(p.def) && Number.isInteger(p.min) && Number.isInteger(p.max) && (p.max - p.min) > 1) {
    newVal = Math.round(newVal);
  }
  fxSetParam(ti, slotIdx, p.key, newVal);

  // Mettre à jour visuellement selon la page courante
  if (fxPage === 'main') {
    // Page principale : mettre à jour l'arc de l'Arp si c'est un param Arp
    const arcEl = document.getElementById(`fxpv_arc_${slotIdx}_${paramIdx}`);
    if (arcEl) {
      const START = 135, END = 405;
      const pct2 = (newVal - p.min) / (p.max - p.min);
      const angleFill = START + pct2 * (END - START);
      arcEl.setAttribute('d', arcPathFX(
        parseFloat(arcEl.getAttribute('cx') || 0),
        parseFloat(arcEl.getAttribute('cy') || 0),
        16, START, angleFill
      ));
    }
    // Mettre à jour le texte valeur
    const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
    if (valEl) valEl.textContent = fxFormatVal(p, newVal);
    return;
  }

  // Page avancée : barre verticale
  const pct = p.log
    ? Math.log(newVal/p.min) / Math.log(p.max/p.min)
    : (newVal - p.min) / (p.max - p.min);
  const barEl = document.getElementById(`fxbar_${slotIdx}_${paramIdx}`);
  const totalH = FX_SH - 5*2 - 30;
  const barH = Math.round(pct * totalH);
  if (barEl) {
    const sy = fxSlotY(paramIdx);
    barEl.setAttribute('height', String(barH));
    barEl.setAttribute('y', String(sy + 5 + 10 + totalH - barH));
  }
  const valEl2 = document.getElementById(`fxadv_${slotIdx}_${paramIdx}`);
  if (valEl2) valEl2.textContent = fxFormatVal(p, newVal);
}

// ── Double-clic sur params FX et Master → reset ───────────────
document.addEventListener('dblclick', e => {
  const panel = document.getElementById('enginePanel');
  if (!panel || panel.getAttribute('visibility') === 'hidden') return;
  // Ignorer si on est sur la piste Master, drum ou Junox
  const curT = S.tracks[S.currentTrack];
  if (curT.outputMode === 'junox') return;
  if (curT.mode === 'master' && !e.target.closest('[data-mfx]')) return;

  let el = e.target;
  for (let n = el; n && n !== document; n = n.parentNode) {
    if (!n.getAttribute) continue;
    // Ignorer les drum pads
    if (n.getAttribute('data-drumpad') !== null) return;

    // Param FX piste (page principale ou avancée)
    if (n.getAttribute('data-fxparam') !== null) {
      const paramIdx = parseInt(n.getAttribute('data-fxparam'));
      const slotIdx  = parseInt(n.getAttribute('data-fxslotadv') ?? n.getAttribute('data-fxslot'));
      const def = FX_DEFS[slotIdx];
      if (!def) break;
      const slot = trackFX[S.currentTrack][slotIdx];
      const p = def.params[paramIdx];
      if (!p) break;
      fxSetParam(S.currentTrack, slotIdx, p.key, p.def);
      if (fxPage === 'main') renderFXPageMain(S.currentTrack);
      else renderFXPageAdvanced(S.currentTrack, slotIdx);
      oledForce('RESET', p.name, def.name);
      e.preventDefault(); e.stopPropagation();
      return;
    }

    // Param Master FX
    if (n.getAttribute('data-mfx') !== null && n.getAttribute('data-mfxp') !== null) {
      const fxId = n.getAttribute('data-mfx');
      const pi   = parseInt(n.getAttribute('data-mfxp'));
      const MASTER_DEFS = {
        delay:  [ {key:'syncDiv',def:4}, {key:'sync'}, {key:'feedback',def:0.35}, {key:'filter',def:4000} ],
        reverb: [ {key:'decay',def:4.0}, {key:'brightness',def:0.55}, {key:'predelay',def:0.0} ],
        comp:   [ {key:'threshold',def:-18}, {key:'ratio',def:3}, {key:'attack',def:0.010}, {key:'release',def:0.15} ],
        lim:    [ {key:'threshold',def:-1}, {key:'release',def:0.05}, {key:'knee',def:2}, {key:'gain',def:0} ],
      };
      const pd = MASTER_DEFS[fxId]?.[pi];
      if (!pd || pd.def === undefined) break;
      masterFX[fxId][pd.key] = pd.def;
      if (fxId === 'delay') updateDelayTime();
      applyMasterFX();
      renderMasterPanel();
      oledForce('RESET', fxId.toUpperCase(), pd.key);
      e.preventDefault(); e.stopPropagation();
      return;
    }
    break;
  }
});

// Preview : timer noteOff pour le browsing de presets
let previewTimer = null;
const PREVIEW_NOTE = 60; // C4

async function initSF2() {
  if (sf2Ready || sf2Initializing) return;
  sf2Initializing = true;
  ensureAudio();
  try {
    await JSSynth.Synthesizer.waitForWasmInitialized();
    // Créer des instances FluidSynth uniquement pour les tracks mélodiques (pas drum ni master)
    let instanceCount = 0;
    for (let ti = 0; ti < 8; ti++) {
      if (TRACK_MODES[ti] === 'drum' || TRACK_MODES[ti] === 'master') {
        jsSynths[ti] = null;
        jsSynthNodes[ti] = null;
        console.log(`[SF2] Track ${ti+1} (${TRACK_MODES[ti]}) — pas de FluidSynth`);
        continue;
      }
      // Track Junox — pas d'instance FluidSynth
      const t = S.tracks[ti];
      if (t.outputMode === 'junox') {
        jsSynths[ti] = null;
        jsSynthNodes[ti] = null;
        console.log(`[SF2] Track ${ti+1} — Junox (pas de FluidSynth)`);
        continue;
      }
      const synth = new JSSynth.Synthesizer();
      await synth.init(actx.sampleRate, [
        ['synth.sample-rate', actx.sampleRate],
        ['synth.gain', 0.8],
        ['synth.polyphony', 32],
      ]);
      const node = synth.createAudioNode(actx, 1024);
      jsSynths[ti]     = synth;
      jsSynthNodes[ti] = node;
      instanceCount++;
      console.log(`[SF2] Instance T${ti+1} prête`);
    }
    sf2Ready = true;
    sf2Initializing = false;
    console.log(`[SF2] FluidSynth WASM prêt — ${instanceCount} instances`);
    // Construire les chaînes FX (une par track)
    setTimeout(() => { for (let ti = 0; ti < 8; ti++) fxRebuildChain(ti); }, 100);
  } catch(e) {
    sf2Initializing = false;
    console.error('[SF2] Init failed:', e);
  }
}

// Cache persistant par track : sf2BankCache[ti][fileName] = { sfontId, presets }
const sf2BankCache = [{},{},{},{},{},{},{},{}];
// Cache temporaire par track (browsing)
const sf2TempBank = [null, null, null, null, null, null, null, null]; // { name, sfontId, presets }

// Décharger une SF2 d'une instance si plus utilisée sur cette track
function sf2MaybeUnload(ti, name) {
  if (!name || !sf2BankCache[ti][name]) return;
  try { jsSynths[ti].unloadSFont(sf2BankCache[ti][name].sfontId); } catch(e) {}
  delete sf2BankCache[ti][name];
  console.log(`[SF2] Track ${ti+1} déchargé : ${name}`);
}

// Charger une SF2 sur l'instance de la track ti
async function sf2LoadBank(ti, arrayBuffer, fileName) {
  if (!sf2Ready) await initSF2();
  const ts = trackSF2[ti];
  const oldName = ts.sfName;

  let sfontId, presets;

  if (sf2BankCache[ti][fileName]) {
    sfontId = sf2BankCache[ti][fileName].sfontId;
    presets = sf2BankCache[ti][fileName].presets;
    console.log(`[SF2] Track ${ti+1} : ${fileName} (cache) — ${presets.length} presets`);
  } else if (sf2TempBank[ti] && sf2TempBank[ti].name === fileName) {
    sfontId = sf2TempBank[ti].sfontId;
    presets = sf2TempBank[ti].presets;
    sf2BankCache[ti][fileName] = { sfontId, presets };
    sf2TempBank[ti] = null;
    console.log(`[SF2] Track ${ti+1} : ${fileName} (promu) — ${presets.length} presets`);
  } else {
    sfontId = await jsSynths[ti].loadSFont(arrayBuffer);
    presets = sf2GetPresets(ti, sfontId);
    sf2BankCache[ti][fileName] = { sfontId, presets };
    console.log(`[SF2] Track ${ti+1} : ${fileName} — ${presets.length} presets`);
  }

  ts.sfName  = fileName;
  ts.sfontId = sfontId;
  ts.presets = presets;

  if (ts.presets.length > 0) {
    ts.bank    = ts.presets[0].bank;
    ts.program = ts.presets[0].program;
    jsSynths[ti].midiProgramSelect(SF2_CHANNEL, ts.sfontId, ts.bank, ts.program);
  }

  if (oldName && oldName !== fileName) sf2MaybeUnload(ti, oldName);
  return ts.presets;
}

// Lire la liste des presets via getSFontObject
function sf2GetPresets(ti, sfontId) {
  const presets = [];
  try {
    const sf = jsSynths[ti].getSFontObject(sfontId);
    if (sf) {
      for (const preset of sf.getPresetIterable()) {
        presets.push({
          bank:    preset.bankNum,
          program: preset.num,
          name:    preset.name || `Bank${preset.bankNum} P${preset.num}`
        });
      }
      presets.sort((a,b) => a.bank !== b.bank ? a.bank-b.bank : a.program-b.program);
    }
  } catch(e) {
    console.warn('[SF2] getPresets error:', e);
  }
  return presets;
}

// Changer de preset sur une track + preview
function sf2SelectPreset(ti, presetIdx) {
  const ts = trackSF2[ti];
  if (!ts.presets.length || ts.sfontId < 0 || !jsSynths[ti]) return;
  const preset = ts.presets[Math.max(0, Math.min(presetIdx, ts.presets.length - 1))];
  ts.bank    = preset.bank;
  ts.program = preset.program;
  jsSynths[ti].midiProgramSelect(SF2_CHANNEL, ts.sfontId, preset.bank, preset.program);
  sf2PreviewNote(ti);
  return preset;
}

function sf2PreviewNote(ti) {
  if (!sf2Ready || !jsSynths[ti]) return;
  jsSynths[ti].midiNoteOff(SF2_CHANNEL, PREVIEW_NOTE);
  clearTimeout(previewTimer);
  jsSynths[ti].midiNoteOn(SF2_CHANNEL, PREVIEW_NOTE, 100);
  previewTimer = setTimeout(() => { if (jsSynths[ti]) jsSynths[ti].midiNoteOff(SF2_CHANNEL, PREVIEW_NOTE); }, 1000);
}

function sf2NoteOn(trackIdx, midi, velocity) {
  if (!sf2Ready || !jsSynths[trackIdx]) return;
  if (_sf2LoadingTrack[trackIdx]) return; // preset en cours de chargement — ignorer
  ensureAudio();
  const vel = Math.max(1, Math.min(127, Math.round(velocity * 127)));
  jsSynths[trackIdx].midiNoteOn(SF2_CHANNEL, midi, vel);
}

function sf2NoteOff(trackIdx, midi) {
  if (!sf2Ready || !jsSynths[trackIdx]) return;
  jsSynths[trackIdx].midiNoteOff(SF2_CHANNEL, midi);
}

function sf2AllNotesOff(trackIdx) {
  if (!sf2Ready || !jsSynths[trackIdx]) return;
  jsSynths[trackIdx].midiAllNotesOff(SF2_CHANNEL);
}

// ── MIDI CTRL — envoyer des CC FluidSynth ──
function midiCtrlSendCC(ti, cc, value) {
  if (!sf2Ready || !jsSynths[ti]) return;
  const synth = jsSynths[ti];
  try {
    if (cc === 74) {
      // Cutoff : value 0-127, 127=original SF2, 0=très fermé
      // Generator 8 est additif → offset négatif pour fermer le filtre
      // 127 = offset 0 (pas de changement), 0 = offset -9000 cents (très sombre)
      const offset = -((127 - value) / 127) * 9000;
      synth.setGenerator(SF2_CHANNEL, 8, offset);
      return;
    } else if (cc === 71) {
      // Resonance : value 0-127, 0=flat, 127=max resonance
      // Generator 9 est additif → offset positif pour ajouter de la résonance
      // Limiter à 200cB max pour éviter la coupure du son
      const offset = (value / 127) * 200;
      synth.setGenerator(SF2_CHANNEL, 9, offset);
      return;
    } else if (cc === 72) {
      // Release : value 0-127, 0=original SF2, 127=très long
      // Generator 38 est additif en timecents
      // 0 = offset 0 (pas de changement), 127 = +8000 (très long)
      const offset = (value / 127) * 8000;
      synth.setGenerator(SF2_CHANNEL, 38, offset);
      return;
    }
  } catch(e) {
    // setGenerator non disponible → fallback CC MIDI
  }
  synth.midiControl(SF2_CHANNEL, cc, Math.max(0, Math.min(127, Math.round(value))));
}

function midiCtrlApply(ti) {
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  if (arpIdx < 0) return;
  const slot = trackFX[ti][arpIdx];
  if (!slot || !slot.active) return;
  midiCtrlSendCC(ti, 72, Math.round(slot.params['midiRelease'] ?? 0));
  midiCtrlSendCC(ti, 74, Math.round(slot.params['midiCutoff']  ?? 127));
  midiCtrlSendCC(ti, 71, Math.round(slot.params['midiReson']   ?? 0));
}

function midiCtrlReset(ti) {
  if (!sf2Ready || !jsSynths[ti]) return;
  const synth = jsSynths[ti];
  try {
    synth.setGenerator(SF2_CHANNEL, 8, 0);   // Cutoff → original SF2
    synth.setGenerator(SF2_CHANNEL, 9, 0);   // Resonance → original SF2
    synth.setGenerator(SF2_CHANNEL, 38, 0);  // Release → original SF2
  } catch(e) {
    synth.midiControl(SF2_CHANNEL, 74, 127);
    synth.midiControl(SF2_CHANNEL, 71, 0);
    synth.midiControl(SF2_CHANNEL, 72, 64);
  }
}

function sf2GetTrackName(ti) {
  const ts = trackSF2[ti];
  if (ts.sfontId < 0) return 'No SF2';
  if (!ts.presets.length) return ts.sfName.replace('.sf2','').slice(0,12);
  const preset = ts.presets.find(p => p.bank === ts.bank && p.program === ts.program);
  return preset ? preset.name.slice(0,12) : ts.sfName.replace('.sf2','').slice(0,12);
}

// Nom du son/patch courant selon le mode de la track
function getTrackSoundName(ti) {
  const t = S.tracks[ti];
  if (t.outputMode === 'junox') return junoxPatches[ti]?.name || 'Junox';
  return sf2GetTrackName(ti);
