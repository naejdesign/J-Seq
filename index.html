// ═══════════════════════════════════════════════════════════════
// ENCODEURS 0-3 : Length / Velocity / Shift / Probability
// ═══════════════════════════════════════════════════════════════
var ENC_DEFS = [
  { key:'len',
    label:'LENGTH',
    // max dynamique selon position step et taille pattern
    getMax: () => {
      const res = getHeldSt();
      if (!res) return 128;
      const clip = activeClip();
      const totalSteps = clip.numBars * 16;
      const absPos = S.currentBar * 16 + res.idx;
      return Math.max(1, totalSteps - absPos);
    },
    min: 1, def: 1,
    get: (st) => st.len || 1,
    set: (st, v) => { st.len = Math.round(v); },
    fmt: v => `${Math.round(v)} steps`
  },
  { key:'vel',
    label:'VELOCITY',
    min: 0, max: 127, def: 100,
    get: (st) => Math.round((st.vel !== undefined ? st.vel : 0.8) * 127),
    set: (st, v) => { st.vel = Math.max(0, Math.min(1, v / 127)); },
    fmt: v => `${Math.round(v)}`
  },
  { key:'shift',
    label:'OFFSET',
    // Simple : -0.49 à +0.5. Négatif=avant le step, positif=après.
    min: -0.5, max: 0.5, def: 0,
    get: (st) => Math.max(-0.5, Math.min(0.5, st.shift || 0)),
    set: (st, v) => { st.shift = Math.max(-0.5, Math.min(0.5, v)); },
    fmt: v => {
      if (Math.abs(v) < 0.005) return '0%';
      return (v > 0 ? '+' : '-') + Math.round(Math.abs(v) * 100) + '%';
    }
  },
  { key:'prob',
    label:'PROB',
    min: 0, max: 100, def: 100,
    get: (st) => st.prob !== undefined ? st.prob : 100,
    set: (st, v) => { st.prob = v; },
    fmt: v => `${Math.round(v)}%`
  },
];

function getEncMax(def) {
  return def.getMax ? def.getMax() : def.max;
}
var ENC_CX = [190, 291, 392, 494]; // positions mises à jour

// Arcs encodeurs via stroke-dasharray (technique fiable)
var ENC_R = 18, ENC_CIRC = 2 * Math.PI * ENC_R; // ~113.10 (r=18)
var ENC_ARC_TOTAL = ENC_CIRC * 0.75; // 270° = 75% du cercle

function updateEncArcs() {
  if (projectModeActive) return;
  if (S.mode === 'session') {
    for (let i = 0; i < 4; i++) {
      const enc = svg('enc' + i);
      const lbl = document.getElementById('encLbl' + i);
      const arc = document.getElementById('encArc' + i);
      if (enc) enc.setAttribute('stroke', '#1e1e20');
      if (lbl) lbl.setAttribute('fill', '#1a1a1a');
      if (arc) { arc.setAttribute('stroke', 'none'); arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`); arc.setAttribute('stroke-dashoffset', '0'); }
    }
    return;
  }
  const col = trackColor(S.currentTrack);
  const t = S.tracks[S.currentTrack];

  // Helpers communs
  // setArcUni : arc unipolaire standard via stroke-dasharray (pour <circle> avec rotate(-225))
  function setArcUni(id, pct, color) {
    const arc = document.getElementById(id);
    if (!arc) return;
    const lit = ENC_ARC_TOTAL * Math.max(0, Math.min(1, pct));
    arc.setAttribute('stroke-dashoffset', '0');  // reset tout dashoffset bipolaire résiduel
    arc.setAttribute('stroke-dasharray', `${lit.toFixed(2)} ${(ENC_CIRC - lit).toFixed(2)}`);
    arc.setAttribute('stroke', color);
  }

  // setArcBipolar : arc bipolaire depuis 12h via stroke-dasharray + dashoffset
  // Principe : le cercle est déjà rotaté à -225°. Le centre (12h) est à 135°*2 = 75% du tour.
  // On dessine un arc centré sur 12h de longueur proportionnelle à |val/max|.
  // Pour positif : dashoffset = 0 (part de -225°), dasharray = [longueur, reste]
  // C'est plus simple avec dashoffset : on décale pour centrer.
  // 12h sur le cercle rotaté à -225° correspond à 135/360 * circonférence = 25.92px depuis le début
  function setArcBipolar(id, val, maxAbsVal, color) {
    const arc = document.getElementById(id);
    if (!arc) return;
    // Sur le cercle rotaté -225°, 12h = position 135° = 135/360 * CIRC = ENC_CIRC * 0.375 = 25.92
    const CENTER = ENC_CIRC * (135 / 360); // 25.92px
    const maxLen = ENC_ARC_TOTAL * 0.5; // moitié de la plage totale = 135°
    const len = Math.abs(val / maxAbsVal) * maxLen;

    if (len < 0.3) {
      // Point neutre (valeur ~0) : petit arc visible
      arc.setAttribute('stroke-dasharray', `1.5 ${ENC_CIRC - 1.5}`);
      arc.setAttribute('stroke-dashoffset', `${-(CENTER - 0.75).toFixed(2)}`);
      arc.setAttribute('stroke', color);
      return;
    }

    if (val > 0) {
      // Positif → arc de 12h vers la droite (horaire)
      // Start = CENTER, longueur = len
      arc.setAttribute('stroke-dashoffset', `${-(CENTER).toFixed(2)}`);
      arc.setAttribute('stroke-dasharray', `${len.toFixed(2)} ${(ENC_CIRC - len).toFixed(2)}`);
    } else {
      // Négatif → arc de 12h vers la gauche (antihoraire)
      // On triche : start = CENTER - len (position avant 12h)
      const offset = CENTER - len;
      arc.setAttribute('stroke-dashoffset', `${-(offset).toFixed(2)}`);
      arc.setAttribute('stroke-dasharray', `${len.toFixed(2)} ${(ENC_CIRC - len).toFixed(2)}`);
    }
    arc.setAttribute('stroke', color);
  }

  function hideArc(id) {
    const arc = document.getElementById(id);
    if (!arc) return;
    arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`);
    arc.setAttribute('stroke-dashoffset', '0');
    arc.setAttribute('stroke', 'none');
  }

  function setEncRing(i, on, color) {
    const enc = svg('enc' + i);
    if (enc) enc.setAttribute('stroke', on ? color + '88' : '#383838');
  }

  function setLabel(i, text, color) {
    const lbl = document.getElementById('encLbl' + i);
    if (lbl) { lbl.textContent = text; lbl.setAttribute('fill', color); }
  }

  // ── Step tenu : priorité maximale, toutes tracks ───────────────
  const res = getHeldSt();
  const hasStep = res && res.st.on;

  if (hasStep) {
    ENC_DEFS.forEach((def, i) => {
      setEncRing(i, true, col);
      setLabel(i, def.label, col);

      if (i === 2) {
        // OFFSET : bipolaire
        const val = def.get(res.st); // -0.5..+0.5
        setArcBipolar('encArc2', val, 0.5, col);
        return;
      }
      const val = def.get(res.st);
      const eMax = getEncMax(def);
      const pct = (val - def.min) / (eMax - def.min);
      setArcUni('encArc' + i, pct, col);
    });
    return;
  }

  // ── Mode drum, aucun step tenu : Tune/Decay/Tone/Drive ─────────
  if (t.mode === 'drum') {
    if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
    const pad = t.drumPads[S.selectedDrumPad];

    // TUNE (enc0) — bipolaire -12..+12
    setEncRing(0, true, col); setLabel(0, 'TUNE', col);
    setArcBipolar('encArc0', pad.tune ?? 0, 12, col);

    // DECAY (enc1) — unipolaire
    setEncRing(1, true, col); setLabel(1, 'DECAY', col);
    setArcUni('encArc1', ((pad.decay ?? 0.5) - 0.05) / (2 - 0.05), col);

    // TONE (enc2) — unipolaire
    setEncRing(2, true, col); setLabel(2, 'TONE', col);
    setArcUni('encArc2', pad.tone ?? 0.5, col);

    // DRIVE (enc3) — unipolaire
    setEncRing(3, true, col); setLabel(3, 'DRIVE', col);
    setArcUni('encArc3', pad.drive ?? 0, col);

    return;
  }

  // ── Mode master : masquer tous les labels encodeurs ──────────
  if (t.mode === 'master') {
    for (let i = 0; i < 6; i++) {
      hideArc('encArc' + i);
      setEncRing(i, false, col);
      setLabel(i, '', '#2a2a2a');
    }
    return;
  }

  // ── Mode mélodique (SF2), aucun step tenu : encodeurs inactifs, pas de labels ───────
  for (let i = 0; i < 4; i++) {
    hideArc('encArc' + i);
    setEncRing(i, false, col);
    setLabel(i, '', '#2a2a2a');
  }
}

function getHeldSt() {
  if(!anyStepHeld()) return null;
  const idx=heldStepList()[0];
  const t=S.tracks[S.currentTrack];
  const st = t.mode==='drum'
    ? activeClip().drumBars[S.selectedDrumPad][S.currentBar][idx]
    : activeClip().bars[S.currentBar][idx];
  return {st, idx};
}



var encDrags = [null, null, null, null];

// Définitions des encodeurs en mode drum (indices 0..3 visibles, mais on gère 0..7 via les 4 premiers)
const DRUM_ENC_KEYS = ['tune','decay','tone','drive']; // enc 0..3
const DRUM_ENC_RANGES = [
  { min:-12, max:12,  label:'TUNE',   fmt: v => (v>0?'+':'')+v.toFixed(1)+' st' },
  { min:0.05,max:2,   label:'DECAY',  fmt: v => v.toFixed(2)+'s' },
  { min:0,   max:1,   label:'TONE',   fmt: v => Math.round(v*100)+'%' },
  { min:0,   max:1,   label:'DRIVE',  fmt: v => Math.round(v*100)+'%' },
];

// ── Encodeurs 0-3 : drag ────────────────────────────────────
// (le double-tap reset est géré en fin de document)
ENC_DEFS.forEach((def, i) => {
  svg('enc' + i).addEventListener('mousedown', e => {
    if (projectModeActive) return;
    if (S.mode === 'session') return;
    const t = S.tracks[S.currentTrack];

    // Priorité 1 : step tenu → Length/Vel/Offset/Prob
    const res = getHeldSt();
    if (res && res.st.on) {
      encDrags[i] = { y: e.clientY, x: e.clientX, startVal: def.get(res.st), idx: res.idx, moved: false, drumMode: false };
      if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
      S._oledLocked = true;
      e.preventDefault();
      return;
    }

    // Priorité 2 : mode drum → Tune/Decay/Tone/Drive
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      const pad = t.drumPads[S.selectedDrumPad];
      const dr = DRUM_ENC_RANGES[i];
      if (!dr) return;
      const key = DRUM_ENC_KEYS[i];
      encDrags[i] = { y: e.clientY, x: e.clientX, startVal: pad[key] ?? 0, drumMode: true, key, dr };
      S._oledLocked = true;
      e.preventDefault();
      return;
    }
    // Priorité 3 : mélodique sans step → rien
  });
});

// ── Enc4 = Reverb Send, Enc5 = Delay Send ─────────────────────
// Valeur par pad en mode drum, valeur globale track en mode mélodique
const encSendDrags = [null, null]; // [rev, delay]
const SEND_ENCS = [
  { id: 'enc4', arcId: 'encArc4', lblId: 'encLbl4', key: 'sendDelay',  label: 'DELAY'  },
  { id: 'enc5', arcId: 'encArc5', lblId: 'encLbl5', key: 'sendReverb', label: 'REVERB' },
];

// ── Enc4/Enc5 sends : drag ──────────────────────────────────
// (le double-tap reset est géré en fin de document)
SEND_ENCS.forEach((def, si) => {
  const el = svg(def.id);
  if (!el) return;
  el.addEventListener('mousedown', e => {
    if (projectModeActive) return;
    if (S.mode === 'session') return;
    const t = S.tracks[S.currentTrack];
    if (t.mode === 'master') return;
    let startVal;
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      startVal = t.drumPads[S.selectedDrumPad][def.key] ?? 0;
    } else {
      startVal = t[def.key] ?? 0;
    }
    encSendDrags[si] = { y: e.clientY, x: e.clientX, startVal };
    S._oledLocked = true;
    e.preventDefault();
  });
});

document.addEventListener('mousemove', e => {
  SEND_ENCS.forEach((def, si) => {
    const drag = encSendDrags[si];
    if (!drag) return;
    const dy = drag.y - e.clientY;
    const dx = e.clientX - (drag.x || e.clientX);
    const delta = dy + dx;
    if (Math.abs(delta) < 2) return;
    const t = S.tracks[S.currentTrack];
    const newVal = Math.max(0, Math.min(1, drag.startVal + delta / 150));
    if (t.mode === 'drum') {
      if (!t.drumPads) return;
      t.drumPads[S.selectedDrumPad][def.key] = newVal;
      oledForce(def.label + ' SEND', Math.round(newVal * 100) + '%', `Pad ${S.selectedDrumPad + 1}`);
    } else {
      t[def.key] = newVal;
      // Mettre à jour le GainNode send en temps réel
      const nodes = trackSendNodes[S.currentTrack];
      if (nodes) {
        if (def.key === 'sendDelay')  nodes.dSend.gain.value = newVal;
        if (def.key === 'sendReverb') nodes.rSend.gain.value = newVal;
      }
      oledForce(def.label + ' SEND', Math.round(newVal * 100) + '%', `Track ${S.currentTrack + 1}`);
    }
    updateSendArcs();
  });
});

document.addEventListener('mouseup', () => {
  encSendDrags.forEach((d, si) => {
    if (d) { encSendDrags[si] = null; S._oledLocked = false; }
  });
});

function updateSendArcs() {
  const t = S.tracks[S.currentTrack];
  const col = trackColor(S.currentTrack);
  const dimAll = projectModeActive || S.mode === 'session';
  SEND_ENCS.forEach((def, si) => {
    const enc = svg(def.id);
    const lbl = document.getElementById(def.lblId);
    const arc = document.getElementById(def.arcId);
    if (dimAll || t.mode === 'master') {
      if (enc) enc.setAttribute('stroke', dimAll ? '#1e1e20' : '#383838');
      if (lbl) { lbl.textContent = def.label; lbl.setAttribute('fill', dimAll ? '#1a1a1a' : '#2a2a2a'); }
      if (arc) { arc.setAttribute('stroke', 'none'); arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`); arc.setAttribute('stroke-dashoffset', '0'); }
      return;
    }
    let val;
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      val = t.drumPads[S.selectedDrumPad][def.key] ?? 0;
    } else {
      val = t[def.key] ?? 0;
    }
    if (enc) enc.setAttribute('stroke', col + '88');
    if (lbl) { lbl.textContent = def.label; lbl.setAttribute('fill', col); }
    if (arc) {
      const lit = ENC_ARC_TOTAL * Math.max(0, Math.min(1, val));
      arc.setAttribute('stroke-dashoffset', '0');
      arc.setAttribute('stroke-dasharray', `${lit.toFixed(2)} ${(ENC_CIRC - lit).toFixed(2)}`);
      arc.setAttribute('stroke', col);
    }
  });
}

document.addEventListener('mousemove', e => {
  ENC_DEFS.forEach((def, i) => {
    if (!encDrags[i]) return;
    const dy = encDrags[i].y - e.clientY;
    const dx = e.clientX - (encDrags[i].x || e.clientX);
    const delta = dy + dx; // up+right = increase, down+left = decrease

    // Mode drum
    if (encDrags[i].drumMode) {
      if (Math.abs(delta) < 2) return;
      const t = S.tracks[S.currentTrack];
      if (!t.drumPads) return;
      const pad = t.drumPads[S.selectedDrumPad];
      const { key, dr } = encDrags[i];
      const range = dr.max - dr.min;
      const newVal = Math.max(dr.min, Math.min(dr.max, encDrags[i].startVal + delta / 120 * range));
      pad[key] = newVal;
      oledForce(dr.label, dr.fmt(newVal), `Pad ${S.selectedDrumPad + 1}`);
      updateEncArcs();
      return;
    }

    if (Math.abs(delta) < 2) return;
    encDrags[i].moved = true;
    const eMax = getEncMax(def);
    const range = eMax - def.min;
    const newVal = Math.max(def.min, Math.min(eMax, encDrags[i].startVal + delta / 80 * range));
    const res = getHeldSt();
    if (!res) return;
    def.set(res.st, newVal);
    if (i === 0 && res.st.on) {
      showNoteLengthFeedback(res.idx, true, Math.round(newVal));
    }
    oledForce(def.label, def.fmt(newVal), `Step ${encDrags[i].idx + 1}`);
    updateEncArcs();
  });
});

document.addEventListener('mouseup', () => {
  let any = false;
  encDrags.forEach((d, i) => {
    if (!d) return;
    // Clic sans drag → afficher valeur actuelle
    if (!d.moved) {
      const res = getHeldSt();
      if (res && res.st.on) {
        const def = ENC_DEFS[i];
        oledForce(def.label, def.fmt(def.get(res.st)), `Step ${d.idx + 1}`);
        S._oledLocked = true;
        setTimeout(() => { S._oledLocked = false; }, 2000);
      }
    }
    encDrags[i] = null;
    any = true;
  });
  if (any) { updateEncArcs(); if (!encDrags.some(d=>d)) S._oledLocked = false; }
});



// ═══════════════════════════════════════════════════════════════
// PIANO SVG (dans le SVG principal, group #pianoPart)
// ═══════════════════════════════════════════════════════════════
S.pianoOctave = 0;  // relatif : -2 à +2, 0 = C1-C5
S.pianoOpen = true;
var PIANO_BASE_OCT = 1; // niveau 0 = C1-C5 ✓, range -2 à +3 couvre C-1 à C8

var PX0 = 62, PY0 = 0;    // origine touches (relatif au groupe keyboardZone)
var PW_TOTAL = 836 - PX0;  // 774px disponibles
var PIANO_OCTAVES = 3;
var WHITE_TOTAL = PIANO_OCTAVES * 7 + 1; // 22 blanches
var PK_WW = PW_TOTAL / WHITE_TOTAL;       // largeur d'une blanche
var PK_WH = 97;                           // hauteur blanche
var PK_BW = PK_WW * 0.62;                // largeur noire
var PK_BH = PK_WH * 0.62;                // hauteur noire

// Constantes piano
var WHITE_SEMI   = [0,2,4,5,7,9,11];  // demi-tons touches blanches dans une octave
var BLACK_SEMI   = [1,3,6,8,10];       // demi-tons touches noires
var BLACK_AFTER_W = [0,1,3,4,5];       // après quelle blanche (index) se trouve chaque noire

function pMidi(oct, semi) { return (oct + 1) * 12 + semi; }

function buildPiano() {
  const g = document.getElementById('pianoKeys');
  g.innerHTML = '';
  const col = trackColor(S.currentTrack);
  const baseOct = PIANO_BASE_OCT + S.pianoOctave; // octave réel de la première touche

  // Blanches
  let wx = 0;
  for (let oct = 0; oct < PIANO_OCTAVES; oct++) {
    WHITE_SEMI.forEach((semi, wi) => {
      const midi = pMidi(baseOct + oct, semi);
      const x = PX0 + wx * PK_WW;
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('id', 'pk_' + midi);
      r.setAttribute('x', (x + 0.5).toFixed(1));
      r.setAttribute('y', PY0);
      r.setAttribute('width', (PK_WW - 1).toFixed(1));
      r.setAttribute('height', PK_WH);
      r.setAttribute('rx', '2');
      r.setAttribute('fill', '#d0d0d0');
      r.setAttribute('stroke', '#888');
      r.setAttribute('stroke-width', '0.5');
      r.setAttribute('cursor', 'pointer');
      r.addEventListener('mousedown', () => pianoKeyPress(midi));
      r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
      r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
      r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
      g.appendChild(r);
      wx++;
    });
  }
  // Dernière blanche C
  {
    const midi = pMidi(baseOct + PIANO_OCTAVES, 0);
    const x = PX0 + wx * PK_WW;
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('id', 'pk_' + midi);
    r.setAttribute('x', (x + 0.5).toFixed(1)); r.setAttribute('y', PY0);
    r.setAttribute('width', (PK_WW - 1).toFixed(1)); r.setAttribute('height', PK_WH);
    r.setAttribute('rx', '2'); r.setAttribute('fill', '#d0d0d0'); r.setAttribute('stroke', '#888');
    r.setAttribute('stroke-width', '0.5'); r.setAttribute('cursor', 'pointer');
    r.addEventListener('mousedown', () => pianoKeyPress(midi));
    r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
    r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
    r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
    g.appendChild(r);
  }
  // Noires
  wx = 0;
  for (let oct = 0; oct < PIANO_OCTAVES; oct++) {
    BLACK_AFTER_W.forEach((wi, bi) => {
      const semi = BLACK_SEMI[bi];
      const midi = pMidi(baseOct + oct, semi);
      const x = PX0 + (wx + wi) * PK_WW + PK_WW - PK_BW / 2;
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('id', 'pk_' + midi);
      r.setAttribute('x', x.toFixed(1)); r.setAttribute('y', PY0);
      r.setAttribute('width', PK_BW.toFixed(1)); r.setAttribute('height', PK_BH);
      r.setAttribute('rx', '2'); r.setAttribute('fill', '#1a1a1a'); r.setAttribute('stroke', '#000');
      r.setAttribute('stroke-width', '0.5'); r.setAttribute('cursor', 'pointer');
      r.addEventListener('mousedown', () => pianoKeyPress(midi));
      r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
      r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
      r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
      g.appendChild(r);
    });
    wx += 7;
  }
  // Labels C
  for (let oct = 0; oct <= PIANO_OCTAVES; oct++) {
    const x = PX0 + oct * 7 * PK_WW + PK_WW / 2;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x.toFixed(1));
    t.setAttribute('y', PY0 + PK_WH - 4);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '14');
    t.setAttribute('font-family', "'DM Mono',monospace"); t.setAttribute('fill', '#999');
    t.setAttribute('pointer-events', 'none');
    t.textContent = 'C' + (baseOct + oct);
    g.appendChild(t);
  }
  // Affichage octave relatif
  const octStr = S.pianoOctave === 0 ? '0' : (S.pianoOctave > 0 ? '+' + S.pianoOctave : '' + S.pianoOctave);
  document.getElementById('octaveDisplay').textContent = octStr;
  illuminatePianoNotes();
}

function pianoKeyColor(midi, on) {
  const el = document.getElementById('pk_' + midi);
  if (!el) return;
  const h = parseFloat(el.getAttribute('height'));
  const isBlack = h < PK_WH * 0.8;
  const col = trackColor(S.currentTrack);
  if (on) { el.setAttribute('fill', col); el.setAttribute('stroke', '#fff'); }
  else { el.setAttribute('fill', isBlack ? '#1a1a1a' : '#d0d0d0'); el.setAttribute('stroke', isBlack ? '#000' : '#888'); }
}

let _pianoHeldMidi = null; // touche piano actuellement pressée
let _padHeldNote = null;   // note pad SF2 actuellement pressée

function pianoKeyPress(midi) {
  ensureAudio();
  if (_pianoHeldMidi !== null && _pianoHeldMidi !== midi) {
    pianoKeyRelease(_pianoHeldMidi);
  }
  _pianoHeldMidi = midi;
  pianoKeyColor(midi, true);

  const t = S.tracks[S.currentTrack];

  // ── Track drum : mapper les notes aux pads ──
  if (t.mode === 'drum' && isDrumMidi(midi)) {
    const padIdx = midi - DRUM_MIDI_BASE;
    triggerDrumPad(padIdx, 0.8);
    return;
  }

  // ── Track mélodique : comportement normal ──
  if (t.mode === 'drum') return;
  if (t.outputMode === 'sf2' && arpIsActive(S.currentTrack)) {
    arpNoteOn(S.currentTrack, midi);
  } else {
    playTrackNote(S.currentTrack, midi, 0.75);
  }
  recNoteOn(midi, 0.8);
  if (anyStepHeld()) {
    const t = S.tracks[S.currentTrack];
    if (t.mode !== 'drum') {
      const bar = currentStepBar();
      heldSteps.forEach(o => o.didAction = true);
      for (const idx of heldSteps.keys()) {
        const st = bar[idx];
        if (!st.on) { st.on=true; st.note=midi; st.vel=0.8; st.len=1; st.extraNotes=[]; }
        else if (st.note === midi) { st.on=false; st.extraNotes=[]; }
        else {
          if (!st.extraNotes) st.extraNotes = [];
          const i2 = st.extraNotes.indexOf(midi);
          if (i2 >= 0) st.extraNotes.splice(i2, 1); else st.extraNotes.push(midi);
        }
      }
      clearStepNoteIllumination(); illuminateHeldStepNotes(); renderSteps(); illuminatePianoNotes();
    }
  }
}

function pianoKeyRelease(midi) {
  if (_pianoHeldMidi === midi) _pianoHeldMidi = null;
  const allNotes = getAllHeldNotes();
  if (!allNotes.includes(midi)) pianoKeyColor(midi, false);
  const t = S.tracks[S.currentTrack];
  if (t.outputMode === 'sf2' && t.mode !== 'drum') {
    if (arpIsActive(S.currentTrack)) {
      arpNoteOff(S.currentTrack, midi);
    } else {
      sf2NoteOff(S.currentTrack, midi);
    }
  }
  recNoteOff(midi);
}

// Relâchement global des touches piano et pads (mouseup hors de la touche)
document.addEventListener('mouseup', () => {
  if (_pianoHeldMidi !== null) {
    pianoKeyRelease(_pianoHeldMidi);
  }
  if (_padHeldNote !== null) {
    sf2NoteOff(_padHeldNote.ti, _padHeldNote.note);
    recNoteOff(_padHeldNote.note);
    _padHeldNote = null;
  }
});

function illuminatePianoNotes() {
  if (!S.pianoOpen) return;
  document.querySelectorAll('[id^="pk_"]').forEach(el => {
    const h = parseFloat(el.getAttribute('height'));
    const isBlack = h < PK_WH * 0.8;
    el.setAttribute('fill', isBlack ? '#1a1a1a' : '#d0d0d0');
    el.setAttribute('stroke', isBlack ? '#000' : '#888');
  });
  getAllHeldNotes().forEach(m => pianoKeyColor(m, true));
  updatePianoOctaveIndicators();
}

function illuminatePianoRT(notes, on) {
  if(!S.pianoOpen) return;
  const col=trackColor(S.currentTrack);
  notes.forEach(midi=>{
    const el=document.getElementById('pk_'+midi);

    if(on){el.setAttribute('fill',col);el.setAttribute('stroke','#fff');}
    else{el.setAttribute('fill',isBlack?'#1a1a1a':'#d0d0d0');el.setAttribute('stroke',isBlack?'#000':'#888');}
  });
}

// Piano toujours visible — plus de tiroir
function togglePiano() {} // conservé pour compatibilité, ne fait rien

document.getElementById('btnOctUp').addEventListener('click', () => {
  if (S.pianoOctave < 3) { S.pianoOctave++; buildPiano(); updatePianoOctaveIndicators(); }  // max +3 → C4-C8
});
document.getElementById('btnOctDown').addEventListener('click', () => {
  if (S.pianoOctave > -2) { S.pianoOctave--; buildPiano(); updatePianoOctaveIndicators(); }  // min -2 → C0-C4
});

// Indicateurs notes hors plage sur les boutons ↑/↓ du piano
function updatePianoOctaveIndicators() {
  const upRect   = document.getElementById('svgOctUpRect');
  const downRect = document.getElementById('svgOctDownRect');
  if (!upRect || !downRect) return;
  const baseOct = PIANO_BASE_OCT + S.pianoOctave;
  // pMidi(oct, 0) = (oct+1)*12  → C de l'octave baseOct
  const lowestVisible  = (baseOct + 1) * 12;                        // MIDI de C_baseOct
  const highestVisible = (baseOct + 1 + PIANO_OCTAVES) * 12 - 1;   // MIDI du dernier B visible

  let hasAbove = false, hasBelow = false;
  const t = S.tracks[S.currentTrack];
  if (t.mode !== 'drum') {
    const clip = activeClip();
    for (let b = 0; b < clip.numBars; b++) {
      for (const st of clip.bars[b]) {
        if (!st.on) continue;
        for (const n of [st.note, ...(st.extraNotes || [])]) {
          if (n > highestVisible) hasAbove = true;
          if (n < lowestVisible)  hasBelow = true;
        }
      }
    }
  }

  const col = trackColor(S.currentTrack);
  upRect.setAttribute('fill',   hasAbove ? col + '44' : '#1c1c1e');
  upRect.setAttribute('stroke', hasAbove ? col        : '#2a2a2c');
  downRect.setAttribute('fill',   hasBelow ? col + '44' : '#1c1c1e');
  downRect.setAttribute('stroke', hasBelow ? col        : '#2a2a2c');
}

// Touche P
document.addEventListener('keydown', e=>{
  // Touche P supprimée — piano toujours visible
});

// Prob + shift dans le scheduler — on patche via wrapper
// Le scheduler existant joue déjà les notes — on ajoute prob/shift ici
// en wrappant la section mélodique via un flag de pre-check global
// (le vrai patch est fait inline dans le scheduler ci-dessous)

// ═══════════════════════════════════════════════════════════════
// MIDI INPUT
// ═══════════════════════════════════════════════════════════════
var midiState = {
  access: null,
  inputs: [],
  outputs: [],
  selectedOutput: null,
  heldNotes: new Map(),
  _joystickUpFired: false,   // anti-répétition joystick haut
  _joystickDownFired: false, // anti-répétition joystick bas
};

function midiSetIndicator(connected) {
  const dot = document.getElementById('midiDot');
  const lbl = document.getElementById('midiLbl');
  if (!dot) return;
  if (connected) {
    dot.setAttribute('fill', '#44ff88');
    dot.setAttribute('stroke', '#22aa44');
    if (lbl) lbl.setAttribute('fill', '#44ff88');
  } else {
    dot.setAttribute('fill', '#1a1a1a');
    dot.setAttribute('stroke', '#333');
    if (lbl) lbl.setAttribute('fill', '#2a2a2a');
  }
}



function midiNoteOff(midi, ch) {
  midiState.heldNotes.delete(midi);

  // Ch10 → pas de recNoteOff ni de rendu mélodique
  if (ch === 10) return;

  recNoteOff(midi);

  const t = S.tracks[S.currentTrack];

  // MIDI out → envoyer note off sur le port
  if (t.mode !== 'drum' && t.outputMode === 'midi') {
    const out = getTrackOutput(S.currentTrack);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      out.send([0x80 | mch, midi & 0x7f, 0]);
    }
  } else if (t.mode !== 'drum' && t.outputMode === 'sf2') {
    if (arpIsActive(S.currentTrack)) {
      arpNoteOff(S.currentTrack, midi);
    } else {
      sf2NoteOff(S.currentTrack, midi);
    }
  }

  // Éteindre piano (toutes tracks)
  if (S.pianoOpen) {
    const allNotes = getAllHeldNotes();
    if (!allNotes.includes(midi)) pianoKeyColor(midi, false);
  }

  // Éteindre pads matrice (toutes tracks mélodiques)
  if (t.mode !== 'drum') {
    for (let r = 0; r < 4; r++)
      for (let c = 0; c < 8; c++)
        if (padNote(r, c) === midi) renderPadAppearance(r, c);
  }
}

function midiOnMessage(e) {
  const [status, data1, data2] = e.data;
  const cmd = status & 0xf0;
  const ch  = (status & 0x0f) + 1; // canal MIDI 1-16
  if (cmd === 0x90) midiNoteOn(data1, data2, ch);
  else if (cmd === 0x80) midiNoteOff(data1, ch);
  else if (cmd === 0xb0) {
    // CC sur ch10 → forwarder vers drum track si elle est en MIDI out
    // MAIS les CC globaux (encodeurs, BPM, navigation) passent toujours dans midiCC
    if (ch === 10) {
      const drumTi = S.tracks.findIndex(t => t.mode === 'drum');
      if (drumTi >= 0 && S.tracks[drumTi].outputMode === 'midi') {
        const out = getTrackOutput(drumTi);
        if (out) {
          const mch = (S.tracks[drumTi].midiChannel - 1) & 0x0f;
          out.send([0xb0 | mch, data1, data2]);
        }
      }
      // Les CC globaux (encodeurs/nav) passent quand même dans midiCC
      const GLOBAL_CC = [1, 2, 70, 71, 72, 73, 74, 77, 115, 116];
      if (GLOBAL_CC.includes(data1)) midiCC(data1, data2);
    } else {
      midiCC(data1, data2);
    }
  }
  else if (cmd === 0xe0) midiPitchBend(data1, data2);
}

function midiCC(cc, value) {
  // ── CC0 → joystick X-axis — ignoré ──
  if (cc === 0) return;

  // ── CC2 → joystick Y-axis — changer de track par à-coup avec hysteresis ──
  if (cc === 2) {
    if (value > 120 && !midiState._joystickUpFired) {
      midiState._joystickUpFired = true;
      const next = (S.currentTrack + 7) % 8; // track précédente (wraparound)
      const nextPage = Math.floor(next / 4);
      if (nextPage !== S.page) S.page = nextPage;
      selectTrack(next);
      const slot = next % 4;
      setBtnLit(`trkBtn${slot}`, true);
      setTimeout(() => setBtnLit(`trkBtn${slot}`, false), 150);
    } else if (value < 70) {
      midiState._joystickUpFired = false;
    }

    if (value < 20 && !midiState._joystickDownFired) {
      midiState._joystickDownFired = true;
      const prev = (S.currentTrack + 1) % 8; // track suivante (wraparound)
      const prevPage = Math.floor(prev / 4);
      if (prevPage !== S.page) S.page = prevPage;
      selectTrack(prev);
      const slot = prev % 4;
      setBtnLit(`trkBtn${slot}`, true);
      setTimeout(() => setBtnLit(`trkBtn${slot}`, false), 150);
    } else if (value > 60) {
      midiState._joystickDownFired = false;
    }
    return;
  }
  // ── Mod wheel (CC1) → visuel tiroir piano ──
  if (cc === 1) {
    const pct = value / 127;
    if (notch) {
      const trackH = 72, notchH = 7;
      const y = 383 + (trackH - notchH) * (1 - pct);
      notch.setAttribute('y', y.toFixed(1));
    }
    // Forwarder sur MIDI out OU FluidSynth selon outputMode
    const tiMod = S.currentTrack;
    const tMod = S.tracks[tiMod];
    if (tMod.outputMode === 'midi') {
      const out = getTrackOutput(tiMod);
      if (out) {
        const mch = (tMod.midiChannel - 1) & 0x0f;
        out.send([0xb0 | mch, 1, value & 0x7f]);
      }
    } else if (tMod.outputMode === 'sf2' && sf2Ready && jsSynths[tiMod]) {
      jsSynths[tiMod].midiControl(SF2_CHANNEL, 1, value & 0x7f);
    }
    return;
  }

  // ── Encodeurs infinis relatifs (MPK mini Plus style) ──
  // Valeur 1-63 = sens horaire (+), 65-127 = sens antihoraire (-)
  // On normalise en delta : +1 par incrément, -1 par décrément
  function relDelta(v, sensitivity) {
    const s = sensitivity || 1;
    if (v >= 1  && v <= 63)  return  s * (v);        // horaire
    if (v >= 65 && v <= 127) return -s * (128 - v);  // antihoraire
    return 0;
  }

  // ── CC70-73 → 4 encodeurs contextuels ──
  // Step tenu → Length/Velocity/Offset/Probability
  // Mode drum sans step tenu → Tune/Decay/Tone/Drive
  if (cc >= 70 && cc <= 73) {
    const encIdx = cc - 70; // 0-3
    const res = getHeldSt();

    if (res && res.st.on) {
      // Step tenu : paramètres de step
      const def = ENC_DEFS[encIdx];
      const sensMap = [1, 2, 0.02, 2]; // Length:1step, Vel:2, Offset:0.02, Prob:2%
      const d = relDelta(value, sensMap[encIdx]);
      const eMax  = getEncMax(def);
      const cur   = def.get(res.st);
      const newVal = Math.max(def.min, Math.min(eMax, cur + d));
      def.set(res.st, newVal);
      if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
      if (encIdx === 0) showNoteLengthFeedback(res.idx, true, Math.round(newVal));
      oledForce(def.label, def.fmt(newVal), `Step ${res.idx + 1}`);
      updateEncArcs();
      return;
    }

    const tEnc = S.tracks[S.currentTrack];
    if (tEnc.mode === 'drum') {
      // Mode drum sans step tenu : paramètres du pad
      if (!tEnc.drumPads) tEnc.drumPads = makeDefaultDrumPads();
      const pad = tEnc.drumPads[S.selectedDrumPad];
      const dr  = DRUM_ENC_RANGES[encIdx];
      const key = DRUM_ENC_KEYS[encIdx];
      if (!dr) return;
      const sens = (dr.max - dr.min) / 60; // ~60 incréments pour traverser la plage
      const d2 = relDelta(value, sens);
      const newVal = Math.max(dr.min, Math.min(dr.max, (pad[key] ?? dr.min) + d2));
      pad[key] = newVal;
      oledForce(dr.label, dr.fmt(newVal), `Pad ${S.selectedDrumPad + 1}`);
      updateEncArcs();
      return;
    }

    return;
  }

  // ── CC74 → Molette BPM (encodeur relatif, identique aux autres encodeurs) ──
  if (cc === 74) {
    const rawD = relDelta(value, 1);
    const d = rawD > 0 ? Math.min(rawD, 5) : Math.max(rawD, -5);
    if (d === 0) return;

    // ── Comportement normal ──
    if (anyStepHeld()) {
      const res = getHeldSt();
      if (res && res.st.on) {
        const clip = activeClip();
        const totalSteps = clip.numBars * 16;
        const absPos = S.currentBar * 16 + res.idx;
        const maxLen = totalSteps - absPos;
        const cur    = res.st.len || 1;
        res.st.len   = Math.max(1, Math.min(maxLen, cur + d));
        showNoteLengthFeedback(res.idx, true, res.st.len);
        oledForce(`STEP ${res.idx+1}`, `${res.st.len} step${res.st.len>1?'s':''}`,
                  `= ${(res.st.len * stepDur()).toFixed(2)}s`);
        if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
        updateEncArcs();
      }
    } else if (S.mode === 'loop' && S._loopBarHeld >= 0) {
      loopBarVelocityDelta(d * 4);
    } else {
      setBpm(S.bpm + d);
      oledForce('BPM', `${S.bpm}`, S.playing ? '▶' : '■');
    }
    return;
  }

  // ── CC77 → Encodeur Volume master (ou vélocité step si tenu) ──
  if (cc === 77) {
    if (anyStepHeld()) {
      const d = relDelta(value, 1 / 60); // step velocity : 60 ticks pour traverser
      const res = getHeldSt();
      if (res && res.st.on) {
        const cur = res.st.vel ?? 0.8;
        res.st.vel = Math.max(0, Math.min(1, cur + d));
        oledForce(`STEP ${res.idx+1}`, `VÉL: ${Math.round(res.st.vel*127)}`,
                  `(${Math.round(res.st.vel*100)}%)`);
        if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
        updateEncArcs();
      }
    } else if (S._heldTrack >= 0) {
      const d = relDelta(value, 1 / 100); // volume track : 100 ticks → 1% par tick
      const t = S.tracks[S._heldTrack];
      t.volume = Math.max(0, Math.min(1, t.volume + d));
      oledForce(`VOL T${S._heldTrack+1}`, `${Math.round(t.volume*100)}%`, '');
    } else {
      const d = relDelta(value, 1 / 100); // volume master : 100 ticks → 1% par tick
      setMasterVolume(S.masterVolume + d);
    }
    return;
  }

  // ── CC75 → Enc5 Delay Send, CC76 → Enc4 Reverb Send ──────────
  if (cc === 75 || cc === 76) {
    const isDelay = (cc === 75);
    const key  = isDelay ? 'sendDelay' : 'sendReverb';
    const lbl  = isDelay ? 'DELAY SEND' : 'REVERB SEND';
    const d    = relDelta(value, 1 / 60);
    const t    = S.tracks[S.currentTrack];
    if (t.mode === 'master') return;
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      const pad = t.drumPads[S.selectedDrumPad];
      pad[key] = Math.max(0, Math.min(1, (pad[key] ?? 0) + d));
      oledForce(lbl, Math.round(pad[key] * 100) + '%', `Pad ${S.selectedDrumPad + 1}`);
    } else {
      t[key] = Math.max(0, Math.min(1, (t[key] ?? 0) + d));
      const nodes = trackSendNodes[S.currentTrack];
      if (nodes) {
        if (key === 'sendDelay')  nodes.dSend.gain.value = t[key];
        if (key === 'sendReverb') nodes.rSend.gain.value = t[key];
      }
      oledForce(lbl, Math.round(t[key] * 100) + '%', `Track ${S.currentTrack + 1}`);
    }
    updateSendArcs();
    return;
  }

  // ── Boutons CC115=Back, CC116=clic molette, CC117=Mode, CC118=Play, CC119=Rec ──
  if (value === 0) return; // ignorer le relâchement (d2=0)

  if (cc === 118) { ensureAudio(); togglePlay(); return; }
  if (cc === 119) { ensureAudio(); toggleRec();  return; }

  if (cc === 117) {
    // Mode/burger — flash lumineux + toggle session/note
    setModeButtonLit(true);
    if (S.mode === 'loop') {
      S.mode = 'note';
      S._loopBarHeld = -1; S._loopBar2 = -1;
      setBtnLit('btnLoop', false, '#3ddc84');
    }
    const otherMode = S.mode === 'note' ? 'session' : 'note';
    enterMode(otherMode);
    setTimeout(() => setModeButtonLit(false), 150);
    return;
  }
  if (cc === 115 || cc === 116) {
    // Navigation preset : CC115=précédent, CC116=suivant
    const ti = S.currentTrack;
    const t  = S.tracks[ti];
    // Pas d'action sur drum (T1) ni master (T8)
    if (t.mode === 'drum' || t.mode === 'master') return;
    if (!sf2Browser.catalogue || !sf2Browser.catalogue.length) {
      oledForce('SF2', 'Pas de catalogue', 'charger un dossier');
      return;
    }

    const delta = (cc === 115) ? -1 : 1;
    const browserOpen = document.getElementById('sf2Browser').classList.contains('open');

    // Construire la liste de navigation : si browser ouvert → currentFiltered,
    // sinon les sons de la catégorie du son actif (ou catégorie 0 si rien)
    const ts = trackSF2[ti];
    let list;
    if (browserOpen) {
      list = sf2Browser.currentFiltered;
    } else {
      const activeEntry = sf2Browser.catalogue.find(s => s.file === ts.sfName);
      const activeCat = activeEntry?.category || sf2Browser.categories[0];
      list = sf2Browser.catalogue.filter(s => s.category === activeCat);
    }
    if (!list || !list.length) return;

    let curIdx = list.findIndex(s => s.file === ts.sfName);
    if (curIdx < 0) curIdx = delta > 0 ? -1 : list.length;
    const newIdx = Math.max(0, Math.min(list.length - 1, curIdx + delta));
    if (newIdx === curIdx) return; // déjà au bout

    const sound = list[newIdx];
    if (!sound) return;

    if (browserOpen) {
      // Browser ouvert : simuler un clic (preview + chargement debounced)
      sf2SoundClick(newIdx);
      // Scroll vers l'item dans la liste
      const items = document.querySelectorAll('#sf2PresetList .brItem');
      if (items[newIdx]) items[newIdx].scrollIntoView({ block: 'nearest' });
    } else {
      // Browser fermé : feedback OLED immédiat + chargement debounced
      oledForce(`T${ti+1}`, (sound.displayName || sound.name).slice(0, 12),
                (sound.category || '').slice(0, 12));
      clearTimeout(sf2Browser.previewDebounce);
      sf2Browser.previewDebounce = setTimeout(async () => {
        sf2Browser.previewDebounce = null;
        sf2Browser.trackIdx = ti;
        // ── Mutex : incrémenter le token — tout chargement précédent sera annulé ──
        const myToken = ++_sf2LoadToken[ti];
        _sf2LoadingTrack[ti] = true;
        sf2AllNotesOff(ti); // couper les notes en cours avant de changer de preset
        // Charger le SF2 si nécessaire (utilise le mécanisme interne)
        const name = sound.file;
        let bankData = sf2BankCache[ti][name];
        if (!bankData && sf2TempBank[ti]?.name === name) {
          bankData = { sfontId: sf2TempBank[ti].sfontId, presets: sf2TempBank[ti].presets };
        }
        if (!bankData) {
          // Charger via le même chemin que le browser (file handle ou fallback)
          try {
            let file;
            if (sf2Browser.useFileHandles) {
              const handle = sf2Browser.fileHandles[name];
              if (!handle) { console.warn('[SF2] Handle introuvable :', name); _sf2LoadingTrack[ti] = false; return; }
              file = await handle.getFile();
            } else {
              file = sf2Browser.fallbackFiles[name];
              if (!file) { console.warn('[SF2] Fichier introuvable :', name); _sf2LoadingTrack[ti] = false; return; }
            }
            // Vérifier que ce chargement est toujours d'actualité
            if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }
            const buf     = await file.arrayBuffer();
            if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }
            const sfontId = await jsSynths[ti].loadSFont(buf);
            if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }
            const presets = sf2GetPresets(ti, sfontId);
            bankData = { sfontId, presets };
            sf2BankCache[ti][name] = bankData;
          } catch(e) {
            console.error('[SF2] Erreur chargement CC115/116 :', e);
            _sf2LoadingTrack[ti] = false;
            return;
          }
        } else if (sf2TempBank[ti]?.name === name) {
          // Promouvoir le temp en cache
          sf2BankCache[ti][name] = bankData;
          sf2TempBank[ti] = null;
        }

        // Vérification finale : un autre chargement a-t-il supplanté celui-ci ?
        if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }

        // Sélectionner le preset (premier du SF2)
        const oldName = trackSF2[ti].sfName;
        const preset = bankData.presets?.[0] ?? { bank: 0, program: 0 };
        trackSF2[ti].sfName  = name;
        trackSF2[ti].sfontId = bankData.sfontId;
        trackSF2[ti].presets = bankData.presets;
        trackSF2[ti].bank    = preset.bank;
        trackSF2[ti].program = preset.program;
        try { jsSynths[ti].midiProgramSelect(SF2_CHANNEL, bankData.sfontId, preset.bank, preset.program); } catch(e) {}
        S.tracks[ti].outputMode = 'sf2';
        if (oldName && oldName !== name) sf2MaybeUnload(ti, oldName);
        _sf2LoadingTrack[ti] = false; // ── libérer le mutex ──
        renderTrackButtons();
        oledForce(`T${ti+1}`, (sound.displayName || sound.name).slice(0, 12),
                  (sound.category || '').slice(0, 12));
      }, sf2Browser.PREVIEW_DELAY);
    }
    return;
  }
}

function midiPitchBend(lsb, msb) {
  // Valeur 14 bits : 0=min, 8192=centre, 16383=max
  const raw = (msb << 7) | lsb;
  const pct = (raw - 8192) / 8192; // -1..+1

  // Visuel molette pitch
  if (notch) {
    const trackH = 72, notchH = 7;
    const mid = 383 + (trackH - notchH) / 2;
    const y = mid - pct * (trackH - notchH) / 2;
    notch.setAttribute('y', y.toFixed(1));
  }

  // Forwarder sur le port MIDI out OU sur FluidSynth selon l'outputMode
  const ti = S.currentTrack;
  const t = S.tracks[ti];
  if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      out.send([0xe0 | mch, lsb & 0x7f, msb & 0x7f]);
    }
  } else if (t.outputMode === 'sf2' && sf2Ready && jsSynths[ti]) {
    // FluidSynth attend 0..16383 (0x0000=min, 0x2000=centre, 0x3FFF=max)
    const raw = (msb << 7) | lsb;  // valeur 14 bits brute, déjà dans la bonne plage
    jsSynths[ti].midiPitchBend(SF2_CHANNEL, raw);
  }
}

function midiConnectInput(input) {
  input.onmidimessage = midiOnMessage;
  midiState.inputs.push(input);
  midiSetIndicator(true);
  oledForce('MIDI', input.name.slice(0, 16), 'connecté');
  setTimeout(() => S._oledLocked = false, 2000);
}

function midiDisconnectInput(input) {
  // Chercher par id car la référence peut différer
  midiState.inputs.forEach(i => { if (i.id === input.id) i.onmidimessage = null; });
  midiState.inputs = midiState.inputs.filter(i => i.id !== input.id);
  midiSetIndicator(midiState.inputs.length > 0);
  if (midiState.inputs.length === 0) oledForce('MIDI', 'déconnecté', '');
}

function midiInit() {
  if (!navigator.requestMIDIAccess) {
    console.log('Web MIDI not supported');
    return;
  }
  navigator.requestMIDIAccess({ sysex: false }).then(access => {
    midiState.access = access;

    // Connecter tous les inputs sauf l'IAC (évite la boucle MIDI)
    access.inputs.forEach(input => {
      if (!input.name.toLowerCase().includes('iac')) midiConnectInput(input);
    });

    // Indexer tous les outputs déjà présents
    access.outputs.forEach(output => {
      midiState.outputs.push(output);
      // Sélectionner le premier output disponible par défaut
      if (!midiState.selectedOutput) midiState.selectedOutput = output;
      midiUpdateOutputIndicator();
    });

    // Écouter les connexions/déconnexions
    access.onstatechange = e => {
      const port = e.port;
      if (port.type === 'input') {
        if (port.state === 'connected') {
          if (!midiState.inputs.find(i => i.id === port.id) &&
              !port.name.toLowerCase().includes('iac')) {
            midiConnectInput(port);
          }
        } else if (port.state === 'disconnected') {
          midiDisconnectInput(port);
          setTimeout(() => {
            const activeIds = new Set([...access.inputs.values()].map(i => i.id));
            midiState.inputs = midiState.inputs.filter(i => activeIds.has(i.id));
            midiSetIndicator(midiState.inputs.length > 0);
          }, 200);
        }
      } else if (port.type === 'output') {
        if (port.state === 'connected') {
          if (!midiState.outputs.find(o => o.id === port.id)) {
            midiState.outputs.push(port);
            if (!midiState.selectedOutput) midiState.selectedOutput = port;
            midiUpdateOutputIndicator();
          }
        } else if (port.state === 'disconnected') {
          midiState.outputs = midiState.outputs.filter(o => o.id !== port.id);
          if (midiState.selectedOutput?.id === port.id) {
            midiState.selectedOutput = midiState.outputs[0] || null;
          }
          midiUpdateOutputIndicator();
        }
      }
    };
  }).catch(err => {
    console.warn('MIDI access denied:', err);
    oledForce('MIDI', 'accès refusé', 'vérif navigateur');
  });
}

function midiUpdateOutputIndicator() {
  // Mettre à jour le dot MIDI selon si on a un output disponible
  const hasOut = midiState.outputs.length > 0;
  const hasIn  = midiState.inputs.length > 0;
  midiSetIndicator(hasIn || hasOut);
}

// Lancer MIDI au démarrage
midiInit();

// ═══════════════════════════════════════════════════════════════
// MIDI OUTPUT
// ═══════════════════════════════════════════════════════════════

// Retourne le port output pour une track donnée
function getTrackOutput(ti) {
  const t = S.tracks[ti];
  if (t.midiOutputId && midiState.access) {
    const port = midiState.access.outputs.get(t.midiOutputId);
    if (port && port.state === 'connected') return port;
  }
  return midiState.selectedOutput; // fallback
}

// Envoie un noteOn + noteOff schedulé sur le canal de la track
function midiOutNote(ti, midi, vel, durationMs) {
  const out = getTrackOutput(ti);
  if (!out) return;
  const ch = (S.tracks[ti].midiChannel - 1) & 0x0f;
  const velByte = Math.max(1, Math.min(127, Math.round(vel * 127)));
  out.send([0x90 | ch, midi & 0x7f, velByte]);
  setTimeout(() => {
    if (out.state === 'connected') out.send([0x80 | ch, midi & 0x7f, 0]);
  }, Math.max(20, durationMs));
}

function midiOutDrum(ti, padIdx, vel, durationMs) {
  const drumMidi = 36 + padIdx;
  midiOutNote(ti, drumMidi, vel, durationMs);
}

function midiAllNotesOff(ti) {
  const t = S.tracks[ti];
  if (t.outputMode === 'sf2') {
    sf2AllNotesOff(ti);
    return;
  }
  const out = getTrackOutput(ti);
  if (!out) return;
  const ch = (t.midiChannel - 1) & 0x0f;
  out.send([0xb0 | ch, 123, 0]);
}

// ═══════════════════════════════════════════════════════════════
// RECORDING LIVE
// ═══════════════════════════════════════════════════════════════
function recQuantizeStep() {
  if (!S.playing && !_countdownActive) return null;
  const now = actx.currentTime;
  const sd = stepDur();
  const clip = activeClip();
  const totalSteps = clip.numBars * 16;

  // Pendant le décompte : toutes les notes vont sur step 0 sans offset
  if (_countdownActive) {
    return { bar: 0, step: 0, shift: 0, time: now };
  }

  // Temps du début du step en cours (dernier step schedulé)
  const lastStepTime = nextTime - sd;
  const frac = (now - lastStepTime) / sd; // position réelle, sans clamp

  const curAbs  = ((globalTick - 1) % totalSteps + totalSteps) % totalSteps;

  let targetAbs, shiftVal;

  if (frac >= -0.5 && frac <= 0.5) {
    // Note dans le "halo" du step courant
    if (curAbs === 0 && frac < 0) {
      // Step 0 : jamais d'offset négatif — tout quantisé sur step 0
      targetAbs = 0; shiftVal = 0;
    } else {
      targetAbs = curAbs;
      shiftVal = frac;
    }
  } else if (frac > 0.5) {
    // Note dans la 2ème moitié → step suivant
    const nextAbs = (curAbs + 1) % totalSteps;
    if (nextAbs === 0 && curAbs !== 0) {
      // Bord fin de pattern → quantiser sur step 0 sans shift
      targetAbs = 0; shiftVal = 0;
    } else {
      targetAbs = nextAbs;
      shiftVal = frac - 1; // ex: frac=0.8 → shift=-0.2
    }
  } else {
    // frac < -0.5 → step précédent
    if (curAbs === 0) {
      // Step 0 : exception, quantiser sans shift
      targetAbs = 0; shiftVal = 0;
    } else {
      const prevAbs = curAbs - 1;
      targetAbs = prevAbs;
      shiftVal = frac + 1; // ex: frac=-0.8 → shift=+0.2
    }
  }

  // Clamp de sécurité
  shiftVal = Math.max(-0.5, Math.min(0.5, shiftVal));

  return {
    bar:   Math.floor(targetAbs / 16),
    step:  targetAbs % 16,
    shift: shiftVal,
    time:  now
  };
}

function totalStepsNow() {
  return activeClip().numBars * 16;
}

// ── Mapping MIDI → Drum pads ────────────────────────────────
// C2 (MIDI 36) = Pad 1 (Kick) ... D#3 (MIDI 51) = Pad 16 (FX Nz)
var DRUM_MIDI_BASE = 36; // C2 — pad 0
var DRUM_MIDI_TOP  = 43; // G2 — pad 7 (8 pads)

function isDrumMidi(midi) {
  return midi >= DRUM_MIDI_BASE && midi <= DRUM_MIDI_TOP;
}

function triggerDrumPad(padIdx, vel, trackIdx) {
  const ti = trackIdx ?? S.currentTrack;
  const t  = S.tracks[ti];

  // Initialiser les drumPads à la première utilisation
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();

  if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      const drumMidi = 36 + padIdx;
      const velByte = Math.max(1, Math.min(127, Math.round(vel * 127)));
      out.send([0x90 | mch, drumMidi & 0x7f, velByte]);
      setTimeout(() => { if (out.state === 'connected') out.send([0x80 | mch, drumMidi & 0x7f, 0]); }, 100);
    }
  } else {
    drumPadPlay(ti, padIdx, vel);
  }

  // Flash visuel
  const isDrumVisible = (ti === S.currentTrack) &&
                        !projectModeActive &&
                        S.mode !== 'session' &&
                        t.mode === 'drum';
  if (isDrumVisible) flashDrumPadNew(padIdx);

  recDrumNoteOn(padIdx, vel, ti);
}

function recDrumNoteOn(padIdx, vel, trackIdx) {
  const ti = trackIdx ?? S.currentTrack;
  const t  = S.tracks[ti];
  if (!S.recording || (!S.playing && !_countdownActive) || t.mode !== 'drum') return;
  // Sauvegarder currentTrack pour snapshot correct
  const prevTrack = S.currentTrack;
  S.currentTrack  = ti;
  const pos = recQuantizeStep();
  if (!pos) { S.currentTrack = prevTrack; return; }
  saveUndo(ti);
  const clip = S.tracks[ti].clips[S.tracks[ti].activeClip];
  const st = clip.drumBars[padIdx][pos.bar][pos.step];
  if (st.on) { st.on = false; }
  else { st.on = true; st.vel = vel; }
  S.currentTrack = prevTrack;
  if (pos.bar === S.currentBar && ti === S.currentTrack) renderSteps();
}

function midiNoteOn(midi, velocity, ch) {
  if (velocity === 0) { midiNoteOff(midi, ch); return; }
  ensureAudio();
  const vel = velocity / 127;

  // ── Channel 10 → toujours router vers la première track drum ──
  if (ch === 10 && isDrumMidi(midi)) {
    const drumTrackIdx = S.tracks.findIndex(t => t.mode === 'drum');
    if (drumTrackIdx >= 0) {
      const padIdx = midi - DRUM_MIDI_BASE;
      triggerDrumPad(padIdx, vel, drumTrackIdx); // trackIdx explicite, pas de changement de currentTrack
      midiState.heldNotes.set(midi, true);
      return;
    }
  }

  const t = S.tracks[S.currentTrack];

  // Track drum : mapper les notes MIDI aux pads (C2-D#3)
  if (t.mode === 'drum') {
    if (isDrumMidi(midi)) {
      const padIdx = midi - DRUM_MIDI_BASE;
      triggerDrumPad(padIdx, vel);
    }
    if (S.pianoOpen) pianoKeyColor(midi, true);
    midiState.heldNotes.set(midi, true);
    return;
  }

  // Track mélodique : comportement normal
  recNoteOn(midi, vel);

  if (t.outputMode === 'midi') {
    // MIDI out — envoyer la note sur le port/canal de la track
    // Note off sera géré par midiNoteOff via heldNotes
    const out = getTrackOutput(S.currentTrack);
    if (out) {
      const mch = (t.midiChannel - 1) & 0x0f;
      const velByte = Math.max(1, Math.min(127, Math.round(vel * 127)));
      out.send([0x90 | mch, midi & 0x7f, velByte]);
    }
  } else if (t.outputMode === 'sf2') {
    if (arpIsActive(S.currentTrack)) {
      arpNoteOn(S.currentTrack, midi);
    } else {
      sf2NoteOn(S.currentTrack, midi, vel);
    }
  } else {
    // Moteur interne
    playTrackNote(S.currentTrack, midi, vel * 0.9);
  }
  midiState.heldNotes.set(midi, true);

  if (S.pianoOpen) pianoKeyColor(midi, true);

  if (anyStepHeld()) {
    saveUndo();
    const bar = currentStepBar();
    heldSteps.forEach(o => o.didAction = true);
    for (const idx2 of heldSteps.keys()) {
      const st = bar[idx2];
      if (!st.on) {
        st.on = true; st.note = midi; st.vel = vel; st.len = 1; st.extraNotes = [];
      } else if (st.note === midi) {
        st.on = false; st.extraNotes = [];
      } else {
        if (!st.extraNotes) st.extraNotes = [];
        const i2 = st.extraNotes.indexOf(midi);
        if (i2 >= 0) st.extraNotes.splice(i2, 1);
        else st.extraNotes.push(midi);
      }
    }
    clearStepNoteIllumination(); illuminateHeldStepNotes(); renderSteps();
  }

  // Illuminer pad matrice et piano (toutes tracks, MIDI out ou interne)
  for (let r = 0; r < 4; r++)
    for (let cc = 0; cc < 8; cc++)
      if (padNote(r, cc) === midi) {
        const col = trackColor(S.currentTrack);
        padEl(r,cc).setAttribute('fill', col+'ff');
        padEl(r,cc).setAttribute('stroke', '#fff');
        padEl(r,cc).setAttribute('stroke-width', '2');
      }
}

function recNoteOn(midi, vel) {
  const t = S.tracks[S.currentTrack];
  if (!S.recording || (!S.playing && !_countdownActive) || t.mode === 'drum') return;
  const pos = recQuantizeStep();
  if (!pos) return;
  const clip = activeClip();
  const st = clip.bars[pos.bar][pos.step];

  saveUndo();

  if (!st.on) {
    st.on = true; st.note = midi; st.vel = vel; st.len = 1;
    st.extraNotes = []; st.prob = 100;
    st.shift = pos.shift; // shift calculé depuis la position réelle de jeu
  } else if (st.note === midi) {
    st.on = false; st.extraNotes = [];
    recHeld.delete(midi); renderSteps(); return;
  } else {
    if (!st.extraNotes) st.extraNotes = [];
    const idx = st.extraNotes.indexOf(midi);
    if (idx >= 0) {
      st.extraNotes.splice(idx, 1);
      recHeld.delete(midi); renderSteps(); return;
    }
    st.extraNotes.push(midi);
  }

  recHeld.set(midi, { bar: pos.bar, step: pos.step, startTime: pos.time });
  if (pos.bar === S.currentBar) setStepAppearance(pos.step, true, false);
}

function recNoteOff(midi) {
  const t = S.tracks[S.currentTrack];
  if (!S.recording || (!S.playing && !_countdownActive) || t.mode === 'drum') return;
  const held = recHeld.get(midi);
  if (!held) return;
  recHeld.delete(midi);
  const now = actx.currentTime;
  const sd = stepDur();
  const clip = activeClip();
  const totalSteps = clip.numBars * 16;
  const absStart = held.bar * 16 + held.step;
  const maxLen = totalSteps - absStart;
  const lenSteps = Math.max(1, Math.min(maxLen, Math.round((now - held.startTime) / sd)));
  const st = clip.bars[held.bar][held.step];
  // Mettre à jour la longueur seulement pour la note principale
  if (st.on && st.note === midi) st.len = lenSteps;
  renderSteps();
}

function toggleRec() {
  S.recording = !S.recording;
  const dot = svg('recDot');
  const circle = dot?.parentElement?.querySelector('circle');
  if (S.recording) {
    dot?.setAttribute('fill', '#ff3344');
    circle?.setAttribute('stroke', '#ff3344');
    if (S.playing) { saveUndo(); metronomeStart(); }
    oledForce('⏺ REC', `${S.bpm} BPM`, trackInfo());
    recBlinkTimer = setInterval(() => {
      const on = dot?.getAttribute('fill') === '#ff3344';
      dot?.setAttribute('fill', on ? '#881122' : '#ff3344');
    }, 500);
  } else {
    // Annuler le décompte si en cours
    if (countdownTimer) { clearTimeout(countdownTimer); countdownTimer = null; }
    _countdownActive = false;
    metronomeStop();
    clearInterval(recBlinkTimer); recBlinkTimer = null;
    dot?.setAttribute('fill', '#441111');
    circle?.setAttribute('stroke', '#331111');
    recHeld.clear();
    oledForce('■ REC OFF', `${S.bpm} BPM`, trackInfo());
  }
}

// ═══════════════════════════════════════════════════════════════
// LOOP MODE
// ═══════════════════════════════════════════════════════════════

function toggleLoopMode() {
  if (projectModeActive) return;
  if (S.tracks[S.currentTrack].mode === 'master') return;
  if (S.mode === 'session') return;
  if (S.mode === 'loop') {
    S.mode = 'note';
    S._loopBarHeld = -1; S._loopBar2 = -1;
    setBtnLit('btnLoop', false, '#3ddc84');
    clearStepNoteIllumination();
    // Naviguer vers loopStart pour que le séquenceur reparte du début de la région
    const clip = activeClipObj();
    S.currentBar = clip.loopStart ?? 0;
    renderPads();
    renderSteps();
    oled('NOTE MODE', trackInfo(), `Clip ${S.tracks[S.currentTrack].activeClip + 1}`);
  } else {
    S.mode = 'loop';
    S._loopBarHeld = -1; S._loopBar2 = -1;
    setBtnLit('btnLoop', true, '#3ddc84');
    const clip = activeClipObj();
    if (clip.loopStart === undefined) clip.loopStart = 0;
    if (clip.loopEnd   === undefined) clip.loopEnd   = clip.numBars - 1;
    renderLoopMode();
    const lo  = clip.loopStart;
    const hi  = clip.loopEnd;
    const len = hi - lo + 1;
    oled('LOOP MODE', trackInfo(), `${len} bar${len>1?'s':''} (${lo+1}→${hi+1})`);
  }
}

function activeClipObj() {
  const t = S.tracks[S.currentTrack];
  return t.clips[t.activeClip];
}

function renderLoopMode() {
  if (S.mode !== 'loop') return;
  const clip       = activeClipObj();
  const loopStart  = clip.loopStart ?? 0;
  const loopEnd    = clip.loopEnd   ?? (clip.numBars - 1);
  const playingBar = S.playingBar;
  const col        = trackColor(S.currentTrack);
  const isCopyDst  = S._copyHeld && S._copySource && S._copySource.type === 'loopbar';

  for (let i = 0; i < 16; i++) {
    const el  = svg('step' + i);
    const led = svg('sled' + i);

    if (i >= 8) {
      // Au-delà des 8 slots max — complètement éteint
      el.setAttribute('fill', '#111113');
      el.setAttribute('stroke', '#1a1a1c');
      el.setAttribute('stroke-dasharray', 'none');
      el.setAttribute('stroke-width', '0.8');
      led.setAttribute('fill', '#1a1a1c');
      continue;
    }

    const inRegion  = (i >= loopStart && i <= loopEnd);
    const isPlaying = S.playing && (i === playingBar);
    const isHeld    = (i === S._loopBarHeld) ||
                      (S._loopBar2 !== -1 &&
                       i >= Math.min(S._loopBarHeld, S._loopBar2) &&
                       i <= Math.max(S._loopBarHeld, S._loopBar2));

    if (isPlaying && isHeld) {
      el.setAttribute('fill', col + 'ff');
      el.setAttribute('stroke', '#fff');
      el.setAttribute('stroke-width', '2.5');
      el.setAttribute('stroke-dasharray', 'none');
      led.setAttribute('fill', '#fff');
    } else if (isPlaying) {
      el.setAttribute('fill', col + 'cc');
      el.setAttribute('stroke', '#fff');
      el.setAttribute('stroke-width', '2');
      el.setAttribute('stroke-dasharray', 'none');
      led.setAttribute('fill', col + 'ff');
    } else if (isHeld) {
      el.setAttribute('fill', col + '88');
      el.setAttribute('stroke', col);
      el.setAttribute('stroke-width', '1.5');
      el.setAttribute('stroke-dasharray', 'none');
      led.setAttribute('fill', col + '88');
    } else if (inRegion) {
      // Dans la région active — plein lumineux
      el.setAttribute('fill', col + '33');
      el.setAttribute('stroke', col + '77');
      el.setAttribute('stroke-width', '0.8');
      el.setAttribute('stroke-dasharray', 'none');
      led.setAttribute('fill', col + '44');
    } else {
      // Hors région — pointillé uniforme pour tous les 8 slots,
      // qu'ils aient du contenu ou pas, vides ou non
      el.setAttribute('fill', isCopyDst ? col + '18' : '#111113');
      el.setAttribute('stroke', isCopyDst ? col + '55' : '#2a2a2a');
      el.setAttribute('stroke-dasharray', isCopyDst ? '3 3' : '2 4');
      el.setAttribute('stroke-width', '0.8');
      led.setAttribute('fill', '#1a1a1c');
    }
  }

  // Afficher les notes de la bar tenue sur les pads
  if (S._loopBarHeld >= 0) {
    illuminateLoopBarNotes(S._loopBarHeld);
  } else {
    clearStepNoteIllumination();
    renderPads();
  }
}

function illuminateLoopBarNotes(barIdx) {
  if (barIdx < 0 || barIdx >= 8) return;
  const clip = activeClipObj();
  const t = S.tracks[S.currentTrack];
  clearStepNoteIllumination();
  const col = trackColor(S.currentTrack);

  if (t.mode === 'drum') {
    // Mode drum : allumer les pads qui ont au moins une note dans cette bar (layout 2×4)
    for (let padIdx = 0; padIdx < 8; padIdx++) {
      const hasNote = clip.drumBars[padIdx]?.[barIdx]?.some(st => st.on) || false;
      if (!hasNote) continue;
      const svgRow = 2 + Math.floor(padIdx / 4);
      const svgCol = padIdx % 4;
      const el = padEl(svgRow, svgCol);
      el.setAttribute('fill', col + 'cc');
      el.setAttribute('stroke', '#fff');
      el.setAttribute('stroke-width', '2');
    }
    return;
  }

  // Mode mélodique : allumer les pads correspondant aux notes de la bar
  const notes = new Set();
  for (const st of clip.bars[barIdx]) {
    if (!st.on) continue;
    notes.add(st.note);
    (st.extraNotes || []).forEach(n => notes.add(n));
  }
  if (notes.size === 0) return;

  // Ajuster l'octave AVANT de dessiner les pads, sinon renderPads écrase les illuminations
  const midiList = [...notes];
  const avgMidi = midiList.reduce((a, b) => a + b, 0) / midiList.length;
  const targetOct = Math.max(MIN_OCTAVE, Math.min(MAX_OCTAVE, Math.round(avgMidi / 12) - 3));
  if (targetOct !== S.octave) {
    S.octave = targetOct;
    // renderPads en mode loop pour mettre à jour la couleur des pads
    // SANS rappeler illuminateLoopBarNotes (éviter la boucle)
    for (let r = 0; r < 4; r++)
      for (let c2 = 0; c2 < 8; c2++)
        renderPadAppearance(r, c2);
  }

  // Maintenant allumer les notes — après que renderPads a fini
  for (let r = 0; r < 4; r++) {
    for (let c2 = 0; c2 < 8; c2++) {
      const n = padNote(r, c2);
      if (notes.has(n)) {
        padEl(r, c2).setAttribute('fill', col + 'ff');
        padEl(r, c2).setAttribute('stroke', '#fff');
        padEl(r, c2).setAttribute('stroke-width', '2');
      }
    }
  }
  if (S.pianoOpen) {
    notes.forEach(midi => pianoKeyColor(midi, true));
  }
}

// ── Pression sur un step en Loop Mode ──
// Timestamp du dernier pressLoopStep pour détecter le double-clic
let _loopStepLastPress = { idx: -1, time: 0 };
const LOOP_DBLCLICK_MS = 300;

function pressLoopStep(idx) {
  if (idx >= 8) return;
  const clip    = activeClipObj();
  const isEmpty = idx >= clip.numBars;
  const now     = Date.now();

  // ── Double-clic sur le même step → isoler cette bar seule ──
  if (!isEmpty &&
      _loopStepLastPress.idx === idx &&
      now - _loopStepLastPress.time < LOOP_DBLCLICK_MS) {
    _loopStepLastPress = { idx: -1, time: 0 }; // reset pour éviter triple-clic
    saveUndo();
    clip.loopStart = idx;
    clip.loopEnd   = idx;
    S._loopBarHeld = -1; S._loopBar2 = -1;
    renderLoopMode();
    oled('SOLO BAR', `Bar ${idx+1}`, '1 bar en boucle');
    return;
  }

  // Mémoriser ce press pour détecter un éventuel double-clic suivant
  _loopStepLastPress = { idx, time: now };

  if (S._loopBarHeld === -1) {
    if (isEmpty) {
      // Bar vide → étendre numBars ET la région jusqu'ici
      saveUndo();
      clip.numBars   = idx + 1;
      clip.loopEnd   = idx;
      clip.loopStart = Math.min(clip.loopStart ?? 0, idx);
      S.currentBar   = idx;
      renderLoopMode();
      oled('ÉTENDRE', `→ ${clip.numBars} bar${clip.numBars>1?'s':''}`, 'tenu = éditer');
    } else {
      // Premier step avec contenu tenu
      S._loopBarHeld = idx;
      S.currentBar   = idx;
      renderLoopMode();
      const barNotes = countBarNotes(idx);
      const t = S.tracks[S.currentTrack];
      const hint = t.mode === 'drum' ?
        `${barNotes} hit${barNotes!==1?'s':''}` : `${barNotes} note${barNotes!==1?'s':''}`;
      oled('BAR ' + (idx+1), hint, 'tenu+autre = région');
    }
  } else {
    // 2ème step tenu → prévisualiser la nouvelle région
    S._loopBar2 = idx;
    renderLoopMode();
    const lo = Math.min(S._loopBarHeld, idx);
    const hi = Math.max(S._loopBarHeld, idx);
    oled('RÉGION', `Bar ${lo+1} → Bar ${hi+1}`, `${hi - lo + 1} bars`);
  }
}

function releaseLoopStep(idx) {
  if (S._loopBar2 !== -1) {
    const lo = Math.min(S._loopBarHeld, S._loopBar2);
    const hi = Math.max(S._loopBarHeld, S._loopBar2);
    saveUndo();
    const clip = activeClipObj();
    // Si hi dépasse numBars → étendre le contenu aussi
    if (hi >= clip.numBars) clip.numBars = Math.min(8, hi + 1);
    // Définir la région de loop — ne touche pas aux bars hors région
    clip.loopStart = lo;
    clip.loopEnd   = Math.min(hi, clip.numBars - 1);
    S._loopBarHeld = -1; S._loopBar2 = -1;
    renderLoopMode();
    const len = clip.loopEnd - clip.loopStart + 1;
    oled('LOOP REGION', `Bar ${lo+1} → ${clip.loopEnd+1}`, `${len} bar${len>1?'s':''}`);
  } else if (S._loopBarHeld === idx) {
    S._loopBarHeld = -1;
    loopBarTranspose._cumul = 0; // reset compteur transpose
    clearStepNoteIllumination();
    renderPads();
    renderLoopMode();
    const clip = activeClipObj();
    const lo = clip.loopStart ?? 0;
    const hi = clip.loopEnd   ?? (clip.numBars - 1);
    const len = hi - lo + 1;
    oled('LOOP MODE', trackInfo(), `${len} bar${len>1?'s':''} (${lo+1}→${hi+1})`);
  }
}

function countBarNotes(barIdx) {
  const clip = activeClipObj();
  const t = S.tracks[S.currentTrack];
  // drumBars n'a que 8 bars max (indices 0-7)
  if (barIdx < 0 || barIdx >= 8) return 0;
  if (t.mode === 'drum') {
    let n = 0;
    for (let p = 0; p < 16; p++) {
      if (!clip.drumBars[p] || !clip.drumBars[p][barIdx]) continue;
      clip.drumBars[p][barIdx].forEach(st => { if (st.on) n++; });
    }
    return n;
  }
  if (!clip.bars[barIdx]) return 0;
  return clip.bars[barIdx].filter(st => st.on).length;
}

// ── Édition globale d'une bar (molette/encVol/transpose) ──
function loopBarVelocityDelta(delta) {
  if (S._loopBarHeld < 0) return;
  saveUndo();
  const clip = activeClipObj();
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') {
    for (let p = 0; p < 16; p++)
      clip.drumBars[p][S._loopBarHeld].forEach(st => {
        if (st.on) st.vel = Math.max(0, Math.min(1, (st.vel||0.8) + delta/127));
      });
  } else {
    clip.bars[S._loopBarHeld].forEach(st => {
      if (st.on) st.vel = Math.max(0, Math.min(1, (st.vel||0.8) + delta/127));
    });
  }
  const avgVel = getBarAvgVel(S._loopBarHeld);
  oledForce('BAR ' + (S._loopBarHeld+1), `VEL: ${Math.round(avgVel*127)}`, '');
}

function loopBarTranspose(semitones) {
  if (S._loopBarHeld < 0) return;
  saveUndo();
  const clip = activeClipObj();
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return;

  let transposed = 0;
  let limitHit = false;
  clip.bars[S._loopBarHeld].forEach(st => {
    if (!st.on) return;
    const newNote = st.note + semitones;
    if (newNote < 0 || newNote > 127) { limitHit = true; return; }
    st.note = newNote;
    if (st.extraNotes) st.extraNotes = st.extraNotes.map(n => {
      const nn = n + semitones;
      if (nn < 0 || nn > 127) { limitHit = true; return n; }
      return nn;
    });
    transposed++;
  });

  if (transposed === 0 && !limitHit) {
    oledForce('BAR ' + (S._loopBarHeld+1), 'aucune note', '');
    return;
  }
  if (limitHit) {
    oledForce('TRANSPOSE', 'limite atteinte', `bar ${S._loopBarHeld+1}`);
    return;
  }

  // Compteur cumulatif (reset quand on relâche la bar)
  if (!loopBarTranspose._cumul) loopBarTranspose._cumul = 0;
  loopBarTranspose._cumul += semitones / 12; // en octaves
  const total = loopBarTranspose._cumul;
  const sign = total > 0 ? '+' : '';

  illuminateLoopBarNotes(S._loopBarHeld);
  renderLoopMode();
  oledForce('BAR ' + (S._loopBarHeld+1),
    `${sign}${total} oct`,
    `${transposed} note${transposed > 1 ? 's' : ''}`);
}

function getBarAvgVel(barIdx) {
  const clip = activeClipObj();
  const t = S.tracks[S.currentTrack];
  const vels = [];
  if (t.mode === 'drum') {
    for (let p = 0; p < 16; p++)
      clip.drumBars[p]?.[barIdx]?.forEach(st => { if (st.on) vels.push(st.vel||0.8); });
  } else {
    clip.bars[barIdx].forEach(st => { if (st.on) vels.push(st.vel||0.8); });
  }
  return vels.length ? vels.reduce((a,b)=>a+b,0)/vels.length : 0.8;
}

// ── Copy/Delete de bar en Loop Mode ──
function loopCopyBar(srcBar, dstBar) {
  const clip = activeClipObj();
  saveUndo();
  clip.bars[dstBar] = clip.bars[srcBar].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}));
  for (let p = 0; p < 16; p++)
    clip.drumBars[p][dstBar] = clip.drumBars[p][srcBar].map(st => ({...st}));
  // Étendre numBars si destination est au-delà du contenu
  if (dstBar >= clip.numBars) {
    clip.numBars = Math.min(8, dstBar + 1);
    clip.loopEnd = Math.min(clip.numBars - 1, dstBar);
    syncLoopRegion(clip);
  }
  const len = (clip.loopEnd ?? clip.numBars-1) - (clip.loopStart ?? 0) + 1;
  oledForce('COPY', `Bar ${srcBar+1} → ${dstBar+1}`, `${clip.numBars} bars dispo`);
  renderLoopMode();
}

function loopDeleteBar(barIdx) {
  if (barIdx < 0 || barIdx >= 8) return; // sécurité
  const clip = activeClipObj();
  if (barIdx >= clip.numBars) return; // hors contenu
  saveUndo();
  clip.bars[barIdx] = Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
  for (let p = 0; p < 16; p++) {
    if (clip.drumBars[p] && clip.drumBars[p][barIdx] !== undefined)
      clip.drumBars[p][barIdx] = Array.from({length:16}, () => ({on:false, vel:0.8}));
  }
  oledForce('DELETE', `Bar ${barIdx+1}`, 'vidée');
  renderLoopMode();
}

</script>
