// JUNOX PRESET BROWSER
// ═══════════════════════════════════════════════════════════════
// ── Junox user presets (localStorage) ─────────────────────────
const JUNOX_USER_PRESET_KEY = 'jseq_junox_user_presets';
const JUNOX_MAX_USER_PRESETS = 256;

function junoxUserPresetsLoad() {
  try { return JSON.parse(localStorage.getItem(JUNOX_USER_PRESET_KEY) || '[]'); }
  catch(e) { return []; }
}

function junoxUserPresetsSave(list) {
  localStorage.setItem(JUNOX_USER_PRESET_KEY, JSON.stringify(list));
}

// ── Browser state ──────────────────────────────────────────────
const junoxBr = {
  activeIdx: null,   // index dans la liste fusionnée triée
  mergedList: [],    // liste fusionnée [factory + user], triée alpha
};

function junoxBrBuildList() {
  const factory = (Junox.Juno60FactoryPatchesA || []).map(p => ({ ...p, _user: false }));
  const user    = junoxUserPresetsLoad().map(p => ({ ...p, _user: true }));
  const merged  = [...factory, ...user];
  merged.sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }));
  junoxBr.mergedList = merged;
  return merged;
}

function openJunoxBrowser(ti) {
  if (ti === undefined) ti = S.currentTrack;
  junoxBr.trackIdx = ti; // mémoriser la track pour les actions du browser
  updateBrowserTrackLabel('junox', ti);
  const list = junoxBrBuildList();
  const curName = junoxPatches[ti]?.name || null;
  junoxBr.activeIdx = list.findIndex(p => p.name === curName);
  if (junoxBr.activeIdx < 0) junoxBr.activeIdx = 0;

  document.getElementById('junoxBrCurrent').textContent = curName || '—';
  document.getElementById('junoxBrCount').textContent = list.length + ' presets';

  junoxBrRenderList();
  document.getElementById('junoxBrowser').classList.add('open');

  setTimeout(() => {
    const items = document.querySelectorAll('#junoxBrList .brItem');
    if (items[junoxBr.activeIdx]) items[junoxBr.activeIdx].scrollIntoView({ block: 'center' });
  }, 50);
}

function closeJunoxBrowser() {
  document.getElementById('junoxBrowser').classList.remove('open');
}

function junoxBrRenderList() {
  const list = junoxBr.mergedList;
  const container = document.getElementById('junoxBrList');
  container.innerHTML = '';

  list.forEach((preset, idx) => {
    const el = document.createElement('div');
    el.className = 'brItem' + (idx === junoxBr.activeIdx ? ' active-preset' : '');
    const badge = preset._user ? ' <span style="font-size:9px;color:#4cf;opacity:0.7">★</span>' : '';
    el.innerHTML = `<span class="brName">${preset.name}${badge}</span><span class="brSub">${idx + 1}</span>`;

    el.addEventListener('click', () => junoxBrSelect(idx));
    safeDblClick(el, () => junoxBrConfirm(idx));

    // Long-press 2s → supprimer (presets utilisateur uniquement)
    if (preset._user) {
      let _longTimer = null;
      const startLong = () => {
        _longTimer = setTimeout(() => { _longTimer = null; junoxBrOpenDeletePopup(idx); }, 1000);
      };
      const cancelLong = () => { if (_longTimer) { clearTimeout(_longTimer); _longTimer = null; } };
      el.addEventListener('mousedown', startLong);
      el.addEventListener('touchstart', startLong, { passive: true });
      el.addEventListener('mouseup', cancelLong);
      el.addEventListener('mouseleave', cancelLong);
      el.addEventListener('touchend', cancelLong);
      el.addEventListener('touchcancel', cancelLong);
    }

    container.appendChild(el);
  });
}

function junoxBrOpenDeletePopup(idx) {
  const preset = junoxBr.mergedList[idx];
  if (!preset || !preset._user) return;
  junoxBr._deleteIdx = idx;
  document.getElementById('junoxDeleteName').textContent = preset.name;
  document.getElementById('junoxDeletePopup').style.display = 'flex';
}

function junoxBrCloseDeletePopup() {
  document.getElementById('junoxDeletePopup').style.display = 'none';
  junoxBr._deleteIdx = null;
}

function junoxBrDoDelete() {
  const idx = junoxBr._deleteIdx;
  const preset = junoxBr.mergedList[idx];
  if (!preset || !preset._user) return;

  const users = junoxUserPresetsLoad();
  const newUsers = users.filter(p => p.name !== preset.name);
  junoxUserPresetsSave(newUsers);
  junoxBrCloseDeletePopup();

  // Rafraîchir la liste
  const list = junoxBrBuildList();
  document.getElementById('junoxBrCount').textContent = list.length + ' presets';
  junoxBr.activeIdx = Math.min(junoxBr.activeIdx ?? 0, list.length - 1);
  junoxBrRenderList();
  oledForce('JUNOX', preset.name, 'deleted');
  setTimeout(() => { S._oledLocked = false; }, 1500);
}

function junoxBrSelect(idx) {
  const list = junoxBr.mergedList;
  if (!list[idx]) return;
  junoxBr.activeIdx = idx;

  document.querySelectorAll('#junoxBrList .brItem').forEach((el, i) => {
    el.classList.toggle('active-preset', i === idx);
  });
  document.getElementById('junoxBrCurrent').textContent = list[idx].name;

  const ti = junoxBr.trackIdx ?? S.currentTrack;
  junoxPatches[ti] = JSON.parse(JSON.stringify(list[idx]));
  if (junoxNodes[ti]) {
    const previewPatch = JSON.parse(JSON.stringify(list[idx]));
    if (previewPatch.dco) previewPatch.dco.lfo = 0;
    junoxNodes[ti].setPatch(previewPatch);
    junoxNodes[ti].lfoTrigger();
    const rt = junoxRuntime[ti];
    junoxSetSat(ti, rt.satDrive <= -13 ? null : rt.satDrive, rt.satType);
    junoxSetDelay(ti, rt.dlyTime, rt.dlyFeedback, rt.dlyMix);
    junoxSetReverb(ti, rt.revLevel);
  }
  renderFXPanel();
  oledForce(list[idx].name, 'JUNOX T2', 'double-tap=OK');
}

function junoxBrConfirm(idx) {
  const list = junoxBr.mergedList;
  if (!list[idx]) return;

  junoxBr.activeIdx = idx;
  const ti = junoxBr.trackIdx ?? S.currentTrack;
  junoxPatches[ti] = JSON.parse(JSON.stringify(list[idx]));
  if (junoxNodes[ti]) {
    junoxNodes[ti].setPatch(junoxPatches[ti]);
    junoxNodes[ti].lfoTrigger();
    const rt = junoxRuntime[ti];
    junoxSetSat(ti, rt.satDrive <= -13 ? null : rt.satDrive, rt.satType);
    junoxSetDelay(ti, rt.dlyTime, rt.dlyFeedback, rt.dlyMix);
    junoxSetReverb(ti, rt.revLevel);
  }
  renderFXPanel();
  closeJunoxBrowser();
  oled('JUNOX T2', list[idx].name, 'loaded');
}

// ── Save preset ────────────────────────────────────────────────
function junoxBrOpenSavePopup() {
  const curName = junoxPatches[junoxBr.trackIdx ?? S.currentTrack]?.name || '';
  const input = document.getElementById('junoxSaveName');
  input.textContent = curName;
  const popup = document.getElementById('junoxSavePopup');
  popup.style.display = 'flex';
  setTimeout(() => {
    input.focus();
    // Sélectionner tout le contenu
    const range = document.createRange();
    range.selectNodeContents(input);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }, 80);
}

function junoxBrCloseSavePopup() {
  document.getElementById('junoxSavePopup').style.display = 'none';
}

function junoxBrDoSave() {
  const name = (document.getElementById('junoxSaveName').textContent || '').trim();
  if (!name) return; // au moins 1 caractère requis

  const users = junoxUserPresetsLoad();
  if (users.length >= JUNOX_MAX_USER_PRESETS) {
    alert('Maximum ' + JUNOX_MAX_USER_PRESETS + ' presets utilisateur atteint.');
    return;
  }

  const ti = junoxBr.trackIdx ?? S.currentTrack;
  const patch = JSON.parse(JSON.stringify(junoxPatches[ti] || {}));
  patch.name = name;

  // Écraser si même nom existe déjà
  const existIdx = users.findIndex(p => p.name === name);
  if (existIdx >= 0) users[existIdx] = patch;
  else users.push(patch);

  junoxUserPresetsSave(users);
  junoxBrCloseSavePopup();

  // Rafraîchir la liste et scroll vers le preset sauvegardé
  const list = junoxBrBuildList();
  document.getElementById('junoxBrCount').textContent = list.length + ' presets';
  const newIdx = list.findIndex(p => p.name === name);
  junoxBr.activeIdx = newIdx >= 0 ? newIdx : 0;
  junoxBrRenderList();
  document.getElementById('junoxBrCurrent').textContent = name;
  setTimeout(() => {
    const items = document.querySelectorAll('#junoxBrList .brItem');
    if (items[junoxBr.activeIdx]) items[junoxBr.activeIdx].scrollIntoView({ block: 'center' });
  }, 50);
  oledForce('JUNOX', name, 'preset saved');
  setTimeout(() => { S._oledLocked = false; }, 1500);
}

function initJunoxBrowserUI() {
  document.getElementById('junoxBrCloseBtn')?.addEventListener('click', closeJunoxBrowser);

  document.getElementById('junoxDeleteConfirmBtn')?.addEventListener('click', junoxBrDoDelete);
}

async function drumBrLoadFolder(folderHandle, folderName) {
  if (folderHandle === '__input__') return;
  drumBrStopPreview(); // stopper le sample en cours
  drumBr.activeFolder = folderName;
  drumBr.files = [];
  const AUDIO_EXTS = ['.wav','.mp3','.ogg','.flac','.aif','.aiff'];
  try {
    for await (const [name, handle] of folderHandle.entries()) {
      if (handle.kind === 'file') {
        const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
        if (AUDIO_EXTS.includes(ext)) drumBr.files.push({ name, handle });
      }
    }
    drumBr.files.sort((a, b) => a.name.localeCompare(b.name));
  } catch(e) { console.warn('[DrumBr] folder read error:', e); }
  document.querySelectorAll('#drumBrFolderList .brItem').forEach(el =>
    el.classList.toggle('active-folder', el.dataset.folder === folderName));
  drumBr.filteredFiles = [...drumBr.files];
  drumBrRenderFileList();
}

function drumBrRenderFileList() {
  const files = drumBr.filteredFiles;
  document.getElementById('drumBrFileCount').textContent = `(${files.length})`;
  const list = document.getElementById('drumBrFileList');
  if (!files.length) {
    list.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:#333">Aucun fichier audio</div>';
    return;
  }
  const curFile = S.tracks[S.currentTrack].drumPads?.[drumBr.padIdx]?.fileName || '';
  list.innerHTML = files.map((f, i) => {
    const dot  = f.name.lastIndexOf('.');
    const ext  = dot > 0 ? f.name.slice(dot) : '';
    const base = dot > 0 ? f.name.slice(0, dot) : f.name;
    const active = f.name === curFile ? ' active-file' : '';
    return `<div class="brItem${active}" data-idx="${i}">
      <span class="brName">${base}</span><span class="brSub">${ext}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.brItem').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.addEventListener('click',    () => drumBrPreviewFile(idx));
    safeDblClick(el, () => drumBrConfirmFile(idx));
  });
  const active = list.querySelector('.active-file');
  if (active) active.scrollIntoView({ block: 'center' });
}

async function drumBrPreviewFile(idx) {
  drumBr.activeSoundIdx = idx;
  drumBrStopPreview();
  const f = drumBr.filteredFiles[idx];
  if (!f) return;
  document.querySelectorAll('#drumBrFileList .brItem').forEach((el, i) =>
    el.classList.toggle('active-file', i === idx));
  try {
    const file = f.handle ? await f.handle.getFile() : f.file;
    const buf  = await file.arrayBuffer();
    const audioBuf = await actx.decodeAudioData(buf);
    drumBrStopPreview();
    const src = actx.createBufferSource();
    src.buffer = audioBuf; src.connect(getMaster()); src.start();
    drumBr.previewSrc = src;
    drumBr.previewTimer = setTimeout(() => drumBrStopPreview(), 2000);
  } catch(e) { console.warn('[DrumBr] preview error:', e); }
}

function drumBrStopPreview() {
  clearTimeout(drumBr.previewTimer);
  if (drumBr.previewSrc) { try { drumBr.previewSrc.stop(); } catch(e) {} drumBr.previewSrc = null; }
}

async function drumBrConfirmFile(idx) {
  const f = drumBr.filteredFiles[idx];
  if (!f) return;
  const t = S.tracks[S.currentTrack];
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  const pad = t.drumPads[drumBr.padIdx];
  const doReverse = document.getElementById('drumBrReverse').checked;
  try {
    const file = f.handle ? await f.handle.getFile() : f.file;
    const buf  = await file.arrayBuffer();
    let audioBuf = await actx.decodeAudioData(buf);
    if (doReverse) audioBuf = reverseAudioBuffer(audioBuf);
    pad.buffer   = audioBuf;
    pad.fileName = f.name;
    pad.mode     = 'sample';
    pad.reverse  = doReverse;
    pad.decay    = 1.0; // sample entier par défaut
    saveUndo();
    drumBrUpdateCurrent(pad);
    const revTag = doReverse ? ' ◀' : '';
    oledForce('DRUM', f.name.replace(/\.[^.]+$/,'').slice(0,10) + revTag, `pad ${drumBr.padIdx+1}`);
    renderDrumPadSelection(); updateEncArcs();
    setTimeout(() => { S._oledLocked = false; closeDrumBrowser(); }, 80);
  } catch(e) { console.warn('[DrumBr] confirm error:', e); }
}

// Inverser un AudioBuffer (pré-calcul, zéro coût au playback)
function reverseAudioBuffer(buffer) {
  const reversed = actx.createBuffer(
    buffer.numberOfChannels,
    buffer.length,
    buffer.sampleRate
  );
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);
    for (let i = 0; i < src.length; i++) {
      dst[i] = src[src.length - 1 - i];
    }
  }
  return reversed;
}

document.getElementById('drumBrFolderBtn').addEventListener('click', async () => {

  }
  // Fallback : input webkitdirectory (Android, Firefox)
  const input = document.createElement('input');
  input.type = 'file'; input.webkitdirectory = true;
  input.onchange = () => {
    const AUDIO_EXTS = ['.wav','.mp3','.ogg','.flac','.aif','.aiff'];
    const allFiles = [...input.files].filter(f => {
      const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();

    if (!allFiles.length) return;
    drumBr.dirHandle = '__input__'; drumBr.folders = []; drumBr.files = []; drumBr.activeFolder = null;
    const folderMap = {};
    allFiles.forEach(f => {
      const parts = (f.webkitRelativePath || f.name).split('/');
      const folderName = parts.length > 2 ? parts[1] : '__root__';
      if (!folderMap[folderName]) folderMap[folderName] = [];
      folderMap[folderName].push({ name: f.name, file: f, handle: null });
    });
    Object.entries(folderMap).forEach(([name, files]) => {
      if (name !== '__root__') drumBr.folders.push({ name, handle: null, files });
    });
    drumBr.folders.sort((a, b) => a.name.localeCompare(b.name));
    if (folderMap['__root__']) drumBr.rootFiles = folderMap['__root__'];
    drumBrRenderFolderList();

// Curseur visible sur les 16 steps, déplacé par croix directionnelle
var stepCursorPos = 0;
var stepCursorVisible = false;
var _gamepadBHeld = false;
var _gamepadBTimer = null;
var _gamepadBLong = false;
const STEP_X_POSITIONS = [11,64,117,170,223,276,329,382,435,488,541,594,647,700,753,806];

function updateStepCursor() {
  const cur = document.getElementById('stepCursor');
  if (!cur) return;
  cur.setAttribute('x', STEP_X_POSITIONS[stepCursorPos]);
  if (stepCursorVisible) {
    // Show the cursor animation
    cur.setAttribute('opacity', '0.8');
    cur.innerHTML = '<animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.2s" repeatCount="indefinite"/>';
  } else {
    cur.setAttribute('opacity', '0');
    cur.innerHTML = '';
  }
}

function showStepCursor() {
  stepCursorVisible = true;
  updateStepCursor();
}

function hideStepCursor() {
  stepCursorVisible = false;
  updateStepCursor();
}

function moveStepCursor(delta) {
  // Désactivé en session ou si cursorMode off → fallback navBar
  if (!cursorEnabled || S.mode === 'session') {
    navBar(delta);
    return;
  }
  stepCursorPos = ((stepCursorPos + delta) % 16 + 16) % 16; // cycle 0-15
  showStepCursor();
  // Feedback OLED bref
  const bar = currentStepBar();
  const st = bar[stepCursorPos];
  const t = S.tracks[S.currentTrack];
  let info = st.on ? 'ON' : '—';
  if (st.on && t.mode === 'master') info = st.note + ' BPM';
  else if (st.on && t.mode !== 'drum') info = noteName(st.note);
  oled(`STEP ${stepCursorPos + 1}`, info, `Bar ${S.currentBar + 1}`);

// Gamepad button B : appui court = toggle step, appui long = hold step
var _gamepadBHeldIdx = -1; // index du step pressé via gamepad

function gamepadBDown() {
  if (_gamepadBHeld) return;
  // Junox browser ouvert → bouton A = confirmer le preset sélectionné
  if (document.getElementById('junoxBrowser').classList.contains('open')) {
    junoxBrConfirm(junoxBr.activeIdx ?? 0);
    return;
  }
  // SF2 browser ouvert → bouton A = confirmer le son sélectionné
  if (document.getElementById('sf2Browser').classList.contains('open')) {
    const idx = sf2Browser.activeSoundIdx;
    if (idx !== null && idx >= 0) sf2SoundConfirm(idx);
    return;
  }
  // Drum browser ouvert → bouton A = confirmer le fichier sélectionné
  if (document.getElementById('drumBrowser').classList.contains('open')) {
    const idx = drumBr.activeSoundIdx;
    if (idx !== null && idx >= 0) drumBrConfirmFile(idx);
    return;
  }
  // Mode Project → naviguer les pages avec le curseur
  if (projectModeActive) {
    projectPage = stepCursorPos;
    renderProjectMode();
    oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'tap=preview · 2x=load');
    return;
  }
  if (!cursorEnabled || S.mode === 'session') return;
  _gamepadBHeld = true;
  _gamepadBLong = false;
  _gamepadBHeldIdx = stepCursorPos;
  showStepCursor();
  
  // Mode Loop → mémoriser la bar de départ pour le déplacement
  if (S.mode === 'loop') {
    _gamepadBLong = true;
    S._loopBarHeld = stepCursorPos; // bar saisie
    saveUndo(); // un seul undo pour toute l'opération de déplacement
    renderLoopMode();
    const barNotes = countBarNotes(stepCursorPos);
    oled('SAISIE', `Bar ${stepCursorPos+1}`, `${barNotes} note${barNotes!==1?'s':''} · dpad=déplacer`);
    return;
  }
  
  _gamepadBTimer = setTimeout(() => {
    _gamepadBLong = true;
    pressStep(_gamepadBHeldIdx);
  }, 300);
}

// Force le hold immédiatement si D-pad pressé pendant le timer
function gamepadForceHold() {
  if (_gamepadBHeld && !_gamepadBLong && _gamepadBTimer) {
    clearTimeout(_gamepadBTimer);
    _gamepadBTimer = null;
    _gamepadBLong = true;
    if (S.mode === 'loop') {
      S._loopBarHeld = _gamepadBHeldIdx;
      saveUndo();
      renderLoopMode();
    } else {
      pressStep(_gamepadBHeldIdx);
    }
  }
}

function gamepadBUp() {
  if (!_gamepadBHeld) return;
  _gamepadBHeld = false;
  clearTimeout(_gamepadBTimer);
  _gamepadBTimer = null;
  if (_gamepadBLong) {
    if (S.mode === 'loop') {
      // Fin du déplacement - confirmer la position finale
      S._loopBarHeld = -1;
      S._loopBar2 = -1;
      renderLoopMode();
      const clip = activeClipObj();
      oled('LOOP MODE', trackInfo(), `${clip.numBars} bar${clip.numBars>1?'s':''}`);
    } else {
      releaseStep(stepCursorPos);

    // Appui court → toggle step on/off (note mode seulement)
    if (S.mode !== 'loop') {
      ensureAudio();
      toggleStep(stepCursorPos);
      renderSteps();
      updateStepCursor();

}

let _typePopupTi = -1; // track concernée par la popup

  _typePopupTi = ti;

function joyTrackSelect(axisId, rawValue, groupStart) {
  const val = -rawValue;
  const rKey = 'joy_' + axisId;
  if (Math.abs(val) < JOY_THRESHOLD) {
    if (window._joyRepeat[rKey]) {
      clearTimeout(window._joyRepeat[rKey].timer);
      clearInterval(window._joyRepeat[rKey].interval);
      delete window._joyRepeat[rKey];

  if (window._joyRepeat[rKey]) return;
  function fireAction() {
    const delta = val > 0 ? -1 : 1;
    const groupEnd = groupStart + 3;
    let current = S.currentTrack;
    if (current < groupStart || current > groupEnd) {
      current = groupStart;
    }
    let next = current + delta;
    if (next < groupStart) next = groupEnd;
    if (next > groupEnd) next = groupStart;
    selectTrack(next);
  }
  fireAction();
  window._joyRepeat[rKey] = {
    timer: setTimeout(() => {
      window._joyRepeat[rKey].interval = setInterval(fireAction, JOY_REPEAT);
    }, JOY_DELAY),
    interval: null
  };
}

// ── Déplacer une bar par insertion (gamepad A+dpad en loop mode) ──
// La bar "saisie" se déplace dans le sens du dpad, les autres se décalent.
// Sens détermine l'insertion : vient de gauche → insère après, vient de droite → insère avant.
function moveBarInsert(fromIdx, direction) {
  // direction = +1 (droite) ou -1 (gauche)
  const clip = activeClipObj();
  const maxBar = clip.numBars - 1;
  const toIdx = fromIdx + direction;
  if (toIdx < 0 || toIdx > maxBar) return fromIdx; // bord atteint
  if (fromIdx < 0 || fromIdx > maxBar) return fromIdx; // sécurité

  // Extraire la bar source (mélo + drums)
  const srcBars = clip.bars[fromIdx]
    ? clip.bars[fromIdx].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
    : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));

  const srcDrum = clip.drumBars.map(padSeq =>
    padSeq[fromIdx]
      ? padSeq[fromIdx].map(st => ({...st}))
      : Array.from({length:16}, () => ({on:false, vel:0.787}))
  );

  // Décaler les bars entre from et to
  if (direction > 0) {
    for (let i = fromIdx; i < toIdx; i++) {
      clip.bars[i] = clip.bars[i+1]
        ? clip.bars[i+1].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
        : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
      clip.drumBars.forEach(padSeq => {
        padSeq[i] = padSeq[i+1]
          ? padSeq[i+1].map(st => ({...st}))
          : Array.from({length:16}, () => ({on:false, vel:0.787}));
      });
    }
  } else {
    for (let i = fromIdx; i > toIdx; i--) {
      clip.bars[i] = clip.bars[i-1]
        ? clip.bars[i-1].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
        : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
      clip.drumBars.forEach(padSeq => {
        padSeq[i] = padSeq[i-1]
          ? padSeq[i-1].map(st => ({...st}))
          : Array.from({length:16}, () => ({on:false, vel:0.787}));
      });
    }
  }

  // Placer la bar source à la nouvelle position
  clip.bars[toIdx] = srcBars;
  clip.drumBars.forEach((padSeq, pi) => { padSeq[toIdx] = srcDrum[pi]; });

  return toIdx;
}

function dpadAction(name) {
      // Priorité 0 : Junox browser ouvert → navigation presets
      const junoxOpen = document.getElementById('junoxBrowser').classList.contains('open');
      if (junoxOpen) {
        const delta = name === 'up' ? -1 : name === 'down' ? 1
                    : name === 'left' ? -8 : name === 'right' ? 8 : 0;
        if (delta !== 0) {
          const list = Junox.Juno60FactoryPatchesA;
          const curIdx = junoxBr.activeIdx ?? 0;
          const newIdx = Math.max(0, Math.min(list.length - 1, curIdx + delta));
          if (newIdx !== curIdx) {
            junoxBrSelect(newIdx);
            const items = document.querySelectorAll('#junoxBrList .brItem');
            if (items[newIdx]) items[newIdx].scrollIntoView({ block: 'nearest' });
          }
        }
        return;
      }

      // Priorité 0b : SF2 browser ouvert → navigation presets
      const sf2Open  = document.getElementById('sf2Browser').classList.contains('open');
      const drumOpen = document.getElementById('drumBrowser').classList.contains('open');

      if (sf2Open || drumOpen) {
        const delta = name === 'up' ? -1 : name === 'down' ? 1
                    : name === 'left' ? -8 : name === 'right' ? 8 : 0;
        if (delta !== 0) {
          if (sf2Open) {
            const list = sf2Browser.currentFiltered;
            if (!list || !list.length) return;
            const curIdx = sf2Browser.activeSoundIdx ?? 0;
            const newIdx = Math.max(0, Math.min(list.length - 1, curIdx + delta));
            if (newIdx !== curIdx) {
              sf2SoundClick(newIdx);
              const items = document.querySelectorAll('#sf2PresetList .brItem');
              if (items[newIdx]) items[newIdx].scrollIntoView({ block: 'nearest' });
            }
          } else {
            const files = drumBr.filteredFiles;
            if (!files || !files.length) return;
            const curIdx = drumBr.activeSoundIdx ?? 0;
            const newIdx = Math.max(0, Math.min(files.length - 1, curIdx + delta));
            if (newIdx !== curIdx) {
              drumBrPreviewFile(newIdx);
              const items = document.querySelectorAll('#drumBrFileList .brItem');
              if (items[newIdx]) items[newIdx].scrollIntoView({ block: 'nearest' });
            }
          }
        }
        return; // bloquer toute action sous-jacente
      }

      // Si bouton A maintenu mais timer pas encore expiré → forcer le hold
      if (_gamepadBHeld && !_gamepadBLong) gamepadForceHold();

      // Priorité 1 : Loop held (bouton B tenu) → combos pattern (toujours, quel que soit le mode)
      if (S._loopHeld) {
        if (name === 'up')    duplicatePattern();
        if (name === 'down')  halvePattern();
        if (name === 'left')  compressPattern();
        if (name === 'right') stretchPattern();
        return;
      }

      // Priorité 2 : Loop mode + A maintenu → déplacer la bar par insertion
      if (S.mode === 'loop' && _gamepadBHeld && _gamepadBLong) {
        if (name === 'left' || name === 'right') {
          const direction = name === 'right' ? 1 : -1;
          const newPos = moveBarInsert(S._loopBarHeld, direction);
          if (newPos !== S._loopBarHeld) {
            S._loopBarHeld = newPos;
            stepCursorPos = newPos;
            updateStepCursor();
            renderLoopMode();
            illuminateLoopBarNotes(newPos);
            oled('DÉPLACER', `Bar → pos ${newPos+1}`, 'relâche A pour valider');
          }
        }
        if (name === 'up')   loopBarTranspose(1);
        if (name === 'down') loopBarTranspose(-1);
        return;
      }
      // Priorité 2 : Step maintenu → transpose/nudge
      if (anyStepHeld()) {
        if (name === 'up')    transposeHeldSteps(1);
        if (name === 'down')  transposeHeldSteps(-1);
        if (name === 'left')  nudgeHeldSteps(-1);
        if (name === 'right') nudgeHeldSteps(1);
        return;
      }
      // Priorité 3 : Shift maintenu → add/remove bar
      if (S.shiftHeld) {
        if (name === 'left')  removeBar();
        if (name === 'right') addBar();
        if (name === 'up')    addBar();
        if (name === 'down')  removeBar();
        return;
      }
      // Priorité 4 : Normal → curseur/navigation
      if (name === 'left')  moveStepCursor(-1);
      if (name === 'right') moveStepCursor(1);
      if (name === 'up')    navBar(1);
      if (name === 'down')  navBar(-1);
    }

    _gpDirs.forEach(d => {
      const pressed = btns[d.idx]?.pressed || false;
      const was = _gpPrevButtons[gp.index + '_' + d.idx] || false;
      const rKey = 'dpad_' + d.name;
      if (pressed && !was) {
        // Première pression
        dpadAction(d.name);
        // Auto-repeat — désactivé en loop mode + A tenu (1 mouvement par press)
        if (!(S.mode === 'loop' && _gamepadBHeld)) {
          window._gpDpadRepeat[rKey] = { timer: setTimeout(() => {
            window._gpDpadRepeat[rKey].interval = setInterval(() => dpadAction(d.name), 100);
          }, 300) };
        }
      }
      if (!pressed && was) {
        // Relâchement → stopper auto-repeat
        const r = window._gpDpadRepeat[rKey];
        if (r) {
          clearTimeout(r.timer);
          clearInterval(r.interval);
          delete window._gpDpadRepeat[rKey];
        }
      }
      _gpPrevButtons[gp.index + '_' + d.idx] = pressed;
    });

    // Note: axes[1] (joystick gauche vertical) = tracks 1-4, axes[3] (joystick droit vertical) = tracks 5-8
    // Le D-pad utilise les boutons 12-15 (voir dirs.forEach ci-dessus)

    // ── Joysticks analogiques → Sélection de track ─────────────────
    // Joystick gauche vertical → tracks 1-4
    joyTrackSelect('LV', axes[1] || 0, 0);
    // Joystick droit vertical → tracks 5-8
    joyTrackSelect('RV', axes[3] || 0, 4);

    break; // Utiliser seulement le premier gamepad connecté
  }
  requestAnimationFrame(pollGamepad);
}

function prjClipHasNotes(clip, mode) {
  if (mode === 'drum') {
    return clip.drumBars && clip.drumBars.some(padBars =>
      padBars && padBars.some(bar => bar && bar.some(st => st && st.on)));
  }
  return clip.bars && clip.bars.some(bar => bar && bar.some(st => st && st.on));
}

// ── MIDI file generation ──────────────────────────────────────

function writeMidiVarLen(val) {
  // Variable length encoding pour MIDI
  const bytes = [];
  bytes.push(val & 0x7f);
  val >>= 7;
  while (val > 0) { bytes.push((val & 0x7f) | 0x80); val >>= 7; }
  return bytes.reverse();
}

function buildMidiFile(notes, bpmMap, ticksPerBeat) {
  // notes: [{tick, pitch, vel, offTick}]
  // bpmMap: [{tick, bpm}] — tempo changes
  ticksPerBeat = ticksPerBeat || 96;

  const tempoTrack = [];
  // Track header
  tempoTrack.push(0x4d, 0x54, 0x72, 0x6b); // "MTrk"

  const tempoEvents = [];
  for (const { tick, bpm } of bpmMap) {
    const uspb = Math.round(60000000 / bpm); // microseconds per beat
    tempoEvents.push(...writeMidiVarLen(tick));
    tempoEvents.push(0xff, 0x51, 0x03);
    tempoEvents.push((uspb >> 16) & 0xff, (uspb >> 8) & 0xff, uspb & 0xff);
  }
  tempoEvents.push(0x00, 0xff, 0x2f, 0x00); // EOT

  // Track length
  const tLen = tempoEvents.length;
  tempoTrack.push((tLen>>24)&0xff,(tLen>>16)&0xff,(tLen>>8)&0xff,tLen&0xff);
  tempoTrack.push(...tempoEvents);

  // Note track
  const noteTrack = [];
  noteTrack.push(0x4d, 0x54, 0x72, 0x6b);

  // Build events list sorted by tick
  const events = [];
  for (const n of notes) {
    events.push({ tick: n.tick, type: 'on',  pitch: n.pitch, vel: n.vel });
    events.push({ tick: n.offTick, type: 'off', pitch: n.pitch });
  }
  events.sort((a, b) => a.tick - b.tick || (a.type === 'off' ? -1 : 1));

  const noteEvents = [];
  let lastTick = 0;
  for (const ev of events) {
    const delta = ev.tick - lastTick;
    lastTick = ev.tick;
    noteEvents.push(...writeMidiVarLen(delta));
    if (ev.type === 'on') {
      noteEvents.push(0x90, ev.pitch & 0x7f, Math.round(ev.vel * 127) & 0x7f);
    } else {
      noteEvents.push(0x80, ev.pitch & 0x7f, 0x40);
    }
  }
  noteEvents.push(0x00, 0xff, 0x2f, 0x00); // EOT

  const nLen = noteEvents.length;
  noteTrack.push((nLen>>24)&0xff,(nLen>>16)&0xff,(nLen>>8)&0xff,nLen&0xff);
  noteTrack.push(...noteEvents);

  // Header chunk: format 1, 2 tracks, ticksPerBeat
  const header = [
    0x4d,0x54,0x68,0x64, // "MThd"
    0x00,0x00,0x00,0x06, // length 6
    0x00,0x01,           // format 1
    0x00,0x02,           // 2 tracks
    (ticksPerBeat>>8)&0xff, ticksPerBeat&0xff
  ];

  return new Uint8Array([...header, ...tempoTrack, ...noteTrack]);
}

function projectToMidiFiles(data) {
  // Retourne { 'Track1_Piano/clip_1.mid': Uint8Array, ... }
  const TICKS = 96; // ticks per beat
  const files = {};
  const tracks = data.tracks || [];

  // Construire la bpmMap depuis la piste master
  const masterTrack = tracks.find(t => t.mode === 'master');
  const baseBpm = data.bpm || 120;

  // Pour chaque piste
  tracks.forEach((track, ti) => {
    if (track.mode === 'master') return;

    const modeName = track.mode === 'drum' ? 'Drums' : `Track${ti+1}`;
    const sf2name = track.sfName ? `_${track.sfName.replace('.sf2','').replace(/[^a-zA-Z0-9]/g,'_')}` : '';
    const folderName = `${modeName}${sf2name}`;

    const clips = track.clips || [];
    clips.forEach((clip, ci) => {
      if (!clip || !prjClipHasNotes(clip, track.mode)) return;

      const notes = [];
      const bpmMap = [{ tick: 0, bpm: baseBpm }];

      if (track.mode === 'drum') {
        // Drums → canal 10 (MIDI channel 9), notes GM drums
        const GM_DRUMS = [36,38,42,46,49,51,39,45]; // kick,snare,HH,openHH,crash,ride,clap,tom
        const drumBars = clip.drumBars || [];
        drumBars.forEach((padBars, padIdx) => {
          const pitch = GM_DRUMS[padIdx] || (36 + padIdx);
          if (!padBars) return;
          padBars.forEach((bar, barIdx) => {
            if (!bar) return;
            bar.forEach((st, stepIdx) => {
              if (!st || !st.on) return;
              const tick = (barIdx * 16 + stepIdx) * TICKS / 4;
              const offTick = tick + TICKS / 4 - 1;
              notes.push({ tick, pitch, vel: st.vel || 0.8, offTick });
            });
          });
        });
      } else {
        // Mélodique
        const bars = clip.bars || [];
        bars.forEach((bar, barIdx) => {
          if (!bar) return;
          bar.forEach((st, stepIdx) => {
            if (!st || !st.on) return;
            const tick = (barIdx * 16 + stepIdx) * TICKS / 4;
            const len = Math.max(1, st.len || 1);
            const offTick = tick + len * TICKS / 4 - 1;
            const allNotes = [st.note, ...(st.extraNotes || [])].filter(n => n >= 0 && n <= 127);
            allNotes.forEach(pitch => {
              notes.push({ tick, pitch, vel: st.vel || 0.8, offTick });
            });
          });
        });

        // Intégrer les changements de tempo depuis la piste master
        if (masterTrack && masterTrack.clips?.[ci]) {
          const masterClip = masterTrack.clips[ci];
          const masterBars = masterClip.bars || [];
          bpmMap.length = 0;
          let lastBpm = baseBpm;
          masterBars.forEach((bar, barIdx) => {
            if (!bar) return;
            bar.forEach((st, stepIdx) => {
              if (!st || !st.on) return;
              const tick = (barIdx * 16 + stepIdx) * TICKS / 4;
              const bpm = st.note || baseBpm;
              if (bpm !== lastBpm || (barIdx === 0 && stepIdx === 0)) {
                bpmMap.push({ tick, bpm });
                lastBpm = bpm;
              }
            });
          });
          if (!bpmMap.length) bpmMap.push({ tick: 0, bpm: baseBpm });
        }
      }

      if (notes.length === 0) return;
      const midi = buildMidiFile(notes, bpmMap, TICKS);
      files[`${folderName}/clip_${ci + 1}.mid`] = midi;
    });

    // Fichier infos.txt pour la piste
    let infos = `Piste : ${folderName}\n`;
    infos += `Mode : ${track.mode}\n`;
    if (track.sfName)   infos += `SF2 : ${track.sfName}\n`;
    if (track.sendReverb > 0) infos += `Reverb send : ${Math.round(track.sendReverb * 100)}%\n`;
    if (track.sendDelay > 0)  infos += `Delay send : ${Math.round(track.sendDelay * 100)}%\n`;
    files[`${folderName}/infos.txt`] = infos;
  });

  return files;
}

// ── Export ZIP ────────────────────────────────────────────────

async function exportProjectZip(slot, data) {
  const btn = document.getElementById('prjExportBtn');
  if (btn) btn.textContent = '⏳ Génération…';

  try {
    const zip = new JSZip();
    const name = (data._meta?.name || 'projet').replace(/[^a-zA-Z0-9_\-]/g, '_');

    // JSON complet pour re-import
    zip.file('_projet.json', JSON.stringify(data, null, 2));

    // Fichiers MIDI par piste/clip
    const midiFiles = projectToMidiFiles(data);
    for (const [path, content] of Object.entries(midiFiles)) {
      zip.file(path, content);
    }

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${name}_jseq.zip`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    closeProjectBrowser();
    oledForce('EXPORT', name, '✓ ZIP downloaded');
    setTimeout(() => { S._oledLocked = false; }, 1000);

  } catch(e) {
    console.error('Export ZIP error:', e);
    oledForce('EXPORT', 'Erreur', e.message?.slice(0,16) || '');
  }
}

// ── Import ZIP ────────────────────────────────────────────────

document.getElementById('prjBrFileInput').addEventListener('change', async function() {
  const file = this.files?.[0];
  if (!file) return;
  this.value = ''; // reset pour pouvoir re-sélectionner le même fichier

  try {
    const zip = await JSZip.loadAsync(file);
    const jsonFile = zip.file('_projet.json');
    if (!jsonFile) {
      oledForce('IMPORT', 'Erreur', 'pas de _projet.json');
      return;
    }
    const jsonText = await jsonFile.async('string');
    const data = JSON.parse(jsonText);

    // Trouver le slot cible (le slot vide sélectionné)
    const slot = projectSelected?.slot;
    if (slot === undefined || slot === null) {
      oledForce('IMPORT', 'Erreur', 'aucun slot sélectionné');
      return;
    }

    // Sauvegarder dans le slot
    const name = data._meta?.name || 'Importé';
    localStorage.setItem(PROJECT_KEY(slot), JSON.stringify(data));

    closeProjectBrowser();
    renderProjectMode();
    oledForce('IMPORT', name, `→ slot ${(slot % 32) + 1}`);
    setTimeout(() => { S._oledLocked = false; }, 1000);

  } catch(e) {
    console.error('Import ZIP error:', e);
    oledForce('IMPORT', 'Erreur', e.message?.slice(0,16) || '');
  }
});

// ── Double-tap encodeurs → reset ─────────────────────────────
// Ce script est en fin de body — DOM garanti chargé
(function() {
  const _tap = {};
  const DRUM_KEYS = ['tune','decay','tone','drive','tune','decay'];

  for (let i = 0; i < 6; i++) {
    const el = document.getElementById('enc' + i);
    if (!el) continue;
    function handleDoubleTap(e) {
      const now = Date.now();
      const id = 'enc' + i;
      if (_tap[id] && now - _tap[id] < 350) {
        _tap[id] = 0;
        const t = S.tracks[S.currentTrack];
        const res = getHeldSt();
        if (res && res.st.on) {
          // Mode step tenu — reset Length/Vel/Offset/Prob
          const def = ENC_DEFS[i];
          def.set(res.st, def.def);
          saveUndo(); updateEncArcs();
          oledForce(def.label, def.fmt(def.def), 'RESET');
        } else if (t.mode === 'drum') {
          // Mode drum — reset Tune/Decay/Tone/Drive
          if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
          const pad = t.drumPads[S.selectedDrumPad];
          const key = DRUM_ENC_KEYS[i];
          const defs = DRUM_SYNTH_DEFAULTS[pad.synthType] || DRUM_SYNTH_DEFAULTS['Kick'];
          if (key in defs) { pad[key] = defs[key]; updateEncArcs(); oledForce('RESET', key.toUpperCase(), String(defs[key])); }
        } else if (t.mode === 'master') {
          // Mode master — pas d'encodeurs actifs, ignorer
        }
        e.preventDefault();
      } else {
        _tap[id] = now;
      }
    }
    // Double-tap : écouter touchstart pour la détection (évite le double-déclenchement touch+mouse)
    // Le polyfill global gère le dispatch mousedown pour le drag
    el.addEventListener('touchstart', function(e) {
      handleDoubleTap(e);
      // Ne pas stopPropagation — le polyfill global doit recevoir cet event pour le drag
    }, { passive: true });
    el.addEventListener('mousedown', function(e) {
      // Sur touch, touchstart a déjà géré la détection — ignorer le mousedown synthétique
      if (window._lastTouchTime && Date.now() - window._lastTouchTime < 500) return;
      handleDoubleTap(e);
    });
  }

  // Sends enc4/enc5
  const SEND_KEYS = ['sendDelay', 'sendReverb'];
  const SEND_LABELS = ['DELAY', 'REVERB'];
  for (let si = 0; si < 2; si++) {
    const el = document.getElementById('enc' + (si + 4));
    if (!el) continue;
    function handleSendDoubleTap(e) {
      const now = Date.now();
      const id = 'send' + si;
      if (_tap[id] && now - _tap[id] < 350) {
        _tap[id] = 0;
        const t = S.tracks[S.currentTrack];
        if (t.mode === 'master') return;
        const key = SEND_KEYS[si];
        if (t.mode === 'drum') {
          if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
          t.drumPads[S.selectedDrumPad][key] = 0;
        } else {
          t[key] = 0;
          const nodes = trackSendNodes[S.currentTrack];
          if (nodes) {
            if (key === 'sendDelay')  nodes.dSend.gain.value = 0;
            if (key === 'sendReverb') nodes.rSend.gain.value = 0;
          }
        }
        updateSendArcs();
        oledForce(SEND_LABELS[si] + ' SEND', '0%', 'RESET');
        e.preventDefault();
      } else {
        _tap[id] = now;
      }
    }
    el.addEventListener('touchstart', function(e) {
      handleSendDoubleTap(e);
    }, { passive: true });
    el.addEventListener('mousedown', function(e) {
      if (window._lastTouchTime && Date.now() - window._lastTouchTime < 500) return;
      handleSendDoubleTap(e);
    });
  }

  // encVol — double-tap → reset volume master à 0.65
  const elVol = document.getElementById('encVol');
  if (elVol) {
    function handleVolDoubleTap(e) {
      const now = Date.now();
      if (_tap['encVol'] && now - _tap['encVol'] < 350) {
        _tap['encVol'] = 0;
        // Contexte : track tenue → reset volume de cette track
        if (S._heldTrack >= 0) {
          const t = S.tracks[S._heldTrack];
          t.volume = 0.8;
          oledForce(`VOL T${S._heldTrack+1}`, '80%', 'RESET');
        // Contexte : drum pad tenu → reset volume du pad
        } else if (S._heldDrumPad >= 0 && S.tracks[S.currentTrack]?.mode === 'drum') {
          const t = S.tracks[S.currentTrack];
          if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
          t.drumPads[S._heldDrumPad].volume = 1.0;
          oledForce(`PAD ${S._heldDrumPad+1} VOL`, '100%', 'RESET');
        // Défaut : reset volume master
        } else {
          setMasterVolume(0.80);
          oledForce('VOL MASTER', '80%', 'RESET');
        }
        e.preventDefault();
      } else {
        _tap['encVol'] = now;
      }
    }
    elVol.addEventListener('touchstart', function(e) {
      handleVolDoubleTap(e);
    }, { passive: true });
    elVol.addEventListener('mousedown', function(e) {
      if (window._lastTouchTime && Date.now() - window._lastTouchTime < 500) return;
      handleVolDoubleTap(e);
    });
  }
})();
