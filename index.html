function copyStep(srcIdx, dstIdx) {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') return;
  const bar = currentStepBar();
  const src = bar[srcIdx];
  const dst = bar[dstIdx];
  dst.on = src.on; dst.note = src.note; dst.vel = src.vel;
  dst.len = src.len; dst.prob = src.prob; dst.shift = src.shift;
  dst.extraNotes = src.extraNotes ? [...src.extraNotes] : [];
  oledForce('COPY', `${srcIdx+1} → ${dstIdx+1}`, 'Copy...');
}

// ── Copier le SON d'un pad drum vers un autre (pas le pattern) ──
function copyDrumPad(srcPad, dstPad) {
  saveUndo();
  const t = S.tracks[S.currentTrack];
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  // Copier tous les paramètres du pad source vers la destination
  const src = t.drumPads[srcPad];
  const dst = t.drumPads[dstPad];
  dst.mode      = src.mode;
  dst.synthType = src.synthType;
  dst.tune      = src.tune;  dst.decay = src.decay;
  dst.tone      = src.tone;  dst.drive = src.drive;
  dst.buffer    = src.buffer; dst.fileName = src.fileName;
  dst.startPoint = src.startPoint; dst.reverse = src.reverse;
  renderDrumPadSelection();
  updateEncArcs();
  const soundName = getDrumPadName(S.currentTrack, dstPad);
  oledForce('COPY', soundName, `pad ${srcPad+1} → ${dstPad+1}`);
}

// ── Effacer un pad drum (vider son séquenceur) ──
function deleteDrumPad(padIdx) {
  saveUndo();
  const clip = activeClip();
  for (let b = 0; b < 8; b++) {
    clip.drumBars[padIdx][b] = Array.from({length:16}, () => ({on:false, vel:0.787}));
  }
  renderSteps();
  oledForce('DELETE', `Pad ${padIdx+1}`, 'vidé');
}
function sessionDeleteClip(trackIdx, clipIdx) {
  saveUndo(trackIdx);
  S.tracks[trackIdx].clips[clipIdx] = makeClip();
  if (S.tracks[trackIdx].playingClip === clipIdx) {
    S.tracks[trackIdx].playingClip = 0;
  }
  if (S.tracks[trackIdx].queuedClip === clipIdx) {
    S.tracks[trackIdx].queuedClip = null;
  }
  renderSessionMode();
  oled(`DELETE`, `Clip ${clipIdx+1}`, `Track ${trackIdx+1}`);
}
// ── Wheel drag → BPM uniquement ──
let wheelDrag = null;
let _wheelLastTap = 0;

svg('wheel').addEventListener('mouseup', e => {
  if (anyStepHeld()) { e.stopPropagation(); wheelDrag = null; }
});
svg('wheel').addEventListener('mousedown', e => {
  const now = Date.now();
  
  // Double-tap → reset contextuel
  if (now - _wheelLastTap < 350) {
    _wheelLastTap = 0;
    svg('wheel').setAttribute('stroke', '#aaa');
    svg('wheel').setAttribute('stroke-width', '2.5');
    // Si step master tenu → reset BPM de ce step
    const isMasterDbl = S.tracks[S.currentTrack].mode === 'master';
    if (isMasterDbl && anyStepHeld()) {
      const res = getHeldSt();
      if (res && res.st.on) {
        res.st.note = S.bpm; // reset à la valeur BPM globale courante
        if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
        renderSteps();
        oledForce(`STEP ${res.idx+1}`, `${S.bpm} BPM`, 'RESET');
      }
    } else {
      setBpm(120);
      oledForce('BPM', '120', 'RESET');
    }
    setTimeout(() => {
      svg('wheel').setAttribute('stroke', '#3a3a3a');
      svg('wheel').setAttribute('stroke-width', '1.5');
      S._oledLocked = false;
    }, 800);
    e.preventDefault();
    return;
  }
  _wheelLastTap = now;
  
  // Ne pas réinitialiser si un drag est déjà en cours (touch parasite)
  if (wheelDrag) return;
  
  svg('wheel').setAttribute('stroke', '#aaa');
  svg('wheel').setAttribute('stroke-width', '2.5');
  wheelDrag = { type: 'bpm', y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX, bpm: S.bpm, moved: false };
  S._oledLocked = true;
  oledForce('BPM', `${S.bpm}`, S.playing ? '▶ playing' : '■ stopped');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!wheelDrag) return;
  if (wheelDrag.type === 'bpm') {
    // Filtre de proximité : ignorer les mousemove trop loin de la dernière position connue
    // (vient d'un autre doigt sur l'écran)
    const distFromLast = Math.abs(e.clientY - wheelDrag.lastY) + Math.abs(e.clientX - wheelDrag.lastX);
    if (distFromLast > 60) return; // saut trop grand = doigt parasite
    const dy = wheelDrag.lastY - e.clientY;
    const dx = e.clientX - wheelDrag.lastX;
    const delta = dy + dx;
    wheelDrag.lastY = e.clientY;
    wheelDrag.lastX = e.clientX;
    if (Math.abs(delta) > 0.5) wheelDrag.moved = true;
    
    // Si un step master est maintenu → modifier le BPM de ce step
    const isMaster = S.tracks[S.currentTrack].mode === 'master';
    if (isMaster && anyStepHeld()) {
      const res = getHeldSt();
      if (res && res.st.on) {
        const newBpm = Math.max(20, Math.min(300, (res.st.note || S.bpm) + Math.round(delta / 2)));
        res.st.note = newBpm;
        if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
        renderSteps();
        oledForce(`STEP ${res.idx+1}`, `${newBpm} BPM`, `Bar ${S.currentBar+1}`);
      }
    } else {
      setBpm(S.bpm + Math.round(delta / 2));
      oledForce('BPM', `${S.bpm}`, S.playing ? '▶' : '■');
      flashKnob('wheel');
    }
  }
});
document.addEventListener('mouseup', () => {
  // Libérer le touch de drag
  window._dragTouchId = null;

  // Si un step est encore physiquement tenu, ignorer ce mouseup complètement
  // (vient d'un autre doigt — encodeur, zone vide, etc.)
  if (anyStepHeld()) {
    wheelDrag = null;
    volDrag = null;
    return;
  }

  let keepOledLocked = false;

  // Reset encVol ring
  svg('encVol').setAttribute('stroke', '#3a3a3a');
  svg('encVol').setAttribute('stroke-width', '1.5');
  // Reset wheel ring
  svg('wheel').setAttribute('stroke', '#3a3a3a');
  svg('wheel').setAttribute('stroke-width', '1.5');

  // Molette = BPM uniquement, pas d'action spéciale au clic

  // Clic sans drag sur encVol + step tenu → afficher vélocité
  if (volDrag && volDrag.type === 'vel' && !volDrag.moved) {
    const firstIdx = volDrag.stepIdx;
    const bar = currentStepBar();
    const vel = bar[firstIdx]?.vel || 0.8;
    oledForce(`STEP ${firstIdx+1}`, `VÉL: ${Math.round(vel*127)}`, `(${Math.round(vel*100)}%)`);
    keepOledLocked = true;
    setTimeout(() => { S._oledLocked = false; }, 1000);
  }

  wheelDrag = null;
  volDrag = null;
  S._stepsLocked = false;
  S._heldDrumPad = -1; // relâcher le pad drum tenu

  // Si des steps sont encore tenus (mouseup hors zone) → les relâcher proprement
  if (heldSteps.size > 0) {
    heldSteps.forEach((obj, idx) => { releaseStep(idx); });
    // updateEncArcs est appelé dans releaseStep via renderSteps
  }

  // En page avancée Junox, garder le lock — l'OLED reste sur la section
  const isJunoxAdv = S.tracks[S.currentTrack]?.outputMode === 'junox' && junoxPage !== 'main';
  if (!keepOledLocked && !isJunoxAdv) {
    S._oledLocked = false;
    // Refresh OLED to default display after drag release (delayed to ensure all handlers done)
    setTimeout(() => {
      if (S._oledLocked) return; // something else took over
      const t = S.tracks[S.currentTrack];
      if (t.mode === 'drum') {
        oledForce('DRUM', getDrumPadName(S.currentTrack, S.selectedDrumPad), `pad ${S.selectedDrumPad+1}`);
      } else if (t.mode === 'master') {
        oledForce('MASTER', 'Master Track', `BPM ${S.bpm}`);
      } else {
        oledForce('SOUND', getTrackSoundName(S.currentTrack), trackInfo());
      }
    }, 100);
  }
});
// Info clic géré dans le mouseup
// Volume master global (0-1)

function setMasterVolume(v) {
  S.masterVolume = Math.max(0, Math.min(1, v));
  if (masterGain) masterGain.gain.value = S.masterVolume;
  // Rotation visuelle de l'encodeur VOL
  oled('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶' : '■');
}

let volDrag = null;

// encVol : handlers touch directs (contournent le polyfill)
svg('encVol').addEventListener('touchstart', function(e) {
  e.preventDefault();
  e.stopPropagation();
  const t = e.changedTouches[0];
  volDrag = null;
  S._oledLocked = true;
  svg('encVol').setAttribute('stroke', '#aaa');
  svg('encVol').setAttribute('stroke-width', '2.5');
  // Afficher l'état du volume au touchstart
  if (!anyStepHeld() && S._heldTrack < 0 && S._heldDrumPad < 0) {
    oledForce('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶ playing' : '■ stopped');
  }
  if (anyStepHeld()) {
    const firstIdx = heldStepList()[0];
    const st = currentStepBar()[firstIdx];
    volDrag = { type: 'vel', touchId: t.identifier, lastY: t.clientY, lastX: t.clientX, startVel: st.vel || 0.8, stepIdx: firstIdx, moved: false };
    heldSteps.get(firstIdx).didAction = true;
  } else if (S._heldDrumPad >= 0 && S.tracks[S.currentTrack]?.mode === 'drum') {
    volDrag = { type: 'drumpad', touchId: t.identifier, lastY: t.clientY, lastX: t.clientX, padIdx: S._heldDrumPad, moved: false };
  } else if (S._heldTrack >= 0) {
    volDrag = { type: 'track', touchId: t.identifier, lastY: t.clientY, lastX: t.clientX, ti: S._heldTrack, moved: false };
  } else {
    volDrag = { type: 'master', touchId: t.identifier, lastY: t.clientY, lastX: t.clientX, moved: false };
  }
}, { passive: false });

svg('encVol').addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!volDrag) return;
  // Chercher uniquement le touch qui a initié le drag (par son identifier)
  let t = null;
  for (const touch of e.changedTouches) {
    if (touch.identifier === volDrag.touchId) { t = touch; break; }
  }
  if (!t) return; // ce touchmove vient d'un autre doigt, ignorer
  const dy = volDrag.lastY - t.clientY;
  const dx = t.clientX - volDrag.lastX;
  const delta = dy + dx;
  volDrag.lastY = t.clientY;
  volDrag.lastX = t.clientX;
  if (Math.abs(delta) < 0.5) return;
  volDrag.moved = true;
  if (volDrag.type === 'drumpad') {
    const ti = S.currentTrack;
    const t2 = S.tracks[ti];
    if (t2.drumPads?.[volDrag.padIdx] !== undefined) {
      const newVol = Math.max(0, Math.min(1, (t2.drumPads[volDrag.padIdx].volume ?? 1) + delta / 150));
      t2.drumPads[volDrag.padIdx].volume = newVol;
      volDrag.moved = true;
      oledForce(`PAD ${volDrag.padIdx+1} VOL`, `${Math.round(newVol * 100)}%`, getDrumPadName(ti, volDrag.padIdx));
    }
  } else if (volDrag.type === 'master') {
    setMasterVolume(S.masterVolume + delta / 150);
    oledForce('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶' : '■');
  } else if (volDrag.type === 'track') {
    const newVol = Math.max(0, Math.min(1, S.tracks[volDrag.ti].volume + delta / 150));
    S.tracks[volDrag.ti].volume = newVol;
    oledForce(`VOL T${volDrag.ti+1}`, `${Math.round(newVol * 100)}%`, trackColor(volDrag.ti));
  } else if (volDrag.type === 'vel') {
    const st = currentStepBar()[volDrag.stepIdx];
    const newVel = Math.max(0, Math.min(1, st.vel + delta / 80));
    st.vel = newVel;
    svg(`sled${volDrag.stepIdx}`).setAttribute('fill', trackColor(S.currentTrack));
    svg(`sled${volDrag.stepIdx}`).setAttribute('opacity', newVel.toFixed(2));
    oledForce(`STEP ${volDrag.stepIdx+1}`, `VÉL: ${Math.round(newVel*127)}`, `(${Math.round(newVel*100)}%)`);
  }
}, { passive: false });

svg('encVol').addEventListener('touchend', function(e) {
  e.preventDefault();
  svg('encVol').setAttribute('stroke', '#3a3a3a');
  svg('encVol').setAttribute('stroke-width', '1.5');
  const lastDrag = volDrag;
  volDrag = null;
  if (!anyStepHeld()) {
    S._oledLocked = false;
    // Retour OLED après réglage drumpad ou track (même comportement que mouseup global)
    if (lastDrag && (lastDrag.type === 'drumpad' || lastDrag.type === 'track') && lastDrag.moved) {
      setTimeout(() => {
        if (S._oledLocked) return;
        const t = S.tracks[S.currentTrack];
        if (t.mode === 'drum') oled('DRUM', getDrumPadName(S.currentTrack, S.selectedDrumPad), `pad ${S.selectedDrumPad+1}`);
        else oled('SOUND', getTrackSoundName(S.currentTrack), trackInfo());
      }, 1200);
    }
  }
}, { passive: false });

// encVol mousedown/mouseup pour desktop
svg('encVol').addEventListener('mouseup', e => {
  if (anyStepHeld()) { e.stopPropagation(); volDrag = null; }
});
svg('encVol').addEventListener('mousedown', e => {
  // Ignorer si vient d'un touch (déjà géré par touchstart)
  if (window._lastTouchTime && Date.now() - window._lastTouchTime < 500) return;
  volDrag = null;
  S._oledLocked = true;
  svg('encVol').setAttribute('stroke', '#aaa');
  svg('encVol').setAttribute('stroke-width', '2.5');
  // Afficher l'état du volume au mousedown (comme tap sur wheel pour BPM)
  if (!anyStepHeld() && S._heldTrack < 0 && S._heldDrumPad < 0) {
    oledForce('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶ playing' : '■ stopped');
  }
  if (anyStepHeld()) {
    const firstIdx = heldStepList()[0];
    const bar = currentStepBar();
    const st = bar[firstIdx];
    volDrag = { type: 'vel', lastY: e.clientY, lastX: e.clientX, startVel: st.vel || 0.8, stepIdx: firstIdx, moved: false };
    heldSteps.get(firstIdx).didAction = true;
  } else if (S._heldDrumPad >= 0 && S.tracks[S.currentTrack]?.mode === 'drum') {
    volDrag = { type: 'drumpad', lastY: e.clientY, lastX: e.clientX, padIdx: S._heldDrumPad, moved: false };
  } else if (S._heldTrack >= 0) {
    volDrag = { type: 'track', lastY: e.clientY, lastX: e.clientX, ti: S._heldTrack, moved: false };
  } else {
    volDrag = { type: 'master', lastY: e.clientY, lastX: e.clientX, moved: false };
  }
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!volDrag) return;
  const distFromLast = Math.abs(e.clientY - volDrag.lastY) + Math.abs(e.clientX - volDrag.lastX);
  // Toujours mettre à jour lastY pour éviter le deadlock du filtre
  const prevLastY = volDrag.lastY;
  const prevLastX = volDrag.lastX;
  volDrag.lastY = e.clientY;
  volDrag.lastX = e.clientX;
  if (distFromLast > 60) return; // saut trop grand = doigt parasite, mais lastY est mis à jour
  const dy = prevLastY - e.clientY;
  const dx = e.clientX - prevLastX;
  const delta = dy + dx;
  if (volDrag.type === 'drumpad') {
    const ti = S.currentTrack;
    const t2 = S.tracks[ti];
    if (t2.drumPads?.[volDrag.padIdx] !== undefined) {
      const newVol = Math.max(0, Math.min(1, (t2.drumPads[volDrag.padIdx].volume ?? 1) + delta / 150));
      t2.drumPads[volDrag.padIdx].volume = newVol;
      volDrag.moved = true;
      oledForce(`PAD ${volDrag.padIdx+1} VOL`, `${Math.round(newVol * 100)}%`, getDrumPadName(ti, volDrag.padIdx));
    }
  } else if (volDrag.type === 'master') {
    volDrag.moved = true;
    setMasterVolume(S.masterVolume + delta / 150);
    oledForce('VOL MASTER', `${Math.round(S.masterVolume * 100)}%`, S.playing ? '▶' : '■');
  } else if (volDrag.type === 'track') {
    const newVol = Math.max(0, Math.min(1, S.tracks[volDrag.ti].volume + delta / 150));
    S.tracks[volDrag.ti].volume = newVol;
    oledForce(`VOL T${volDrag.ti+1}`, `${Math.round(newVol * 100)}%`, trackColor(volDrag.ti));
  } else if (volDrag.type === 'vel') {
    if (S.mode === 'loop' && S._loopBarHeld >= 0) {
      const vdelta = dy / 200;
      if (Math.abs(vdelta) > 0.002) {
        volDrag.moved = true;
        loopBarVelocityDelta(vdelta * 127);
      }
      return;
    }
    const bar = currentStepBar();
    const st = bar[volDrag.stepIdx];
    const newVel = Math.max(0, Math.min(1, st.vel + delta / 80));
    st.vel = newVel;
    const col = trackColor(S.currentTrack);
    svg(`sled${volDrag.stepIdx}`).setAttribute('fill', col);
    svg(`sled${volDrag.stepIdx}`).setAttribute('opacity', newVel.toFixed(2));
    oledForce(`STEP ${volDrag.stepIdx+1}`, `VÉL: ${Math.round(newVel*127)}`, `(${Math.round(newVel*100)}%)`);
  }
});

const PROJECT_SLOTS = 256;
const PROJECT_KEY   = (n) => `mwv_project_${n}`;

// ── Remet l'état séquenceur à zéro total (nouveau projet vierge) ──
function resetStateToEmpty() {
  S.bpm = 120;
  S.masterVolume = 0.80;
  S.octave = 3;
  S.playing = false;
  S.recording = false;
  S.currentTrack = 0;
  S.currentBar = 0;
  S.mode = 'note';
  S.selectedDrumPad = 0;
  if (masterGain) masterGain.gain.value = S.masterVolume;
  // Réinitialiser toutes les tracks avec des clips vides
  S.tracks.forEach((t, i) => {
    t.muted       = false;
    t.soloed      = false;
    t.volume      = 0.8;
    t.soundIndex  = 0;
    t.outputMode  = (TRACK_MODES[i] === 'drum') ? 'drum' : (i === 1 ? 'junox' : 'sf2'); // défaut initial
    t.midiChannel = i + 1;
    t.midiOutputId = null;
    t.drumSoundMap = Array.from({length:8}, (_, j) => j);
    t.drumPads     = makeDefaultDrumPads();
    t.activeClip  = 0;
    t.playingClip = 0;
    t.queuedClip  = null;
    t.clips       = Array.from({length:8}, () => makeClip());
  });
  heldSteps.clear();
  recHeld.clear();
  undoStack.history = [];
  undoStack.cursor  = -1;
  undoStack.lastSaveTime = null;
  // Remettre junoxRuntime aux valeurs par défaut
  // Réinitialiser junoxRuntime pour toutes les tracks Junox actives
  junoxRuntime.forEach((rt, ti) => {
    rt.dlyTime = 500; rt.dlyFeedback = 0.5; rt.dlyMix = 0; rt.revLevel = 0;
    rt.satDrive = -13; rt.satType = 0;
    rt.poly = 1; rt.notePrio = 0; rt.subOct = 0; rt.noiseType = 0;
    rt.arpEnabled = 0; rt.arpRate = 2; rt.arpMode = 0; rt.arpOctaves = 1;
    if (junoxReady[ti]) {
      junoxSetDelay(ti, rt.dlyTime, rt.dlyFeedback, rt.dlyMix);
      junoxSetReverb(ti, rt.revLevel);
      junoxSetSat(ti, null);
    }
  });
}

// ── Générateur de noms procéduraux ────────────────────────────
const NAME_ADJ = [
  'Dark','Deep','Warm','Cold','Bright','Soft','Hard','Lost','Wild','Calm',
  'Raw','Fast','Slow','Heavy','Light','Sharp','Smooth','Cosmic','Urban','Crystal',
  'Electric','Silent','Frozen','Hollow','Neon','Acid','Dusty','Liquid','Broken','Golden'
];
const NAME_NOUN = [
  'Wave','Pulse','Groove','Dream','Storm','Cloud','Fire','Stone','Ghost','River',
  'Void','Space','Noise','Bloom','Rain','Dust','Light','Shadow','Echo','Spiral',
  'Frog','Mango','Tiger','Monk','Comet','Drift','Phase','Surge','Loop','Core'
];
function generateProjectName() {
  const adj  = NAME_ADJ [Math.floor(Math.random() * NAME_ADJ.length)];
  const noun = NAME_NOUN[Math.floor(Math.random() * NAME_NOUN.length)];
  return `${adj}${noun}`.slice(0, 8);
}

// Palette de couleurs de set — distinctes et lisibles sur fond noir
const SET_COLORS = [
  '#ff6b00','#3399ff','#3ddc84','#cc44ff',
  '#ff3366','#ffcc00','#00cccc','#ff9933',
  '#aa44ff','#44ffaa','#ff4488','#33aaff',
  '#ffaa33','#66ff44','#ff6644','#4466ff'
];
function randomSetColor() {
  return SET_COLORS[Math.floor(Math.random() * SET_COLORS.length)];
}

// ── État du projet courant ─────────────────────────────────────
// currentProject = { slot, name, color } — le slot actif en cours d'édition
var currentProject = null;  // null = pas encore de slot choisi
var autosaveTimer  = null;

// Déclenche un autosave différé (300ms) après chaque modification
function scheduleAutosave() {
  if (!currentProject) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(() => {
    projectSave(currentProject.slot);
  }, 300);
}

// Sauvegarde immédiate quand l'app passe en arrière-plan (bouton Home, changement d'app)
document.addEventListener('visibilitychange', () => {
  if (document.hidden && currentProject) {
    clearTimeout(autosaveTimer);
    projectSave(currentProject.slot);
  }
});
window.addEventListener('pagehide', () => {
  if (currentProject) projectSave(currentProject.slot);
});

// Intercepter le geste/bouton Back Android pour éviter de quitter accidentellement
// On pousse un état fictif dans l'historique, et quand Back est pressé on le re-pousse
history.pushState({ jseq: true }, '');
window.addEventListener('popstate', () => {
  // Remettre l'état fictif immédiatement → annule l'effet du Back
  history.pushState({ jseq: true }, '');
});

function projectSave(slot) {
  try {
    const data = serializeProject();
    localStorage.setItem(PROJECT_KEY(slot), JSON.stringify(data));
    return true;
  } catch(e) { return false; }
}

function serializeProject() {
  return {
    version: 2,
    bpm: S.bpm,
    masterVolume: S.masterVolume,
    octave: S.octave,
    masterFX: JSON.parse(JSON.stringify(masterFX)),
    tracks: S.tracks.map((t, ti) => ({
      mode: t.mode,
      muted: t.muted,
      soloed: t.soloed,
      volume: t.volume,
      octave: t.octave ?? 3,
      pianoOctave: t.pianoOctave ?? 0,
      sendDelay:  t.sendDelay  || 0,
      sendReverb: t.sendReverb || 0,
      soundIndex: t.soundIndex,
      outputMode: t.outputMode,
      midiChannel: t.midiChannel,
      midiOutputId: t.midiOutputId || null,
      junoxPatch: (t.outputMode === 'junox' && junoxPatches[ti]) 
                  ? JSON.parse(JSON.stringify(junoxPatches[ti])) 
                  : null,
      junoxRuntime: (t.outputMode === 'junox') ? {
        dlyTime:     junoxRuntime[ti].dlyTime,
        dlyFeedback: junoxRuntime[ti].dlyFeedback,
        dlyMix:      junoxRuntime[ti].dlyMix,
        revLevel:    junoxRuntime[ti].revLevel,
        satDrive:    junoxRuntime[ti].satDrive,
        satType:     junoxRuntime[ti].satType,
        poly:        junoxRuntime[ti].poly,
        notePrio:    junoxRuntime[ti].notePrio,
        subOct:      junoxRuntime[ti].subOct,
        noiseType:   junoxRuntime[ti].noiseType,
        arpEnabled:  junoxRuntime[ti].arpEnabled,
        arpRate:     junoxRuntime[ti].arpRate,
        arpMode:     junoxRuntime[ti].arpMode,
        arpOctaves:  junoxRuntime[ti].arpOctaves,
      } : null,
      drumSoundMap: [...t.drumSoundMap],  // conservé pour compatibilité v2
      drumPads: t.drumPads ? t.drumPads.map(p => ({
        mode: p.mode, synthType: p.synthType,
        tune: p.tune, decay: p.decay, tone: p.tone, drive: p.drive,
        fileName: p.fileName || '', startPoint: p.startPoint || 0, reverse: p.reverse || false,
        volume: p.volume, sendReverb: p.sendReverb, sendDelay: p.sendDelay,
      })) : null,
      activeClip: t.activeClip,
      clips: t.clips.map(clip => {
        // Format sparse : on ne stocke que les steps actifs
        // bars : [[barIdx, stepIdx, {note,vel,len,shift,prob,extraNotes}], ...]
        const bars = [];
        clip.bars.forEach((bar, bi) => {
          bar.forEach((st, si) => {
            if (!st.on) return;
            const s = {v: st.vel};
            if (st.note !== undefined && st.note !== 60) s.n = st.note;
            if (st.len  && st.len  !== 1)   s.l = st.len;
            if (st.shift && st.shift !== 0) s.sh = st.shift;
            if (st.prob !== undefined && st.prob !== 100) s.p = st.prob;
            if (st.extraNotes?.length)      s.e = st.extraNotes;
            bars.push([bi, si, s]);
          });
        });
        // drumBars : [[padIdx, barIdx, stepIdx, {vel,shift,prob}], ...]
        const drumBars = [];
        clip.drumBars.forEach((padSeq, pi) => {
          padSeq.forEach((bar, bi) => {
            bar.forEach((st, si) => {
              if (!st.on) return;
              const s = {v: st.vel};
              if (st.shift && st.shift !== 0) s.sh = st.shift;
              if (st.prob !== undefined && st.prob !== 100) s.p = st.prob;
              drumBars.push([pi, bi, si, s]);
            });
          });
        });
        return {
          nb: clip.numBars,
          ls: clip.loopStart ?? 0,
          le: clip.loopEnd   ?? (clip.numBars - 1),
          cr: clip.columnRepeats || 0,
          b:  bars,
          d:  drumBars,
        };
      }),
    })),
    _meta: {
      savedAt: Date.now(),
      name:  currentProject?.name  || generateProjectName(),
      color: currentProject?.color || randomSetColor(),
    }
  };
}

// Restaure l'état depuis un objet JSON (supporte v1 et v2)
function deserializeProject(data, slot) {
  if (!data || (data.version !== 1 && data.version !== 2)) return false;
  S.bpm = data.bpm ?? 120;
  S.masterVolume = data.masterVolume ?? 0.80;
  S.octave = data.octave ?? 3;
  if (masterGain) masterGain.gain.value = S.masterVolume;

  // Restaurer masterFX
  if (data.masterFX) {
    Object.keys(masterFX).forEach(fxId => {
      if (data.masterFX[fxId]) {
        Object.assign(masterFX[fxId], data.masterFX[fxId]);
      }
    });
    applyMasterFX();
  }

  data.tracks.forEach((td, ti) => {
    if (ti >= 8) return;
    const t = S.tracks[ti];
    t.mode        = td.mode        ?? t.mode;
    // Synchroniser TRACK_MODES (pour les tracks non verrouillées)
    if (LOCKED_TRACK_MODES[ti] === undefined) TRACK_MODES[ti] = t.mode;
    t.muted       = td.muted       ?? false;
    t.soloed      = td.soloed      ?? false;
    t.volume      = td.volume      ?? 0.8;
    t.octave      = td.octave      ?? 3;
    t.pianoOctave = td.pianoOctave ?? 0;
    t.sendDelay   = td.sendDelay   ?? 0;
    t.sendReverb  = td.sendReverb  ?? 0;
    t.soundIndex  = td.soundIndex  ?? 0;
    t.outputMode  = td.outputMode  ?? 'sf2';
    // T2 reste toujours Junox même si le projet sérialisé dit autre chose
    // outputMode is restored from saved data below
    t.midiChannel = td.midiChannel ?? (ti + 1);
    t.midiOutputId = td.midiOutputId ?? null;
    // Restaurer le patch Junox si disponible
    if (t.outputMode === 'junox') {
      // Mettre à jour TRACK_MODES pour la track si ce n'est pas T1/T8
      if (LOCKED_TRACK_MODES[ti] === undefined) TRACK_MODES[ti] = 'melodic';
      if (td.junoxPatch) {
        junoxPatches[ti] = td.junoxPatch;
        if (junoxNodes[ti]) {
          junoxNodes[ti].setPatch(td.junoxPatch);
          junoxNodes[ti].lfoTrigger();
        } else {
          // Initialiser Junox pour cette track si pas encore fait
          initJunox(ti).then(() => {
            if (junoxNodes[ti] && junoxPatches[ti]) {
              junoxNodes[ti].setPatch(junoxPatches[ti]);
              junoxNodes[ti].lfoTrigger();
            }
          });
        }
      }
    }
    // Restaurer junoxRuntime (delay, sat, arp...) — avec fallback sur les defaults
    if (t.outputMode === 'junox') {
      const jr = td.junoxRuntime || {};
      const rt = junoxRuntime[ti];
      rt.dlyTime     = jr.dlyTime     ?? 500;
      rt.dlyFeedback = jr.dlyFeedback ?? 0.5;
      rt.dlyMix      = jr.dlyMix      ?? 0;
      rt.revLevel    = jr.revLevel    ?? 0;
      rt.satDrive    = jr.satDrive    ?? -13;
      rt.satType     = jr.satType     ?? 0;
      rt.poly        = jr.poly        ?? 2;
      rt.notePrio    = jr.notePrio    ?? 0;
      rt.subOct      = jr.subOct      ?? 0;
      rt.noiseType   = jr.noiseType   ?? 0;
      rt.arpEnabled  = jr.arpEnabled  ?? 0;
      rt.arpRate     = jr.arpRate     ?? 2;
      rt.arpMode     = jr.arpMode     ?? 0;
      rt.arpOctaves  = jr.arpOctaves  ?? 1;
      // Appliquer aux nodes audio si déjà initialisés
      junoxSetDelay(ti, rt.dlyTime, rt.dlyFeedback, rt.dlyMix);
      junoxSetReverb(ti, rt.revLevel);
      junoxSetSat(ti, rt.satDrive <= -13 ? null : rt.satDrive, rt.satType);
    }
    t.drumSoundMap = td.drumSoundMap
      ? td.drumSoundMap.slice(0, 8)
      : Array.from({length:8}, (_, i) => i);
    // Restaurer drumPads
    if (td.drumPads && Array.isArray(td.drumPads)) {
      t.drumPads = td.drumPads.slice(0, 8).map((p, i) => {
        const base = makeDrumPad(i);
        const pad = { ...base, ...p, buffer: null }; // buffer non sérialisable
        // Si mode sample mais pas de fileName → fallback synth
        if (pad.mode === 'sample' && !pad.fileName) {
          pad.mode = 'synth';
        }
        // Migration : synthType supprimé → mapper vers le plus proche
        if (pad.mode === 'synth' && pad.synthType && !DRUM_SYNTH_DEFAULTS[pad.synthType]) {
          const MAP = {
            'Rim':'Kick','Tom Hi':'Tom','Tom Mid':'Tom','Tom Lo':'Tom',
            'Ride':'Crash','Shaker':'HH Cl','Tamb':'HH Op','Conga':'Tom',
            'Bongo':'Tom','Maracas':'HH Cl','Woodblk':'Triangle',
            'Snap':'Clap','Noise':'Clap','Click':'Zap',
          };
          pad.synthType = MAP[pad.synthType] || 'Kick';
        }
        return pad;
      });
      // Compléter si moins de 8
      while (t.drumPads.length < 8) t.drumPads.push(makeDrumPad(t.drumPads.length));
    } else {
      t.drumPads = makeDefaultDrumPads();
    }
    t.activeClip  = td.activeClip  ?? 0;
    t.playingClip = 0;
    t.queuedClip  = null;

    td.clips.forEach((cd, ci) => {
      if (ci >= 8) return;
      const clip = t.clips[ci];

      if (data.version === 2) {
        // Format sparse v2
        clip.numBars   = cd.nb ?? 1;
        clip.loopStart = cd.ls ?? 0;
        clip.loopEnd   = cd.le ?? (clip.numBars - 1);
        clip.columnRepeats = cd.cr ?? 0;
        // Réinitialiser à vide
        clip.bars = Array.from({length:8}, () =>
          Array.from({length:16}, () => ({on:false, note:60, vel:0.787}))
        );
        clip.drumBars = Array.from({length:8}, () =>
          Array.from({length:8}, () =>
            Array.from({length:16}, () => ({on:false, vel:0.787}))
          )
        );
        // Restituer les steps actifs
        (cd.b || []).forEach(([bi, si, s]) => {
          if (bi < 8 && si < 16) clip.bars[bi][si] = {
            on: true,
            note: s.n ?? 60,
            vel:  s.v ?? 0.787,
            len:  s.l ?? 1,
            shift: s.sh ?? 0,
            prob:  s.p ?? 100,
            extraNotes: s.e ? [...s.e] : [],
          };
        });
        (cd.d || []).forEach(([pi, bi, si, s]) => {
          if (pi < 8 && bi < 8 && si < 16) clip.drumBars[pi][bi][si] = {
            on: true,
            vel:  s.v ?? 0.787,
            shift: s.sh ?? 0,
            prob:  s.p ?? 100,
          };
        });
      } else {
        // Format dense v1 (rétrocompatibilité)
        clip.numBars   = cd.numBars   ?? 1;
        clip.loopStart = cd.loopStart ?? 0;
        clip.loopEnd   = cd.loopEnd   ?? (clip.numBars - 1);
        clip.bars = cd.bars.map(bar =>
          bar.map(st => st.on ? {...st, extraNotes: [...(st.extraNotes||[])]} : {on:false,note:60,vel:0.787})
        );
        clip.drumBars = cd.drumBars.map(padSeq =>
          padSeq.map(bar => bar.map(st => st.on ? {...st} : {on:false,vel:0.787}))
        );
      }
    });
  });

  S.playing = false; S.recording = false;
  S.currentTrack = 0; S.currentBar = 0;
  S.mode = 'note';
  S.octave = S.tracks[0].octave ?? 3;
  heldSteps.clear(); recHeld.clear();

  if (slot !== undefined) {
    currentProject = {
      slot,
      name:  data._meta?.name  || generateProjectName(),
      color: data._meta?.color || randomSetColor(),
    };
  }
  // Mettre à jour les GainNodes sends si déjà créés
  Object.keys(trackSendNodes).forEach(ti => {
    const t = S.tracks[parseInt(ti)];
    const n = trackSendNodes[ti];
    if (n && t) {
      n.dSend.gain.value = t.sendDelay  || 0;
      n.rSend.gain.value = t.sendReverb || 0;
    }
  });
  return true;
}

// Lire un slot
function projectLoad(slot) {
  try {
    const raw = localStorage.getItem(PROJECT_KEY(slot));
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// Effacer un slot
function projectDelete(slot) {
  localStorage.removeItem(PROJECT_KEY(slot));
}

// PROJECT MODE — pool de 256 projets (16 pages × 32 slots)
// ═══════════════════════════════════════════════════════════════
var projectModeActive = false;
var projectPage = 0; // page courante 0-15
var projectSelected = null; // { slot, row, col } — projet sélectionné en preview
var _projectLastClick = { slot: -1, time: 0 };
const PROJECT_DBLCLICK_MS = 400;

function enterProjectMode() {
  if (S.playing) stopPlay();
  // Désactiver loop mode si actif
  if (S.mode === 'loop') {
    S.mode = 'note';
    S._loopBarHeld = -1; S._loopBar2 = -1;
    setBtnLit('btnLoop', false, '#3ddc84');
  }
  projectModeActive = true;
  projectSelected = null;
  _projectLastClick = { slot: -1, time: 0 };
  S._prevMode = S.mode;
  clearAllDynamicLabels();
  resetAllPads();
  resetAllSteps();
  renderProjectMode();
  renderFXPanel();
  // Griser les encodeurs et boutons track — non pertinents en mode project
  _projectDimControls(true);
  oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'tap=preview · 2x=load');
  S._oledLocked = true;
}

function exitProjectMode() {
  projectModeActive = false;
  projectSelected = null;
  S._oledLocked = false;
  setBtnLit('btnSets', false, '#aaa');
  _projectDimControls(false);
  clearAllDynamicLabels();
  resetAllPads();
  resetAllSteps();
  renderTrackButtons();
  if (S.mode === 'loop') {
    renderLoopMode();
  } else {
    renderPads();
  }
  renderSteps();
  renderFXPanel();
  updateEncArcs();
  updateSendArcs();
}

function _projectDimControls(dim) {
  // Encodeurs 0-5 : griser anneau + label + arc
  for (let i = 0; i < 6; i++) {
    const enc = svg('enc' + i);
    const lbl = document.getElementById('encLbl' + i);
    const arc = document.getElementById('encArc' + i);
    if (enc) enc.setAttribute('stroke', dim ? '#1e1e20' : '#383838');
    if (lbl) lbl.setAttribute('fill', dim ? '#1a1a1a' : '#2a2a2a');
    if (arc) {
      arc.setAttribute('stroke', 'none');
      arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`);
      arc.setAttribute('stroke-dashoffset', '0');
    }
  }
  // Boutons track : opacité réduite
  for (let slot = 0; slot < 4; slot++) {
    const el = svg(`trkBtn${slot}`);
    if (el) el.setAttribute('opacity', dim ? '0.08' : '0.4');
  }
}

function renderProjectMode() {
  if (!projectModeActive) return;

  // ── 32 pads = 32 slots sur la page courante ──
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      const slot     = projectPage * 32 + r * 8 + c; // slot absolu 0-255
      const el       = padEl(r, c);
      const data     = projectLoad(slot);

      el.setAttribute('stroke-dasharray', 'none');
      const isCurrent  = currentProject?.slot === slot;
      const isSelected = projectSelected?.slot === slot;
      if (data) {
        const projCol = data._meta?.color || '#ff6b00';
        el.setAttribute('fill', projCol + (isSelected ? '66' : '44'));
        if (isSelected) {
          el.setAttribute('stroke',       '#fff');
          el.setAttribute('stroke-width', '3');
        } else if (isCurrent) {
          el.setAttribute('stroke',       '#fff');
          el.setAttribute('stroke-width', '2');
        } else {
          el.setAttribute('stroke',       projCol);
          el.setAttribute('stroke-width', '1.5');
        }
      } else {
        const isEmptySelected = isSelected;
        el.setAttribute('fill',         isEmptySelected ? '#1a1a2a' : '#111113');
        el.setAttribute('stroke',       isEmptySelected ? '#fff'    : '#2a2a2a');
        el.setAttribute('stroke-width', isEmptySelected ? '2'       : '0.8');
      }

      // Nom du projet (tronqué à 7 chars) ou numéro si vide
      const slotInPage = r * 8 + c + 1;
      const projName   = data?._meta?.name;
      let lbl = document.getElementById(`prjlbl_${r}_${c}`);
      if (!lbl) {
        lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lbl.setAttribute('id', `prjlbl_${r}_${c}`);
        lbl.setAttribute('font-family', "'DM Mono',monospace");
        lbl.setAttribute('font-size', projName ? '10' : '13');
        lbl.setAttribute('text-anchor', 'middle');
        lbl.setAttribute('pointer-events', 'none');
        document.getElementById('moveSVG').appendChild(lbl);
      }
      lbl.setAttribute('x', PAD_X[c] + 29);
      lbl.setAttribute('y', PAD_Y[r] + (projName ? 24 : 28));
      lbl.setAttribute('font-size', projName ? '10' : '13');
      lbl.setAttribute('fill', data ? (isCurrent ? '#fff' : (data._meta?.color || '#ff6b00')) : '#333');
      lbl.textContent = projName ? projName.slice(0, 10) : String(slotInPage);

      // BPM en petit si slot occupé
      let bpmlbl = document.getElementById(`prjbpm_${r}_${c}`);
      if (!bpmlbl) {
        bpmlbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        bpmlbl.setAttribute('id', `prjbpm_${r}_${c}`);
        bpmlbl.setAttribute('font-family', "'DM Mono',monospace");
        bpmlbl.setAttribute('font-size', '8');
        bpmlbl.setAttribute('text-anchor', 'middle');
        bpmlbl.setAttribute('pointer-events', 'none');
        document.getElementById('moveSVG').appendChild(bpmlbl);
      }
      bpmlbl.setAttribute('x', PAD_X[c] + 29);
      bpmlbl.setAttribute('y', PAD_Y[r] + 36);
      bpmlbl.setAttribute('fill', data ? (isCurrent ? '#aaa' : '#666') : 'none');
      bpmlbl.textContent = data ? `${data.bpm}` : '';
    }
  }

  // ── 16 steps = 16 pages ──
  for (let i = 0; i < 16; i++) {
    const el  = svg(`step${i}`);
    const led = svg(`sled${i}`);
    el.setAttribute('stroke-dasharray', 'none');
    if (i === projectPage) {
      // Page active
      el.setAttribute('fill',         '#ffffff22');
      el.setAttribute('stroke',       '#fff');
      el.setAttribute('stroke-width', '2');
      led.setAttribute('fill', '#fff');
    } else {
      // Vérifier si la page a au moins un projet
      let hasAny = false;
      for (let s = 0; s < 32; s++) {
        if (projectLoad(i * 32 + s)) { hasAny = true; break; }
      }
      el.setAttribute('fill',         hasAny ? '#ffffff11' : '#111113');
      el.setAttribute('stroke',       hasAny ? '#555'      : '#1a1a1c');
      el.setAttribute('stroke-width', '0.8');
      led.setAttribute('fill', hasAny ? '#555' : '#1a1a1c');
    }
  }
}

function clearProjectLabels() {
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 8; c++) {
      ['prjlbl', 'prjbpm'].forEach(pfx => {
        const lbl = document.getElementById(`${pfx}_${r}_${c}`);
        if (lbl) lbl.textContent = '';
      });
    }
  }
}function projectPadClick(row, col) {
  const slot    = projectPage * 32 + row * 8 + col;
  const data    = projectLoad(slot);
  const slotNum = (row * 8 + col) + 1;
  const now     = Date.now();

  if (S._deleteHeld) {
    if (data) {
      if (currentProject?.slot === slot) currentProject = null;
      if (projectSelected?.slot === slot) projectSelected = null;
      projectDelete(slot);
      renderProjectMode();
      oledForce('DELETE', `P${projectPage+1}·${slotNum}`, 'effacé');
    }
    return;
  }

  if (S._copyHeld) {
    if (!S._copySource) {
      if (!data) { oledForce('COPY', 'empty slot', 'choose source'); return; }
      S._copySource = { type: 'project', slot, data };
      padEl(row, col).setAttribute('stroke', '#fff');
      padEl(row, col).setAttribute('stroke-width', '2.5');
      oledForce('COPY', `P${projectPage+1}·${slotNum} →`, 'choose dest.');
    } else if (S._copySource.type === 'project') {
      if (slot === S._copySource.slot) { S._copySource = null; renderProjectMode(); return; }
      try {
        const savedProject = currentProject;
        if (deserializeProject(S._copySource.data)) {
          currentProject = { slot, name: S._copySource.data._meta?.name || generateProjectName(), color: S._copySource.data._meta?.color || randomSetColor() };
          localStorage.setItem(PROJECT_KEY(slot), JSON.stringify(serializeProject()));
          currentProject = savedProject;
          // Restaurer l'état du projet courant
          if (savedProject) {
            const savedData = projectLoad(savedProject.slot);
            if (savedData) deserializeProject(savedData, savedProject.slot);
          }
        }
      } catch(e) { console.warn('copy failed:', e); }
      S._copySource = null;
      renderProjectMode();
      oledForce('COPY', 'copié ✓', `→ P${projectPage+1}·${slotNum}`);
    }
    return;
  }

  if (data) {
    // ── Double-clic → charger définitivement et sortir ──
    if (_projectLastClick.slot === slot && now - _projectLastClick.time < PROJECT_DBLCLICK_MS) {
      _projectLastClick = { slot: -1, time: 0 };
      if (deserializeProject(data, slot)) {
        exitProjectMode();
        clearProjectLabels();
        renderTrackButtons();
        renderPads();
        renderSteps();
        renderFXPanel();
        if (S.pianoOpen) buildPiano();
        updateEncArcs();
        updateSendArcs();
        const name = data._meta?.name || `P${projectPage+1}·${slotNum}`;
        oledForce('LOAD', name, `${data.bpm} BPM`);
        setTimeout(() => { S._oledLocked = false; }, 1000);
      }
      return;
    }

    // ── 1er clic → sélectionner + preview (charger dans S sans sortir) ──
    _projectLastClick = { slot, time: now };
    projectSelected = { slot, row, col };
    // Charger le projet en preview dans S
    deserializeProject(data, slot);
    renderProjectMode();
    const name = data._meta?.name || `P${projectPage+1}·${slotNum}`;
    oledForce(name, `${data.bpm} BPM`, '2x=load · Play=listen');

  } else {
    // ── Slot vide ──
    // 1er clic → sélectionner le slot (highlight), sans créer de projet
    // Double-clic → créer un nouveau projet vierge et entrer dedans
    if (_projectLastClick.slot === slot && now - _projectLastClick.time < PROJECT_DBLCLICK_MS) {
      _projectLastClick = { slot: -1, time: 0 };
      const name  = generateProjectName();
      const color = randomSetColor();
      currentProject = { slot, name, color };
      resetStateToEmpty();
      projectSave(slot);
      exitProjectMode();
      clearProjectLabels();
      renderTrackButtons();
      renderPads();
      renderSteps();
      saveUndo();
      oledForce('NEW', name, `P${projectPage+1}·${slotNum}`);
      setTimeout(() => { S._oledLocked = false; }, 1000);
    } else {
      // 1er clic : juste sélectionner visuellement
      _projectLastClick = { slot, time: now };
      projectSelected = { slot, row, col };
      renderProjectMode();
      oledForce(`EMPTY SLOT`, `P${projectPage+1}·${slotNum}`, '2x=new project');
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// ENCODEURS 0-3 : Length / Velocity / Shift / Probability
// ═══════════════════════════════════════════════════════════════
var ENC_DEFS = [
  { key:'len',
    label:'LENGTH',
    // max dynamique selon position step et taille pattern
    getMax: () => {
      const res = getHeldSt();
      if (!res) return 128;
      const clip = activeClip();
      const totalSteps = clip.numBars * 16;
      const absPos = S.currentBar * 16 + res.idx;
      return Math.max(1, totalSteps - absPos);
    },
    min: 1, def: 1,
    get: (st) => st.len || 1,
    set: (st, v) => { st.len = Math.round(v); },
    fmt: v => `${Math.round(v)} steps`
  },
  { key:'vel',
    label:'VELOCITY',
    min: 0, max: 127, def: 100,
    get: (st) => Math.round((st.vel !== undefined ? st.vel : 0.8) * 127),
    set: (st, v) => { st.vel = Math.max(0, Math.min(1, v / 127)); },
    fmt: v => `${Math.round(v)}`
  },
  { key:'shift',
    label:'OFFSET',
    // Simple : -0.49 à +0.5. Négatif=avant le step, positif=après.
    min: -0.5, max: 0.5, def: 0,
    get: (st) => Math.max(-0.5, Math.min(0.5, st.shift || 0)),
    set: (st, v) => { st.shift = Math.max(-0.5, Math.min(0.5, v)); },
    fmt: v => {
      if (Math.abs(v) < 0.005) return '0%';
      return (v > 0 ? '+' : '-') + Math.round(Math.abs(v) * 100) + '%';
    }
  },
  { key:'prob',
    label:'PROB',
    min: 0, max: 100, def: 100,
    get: (st) => st.prob !== undefined ? st.prob : 100,
    set: (st, v) => { st.prob = v; },
    fmt: v => `${Math.round(v)}%`
  },
];

function getEncMax(def) {
  return def.getMax ? def.getMax() : def.max;
}
var ENC_CX = [190, 291, 392, 494]; // positions mises à jour

// Arcs encodeurs via stroke-dasharray (technique fiable)
var ENC_R = 18, ENC_CIRC = 2 * Math.PI * ENC_R; // ~113.10 (r=18)
var ENC_ARC_TOTAL = ENC_CIRC * 0.75; // 270° = 75% du cercle

function updateEncArcs() {
  if (projectModeActive) return;
  if (S.mode === 'session') {
    for (let i = 0; i < 4; i++) {
      const enc = svg('enc' + i);
      const lbl = document.getElementById('encLbl' + i);
      const arc = document.getElementById('encArc' + i);
      if (enc) enc.setAttribute('stroke', '#1e1e20');
      if (lbl) lbl.setAttribute('fill', '#1a1a1a');
      if (arc) { arc.setAttribute('stroke', 'none'); arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`); arc.setAttribute('stroke-dashoffset', '0'); }
    }
    return;
  }
  const col = trackColor(S.currentTrack);
  const t = S.tracks[S.currentTrack];

  // Helpers communs
  // setArcUni : arc unipolaire standard via stroke-dasharray (pour <circle> avec rotate(-225))
  function setArcUni(id, pct, color) {
    const arc = document.getElementById(id);
    if (!arc) return;
    const lit = ENC_ARC_TOTAL * Math.max(0, Math.min(1, pct));
    arc.setAttribute('stroke-dashoffset', '0');  // reset tout dashoffset bipolaire résiduel
    arc.setAttribute('stroke-dasharray', `${lit.toFixed(2)} ${(ENC_CIRC - lit).toFixed(2)}`);
    arc.setAttribute('stroke', color);
  }

  // setArcBipolar : arc bipolaire depuis 12h via stroke-dasharray + dashoffset
  // Principe : le cercle est déjà rotaté à -225°. Le centre (12h) est à 135°*2 = 75% du tour.
  // On dessine un arc centré sur 12h de longueur proportionnelle à |val/max|.
  // Pour positif : dashoffset = 0 (part de -225°), dasharray = [longueur, reste]
  // C'est plus simple avec dashoffset : on décale pour centrer.
  // 12h sur le cercle rotaté à -225° correspond à 135/360 * circonférence = 25.92px depuis le début
  function setArcBipolar(id, val, maxAbsVal, color) {
    const arc = document.getElementById(id);
    if (!arc) return;
    // Sur le cercle rotaté -225°, 12h = position 135° = 135/360 * CIRC = ENC_CIRC * 0.375 = 25.92
    const CENTER = ENC_CIRC * (135 / 360); // 25.92px
    const maxLen = ENC_ARC_TOTAL * 0.5; // moitié de la plage totale = 135°
    const len = Math.abs(val / maxAbsVal) * maxLen;

    if (len < 0.3) {
      // Point neutre (valeur ~0) : petit arc visible
      arc.setAttribute('stroke-dasharray', `1.5 ${ENC_CIRC - 1.5}`);
      arc.setAttribute('stroke-dashoffset', `${-(CENTER - 0.75).toFixed(2)}`);
      arc.setAttribute('stroke', color);
      return;
    }

    if (val > 0) {
      // Positif → arc de 12h vers la droite (horaire)
      // Start = CENTER, longueur = len
      arc.setAttribute('stroke-dashoffset', `${-(CENTER).toFixed(2)}`);
      arc.setAttribute('stroke-dasharray', `${len.toFixed(2)} ${(ENC_CIRC - len).toFixed(2)}`);
    } else {
      // Négatif → arc de 12h vers la gauche (antihoraire)
      // On triche : start = CENTER - len (position avant 12h)
      const offset = CENTER - len;
      arc.setAttribute('stroke-dashoffset', `${-(offset).toFixed(2)}`);
      arc.setAttribute('stroke-dasharray', `${len.toFixed(2)} ${(ENC_CIRC - len).toFixed(2)}`);
    }
    arc.setAttribute('stroke', color);
  }

  function hideArc(id) {
    const arc = document.getElementById(id);
    if (!arc) return;
    arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`);
    arc.setAttribute('stroke-dashoffset', '0');
    arc.setAttribute('stroke', 'none');
  }

  function setEncRing(i, on, color) {
    const enc = svg('enc' + i);
    if (enc) enc.setAttribute('stroke', on ? color + '88' : '#383838');
  }

  function setLabel(i, text, color) {
    const lbl = document.getElementById('encLbl' + i);
    if (lbl) { lbl.textContent = text; lbl.setAttribute('fill', color); }
  }

  // ── Mode master : masquer tous les encodeurs, step tenu ou non ──
  if (t.mode === 'master') {
    for (let i = 0; i < 6; i++) {
      hideArc('encArc' + i);
      setEncRing(i, false, col);
      setLabel(i, '', '#2a2a2a');
    }
    return;
  }

  // ── Step tenu : priorité maximale, toutes tracks sauf master ───
  const res = getHeldSt();
  const hasStep = res && res.st.on;

  if (hasStep) {
    // Mode drum : enc0=Tune step, enc1=Vel, enc2=Offset, enc3=Prob
    if (t.mode === 'drum') {
      const drumStepLabels = ['TUNE', 'VELOCITY', 'OFFSET', 'PROB'];
      setEncRing(0, true, col); setLabel(0, 'TUNE', col);
      setArcBipolar('encArc0', res.st.tune || 0, 12, col);
      setEncRing(1, true, col); setLabel(1, 'VELOCITY', col);
      setArcUni('encArc1', ((res.st.vel||0.8)*127) / 127, col);
      setEncRing(2, true, col); setLabel(2, 'OFFSET', col);
      setArcBipolar('encArc2', res.st.shift||0, 0.5, col);
      setEncRing(3, true, col); setLabel(3, 'PROB', col);
      setArcUni('encArc3', (res.st.prob!==undefined?res.st.prob:100) / 100, col);
      return;
    }
    ENC_DEFS.forEach((def, i) => {
      setEncRing(i, true, col);
      setLabel(i, def.label, col);

      if (i === 2) {
        // OFFSET : bipolaire
        const val = def.get(res.st); // -0.5..+0.5
        setArcBipolar('encArc2', val, 0.5, col);
        return;
      }
      const val = def.get(res.st);
      const eMax = getEncMax(def);
      const pct = (val - def.min) / (eMax - def.min);
      setArcUni('encArc' + i, pct, col);
    });
    return;
  }

  // ── Mode drum, aucun step tenu : Tune/Decay/Tone/Drive ─────────
  if (t.mode === 'drum') {
    if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
    const pad = t.drumPads[S.selectedDrumPad];

    // TUNE (enc0) — bipolaire -24..+24
    setEncRing(0, true, col); setLabel(0, 'TUNE', col);
    setArcBipolar('encArc0', pad.tune ?? 0, 24, col);

    // DECAY (enc1) — unipolaire
    setEncRing(1, true, col); setLabel(1, 'DECAY', col);
    setArcUni('encArc1', ((pad.decay ?? 0.5) - 0.05) / (2 - 0.05), col);

    // TONE (enc2) — unipolaire
    setEncRing(2, true, col); setLabel(2, 'TONE', col);
    setArcUni('encArc2', pad.tone ?? 0.5, col);

    // DRIVE (enc3) — unipolaire
    setEncRing(3, true, col); setLabel(3, 'DRIVE', col);
    setArcUni('encArc3', pad.drive ?? 0, col);

    return;
  }

  // ── Mode Junox, aucun step tenu : enc0=VCF Freq, enc1=Resonance, enc2=Env Mod, enc3=LFO Rate ──
  if (t.outputMode === 'junox') {
    const patch = junoxPatches[S.currentTrack] || {};
    const vcfFreq = patch.vcf?.frequency ?? 0.7;
    const vcfRes  = patch.vcf?.resonance  ?? 0;
    const vcfEnv  = patch.vcf?.envMod     ?? 0;
    const lfoRate = patch.lfo?.frequency  ?? 0.3;

    setEncRing(0, true, col); setLabel(0, 'CUTOFF', col);
    setArcUni('encArc0', vcfFreq, col);

    setEncRing(1, true, col); setLabel(1, 'RESONANCE', col);
    setArcUni('encArc1', vcfRes, col);

    setEncRing(2, true, col); setLabel(2, 'ENV MOD', col);
    setArcUni('encArc2', vcfEnv, col);

    setEncRing(3, true, col); setLabel(3, 'LFO RATE', col);
    setArcUni('encArc3', lfoRate, col);
    return;
  }

  // ── Mode mélodique (SF2), aucun step tenu : enc0=Cutoff enc1=Resonance enc2=Release ──
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  const arpSlot = arpIdx >= 0 ? trackFX[S.currentTrack][arpIdx] : null;
  const cutoff  = arpSlot?.params['midiCutoff']  ?? 127;
  const reson   = arpSlot?.params['midiReson']   ?? 0;
  const release = arpSlot?.params['midiRelease'] ?? 0;

  setEncRing(0, true, col); setLabel(0, 'CUTOFF', col);
  setArcUni('encArc0', cutoff / 127, col);

  setEncRing(1, true, col); setLabel(1, 'RESONANCE', col);
  setArcUni('encArc1', reson / 127, col);

  setEncRing(2, true, col); setLabel(2, 'RELEASE', col);
  setArcUni('encArc2', release / 127, col);

  // enc3 : inactif
  hideArc('encArc3');
  setEncRing(3, false, col);
  setLabel(3, '', '#2a2a2a');
}

function getHeldSt() {
  if(!anyStepHeld()) return null;
  const idx=heldStepList()[0];
  const t=S.tracks[S.currentTrack];
  const st = t.mode==='drum'
    ? activeClip().drumBars[S.selectedDrumPad][S.currentBar][idx]
    : activeClip().bars[S.currentBar][idx];
  return {st, idx};
}



var encDrags = [null, null, null, null];

// Définitions des encodeurs en mode drum (indices 0..3 visibles, mais on gère 0..7 via les 4 premiers)
const DRUM_ENC_KEYS = ['tune','decay','tone','drive']; // enc 0..3
const DRUM_ENC_RANGES = [
  { min:-24, max:24,  label:'TUNE',   fmt: v => (v>0?'+':'')+v.toFixed(1)+' st' },
  { min:0.05,max:2,   label:'DECAY',  fmt: v => v.toFixed(2)+'s' },
  { min:0,   max:1,   label:'TONE',   fmt: v => Math.round(v*100)+'%' },
  { min:0,   max:1,   label:'DRIVE',  fmt: v => Math.round(v*100)+'%' },
];

// ── Encodeurs 0-3 : drag ────────────────────────────────────
// (le double-tap reset est géré en fin de document)
ENC_DEFS.forEach((def, i) => {
  // Bloquer le mouseup de l'encodeur de remonter vers document si un step est tenu
  svg('enc' + i).addEventListener('mouseup', e => {
    if (anyStepHeld()) { e.stopPropagation(); encDrags[i] = null; }
  });
  svg('enc' + i).addEventListener('mousedown', e => {
    if (projectModeActive) return;
    if (S.mode === 'session') return;
    if (encDrags[i]) return; // drag déjà actif — ignorer touch parasite
    const t = S.tracks[S.currentTrack];

    // Priorité 1 : step tenu
    const res = getHeldSt();
    if (res && res.st.on) {
      // En mode drum, enc0 = Tune du step, enc1 = Velocity, enc2/3 = Offset/Prob
      if (t.mode === 'drum') {
        const DRUM_STEP_DEFS = [
          { min:-12, max:12, label:'TUNE',     fmt: v => (v>0?'+':'') + Math.round(v) + ' st',
            get: (st) => st.tune || 0, set: (st,v) => { st.tune = Math.round(Math.max(-12, Math.min(12, v))); } },
          { min:0,   max:127,label:'VELOCITY', fmt: v => `${Math.round(v)}`,
            get: (st) => Math.round((st.vel||0.8)*127), set: (st,v) => { st.vel = Math.max(0,Math.min(1,v/127)); } },
          { min:-0.5,max:0.5, label:'OFFSET',  fmt: v => Math.abs(v)<0.005?'0%':(v>0?'+':'-')+Math.round(Math.abs(v)*100)+'%',
            get: (st) => st.shift||0, set: (st,v) => { st.shift = Math.max(-0.5,Math.min(0.5,v)); } },
          { min:0,   max:100, label:'PROB',    fmt: v => `${Math.round(v)}%`,
            get: (st) => st.prob!==undefined?st.prob:100, set: (st,v) => { st.prob = v; } },
        ];
        const dsd = DRUM_STEP_DEFS[i];
        if (!dsd) return;
        encDrags[i] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX,
          startVal: dsd.get(res.st), idx: res.idx, moved: false, drumStepMode: true, dsd };
        if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
        S._oledLocked = true;
        e.preventDefault();
        return;
      }
      encDrags[i] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX, startVal: def.get(res.st), idx: res.idx, moved: false, drumMode: false };
      if (heldSteps.has(res.idx)) heldSteps.get(res.idx).didAction = true;
      S._oledLocked = true;
      e.preventDefault();
      return;
    }

    // Priorité 2 : mode drum → Tune/Decay/Tone/Drive
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      const pad = t.drumPads[S.selectedDrumPad];
      const dr = DRUM_ENC_RANGES[i];
      if (!dr) return;
      const key = DRUM_ENC_KEYS[i];
      encDrags[i] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX, startVal: pad[key] ?? 0, drumMode: true, key, dr };
      S._oledLocked = true;
      e.preventDefault();
      return;
    }
    // Priorité 3a : Junox sans step → VCF Freq/Resonance/Env Mod/LFO Rate sur enc0-3
    if (t.outputMode === 'junox' && i < 4) {
      const JUNOX_ENC = [
        { key: 'vcf.frequency', label: 'CUTOFF',    min: 0, max: 1, def: 0.7 },
        { key: 'vcf.resonance', label: 'RESONANCE', min: 0, max: 1, def: 0   },
        { key: 'vcf.envMod',    label: 'ENV MOD',   min: 0, max: 1, def: 0   },
        { key: 'lfo.frequency', label: 'LFO RATE',  min: 0, max: 1, def: 0.3 },
      ];
      const jDef = JUNOX_ENC[i];
      const patch = junoxPatches[S.currentTrack];
      if (!patch) return;
      const parts = jDef.key.split('.');
      const startVal = patch[parts[0]]?.[parts[1]] ?? jDef.def;
      encDrags[i] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX,
        startVal, junoxEncMode: true, jDef };
      S._oledLocked = true;
      e.preventDefault();
      return;
    }

    // Priorité 3b : mélodique SF2 sans step → Cutoff/Resonance/Release sur enc0/1/2
    if (t.outputMode === 'sf2' && i < 3) {
      const SF2_ENC = [
        { key: 'midiCutoff',  label: 'CUTOFF',   min: 0, max: 127, def: 127, fmt: v => Math.round(v) },
        { key: 'midiReson',   label: 'RESONANCE',     min: 0, max: 127, def: 0,   fmt: v => Math.round(v) },
        { key: 'midiRelease', label: 'RELEASE',   min: 0, max: 127, def: 0,   fmt: v => Math.round(v) },
      ];
      const sf2Def = SF2_ENC[i];
      const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
      const arpSlot = arpIdx >= 0 ? trackFX[S.currentTrack][arpIdx] : null;
      if (!arpSlot) return;
      const startVal = arpSlot.params[sf2Def.key] ?? sf2Def.def;
      encDrags[i] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX,
        startVal, sf2EncMode: true, sf2Def, arpIdx };
      S._oledLocked = true;
      e.preventDefault();
    }
  });
});

// ── Enc4 = Reverb Send, Enc5 = Delay Send ─────────────────────
// Valeur par pad en mode drum, valeur globale track en mode mélodique
const encSendDrags = [null, null]; // [rev, delay]
const SEND_ENCS = [
  { id: 'enc4', arcId: 'encArc4', lblId: 'encLbl4', key: 'sendDelay',  label: 'DELAY'  },
  { id: 'enc5', arcId: 'encArc5', lblId: 'encLbl5', key: 'sendReverb', label: 'REVERB' },
];

// ── Enc4/Enc5 sends : drag ──────────────────────────────────
// (le double-tap reset est géré en fin de document)
SEND_ENCS.forEach((def, si) => {
  const el = svg(def.id);
  if (!el) return;
  el.addEventListener('mouseup', e => {
    if (anyStepHeld()) { e.stopPropagation(); encSendDrags[si] = null; }
  });
  el.addEventListener('mousedown', e => {
    if (projectModeActive) return;
    if (S.mode === 'session') return;
    const t = S.tracks[S.currentTrack];
    if (t.mode === 'master') return;
    let startVal;
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      startVal = t.drumPads[S.selectedDrumPad][def.key] ?? 0;
    } else {
      startVal = t[def.key] ?? 0;
    }
    encSendDrags[si] = { y: e.clientY, x: e.clientX, lastY: e.clientY, lastX: e.clientX, startVal };
    S._oledLocked = true;
    e.preventDefault();
  });
});

document.addEventListener('mousemove', e => {
  SEND_ENCS.forEach((def, si) => {
    const drag = encSendDrags[si];
    if (!drag) return;
    const distFromLast = Math.abs(e.clientY - drag.lastY) + Math.abs(e.clientX - drag.lastX);
    const prevLastY = drag.lastY;
    const prevLastX = drag.lastX;
    drag.lastY = e.clientY;
    drag.lastX = e.clientX;
    if (distFromLast > 60) return;
    const dy = prevLastY - e.clientY;
    const dx = e.clientX - prevLastX;
    const delta = dy + dx;
    if (Math.abs(delta) < 1) return;
    const t = S.tracks[S.currentTrack];
    const curVal = t.mode === 'drum'
      ? (t.drumPads?.[S.selectedDrumPad]?.[def.key] ?? 0)
      : (t[def.key] ?? 0);
    const newVal = Math.max(0, Math.min(1, curVal + delta / 300));
    if (t.mode === 'drum') {
      if (!t.drumPads) return;
      t.drumPads[S.selectedDrumPad][def.key] = newVal;
      oledForce(def.label + ' SEND', Math.round(newVal * 100) + '%', `Pad ${S.selectedDrumPad + 1}`);
    } else {
      t[def.key] = newVal;
      const nodes = trackSendNodes[S.currentTrack];
      if (nodes) {
        if (def.key === 'sendDelay')  nodes.dSend.gain.value = newVal;
        if (def.key === 'sendReverb') nodes.rSend.gain.value = newVal;
      }
      oledForce(def.label + ' SEND', Math.round(newVal * 100) + '%', `Track ${S.currentTrack + 1}`);
    }
    updateSendArcs();
  });
});

document.addEventListener('mouseup', () => {
  encSendDrags.forEach((d, si) => {
    if (d) { encSendDrags[si] = null; S._oledLocked = false; }
  });
});

function updateSendArcs() {
  const t = S.tracks[S.currentTrack];
  const col = trackColor(S.currentTrack);
  const dimAll = projectModeActive || S.mode === 'session';
  SEND_ENCS.forEach((def, si) => {
    const enc = svg(def.id);
    const lbl = document.getElementById(def.lblId);
    const arc = document.getElementById(def.arcId);
    if (dimAll || t.mode === 'master') {
      if (enc) enc.setAttribute('stroke', dimAll ? '#1e1e20' : '#383838');
      if (lbl) { lbl.textContent = def.label; lbl.setAttribute('fill', dimAll ? '#1a1a1a' : '#2a2a2a'); }
      if (arc) { arc.setAttribute('stroke', 'none'); arc.setAttribute('stroke-dasharray', `0 ${ENC_CIRC}`); arc.setAttribute('stroke-dashoffset', '0'); }
      return;
    }
    let val;
    if (t.mode === 'drum') {
      if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
      val = t.drumPads[S.selectedDrumPad][def.key] ?? 0;
    } else {
      val = t[def.key] ?? 0;
    }
    if (enc) enc.setAttribute('stroke', col + '88');
    if (lbl) { lbl.textContent = def.label; lbl.setAttribute('fill', col); }
    if (arc) {
      const lit = ENC_ARC_TOTAL * Math.max(0, Math.min(1, val));
      arc.setAttribute('stroke-dashoffset', '0');
      arc.setAttribute('stroke-dasharray', `${lit.toFixed(2)} ${(ENC_CIRC - lit).toFixed(2)}`);
      arc.setAttribute('stroke', col);
    }
  });
}

document.addEventListener('mousemove', e => {
  ENC_DEFS.forEach((def, i) => {
    if (!encDrags[i]) return;
    const distFromLast = Math.abs(e.clientY - encDrags[i].lastY) + Math.abs(e.clientX - encDrags[i].lastX);
    const prevLastY = encDrags[i].lastY;
    const prevLastX = encDrags[i].lastX;
    encDrags[i].lastY = e.clientY;
    encDrags[i].lastX = e.clientX;
    if (distFromLast > 60) return;
    const dy = prevLastY - e.clientY;
    const dx = e.clientX - prevLastX;
    const delta = dy + dx;

    // Mode drum step tenu
    if (encDrags[i].drumStepMode) {
      if (Math.abs(delta) < 0.5) return;
      const res = getHeldSt();
      if (!res) return;
      const { dsd } = encDrags[i];
      const pxPerUnit = i === 0 ? 3 : (i === 1 ? 1 : (i === 2 ? 150 : 1));
      const newVal = Math.max(dsd.min, Math.min(dsd.max, dsd.get(res.st) + delta / pxPerUnit));
      dsd.set(res.st, newVal);
      encDrags[i].moved = true;
      oledForce(dsd.label, dsd.fmt(newVal), `Step ${encDrags[i].idx + 1}`);
      updateEncArcs();
      return;
    }

    // Mode drum (pad global)
    if (encDrags[i].drumMode) {
      if (Math.abs(delta) < 0.5) return;
      const t = S.tracks[S.currentTrack];
      if (!t.drumPads) return;
      const pad = t.drumPads[S.selectedDrumPad];
      const { key, dr } = encDrags[i];
      const range = dr.max - dr.min;
      const newVal = Math.max(dr.min, Math.min(dr.max, (pad[key] ?? dr.min) + delta / 120 * range));
      pad[key] = newVal;
      oledForce(dr.label, dr.fmt(newVal), `Pad ${S.selectedDrumPad + 1}`);
      updateEncArcs();
      return;
    }

    // Mode Junox enc : VCF Freq / Resonance / Env Mod / LFO Rate
    if (encDrags[i].junoxEncMode) {
      if (Math.abs(delta) < 0.3) return;
      const { jDef } = encDrags[i];
      const patch = junoxPatches[S.currentTrack];
      if (!patch) return;
      const parts = jDef.key.split('.');
      const cur = patch[parts[0]]?.[parts[1]] ?? jDef.def;
      const newVal = Math.max(jDef.min, Math.min(jDef.max, cur + delta / 150));
      if (!patch[parts[0]]) patch[parts[0]] = {};
      patch[parts[0]][parts[1]] = newVal;
      // Appliquer au nœud Junox en temps réel
      const node = junoxNodes[S.currentTrack];
      if (node) node.sendMessage('set-param', { name: jDef.key, value: newVal });
      oledForce(jDef.label, Math.round(newVal * 100) + '%', `T${S.currentTrack + 1}`);
      updateEncArcs();
      return;
    }

    // Mode SF2 enc : Cutoff / Resonance / Release
    if (encDrags[i].sf2EncMode) {
      if (Math.abs(delta) < 0.5) return;
      const { sf2Def, arpIdx } = encDrags[i];
      const arpSlot = trackFX[S.currentTrack][arpIdx];
      if (!arpSlot) return;
      const cur = arpSlot.params[sf2Def.key] ?? sf2Def.def;
      const newVal = Math.max(sf2Def.min, Math.min(sf2Def.max, cur + delta / 1.5));
      arpSlot.params[sf2Def.key] = newVal;
      midiCtrlSendCC(S.currentTrack,
        sf2Def.key === 'midiCutoff' ? 74 : sf2Def.key === 'midiReson' ? 71 : 72,
        Math.round(newVal));
      oledForce(sf2Def.label, String(Math.round(newVal)), `T${S.currentTrack + 1}`);
      updateEncArcs();
      return;
    }

    if (Math.abs(delta) < 0.5) return;
    encDrags[i].moved = true;
    const eMax = getEncMax(def);
    const res = getHeldSt();
    if (!res) return;
    const cur = def.get(res.st);
    const pxPerUnit = i === 0 ? 2 : (i === 2 ? 150 : 1);
    const newVal = Math.max(def.min, Math.min(eMax, cur + delta / pxPerUnit));
    def.set(res.st, newVal);
    if (i === 0 && res.st.on) {
      showNoteLengthFeedback(res.idx, true, Math.round(newVal));
    }
    oledForce(def.label, def.fmt(newVal), `Step ${encDrags[i].idx + 1}`);
    updateEncArcs();
  });
});

document.addEventListener('mouseup', () => {
  // Si un step est tenu, ne pas désactiver les encodeurs — on veut pouvoir
  // enchaîner plusieurs réglages sans relâcher le step
  if (anyStepHeld()) {
    encDrags.forEach((d, i) => { encDrags[i] = null; });
    return;
  }
  let any = false;
  encDrags.forEach((d, i) => {
    if (!d) return;
    if (!d.moved) {
      const res = getHeldSt();
      if (res && res.st.on) {
        const def = ENC_DEFS[i];
        oledForce(def.label, def.fmt(def.get(res.st)), `Step ${d.idx + 1}`);
      }
    }
    encDrags[i] = null;
    any = true;
  });
  if (any) {
    updateEncArcs();
    if (!encDrags.some(d=>d) && !anyStepHeld()) S._oledLocked = false;
  }
});



// ═══════════════════════════════════════════════════════════════
// PIANO SVG (dans le SVG principal, group #pianoPart)
// ═══════════════════════════════════════════════════════════════
S.pianoOctave = 0;  // relatif : -2 à +2, 0 = C1-C5
S.pianoOpen = true;
var PIANO_BASE_OCT = 1; // niveau 0 = C1-C5 ✓, range -2 à +3 couvre C-1 à C8

var PX0 = 62, PY0 = 0;    // origine touches (relatif au groupe keyboardZone)
var PW_TOTAL = 836 - PX0;  // 774px disponibles
var PIANO_OCTAVES = 3;
var WHITE_TOTAL = PIANO_OCTAVES * 7 + 1; // 22 blanches
var PK_WW = PW_TOTAL / WHITE_TOTAL;       // largeur d'une blanche
var PK_WH = 97;                           // hauteur blanche
var PK_BW = PK_WW * 0.62;                // largeur noire
var PK_BH = PK_WH * 0.62;                // hauteur noire

// Constantes piano
var WHITE_SEMI   = [0,2,4,5,7,9,11];  // demi-tons touches blanches dans une octave
var BLACK_SEMI   = [1,3,6,8,10];       // demi-tons touches noires
var BLACK_AFTER_W = [0,1,3,4,5];       // après quelle blanche (index) se trouve chaque noire

function pMidi(oct, semi) { return (oct + 1) * 12 + semi; }

function buildPiano() {
  const g = document.getElementById('pianoKeys');
  g.innerHTML = '';
  const col = trackColor(S.currentTrack);
  const baseOct = PIANO_BASE_OCT + S.pianoOctave; // octave réel de la première touche

  // Blanches
  let wx = 0;
  for (let oct = 0; oct < PIANO_OCTAVES; oct++) {
    WHITE_SEMI.forEach((semi, wi) => {
      const midi = pMidi(baseOct + oct, semi);
      const x = PX0 + wx * PK_WW;
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('id', 'pk_' + midi);
      r.setAttribute('x', (x + 0.5).toFixed(1));
      r.setAttribute('y', PY0);
      r.setAttribute('width', (PK_WW - 1).toFixed(1));
      r.setAttribute('height', PK_WH);
      r.setAttribute('rx', '2');
      r.setAttribute('fill', '#d0d0d0');
      r.setAttribute('stroke', '#888');
      r.setAttribute('stroke-width', '0.5');
      r.setAttribute('cursor', 'pointer');
      r.addEventListener('mousedown', () => pianoKeyPress(midi));
      r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
      r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
      r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
      g.appendChild(r);
      wx++;
    });
  }
  // Dernière blanche C
  {
    const midi = pMidi(baseOct + PIANO_OCTAVES, 0);
    const x = PX0 + wx * PK_WW;
    const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    r.setAttribute('id', 'pk_' + midi);
    r.setAttribute('x', (x + 0.5).toFixed(1)); r.setAttribute('y', PY0);
    r.setAttribute('width', (PK_WW - 1).toFixed(1)); r.setAttribute('height', PK_WH);
    r.setAttribute('rx', '2'); r.setAttribute('fill', '#d0d0d0'); r.setAttribute('stroke', '#888');
    r.setAttribute('stroke-width', '0.5'); r.setAttribute('cursor', 'pointer');
    r.addEventListener('mousedown', () => pianoKeyPress(midi));
    r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
    r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
    r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
    g.appendChild(r);
  }
  // Noires
  wx = 0;
  for (let oct = 0; oct < PIANO_OCTAVES; oct++) {
    BLACK_AFTER_W.forEach((wi, bi) => {
      const semi = BLACK_SEMI[bi];
      const midi = pMidi(baseOct + oct, semi);
      const x = PX0 + (wx + wi) * PK_WW + PK_WW - PK_BW / 2;
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      r.setAttribute('id', 'pk_' + midi);
      r.setAttribute('x', x.toFixed(1)); r.setAttribute('y', PY0);
      r.setAttribute('width', PK_BW.toFixed(1)); r.setAttribute('height', PK_BH);
      r.setAttribute('rx', '2'); r.setAttribute('fill', '#1a1a1a'); r.setAttribute('stroke', '#000');
      r.setAttribute('stroke-width', '0.5'); r.setAttribute('cursor', 'pointer');
      r.addEventListener('mousedown', () => pianoKeyPress(midi));
      r.addEventListener('mouseup',   () => pianoKeyRelease(midi));
      r.addEventListener('touchstart', (e) => { e.preventDefault(); pianoKeyPress(midi); });
      r.addEventListener('touchend',   (e) => { e.preventDefault(); pianoKeyRelease(midi); });
      g.appendChild(r);
    });
    wx += 7;
  }
  // Labels C
  for (let oct = 0; oct <= PIANO_OCTAVES; oct++) {
    const x = PX0 + oct * 7 * PK_WW + PK_WW / 2;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x.toFixed(1));
    t.setAttribute('y', PY0 + PK_WH - 4);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', '14');
    t.setAttribute('font-family', "'DM Mono',monospace"); t.setAttribute('fill', '#999');
    t.setAttribute('pointer-events', 'none');
    t.textContent = 'C' + (baseOct + oct);
    g.appendChild(t);
  }
  // Affichage octave relatif
  const octStr = S.pianoOctave === 0 ? '0' : (S.pianoOctave > 0 ? '+' + S.pianoOctave : '' + S.pianoOctave);
  const octDisp2 = document.getElementById('octaveDisplay');
  if (octDisp2) octDisp2.textContent = octStr;
  illuminatePianoNotes();
}

function pianoKeyColor(midi, on) {
  const el = document.getElementById('pk_' + midi);
  if (!el) return;
  const h = parseFloat(el.getAttribute('height'));
  const isBlack = h < PK_WH * 0.8;
  const col = trackColor(S.currentTrack);
  if (on) { el.setAttribute('fill', col); el.setAttribute('stroke', '#fff'); }
  else { el.setAttribute('fill', isBlack ? '#1a1a1a' : '#d0d0d0'); el.setAttribute('stroke', isBlack ? '#000' : '#888'); }
}

let _pianoHeldMidi = null; // touche piano actuellement pressée
let _padHeldNote = null;   // note pad SF2 actuellement pressée

function pianoKeyPress(midi) {
  ensureAudio();
  if (_pianoHeldMidi !== null && _pianoHeldMidi !== midi) {
    pianoKeyRelease(_pianoHeldMidi);
  }
  _pianoHeldMidi = midi;
  pianoKeyColor(midi, true);

  const t = S.tracks[S.currentTrack];

  // ── Track drum : mapper les notes aux pads ──
  if (t.mode === 'drum' && isDrumMidi(midi)) {
    const padIdx = midi - DRUM_MIDI_BASE;
    triggerDrumPad(padIdx, 0.8);
    return;
  }

  // ── Track mélodique : comportement normal ──
  if (t.mode === 'drum') return;
  if (arpIsActive(S.currentTrack)) {
    arpNoteOn(S.currentTrack, midi);
  } else {
    playTrackNote(S.currentTrack, midi, 0.75);
  }
  recNoteOn(midi, 0.8);
  if (anyStepHeld()) {
    const t = S.tracks[S.currentTrack];
    if (t.mode !== 'drum') {
      const bar = currentStepBar();
      heldSteps.forEach(o => o.didAction = true);
      for (const idx of heldSteps.keys()) {
        const st = bar[idx];
        if (!st.on) { st.on=true; st.note=midi; st.vel=0.8; st.len=1; st.extraNotes=[]; }
        else if (st.note === midi) {
          // Supprimer la note principale
          if (st.extraNotes && st.extraNotes.length > 0) {
            // Promouvoir la première extraNote comme note principale
            st.note = st.extraNotes.shift();
          } else {
            // Plus aucune note → désactiver le step
            st.on = false; st.extraNotes = [];
          }
        }
        else {
          if (!st.extraNotes) st.extraNotes = [];
          const i2 = st.extraNotes.indexOf(midi);
          if (i2 >= 0) {
            // Note déjà présente → la retirer
            st.extraNotes.splice(i2, 1);
          } else {
            // Nouvelle note → l'ajouter, et si st.note était le C4 par défaut (60) le remplacer
            const DEFAULT_NOTE = 60;
            if (st.note === DEFAULT_NOTE && st.extraNotes.length === 0) {
              // Le step n'avait que la note par défaut → la remplacer
              st.note = midi;
            } else {
              st.extraNotes.push(midi);
            }
          }
        }
      }
      clearStepNoteIllumination(); illuminateHeldStepNotes(); renderSteps(); illuminatePianoNotes();
    }
  }
}

function pianoKeyRelease(midi) {
  if (_pianoHeldMidi === midi) _pianoHeldMidi = null;
  const allNotes = getAllHeldNotes();
  if (!allNotes.includes(midi)) pianoKeyColor(midi, false);
  const t = S.tracks[S.currentTrack];
  if (t.outputMode === 'sf2' && t.mode !== 'drum') {
    if (arpIsActive(S.currentTrack)) {
      arpNoteOff(S.currentTrack, midi);
    } else {
      sf2NoteOff(S.currentTrack, midi);
    }
  } else if (t.outputMode === 'junox' && t.mode !== 'drum') {
    if (arpIsActive(S.currentTrack)) {
      arpNoteOff(S.currentTrack, midi);
    } else {
      junoxNoteOff(S.currentTrack, midi);
    }
  }
  recNoteOff(midi);
}

// Relâchement global des touches piano et pads (mouseup hors de la touche)
document.addEventListener('mouseup', () => {

    if (t_pad.outputMode === 'junox') junoxNoteOff(_padHeldNote.ti, _padHeldNote.note);
    else sf2NoteOff(_padHeldNote.ti, _padHeldNote.note);
    recNoteOff(_padHeldNote.note);
    _padHeldNote = null;
  }
});

function illuminatePianoNotes() {

// Indicateurs notes hors plage sur les boutons ↑/↓ du piano
function updatePianoOctaveIndicators() {
  const upRect   = document.getElementById('svgOctUpRect');
  const downRect = document.getElementById('svgOctDownRect');
  if (!upRect || !downRect) return;
  const baseOct = PIANO_BASE_OCT + S.pianoOctave;
  // pMidi(oct, 0) = (oct+1)*12  → C de l'octave baseOct
  const lowestVisible  = (baseOct + 1) * 12;                        // MIDI de C_baseOct
  const highestVisible = (baseOct + 1 + PIANO_OCTAVES) * 12 - 1;   // MIDI du dernier B visible

  let hasAbove = false, hasBelow = false;
  const t = S.tracks[S.currentTrack];
  if (t.mode !== 'drum' && t.mode !== 'master') {
    const clip = activeClip();
    for (let b = 0; b < clip.numBars; b++) {
      for (const st of clip.bars[b]) {
        if (!st.on) continue;
        for (const n of [st.note, ...(st.extraNotes || [])]) {
          if (n > highestVisible) hasAbove = true;
          if (n < lowestVisible)  hasBelow = true;
        }
      }
    }
  }

  const col = trackColor(S.currentTrack);
  upRect.setAttribute('fill',   hasAbove ? col + '44' : '#1c1c1e');
  upRect.setAttribute('stroke', hasAbove ? col        : '#2a2a2c');
  downRect.setAttribute('fill',   hasBelow ? col + '44' : '#1c1c1e');
  downRect.setAttribute('stroke', hasBelow ? col        : '#2a2a2c');
}

// Prob + shift dans le scheduler — on patche via wrapper

// MIDI INPUT
// ═══════════════════════════════════════════════════════════════
// Molette visuelle pitchbend/modwheel (null = pas d'élément SVG présent)
var notch = null;
var midiState = {
  access: null,
  inputs: [],
  outputs: [],
  selectedOutput: null,
  heldNotes: new Map(),
  _joystickUpFired: false,   // anti-répétition joystick haut
  _joystickDownFired: false, // anti-répétition joystick bas
};

function midiSetIndicator(connected) {
