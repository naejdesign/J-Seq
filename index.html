@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #808080;
  font-family: 'DM Mono', monospace;
  touch-action: none;
  overscroll-behavior: none; /* bloque pull-to-refresh et swipe de navigation */
  -webkit-overflow-scrolling: auto;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

#device {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  position: relative;
}

#device svg {
  width: 100%;
  height: 100%;
  max-width: 100vw;
  max-height: 100vh;
  display: block;
}

/* SF2 Browser — se positionne par dessus le SVG, mêmes dimensions */
#sf2Browser {
  display: none;
  position: absolute;
  /* Centré comme le SVG avec les mêmes contraintes */
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(100vw, calc(100vh * 860 / 461));
  height: min(100vh, calc(100vw * 461 / 860));
  max-width: 100vw;
  max-height: 100vh;
  z-index: 100;
  border-radius: 14px;
  background: #1a1a1c;
  border: 1.5px solid #333;
  font-family: 'DM Mono', monospace;
  color: #eee;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}
#sf2Browser.open { display: flex; }

</style>

</script>

// Lire une valeur dans le patch via chemin dot-notation
function junoxGetPatchVal(patch, key) {
  const parts = key.split('.');
  let obj = patch;
  for (const p of parts) obj = obj?.[p];
  return obj;
}

// Écrire une valeur dans le patch via chemin dot-notation
function junoxSetPatchVal(patch, key, value) {
  const parts = key.split('.');
  let obj = patch;
  for (let i = 0; i < parts.length - 1; i++) {
    if (obj[parts[i]] === undefined) obj[parts[i]] = {};
    obj = obj[parts[i]];
  }
  obj[parts[parts.length - 1]] = value;
}

// Convertir la valeur UI → valeur patch (pour les params avec map)
function junoxMapVal(param, uiVal) {
  if (param.map) return param.map(uiVal);
  // Booleans : vcf.modPositive, lfo.autoTrigger
  if (param.key === 'vcf.modPositive' || param.key === 'lfo.autoTrigger') {
    return uiVal >= 0.5;
  }
  // dco.saw et dco.pulse : floats 0→1 (pas de boolean, le moteur accepte les deux)
  // dco.subAmount : float
  // Tout le reste : float direct
  return uiVal;
}

// Convertir valeur patch → valeur UI numérique
function junoxUiVal(param, patchVal) {
  if (typeof patchVal === 'boolean') return patchVal ? 1 : 0;
  if (typeof patchVal === 'string') {
    // pwmMod : 'l'→0, 'm'→1, 'e'→2
    if (param.key === 'dco.pwmMod') return {'l':0,'m':1,'e':2}[patchVal] ?? 0;
    // vcaType : 'env'→1, 'gate'→0
    if (param.key === 'vcaType') return patchVal === 'env' ? 1 : 0;
  }
  // dco.range : les valeurs patch sont 0.5/1/2 → index 0/1/2 pour l'UI cycleVals
  if (param.key === 'dco.range' && param.cycleVals) {
    const idx = param.cycleVals.indexOf(patchVal);
    return idx >= 0 ? idx : 1; // défaut = 8' (index 1)
  }
  // dco.saw et dco.pulse peuvent être true/false (anciens patchs) → 1 ou 0
  if ((param.key === 'dco.saw' || param.key === 'dco.pulse') && typeof patchVal === 'boolean') {
    return patchVal ? 1 : 0;
  }
  return typeof patchVal === 'number' ? patchVal : param.def;
}

// Initialiser Junox pour une track donnée
async function initJunox(ti) {
  if (ti === undefined) ti = 1; // compatibilité ancienne API
  if (junoxReady[ti] || junoxInitializing[ti]) return;
  junoxInitializing[ti] = true;
  ensureAudio();
  try {
    // Utiliser le patch existant si disponible, sinon Strings 1 par défaut
    const existingPatch = junoxPatches[ti];
    const patch = existingPatch
      ? JSON.parse(JSON.stringify(existingPatch))
      : { ...Junox.defaultPatch, dco: { ...Junox.defaultPatch.dco, sub: true } };
    junoxPatches[ti] = patch;

    const node = await Junox.createJuno60(actx, patch, { polyphony: 16 });
    junoxNodes[ti] = node;

    // Connecter dans la chaîne FX / sends
    junoxRebuildChain(ti);

    junoxReady[ti] = true;
    junoxInitializing[ti] = false;
    console.log(`[Junox] T${ti+1} prête — patch:`, patch.name);
  } catch(e) {
    junoxInitializing[ti] = false;
    console.error(`[Junox] T${ti+1} init failed:`, e);
  }
}

// Démonter Junox pour une track (libère les ressources audio)
function destroyJunox(ti) {
  const node = junoxNodes[ti];
  if (node) {
    try { node.disconnect(); } catch(e) {}
    junoxNodes[ti] = null;
  }
  junoxPatches[ti] = null;
  junoxReady[ti] = false;
  junoxInitializing[ti] = false;
}

// Construire la chaîne audio Junox
function junoxRebuildChain(ti) {
  const node = junoxNodes[ti];
  if (!node || !actx) return;
  try { node.disconnect(); } catch(e) {}

  // Créer ou recréer les nœuds delay+reverb+sat si besoin
  if (!junoxDelayNodes[ti]) junoxCreateFX(ti);
  if (!junoxSatNodes[ti])   junoxCreateSat(ti);

  try {
    const delay  = junoxDelayNodes[ti];
    const reverb = junoxReverbNodes[ti];
    const sat    = junoxSatNodes[ti];

    if (delay && reverb && sat) {
      // Chaîne : junox → delay → reverb → saturateur → master + sends
      node.connect(delay.input);
      delay.output.connect(reverb.input);
      reverb.output.connect(sat.input);
      sat.output.connect(getMaster());
      // Sends master
      const t = S.tracks[ti];
      const dSend = actx.createGain();
      const rSend = actx.createGain();
      dSend.gain.value = t.sendDelay  || 0;
      rSend.gain.value = t.sendReverb || 0;
      sat.output.connect(dSend); dSend.connect(getDelayBus());
      sat.output.connect(rSend); rSend.connect(getReverbBus());
      trackSendNodes[ti] = { dSend, rSend };
    } else {
      // Fallback direct
      node.connect(getMaster());
    }
    console.log('[Junox] Chaîne audio T2 connectée');
  } catch(e) {
    console.warn('[Junox] Erreur chaîne audio:', e);
    try { node.connect(getMaster()); } catch(e2) {}
  }
}

// Créer les nœuds delay+reverb Viktor pour une track
function junoxCreateFX(ti) {
  if (!actx) return;

  // ── DELAY (architecture Viktor : delay → LP filter → feedback) ───────────
  const rt = junoxRuntime[ti];
  const dlyInput   = actx.createGain();
  const dlyDry     = actx.createGain();
  const dlyWet     = actx.createGain();
  const dlyDelay   = actx.createDelay(2.0);
  const dlyFilter  = actx.createBiquadFilter();
  const dlyFeedback= actx.createGain();
  const dlyOutput  = actx.createGain();

  dlyFilter.type = 'lowpass';
  dlyFilter.frequency.value = 2000; // secret Viktor : LP 2kHz dans le feedback

  // Connexions delay
  dlyInput.connect(dlyDry);
  dlyInput.connect(dlyDelay);
  dlyDelay.connect(dlyFilter);
  dlyFilter.connect(dlyFeedback);
  dlyFeedback.connect(dlyDelay);   // boucle feedback
  dlyFeedback.connect(dlyWet);
  dlyDry.connect(dlyOutput);
  dlyWet.connect(dlyOutput);

  // Valeurs initiales
  dlyDelay.delayTime.value    = rt.dlyTime / 1000;
  dlyFeedback.gain.value      = rt.dlyFeedback;
  dlyDry.gain.value           = 1;
  dlyWet.gain.value           = rt.dlyMix;

  junoxDelayNodes[ti] = { input: dlyInput, output: dlyOutput,
    delay: dlyDelay, filter: dlyFilter, feedback: dlyFeedback,
    dry: dlyDry, wet: dlyWet };

  // ── REVERB (convolution IR Viktor) ───────────────────────────────────────
  const rvInput    = actx.createGain();
  const rvDry      = actx.createGain();
  const rvWet      = actx.createGain();
  const rvConv     = actx.createConvolver();
  const rvFilterLo = actx.createBiquadFilter();
  const rvFilterHi = actx.createBiquadFilter();
  const rvOutput   = actx.createGain();

  rvFilterLo.type = 'highpass'; rvFilterLo.frequency.value = 20;
  rvFilterHi.type = 'lowpass';  rvFilterHi.frequency.value = 22050;

  rvInput.connect(rvDry);
  rvInput.connect(rvFilterLo);
  rvFilterLo.connect(rvFilterHi);
  rvFilterHi.connect(rvConv);
  rvConv.connect(rvWet);
  rvDry.connect(rvOutput);
  rvWet.connect(rvOutput);

  rvDry.gain.value = 1;
  rvWet.gain.value = rt.revLevel;

  // Charger l'IR depuis le fichier externe
  fetch('./impulse_rev.wav')
    .then(r => r.arrayBuffer())
    .then(buf => actx.decodeAudioData(buf))
    .then(decoded => {
      rvConv.buffer = decoded;
      console.log('[Junox] Reverb IR chargée');
    })
    .catch(e => console.warn('[Junox] IR load error:', e));

  junoxReverbNodes[ti] = { input: rvInput, output: rvOutput,
    convolver: rvConv, wet: rvWet, dry: rvDry };
}

// Mettre à jour les paramètres delay/reverb en live
function junoxSetDelay(ti, time, feedback, mix) {
  const d = junoxDelayNodes[ti];
  if (!d) return;
  if (time      !== undefined) d.delay.delayTime.value = time / 1000;
  if (feedback  !== undefined) d.feedback.gain.value   = feedback;
  if (mix       !== undefined) { d.wet.gain.value = mix; d.dry.gain.value = 1; }
}
function junoxSetReverb(ti, level) {
  const r = junoxReverbNodes[ti];
  if (!r) return;
  r.wet.gain.value = level;
}

function junoxSetSat(ti, drive, type) {
  const s = junoxSatNodes[ti];
  if (!s) return;
  if (drive !== undefined) {
    if (drive === null) {
      // OFF : bypass actif, chemin saturé coupé
      s.bypass.gain.setTargetAtTime(1, actx.currentTime, 0.02);
      s.preGain.gain.setTargetAtTime(0, actx.currentTime, 0.02);
      s.postGain.gain.setTargetAtTime(0, actx.currentTime, 0.02);
    } else {
      // ON : bypass coupé, chemin saturé actif
      const lin = Math.pow(10, drive / 20);
      s.bypass.gain.setTargetAtTime(0, actx.currentTime, 0.02);
      s.preGain.gain.setTargetAtTime(lin, actx.currentTime, 0.02);
      s.postGain.gain.setTargetAtTime(1 / Math.max(1, Math.sqrt(lin)), actx.currentTime, 0.02);
      if (!s.shaper.curve) {
        s.shaper.curve = junoxMakeSatCurve(junoxRuntime[ti].satType || 0);
      }
    }
  }
  if (type !== undefined) {
    s.shaper.curve = junoxMakeSatCurve(type);
  }
}

function junoxMakeSatCurve(type) {
  const n = 1024;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    let x = (i * 2) / n - 1;
    x *= 8;
    const sign = x >= 0 ? 1 : -1;
    const ax = Math.abs(x);
    let y;
    switch (type) {
      case 0: y = Math.tanh(x); break;
      case 1: y = Math.sin(x); break;
      case 2: y = x / Math.pow(1 + Math.pow(ax, 8), 1/8); break;
      case 3: y = Math.log(1 + ax) * sign * 0.6; y = y / Math.pow(1 + Math.pow(Math.abs(y), 8), 1/8); break;
      case 4: y = Math.sqrt(ax) * sign * 0.6; y = y / Math.pow(1 + Math.pow(Math.abs(y), 8), 1/8); break;
      case 5: y = Math.sin(Math.cbrt(x) * 0.5); break;
      case 6: { const t2 = 0.9; let s2 = x % (2*t2); if (s2 > t2) s2 = 2*t2-s2; else if (s2 < -t2) s2 = -2*t2-s2; y = s2; break; }
      case 7: y = Math.sin(ax * ax * sign); break;
      default: y = Math.tanh(x);
    }
    curve[i] = Math.max(-1, Math.min(1, y));
  }
  return curve;
}

function junoxCreateSat(ti) {
  if (!actx) return;
  const rt = junoxRuntime[ti];
  const input    = actx.createGain();
  const output   = actx.createGain();
  const bypass   = actx.createGain(); // chemin direct quand sat OFF
  const preGain  = actx.createGain();
  const shaper   = actx.createWaveShaper();
  shaper.oversample = '4x';
  const postGain = actx.createGain();

  // Deux chemins parallèles : bypass direct et chaîne saturée
  input.connect(bypass);
  bypass.connect(output);
  input.connect(preGain);
  preGain.connect(shaper);
  shaper.connect(postGain);
  postGain.connect(output);

  shaper.curve = junoxMakeSatCurve(rt.satType || 0);
  const isOff = (rt.satDrive ?? -13) <= -13;
  if (isOff) {
    bypass.gain.value   = 1;   // chemin direct actif
    preGain.gain.value  = 0;   // chemin saturé coupé
    postGain.gain.value = 0;
  } else {
    bypass.gain.value   = 0;   // chemin direct coupé
    const lin = Math.pow(10, rt.satDrive / 20);
    preGain.gain.value  = lin;
    postGain.gain.value = 1 / Math.max(1, Math.sqrt(lin));
  }

  junoxSatNodes[ti] = { input, output, bypass, preGain, shaper, postGain };
}

// ── API note Junox ────────────────────────────────────────────
function junoxNoteOn(ti, midi, velocity) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.noteOn(midi, Math.max(0.01, Math.min(1, velocity)));
}

function junoxNoteOff(ti, midi) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.noteOff(midi);
}

function junoxAllNotesOff(ti) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.panic();
}

function junoxPitchBend(ti, valueMinus1to1) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.pitchBend(valueMinus1to1);
}

function junoxSetPolyphony(ti, voices) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.port.postMessage({ action: 'set-polyphony', value: voices });
}

function junoxSetNotePrio(ti, prio) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.port.postMessage({ action: 'set-note-prio', value: prio });
}

function junoxSetSubOctave(ti, octaves) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.port.postMessage({ action: 'set-sub-octave', value: octaves });
}

function junoxSetNoiseType(ti, type) {
  const node = junoxNodes[ti];
  if (!node) return;
  node.port.postMessage({ action: 'set-noise-type', value: type });
}

// Appliquer un paramètre au nœud Junox en live
function junoxSetParam(ti, sectionIdx, paramKey, value) {
  const sec = JUNOX_SECTIONS[sectionIdx];
  if (!sec) return;
  const param = sec.params.find(p => p.key === paramKey);
  if (!param) return;

  // Paramètres hors-patch (runtime seulement)
  if (paramKey === '_poly') {
    const idx = Math.round(value);
    const voices = param.cycleVals[idx] ?? 16;
    junoxRuntime[ti].poly = idx;
    junoxSetPolyphony(ti, voices);
    // MONO → forcer Last note priority
    if (voices === 1) {
      junoxRuntime[ti].notePrio = 0;
      junoxSetNotePrio(ti, 0);
    }
    return;
  }
  if (paramKey === '_noiseType') {
    const type = Math.round(value);
    junoxRuntime[ti].noiseType = type;
    junoxSetNoiseType(ti, type);
    return;
  }
  if (paramKey === '_dlyTime') {
    junoxRuntime[ti].dlyTime = value;
    junoxSetDelay(ti, value, undefined, undefined);
    return;
  }
  if (paramKey === '_dlyFeedback') {
    junoxRuntime[ti].dlyFeedback = value;
    junoxSetDelay(ti, undefined, value, undefined);
    return;
  }
  if (paramKey === '_dlyMix') {
    junoxRuntime[ti].dlyMix = value;
    junoxSetDelay(ti, undefined, undefined, value);
    return;
  }
  if (paramKey === '_revLevel') {
    junoxRuntime[ti].revLevel = value;
    junoxSetReverb(ti, value);
    return;
  }
  if (paramKey === '_satDrive') {
    // Snap à l'entier (plage -12/+12 en pas de 1dB, plus OFF à -13)
    // Valeurs possibles : -13 (OFF), puis -12 à +12 en entiers
    // La zone entre -13 et -12 snap vers OFF (-13), au-dessus snap à l'entier
    const snapped = value < -12 ? -13 : Math.round(Math.max(-12, Math.min(12, value)));
    junoxRuntime[ti].satDrive = snapped;
    junoxSetSat(ti, snapped <= -13 ? null : snapped, undefined);
    return;
  }
  if (paramKey === '_satType') {
    junoxRuntime[ti].satType = Math.round(value);
    junoxSetSat(ti, undefined, Math.round(value));
    return;
  }
  if (paramKey === '_arpEnabled') {
    const v = Math.round(value);
    junoxRuntime[ti].arpEnabled = v;
    if (v === 0) arpStop(ti);
    return;
  }
  if (paramKey === '_arpRate') {
    junoxRuntime[ti].arpRate = Math.round(value);
    if (arpState[ti].timer) {
      clearInterval(arpState[ti].timer);
      arpState[ti].timer = null;
      arpState[ti].lastRate = Math.round(value);
      const newMs = ARP_RATE_STEPS[Math.round(value)] * stepDur() * 1000;
      arpState[ti].timer = setInterval(() => arpTick(ti), newMs);
    }
    return;
  }
  if (paramKey === '_arpMode') {
    junoxRuntime[ti].arpMode = Math.round(value);
    if (arpState[ti].timer) arpState[ti].noteIdx = 0;
    return;
  }
  if (paramKey === '_arpOctaves') {
    junoxRuntime[ti].arpOctaves = Math.round(value);
    return;
  }
  if (paramKey === '_notePrio') {
    junoxRuntime[ti].notePrio = Math.round(value);
    junoxSetNotePrio(ti, Math.round(value));
    return;
  }
  if (paramKey === '_subOct') {
    const oct = param.cycleVals[Math.round(value)] ?? 1;
    junoxRuntime[ti].subOct = Math.round(value); // stocker l'index UI
    junoxSetSubOctave(ti, oct);
    return;
  }

  const patch = junoxPatches[ti];
  if (!patch) return;

  let patchValue;
  if (param.cycleVals) {
    patchValue = param.cycleVals[Math.round(value)] ?? param.cycleVals[1] ?? value;
  } else if (param.key === 'chorus') {
    patchValue = Math.round(value);
  } else {
    patchValue = junoxMapVal(param, value);
  }
  junoxSetPatchVal(patch, paramKey, patchValue);

  // dco.subAmount pilote aussi le boolean dco.sub
  if (paramKey === 'dco.subAmount') {
    patch.dco.sub = patchValue > 0;
  }

  const node = junoxNodes[ti];
  if (!node) return;
  node.setPatch(patch);
}

// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
let actx = null;
function ensureAudio() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  // Keepalive : oscillateur quasi-silencieux qui empêche Chrome/Android de suspendre le contexte
  if (!window._audioKeepAlive) {
    const osc = actx.createOscillator();
    osc.frequency.value = 1; // 1Hz — infra-basse inaudible
    const g = actx.createGain();
    g.gain.value = 0.0001; // quasi-silencieux mais non-nul (Chrome ignore gain=0)
    osc.connect(g);
    g.connect(actx.destination);
    osc.start();
    window._audioKeepAlive = osc;
  }
  // Initialiser FluidSynth WASM au premier geste
  if (!sf2Ready && !sf2Initializing) initSF2();
  // Initialiser Junox au premier geste
  if (!junoxReady[S.currentTrack] && !junoxInitializing[S.currentTrack] && S.tracks[S.currentTrack]?.outputMode === 'junox') initJunox(S.currentTrack);
}

// ═══════════════════════════════════════════════════════════════
// MOTEUR ARPEGGIATEUR
// ═══════════════════════════════════════════════════════════════
// Rate en subdivisions de step (1/16) : 0=1/1(16) 1=1/2(8) 2=1/4(4) 3=1/8(2) 4=1/16(1) 5=1/32(0.5)
const ARP_RATE_STEPS = [16, 8, 4, 2, 1, 0.5]; // en nombre de steps 1/16

// État par track
const arpState = Array.from({length:8}, () => ({
  heldNotes:   [],
  noteIdx:     0,
  timer:       null,
  startTimer:  null,
  seqStopTimer: null,
  lastNote:    -1,
  octaveIdx:   0,
  fromSeq:     false,
  lastRate:    -1,
}));

function arpIsActive(ti) {
  // JunoX : vérifier la section ARP de JUNOX_SECTIONS
  if (S.tracks[ti]?.outputMode === 'junox') {
    return Math.round(junoxRuntime[ti].arpEnabled ?? 0) === 1;
  }
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  if (arpIdx < 0) return false;
  const s = trackFX[ti][arpIdx];
  return s.active && Math.round(s.params['arpEnabled'] ?? 0) === 1;
}

function arpGetParams(ti) {
  // JunoX : lire depuis junoxRuntime
  if (S.tracks[ti]?.outputMode === 'junox') {
    const rt = junoxRuntime[ti];
    return {
      rate:    Math.round(rt.arpRate    ?? 2),
      mode:    Math.round(rt.arpMode    ?? 0),
      octaves: Math.round(rt.arpOctaves ?? 1),
    };
  }
  const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
  const slot = trackFX[ti][arpIdx];
  return {
    rate:    Math.round(slot.params['arpRate']    ?? 2),
    mode:    Math.round(slot.params['arpMode']    ?? 0),
    octaves: Math.round(slot.params['arpOctaves'] ?? 1),
  };
}

// Construire la séquence de notes selon mode + octaves
function arpBuildSeq(notes, mode, octaves) {
  if (!notes.length) return [];
  const base = [...notes].sort((a,b) => a-b);
  let seq = [];
  for (let oct = 0; oct < octaves; oct++) {
    base.forEach(n => seq.push(n + oct * 12));
  }
  if (mode === 1) seq = seq.reverse();           // down
  if (mode === 2) {                               // up-down
    const down = seq.slice(1, seq.length-1).reverse();
    seq = [...seq, ...down];
  }
  if (mode === 3) seq = seq.sort(() => Math.random()-0.5); // random
  // mode 4 = order (ordre d'appui) — déjà dans heldNotes dans l'ordre d'appui
  return seq;
}

// Démarrer l'arp sur une track
function arpStart(ti) {
  const st = arpState[ti];
  if (st.timer) { clearInterval(st.timer); st.timer = null; }
  st.noteIdx = 0;
  st.lastRate = -1; // forcer recalcul intervalle
  arpTick(ti); // jouer immédiatement la première note
  const params = arpGetParams(ti);
  const intervalMs = ARP_RATE_STEPS[params.rate] * stepDur() * 1000;
  st.lastRate = params.rate;
  st.timer = setInterval(() => {
    // Relire le rate à chaque tick — si changé, redémarrer l'intervalle
    const p = arpGetParams(ti);
    if (p.rate !== st.lastRate) {
      clearInterval(st.timer);
      st.lastRate = p.rate;
      const newMs = ARP_RATE_STEPS[p.rate] * stepDur() * 1000;
      st.timer = setInterval(() => arpTick(ti), newMs);
    }
    arpTick(ti);
  }, intervalMs);
}

// Jouer la note suivante dans la séquence
function arpTick(ti) {
  const st = arpState[ti];
  const t = S.tracks[ti];
  if (!st.heldNotes.length) { arpStop(ti); return; }
  const params = arpGetParams(ti);
  const seq = arpBuildSeq(st.heldNotes, params.mode, params.octaves);
  if (!seq.length) return;
  // NoteOff de la note précédente
  if (st.lastNote >= 0) {
    if (t.outputMode === 'sf2') sf2NoteOff(ti, st.lastNote);
    else if (t.outputMode === 'junox') junoxNoteOff(ti, st.lastNote);
    else if (t.outputMode === 'midi') {
      const out = getTrackOutput(ti);
      if (out) out.send([0x80 | ((t.midiChannel-1)&0xf), st.lastNote, 0]);
    }
  }
  // Jouer la note courante (index actuel)
  const idx = st.noteIdx % seq.length;
  const note = seq[idx];
  const vel = 0.8;
  if (t.outputMode === 'sf2') sf2NoteOn(ti, note, vel);
  else if (t.outputMode === 'junox') junoxNoteOn(ti, note, vel);
  else if (t.outputMode === 'midi') {
    const out = getTrackOutput(ti);
    if (out) out.send([0x90 | ((t.midiChannel-1)&0xf), note, Math.round(vel*127)]);
  }
  st.lastNote = note;
  st.noteIdx = (st.noteIdx + 1) % seq.length;
}

// Arrêter l'arp sur une track
function arpStop(ti) {
  const st = arpState[ti];
  if (st.startTimer)   { clearTimeout(st.startTimer);   st.startTimer = null; }
  if (st.seqStopTimer) { clearTimeout(st.seqStopTimer); st.seqStopTimer = null; }
  if (st.timer) { clearInterval(st.timer); st.timer = null; }
  if (st.lastNote >= 0) {
    const t = S.tracks[ti];
    if (t.outputMode === 'sf2') sf2NoteOff(ti, st.lastNote);
    else if (t.outputMode === 'junox') junoxNoteOff(ti, st.lastNote);
    else if (t.outputMode === 'midi') {
      const out = getTrackOutput(ti);
      if (out) out.send([0x80 | ((t.midiChannel-1)&0xf), st.lastNote, 0]);
    }
    st.lastNote = -1;
  }
  st.heldNotes = [];
  st.noteIdx = 0;
}

// Déclencher l'arp depuis le séquenceur (step on)
function arpSeqTrigger(ti, notes, durMs) {
  const st = arpState[ti];
  // Mettre à jour les notes sans redémarrer le timer si déjà en route
  st.heldNotes = [...notes];
  st.fromSeq = true;
  st.noteIdx = 0; // reset séquence sur chaque nouveau step
  if (!st.timer) {
    arpStart(ti);
  }
  // Programmer l'arrêt après durMs
  if (st.seqStopTimer) clearTimeout(st.seqStopTimer);
  st.seqStopTimer = setTimeout(() => {
    if (st.fromSeq) {
      st.heldNotes = [];
      arpStop(ti);
    }
  }, durMs);
}

// NoteOn depuis clavier/MIDI
function arpNoteOn(ti, midi) {
  const st = arpState[ti];
  if (!st.heldNotes.includes(midi)) st.heldNotes.push(midi);
  st.fromSeq = false;
  // Annuler le timer de démarrage précédent
  if (st.startTimer) clearTimeout(st.startTimer);
  // Petit délai pour laisser toutes les notes d'un accord arriver
  st.startTimer = setTimeout(() => {
    st.startTimer = null;
    if (!st.timer) arpStart(ti);
  }, 30);
}

// NoteOff depuis clavier/MIDI
function arpNoteOff(ti, midi) {
  const st = arpState[ti];
  st.heldNotes = st.heldNotes.filter(n => n !== midi);
  if (!st.heldNotes.length) arpStop(ti);
}

// ── js-synthesizer (FluidSynth WASM) engine ──────────────────────────────────
// 4 instances indépendantes — une par track
const jsSynths = [null, null, null, null, null, null, null, null]; // Synthesizer par track
const jsSynthNodes = [null, null, null, null, null, null, null, null]; // AudioNode par track
let sf2Ready       = false;
let sf2Initializing = false;
// Mutex de chargement SF2 : true = chargement en cours, bloquer noteOn
const _sf2LoadingTrack = [false, false, false, false, false, false, false, false];
// Token de chargement : annule un chargement précédent si un nouveau arrive
const _sf2LoadToken = [0, 0, 0, 0, 0, 0, 0, 0];

// Accesseurs de compatibilité (track courante)
function jsSynth_ti(ti)     { return jsSynths[ti]; }
function jsSynthNode_ti(ti) { return jsSynthNodes[ti]; }
// Canal MIDI : chaque instance a son propre canal 0
const SF2_CHANNEL = 0;

// État par track : { sfontId, bank, program, presets, sfName }
const trackSF2 = Array.from({length:8}, () => ({

  bank:      0,

// ═══════════════════════════════════════════════════════════════
// SYSTÈME FX PAR TRACK
// ═══════════════════════════════════════════════════════════════
let tuna = null; // instance Tuna initialisée après actx

// Définition des 8 slots FX
// Ordre : Filter Tremolo Compress Chorus / Arp Phaser WahWah Bitcrush
const FX_DEFS = [
  // ── Ligne 1 ──
  {
    id: 'filter', name: 'Filter', color: '#4af',
    params: [
      { name: 'Cutoff', key: 'frequency', min: 20,  max: 20000, def: 18000, log: true  },
      { name: 'Res',    key: 'Q',         min: 0.1, max: 20,    def: 0.7,   log: false },
      { name: 'Type',   key: '_typeIdx',  min: 0,   max: 2,     def: 0,     log: false, labels: ['LP','HP','BP'], cycle: true },
    ],
    mainParams: [0, 1],
    create: () => {
      const node = actx.createBiquadFilter();
      node.type = 'lowpass'; node.frequency.value = 18000; node.Q.value = 0.7;
      node.input = node; node.output = node;
      const types = ['lowpass','highpass','bandpass'];
      node._typeIdx = 0;
      Object.defineProperty(node, '_typeIdx', {
        get: () => node.__typeIdx || 0,
        set: v => { node.__typeIdx = Math.round(v) & 3; node.type = types[node.__typeIdx]; }
      });
      return node;
    },
  },
  {
    id: 'tremolo', name: 'Tremolo', color: '#fa4',
    params: [
      { name: 'Speed', key: '_rate',      min: 0.1, max: 20, def: 5,   log: false },
      { name: 'Depth', key: '_intensity', min: 0,   max: 1,  def: 0.4, log: false },
      { name: 'Mix',   key: '_mix',       min: 0,   max: 1,  def: 0.7, log: false },
    ],
    mainParams: [0, 1],
    create: () => {
      const input   = actx.createGain();
      const output  = actx.createGain();
      const wetGain = actx.createGain(); wetGain.gain.value = 0.7;
      const dryGain = actx.createGain(); dryGain.gain.value = 0.3;
      const lfo     = actx.createOscillator();
      const lfoGain = actx.createGain(); lfoGain.gain.value = 0.4;
      const ampGain = actx.createGain(); ampGain.gain.value = 0.6;
      lfo.frequency.value = 5;
      lfo.connect(lfoGain); lfoGain.connect(ampGain.gain);
      lfo.start();
      input.connect(ampGain); ampGain.connect(wetGain); wetGain.connect(output);
      input.connect(dryGain); dryGain.connect(output);
      return {
        input, output,
        _dryGain: dryGain, _wetGain: wetGain,
        _lfo: lfo, _lfoGain: lfoGain, _ampGain: ampGain,
        _bypass: true, _mixVal: 0.7,
        get bypass() { return this._bypass; },
        set bypass(v) {
          this._bypass = v; const m = this._mixVal ?? 0.7;
          dryGain.gain.setTargetAtTime(v ? 1 : 1-m, actx.currentTime, 0.01);
          wetGain.gain.setTargetAtTime(v ? 0 : m,   actx.currentTime, 0.01);
        },
        get _rate()      { return lfo.frequency.value; },
        set _rate(v)     { lfo.frequency.setValueAtTime(v, actx.currentTime); },
        get _intensity() { return lfoGain.gain.value; },
        set _intensity(v){ lfoGain.gain.setTargetAtTime(v, actx.currentTime, 0.01); ampGain.gain.setTargetAtTime(1-v, actx.currentTime, 0.01); },
      };
    },
  },
  {
    id: 'compressor', name: 'Compressor', color: '#4fa',
    params: [
      { name: 'Thresh',  key: '_threshold', min: -60, max: 0,   def: -20,  log: false },
      { name: 'Ratio',   key: '_ratio',     min: 1,   max: 20,  def: 3,    log: false },
      { name: 'Attack',  key: '_attack',    min: 0,   max: 1,   def: 0.015, log: false },
      { name: 'Release', key: '_release',   min: 0,   max: 3,   def: 0.12, log: false },

  {
    id: 'saturation', name: 'Saturator', color: '#f84',
    params: [
      { name: 'Drive', key: '_drive', min: -12, max: 12, def: 0, step: 1, log: false },
      { name: 'Type',  key: '_type',  min: 0,   max: 7,  def: 0, log: false, labels: ['tanh','sine','hard','log','sqrt','cube','fold','sqSin'], cycle: true },
    ],
    mainParams: [0, 1],
    create: () => {
      const input    = actx.createGain();
      const output   = actx.createGain();
      const preGain  = actx.createGain();
      const shaper   = actx.createWaveShaper();
      shaper.oversample = '4x';
      const postGain = actx.createGain();

      let _driveVal = 0, _typeVal = 0, _bypassed = false;

      function dBtoLin(db) { return Math.pow(10, db / 20); }

      function makeCurve(type) {
        const n = 1024;
        const curve = new Float32Array(n);
        for (let i = 0; i < n; i++) {
          let x = (i * 2) / n - 1;
          x *= 8;
          let y;
          const sign = x >= 0 ? 1 : -1;
          const ax = Math.abs(x);
          switch (type) {
            case 0: y = Math.tanh(x); break;
            case 1: y = Math.sin(x); break;
            case 2: y = x / Math.pow(1 + Math.pow(ax, 8), 1/8); break;
            case 3:
              y = Math.log(1 + ax) * sign * 0.6;
              y = y / Math.pow(1 + Math.pow(Math.abs(y), 8), 1/8);
              break;
            case 4:
              y = Math.sqrt(ax) * sign * 0.6;
              y = y / Math.pow(1 + Math.pow(Math.abs(y), 8), 1/8);
              break;
            case 5: y = Math.sin(Math.cbrt(x) * 0.5); break;
            case 6: {
              const t = 0.9;
              let s = x % (2 * t);
              if (s > t) s = 2*t - s;
              else if (s < -t) s = -2*t - s;
              y = s; break;
            }
            case 7: y = Math.sin(ax * ax * sign); break;
            default: y = Math.tanh(x);
          }
          curve[i] = Math.max(-1, Math.min(1, y));
        }
        return curve;
      }

      function applyDrive() {
        if (_bypassed) return;
        const lin = dBtoLin(_driveVal);
        preGain.gain.setTargetAtTime(lin, actx.currentTime, 0.02);
        postGain.gain.setTargetAtTime(1 / Math.max(1, Math.sqrt(lin)), actx.currentTime, 0.02);
      }

      // Chaîne : input → preGain → shaper → postGain → output
      input.connect(preGain);
      preGain.connect(shaper);
      shaper.connect(postGain);
      postGain.connect(output);

      shaper.curve = makeCurve(0);
      applyDrive();

      return {
        input, output,
        get bypass() { return _bypassed; },
        set bypass(v) {
          _bypassed = !!v;
          if (_bypassed) {
            // Bypass : court-circuiter le shaper en mettant preGain=1 et une courbe identité
            preGain.gain.setTargetAtTime(1, actx.currentTime, 0.01);
            postGain.gain.setTargetAtTime(1, actx.currentTime, 0.01);
            const id = new Float32Array(2); id[0] = -1; id[1] = 1;
            shaper.curve = id;
          } else {
            shaper.curve = makeCurve(_typeVal);
            applyDrive();
          }
        },
        get _drive() { return _driveVal; },
        set _drive(v){ _driveVal = Math.round(Math.max(-12, Math.min(12, v))); applyDrive(); },
        get _type()  { return _typeVal; },
        set _type(v) {
          _typeVal = Math.round(v) % 8;
          if (!_bypassed) shaper.curve = makeCurve(_typeVal);
        },
      };
    },
  },
];

// État FX par track : tableau de 8 slots
// Chaque slot : { active, node, params: {key: value} }
const trackFX = Array.from({length:8}, () =>
  FX_DEFS.map(def => ({
    active: false,
    node: null,
    params: Object.fromEntries(def.params.map(p => [p.key, p.def])),
  }))
);
// Nœuds send delay/reverb par track (créés dans fxRebuildChain, mis à jour en temps réel)
const trackSendNodes = {};

// Page FX courante : 'main' ou index d'effet en édition avancée
let fxPage = 'main';

// Initialiser Tuna après actx
function ensureTuna() {
  if (!tuna && actx) tuna = new Tuna(actx);
}

// Créer/recréer le nœud audio d'un effet et le connecter
function fxCreateNode(ti, slotIdx) {
  const def = FX_DEFS[slotIdx];
  if (!def || !def.create || def.id === 'arp') return null;
  ensureTuna();
  const slot = trackFX[ti][slotIdx];
  if (slot.node) { try { slot.node.output.disconnect(); } catch(e) {} }

  // Effets natifs WebAudio (pas de wrapper Tuna)
  const isNative = def.id === 'filter' || def.id === 'chorus' || def.id === 'tremolo' || def.id === 'phaser' || def.id === 'compressor';

  if (isNative) {
    const node = def.create();
    if (!node) return null;
    // Appliquer les paramètres sauvegardés
    def.params.forEach(p => {
      const v = slot.params[p.key] ?? p.def;
      try {
        if (p.key === '_mix' && node._wetGain) {
          node._mixVal = v;
          node._wetGain.gain.value = v;
          node._dryGain.gain.value = 1 - v;
        } else if (node[p.key] !== undefined) {
          node[p.key] = v;
        }
      } catch(e) {}
    });
    node.bypass = true; // bypassé par défaut
    return node;
  }

  // Effet Tuna — wrapper wet/dry natif WebAudio
  const tunaNode = def.create();
  if (!tunaNode) return null;

  const mixVal  = slot.params['_mix'] ?? 0.5;
  const dryGain = actx.createGain(); dryGain.gain.value = 1 - mixVal;
  const wetGain = actx.createGain(); wetGain.gain.value = mixVal;
  const merger  = actx.createGain();

  // wet path : tuna output → wetGain → merger
  const tunaOut = tunaNode.output || tunaNode;
  tunaOut.connect(wetGain);
  wetGain.connect(merger);
  // dry path : input externe → dryGain → merger
  // (branché dans fxRebuildChain via wrapper.inputDry)
  dryGain.connect(merger);

  const tunaIn = tunaNode.input || tunaNode;
  const wrapper = {
    input:    tunaIn,   // signal wet → tuna
    inputDry: dryGain,  // signal dry → bypass
    output:   merger,
    _tuna:    tunaNode,
    _dry:     dryGain,
    _wet:     wetGain,
    get bypass() { return tunaNode.bypass; },
    set bypass(v) { tunaNode.bypass = v; }
  };

  // Appliquer les paramètres sauvegardés (hors _mix)
  def.params.forEach(p => {
    if (p.key === '_mix') return;
    const v = slot.params[p.key] ?? p.def;
    try {
      const parts = p.key.split('.');
      let t = tunaNode;
      for (let i = 0; i < parts.length - 1; i++) t = t[parts[i]];
      t[parts[parts.length-1]] = v;
    } catch(e) {}
  });

  return wrapper;
}

// Rebuilder la chaîne audio pour la track 0 (canal unique FluidSynth)
// Tous les nœuds FX sont dans la chaîne, bypass = inactif
function fxRebuildChain(ti) {
  if (ti === undefined) ti = S.currentTrack;
  // Track master : pas de chaîne SF2 à reconstruire
  if (S.tracks[ti] && S.tracks[ti].mode === 'master') return;
  // Track Junox → chaîne dédiée
  if (S.tracks[ti] && S.tracks[ti].outputMode === 'junox') {
    junoxRebuildChain(ti);
    return;
  }
  const synthNode = jsSynthNodes[ti];
  if (!synthNode || !sf2Ready) return;
  ensureTuna();
  try { synthNode.disconnect(); } catch(e) {}

  const nodes = [];
  for (let si = 0; si < FX_DEFS.length; si++) {
    if (FX_DEFS[si].id === 'arp') continue;
    const slot = trackFX[ti][si];
    if (!slot.active) {
      // Slot inactif : détruire le nœud pour forcer une recréation propre à la réactivation
      if (slot.node) {
        try { slot.node.output?.disconnect(); } catch(e) {}
        try { slot.node.input?.disconnect(); } catch(e) {}
        slot.node = null;
      }
      continue;
    }
    // Slot actif : toujours recréer le nœud (l'ancien a pu être déconnecté)
    slot.node = fxCreateNode(ti, si);
    if (slot.node) nodes.push(slot.node);
  }

  // Câblage : synthNode → [FX chain] → master + sends
  // Les sends sont TOUJOURS créés, même sans FX actifs
  let current = synthNode;
  try {
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      current.connect(n.input === n ? n : (n.input || n));
      if (n.inputDry) current.connect(n.inputDry);
      current = n.output === n ? n : (n.output || n);
    }
  } catch(e) {
    console.warn('[FX] Erreur chaîne FX track', ti, e);
    current = synthNode;
  }

  // Connexion master
  try { current.connect(getMaster()); } catch(e) {
    try { synthNode.connect(getMaster()); } catch(e2) {}
  }

  // Sends delay/reverb — TOUJOURS créés, même sans aucun FX actif
  try {
    const t = S.tracks[ti];
    const dSend = actx.createGain();
    const rSend = actx.createGain();
    dSend.gain.value = t.sendDelay  || 0;
    rSend.gain.value = t.sendReverb || 0;
    current.connect(dSend); dSend.connect(getDelayBus());
    current.connect(rSend); rSend.connect(getReverbBus());
    trackSendNodes[ti] = { dSend, rSend };
  } catch(e) {
    console.warn('[FX] Erreur sends track', ti, e);
  }
  if (nodes.length > 0) console.log(`[FX] Track ${ti+1} chaîne : ${nodes.length} nœuds`);
}

// Activer/désactiver un slot FX
function fxToggle(ti, slotIdx) {
  const slot = trackFX[ti][slotIdx];
  const def = FX_DEFS[slotIdx];
  slot.active = !slot.active;
  if (def.id === 'arp') {
    // Toggle arpEnabled param + slot.active en sync
    const cur = slot.params['arpEnabled'] ?? 0;
    const next = cur >= 0.5 ? 0 : 1;
    slot.params['arpEnabled'] = next;
    slot.active = next >= 0.5;
    if (!slot.active) {
      arpStop(ti);
    } else {
      // Démarrer l'arp avec les réglages en cours
      const arpIdx = FX_DEFS.findIndex(d => d.id === 'arp');
      if (arpIdx >= 0) fxSetParam(ti, arpIdx, 'arpEnabled', 1);
    }
    renderFXPanel();
    return;
  }
  // Créer le nœud si besoin
  if (!slot.node) {
    slot.node = fxCreateNode(ti, slotIdx);
    // Si c'est le premier nœud créé, rebuilder la chaîne
    fxRebuildChain();
  }
  if (slot.node) {
    const active = slot.active;
    // BiquadFilter natif — bypass via type allpass (transparent) au lieu de fréquence
    if (slot.node.frequency && slot.node.frequency.setValueAtTime) {
      if (!active) {
        // allpass = transparent, laisse tout passer sans coloration
        slot.node.type = 'allpass';
      } else {
        // Restaurer le vrai type depuis les params sauvegardés
        const typeIdx = Math.round(slot.params['_typeIdx'] ?? 0);
        const types = ['lowpass','highpass','bandpass'];
        slot.node.type = types[typeIdx & 3];
        const freqP = def.params.find(p => p.key === 'frequency');
        const qP    = def.params.find(p => p.key === 'Q');
        if (freqP) slot.node.frequency.setValueAtTime(slot.params['frequency'] ?? freqP.def, actx.currentTime);
        if (qP)    slot.node.Q.setValueAtTime(slot.params['Q'] ?? qP.def, actx.currentTime);
      }
    }
    // Chorus natif ou tout nœud avec _wetGain
    else if (slot.node._wetGain) {
      const mixVal = slot.params['_mix'] ?? 0.5;
      slot.node._wetGain.gain.setTargetAtTime(active ? mixVal : 0, actx.currentTime, 0.01);
      slot.node._dryGain.gain.setTargetAtTime(active ? 1 - mixVal : 1, actx.currentTime, 0.01);
    }
    // Tuna
    else {
      slot.node.bypass = !active;
    }
    console.log(`[FX] ${def.name} ${active ? 'ON' : 'OFF'}`);
  }
  renderFXPanel();
}

// Modifier un paramètre FX
function fxSetParam(ti, slotIdx, paramKey, value) {
  const slot = trackFX[ti][slotIdx];
  const def = FX_DEFS[slotIdx];
  slot.params[paramKey] = value;

  // Params MIDI CTRL — pas de nœud audio
  if (def.id === 'arp') {
    // Forcer entier pour octaves
    if (paramKey === 'arpOctaves') value = Math.round(value);
    slot.params[paramKey] = value;
    
    // Envoyer les CC MIDI en temps réel si le slot est actif
    if (slot.active) {
      if (paramKey === 'midiRelease') midiCtrlSendCC(ti, 72, Math.round(value));
      if (paramKey === 'midiCutoff')  midiCtrlSendCC(ti, 74, Math.round(value));
      if (paramKey === 'midiReson')   midiCtrlSendCC(ti, 71, Math.round(value));
    }
    
    // Arp ON/OFF toggle
    if (paramKey === 'arpEnabled') {
      value = Math.round(value);
      slot.params[paramKey] = value;
      if (value === 0) arpStop(ti);
    }
    
    if (paramKey === 'arpMode' && arpState[ti].timer) {
      arpState[ti].noteIdx = 0;
    }
    if (paramKey === 'arpRate' && arpState[ti].timer) {
      clearInterval(arpState[ti].timer);
      arpState[ti].timer = null;
      const newMs = ARP_RATE_STEPS[Math.round(value)] * stepDur() * 1000;
      arpState[ti].lastRate = Math.round(value);
      arpState[ti].timer = setInterval(() => arpTick(ti), newMs);
    }
    const paramIdx = def.params.findIndex(p => p.key === paramKey);
    const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
    if (valEl) valEl.textContent = fxFormatVal(def.params[paramIdx], value);
    const valAdv = document.getElementById(`fxadv_${slotIdx}_${paramIdx}`);
    if (valAdv) valAdv.textContent = fxFormatVal(def.params[paramIdx], value);
    return;
  }

  if (!slot.node) return;
  try {
    if (paramKey === '_mix') {
      // Nœud natif avec _wetGain (chorus)
      if (slot.node._wetGain) {
        slot.node._mixVal = value;
        slot.node._wetGain.gain.setTargetAtTime(value, actx.currentTime, 0.01);
        slot.node._dryGain.gain.setTargetAtTime(1 - value, actx.currentTime, 0.01);
      } else if (slot.node._wet) {
        // Wrapper Tuna
        slot.node._wet.gain.setTargetAtTime(value, actx.currentTime, 0.01);
        slot.node._dry.gain.setTargetAtTime(1 - value, actx.currentTime, 0.01);
      }
      console.log(`[FX] ${def.name}.mix = ${value.toFixed(2)}`);
    } else {
      // Accès direct sur le nœud (ou via _tuna pour les wrappers Tuna)
      const parts = paramKey.split('.');
      let target = slot.node._tuna || slot.node;
      for (let i = 0; i < parts.length - 1; i++) target = target[parts[i]];
      const lastKey = parts[parts.length - 1];
      const prop = target[lastKey];
      if (prop && prop.setValueAtTime) {
        prop.setTargetAtTime(value, actx.currentTime, 0.01);
      } else {
        target[lastKey] = value;
      }
      console.log(`[FX] ${def.name}.${paramKey} = ${value.toFixed ? value.toFixed(2) : value}`);
    }
  } catch(e) { console.warn('[FX] setParam error:', paramKey, e); }
  const paramIdx = def.params.findIndex(p => p.key === paramKey);
  if (paramIdx < 0) return;
  // Mettre à jour la valeur texte
  const valEl = document.getElementById(`fxpv_${slotIdx}_${paramIdx}`);
  if (valEl) {
    valEl.textContent = def.id === 'sends'
      ? Math.round(value * 100) + '%'
      : fxFormatVal(def.params[paramIdx], value);
  }
  // Pour Sends : mettre à jour l'arc en temps réel
  if (def.id === 'sends') {
    const START = 135, END = 405;
    const angleFill = START + value * (END - START);
    const sx = fxSlotX(slotIdx), sy = fxSlotY(slotIdx);
    const encR = 15, gap = 18;
    const totalEncW = encR*2*2 + gap;
    const encStartX = sx + (FX_SW - totalEncW) / 2 + encR;
    const cx = encStartX + paramIdx * (encR*2 + gap);
    const cy = sy + 28 + encR + 4;
    let arcEl = document.getElementById(`fxsend_${slotIdx}_${paramIdx}`);
    if (!arcEl && angleFill > START + 0.5) {
      // Créer l'arc dans le groupe du slot
      const sg = document.getElementById(`fxslot_${slotIdx}`);
      if (sg) {
        arcEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arcEl.setAttribute('id', `fxsend_${slotIdx}_${paramIdx}`);
        arcEl.setAttribute('fill', 'none');
        arcEl.setAttribute('stroke', def.color);
        arcEl.setAttribute('stroke-width', '3');
        arcEl.setAttribute('stroke-linecap', 'round');
        arcEl.setAttribute('pointer-events', 'none');
        // Insérer avant la zone de hit (dernier élément)
        sg.insertBefore(arcEl, sg.lastChild);
      }
    }
    if (arcEl) {
      if (angleFill <= START + 0.5) arcEl.setAttribute('d', '');
      else arcEl.setAttribute('d', arcPathFX(cx, cy, encR, START, angleFill));
    }
  }
}

function fxFormatVal(paramDef, val) {
  if (paramDef.labels) {
    const base = paramDef.cycleBase ?? 0;
    return paramDef.labels[Math.round(val) - base] || val+'';
  }
  if (paramDef.log) return val >= 1000 ? (val/1000).toFixed(1)+'k' : Math.round(val)+'';
  if (Number.isInteger(val)) return val+'';
  return parseFloat(val.toFixed(2))+'';
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDU SVG DU PANEL FX
// ─────────────────────────────────────────────────────────────────────────────
const FX_ZONE_X = 190, FX_ZONE_Y = 107, FX_ZONE_W = 510, FX_ZONE_H = 188;
const FX_COLS = 4, FX_ROWS = 2;
const FX_SW = Math.floor(FX_ZONE_W / FX_COLS); // 127
const FX_SH = Math.floor(FX_ZONE_H / FX_ROWS); // 94

function fxSlotX(i) { return FX_ZONE_X + (i % FX_COLS) * FX_SW; }
function fxSlotY(i) { return FX_ZONE_Y + Math.floor(i / FX_COLS) * FX_SH; }

function arcPathFX(cx, cy, r, startDeg, endDeg) {
  const s = (startDeg - 90) * Math.PI/180;
  const e = (endDeg   - 90) * Math.PI/180;
  const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s);
  const x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
  const large = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
}

function buildFXPanel() {
  const g = document.getElementById('enginePanel');
  if (!g) return;
  g.innerHTML = ''; // reset

  // Fond global
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', FX_ZONE_X); bg.setAttribute('y', FX_ZONE_Y);
  bg.setAttribute('width', FX_ZONE_W); bg.setAttribute('height', FX_ZONE_H);
  bg.setAttribute('rx', 6); bg.setAttribute('fill', '#0f0f11');
  bg.setAttribute('stroke', '#252528'); bg.setAttribute('stroke-width', '1');
  g.appendChild(bg);

  // 8 slots
  for (let i = 0; i < 8; i++) {
    const sg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    sg.setAttribute('id', `fxslot_${i}`);
    sg.setAttribute('data-fxslot', i);
    sg.style.cursor = 'pointer';
    g.appendChild(sg);
  }
}

function renderFXPanel() {
  const ti = S.currentTrack;
  const t = S.tracks[ti];
  const isDrum   = t.mode === 'drum';
  const isMaster = t.mode === 'master';
  const isJunox  = t.outputMode === 'junox';
  const showFX   = (S.mode === 'note' || S.mode === 'loop') && !isDrum && !isMaster && !projectModeActive;
  const showDrum = (S.mode === 'note' || S.mode === 'loop') && isDrum && !projectModeActive;
  const showMaster = (S.mode === 'note' || S.mode === 'loop') && isMaster && !projectModeActive;
  const showPanel  = showFX || showDrum || showMaster;

  // Reset fxPage/junoxPage si on change de track
  if (!isJunox && junoxPage !== 'main') junoxPage = 'main';
  if (fxPage !== 'main' && typeof fxPage === 'number') {
    if (!FX_DEFS[fxPage] || isMaster || isDrum) fxPage = 'main';
  }
  const panel = document.getElementById('enginePanel');
  if (!panel) return;
  panel.setAttribute('visibility', showPanel ? 'visible' : 'hidden');

  for (let r = 0; r < 4; r++) {
    const row = document.getElementById(`padRow${r}`);
    if (row) row.setAttribute('visibility', showPanel ? 'hidden' : 'visible');
  }
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 8; c++)
      ['padlbl','padslbl'].forEach(pfx => {
        const lbl = document.getElementById(`${pfx}_${r}_${c}`);
        if (lbl) lbl.setAttribute('visibility', showPanel ? 'hidden' : 'visible');
      });

  if (!showPanel) return;

  if (showDrum)   { renderDrumPadSelection(); return; }
  if (showMaster) { renderMasterPanel(); return; }
  // ── Junox : panel dédié ──
  if (isJunox) {
    if (junoxPage === 'main') renderJunoxPageMain(ti);
    else renderJunoxPageAdvanced(ti, junoxPage);
    return;
  }
  if (fxPage === 'main') renderFXPageMain(ti);
  else renderFXPageAdvanced(ti, fxPage);
}

// ── Panel Junox — écran principal : 7 sections (icône + nom) ──
function renderJunoxPageMain(ti) {
  const pad = 5;
  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';
    const sx = fxSlotX(i), sy = fxSlotY(i);

    if (i >= JUNOX_SECTIONS.length) {
      // Slot vide
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#0d0d0f');
      bg.setAttribute('stroke', '#1a1a1a'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);
      continue;
    }

    const sec = JUNOX_SECTIONS[i];
    const col = sec.color;
    // Pour la section ARP : état actif = arpEnabled
    const isArpSec  = (sec.id === 'arp');
    const arpActive = isArpSec && Math.round(junoxRuntime[ti].arpEnabled ?? 0) === 1;
    const bgFill    = arpActive ? col + '22' : '#141416';
    const bgStroke  = arpActive ? col        : '#2a2a2e';
    const bgSW      = arpActive ? '2'        : '0.5';

    // Fond
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
    bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
    bg.setAttribute('rx', 5);
    bg.setAttribute('fill', bgFill);
    bg.setAttribute('stroke', bgStroke);
    bg.setAttribute('stroke-width', bgSW);
    sg.appendChild(bg);

    // Icône SVG centrée (haut du slot)
    const iconG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const iconScale = 0.9;
    const iconW = 32 * iconScale;
    const iconX = sx + FX_SW/2 - iconW/2;
    const iconY = sy + 19 + (i === 5 ? 3 : i === 3 ? -1 : i === 6 ? 1 : 0);
    const iconXOffset = (i === 6 ? 1 : 0);
    iconG.setAttribute('transform', `translate(${iconX + iconXOffset},${iconY}) scale(${iconScale})`);
    iconG.setAttribute('pointer-events', 'none');

    if (sec.icon.startsWith('RECTS:')) {
      // Icône en rectangles remplis (ex: ARP piano-roll)
      const rects = sec.icon.slice(6).split('|');
      rects.forEach(r => {
        const [x, y, w, h, rx] = r.split(',').map(Number);
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x); rect.setAttribute('y', y);
        rect.setAttribute('width', w); rect.setAttribute('height', h);
        rect.setAttribute('rx', rx || 1);
        rect.setAttribute('fill', col);
        iconG.appendChild(rect);
      });
    } else {
      const iconPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      iconPath.setAttribute('d', sec.icon);
      iconPath.setAttribute('fill', 'none');
      iconPath.setAttribute('stroke', col);
      iconPath.setAttribute('stroke-width', '2');
      iconPath.setAttribute('stroke-linecap', 'round');
      iconPath.setAttribute('stroke-linejoin', 'round');
      iconG.appendChild(iconPath);
    }
    sg.appendChild(iconG);

    // Nom de la section
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', sx + FX_SW/2);
    nameEl.setAttribute('y', sy + FX_SH/2 + 18);
    nameEl.setAttribute('text-anchor', 'middle');
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '11');
    nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', col);
    nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = sec.name;
    sg.appendChild(nameEl);

    // LED ARP ON/OFF
    if (isArpSec) {
      const led = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      led.setAttribute('cx', sx + FX_SW - 12); led.setAttribute('cy', sy + 12);
      led.setAttribute('r', 3);
      led.setAttribute('fill',   arpActive ? col : '#222');
      led.setAttribute('stroke', arpActive ? col : '#333');
      led.setAttribute('pointer-events', 'none');
      sg.appendChild(led);
    }

    // Zone de clic
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
    hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('data-junoxslot', i);
    sg.appendChild(hit);
  }
}

// ── Panel Junox — écran secondaire : 7 params d'une section + slot retour ──
function renderJunoxPageAdvanced(ti, secIdx) {
  const sec = JUNOX_SECTIONS[secIdx];
  if (!sec) return;
  const patch = junoxPatches[ti];
  const pad = 5;

  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';
    const sx = fxSlotX(i), sy = fxSlotY(i);

    // Slot 7 = retour
    if (i === 7) {
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#1a1a1e');
      bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);
      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      arrow.setAttribute('x', sx + FX_SW/2); arrow.setAttribute('y', sy + FX_SH/2 + 8);
      arrow.setAttribute('text-anchor', 'middle');
      arrow.setAttribute('font-family', "'DM Mono',monospace");
      arrow.setAttribute('font-size', '45'); arrow.setAttribute('fill', '#555');
      arrow.setAttribute('pointer-events', 'none');
      arrow.textContent = '←';
      sg.appendChild(arrow);
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
      hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
      hit.setAttribute('fill', 'transparent');
      hit.setAttribute('data-junoxback', '1');
      sg.appendChild(hit);
      continue;
    }

    // Slots 0..6 = paramètres
    if (i >= sec.params.length) {
      // Slot vide
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#0d0d0f');
      bg.setAttribute('stroke', '#1a1a1a'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);
      continue;
    }

    const p = sec.params[i];
    // Params runtime (hors patch) : lire depuis junoxRuntime
    let rawVal;
    if (p.key === '_poly')        rawVal = junoxRuntime[ti]?.poly      ?? p.def;
    else if (p.key === '_notePrio')    rawVal = junoxRuntime[ti]?.notePrio    ?? p.def;
    else if (p.key === '_subOct')      rawVal = junoxRuntime[ti]?.subOct      ?? p.def;
    else if (p.key === '_noiseType')   rawVal = junoxRuntime[ti]?.noiseType   ?? p.def;
    else if (p.key === '_dlyTime')     rawVal = junoxRuntime[ti]?.dlyTime     ?? p.def;
    else if (p.key === '_dlyFeedback') rawVal = junoxRuntime[ti]?.dlyFeedback ?? p.def;
    else if (p.key === '_dlyMix')      rawVal = junoxRuntime[ti]?.dlyMix      ?? p.def;
    else if (p.key === '_revLevel')    rawVal = junoxRuntime[ti]?.revLevel     ?? p.def;
    else if (p.key === '_satDrive')    rawVal = junoxRuntime[ti]?.satDrive     ?? p.def;
    else if (p.key === '_satType')     rawVal = junoxRuntime[ti]?.satType      ?? p.def;
    else if (p.key === '_arpEnabled')  rawVal = junoxRuntime[ti]?.arpEnabled   ?? p.def;
    else if (p.key === '_arpRate')     rawVal = junoxRuntime[ti]?.arpRate      ?? p.def;
    else if (p.key === '_arpMode')     rawVal = junoxRuntime[ti]?.arpMode      ?? p.def;
    else if (p.key === '_arpOctaves')  rawVal = junoxRuntime[ti]?.arpOctaves   ?? p.def;
    else rawVal = patch ? junoxGetPatchVal(patch, p.key) : undefined;
    const uiVal  = junoxUiVal(p, rawVal !== undefined ? rawVal : p.def);
    // Pour cycleVals (Range) : uiVal est l'index 0/1/2, max = nb entrées - 1
    const uiMax  = p.cycleVals ? p.cycleVals.length - 1 : p.max;
    const uiMin  = p.cycleVals ? 0 : p.min;
    const pct    = Math.max(0, Math.min(1, (uiVal - uiMin) / (uiMax - uiMin || 1)));
    const pColor = p.color || sec.color;

    // Fond
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
    bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
    bg.setAttribute('rx', 5); bg.setAttribute('fill', '#141416');
    bg.setAttribute('stroke', '#252528'); bg.setAttribute('stroke-width', '0.5');
    sg.appendChild(bg);

    // Barre verticale
    const totalH = FX_SH - pad*2 - 30;
    const barH   = Math.max(0, Math.round(pct * totalH));
    const barBg  = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    barBg.setAttribute('x', sx+pad+8); barBg.setAttribute('y', sy+pad+10);
    barBg.setAttribute('width', 6); barBg.setAttribute('height', totalH);
    barBg.setAttribute('rx', 3); barBg.setAttribute('fill', '#1e1e22');
    sg.appendChild(barBg);

    const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bar.setAttribute('id', `junoxbar_${secIdx}_${i}`);
    bar.setAttribute('x', sx+pad+8);
    bar.setAttribute('y', String(sy + pad + 10 + totalH - barH));
    bar.setAttribute('width', 6); bar.setAttribute('height', String(barH));
    bar.setAttribute('rx', 3); bar.setAttribute('fill', pColor);
    bar.setAttribute('pointer-events', 'none');
    sg.appendChild(bar);

    // Nom du paramètre
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', sx+pad+20); nameEl.setAttribute('y', sy+22);
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '13'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', pColor); nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = p.name;
    sg.appendChild(nameEl);

    // Valeur
    const valEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    valEl.setAttribute('id', `junoxval_${secIdx}_${i}`);
    valEl.setAttribute('x', sx + FX_SW - 10); valEl.setAttribute('y', sy + FX_SH - 10);
    valEl.setAttribute('text-anchor', 'end');
    valEl.setAttribute('font-family', "'DM Mono',monospace");
    valEl.setAttribute('font-size', '14'); valEl.setAttribute('fill', '#ccc');
    valEl.setAttribute('pointer-events', 'none');
    // Pour cycleVals : passer l'index si fmtIsIndex, sinon la vraie valeur patch
    const displayVal = p.cycleVals
      ? (p.fmtIsIndex ? p.fmt(Math.round(uiVal)) : p.fmt(p.cycleVals[Math.round(uiVal)] ?? uiVal))
      : p.fmt(uiVal);
    valEl.textContent = displayVal;
    sg.appendChild(valEl);

    // Zone drag / tap
    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
    hit.setAttribute('width', FX_SW-pad*2); hit.setAttribute('height', FX_SH-pad*2);
    hit.setAttribute('fill', 'transparent');
    hit.setAttribute('data-junoxparam', i);
    hit.setAttribute('data-junoxsecadv', secIdx);
    sg.appendChild(hit);
  }
}

// ── Panel Master — 4 effets interactifs en 2 slots chacun ──────
function renderMasterPanel() {
  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (sg) sg.innerHTML = '';
  }

  const MASTER_DEFS = [
    {
      id:'delay', name:'DELAY', slots:[0,1], col:'#4fa',
      params: [
        { key:'syncDiv', label:'Time',   fmt: v => masterFX.delay.sync ? DELAY_SYNC_DIVS[Math.round(Math.max(0,Math.min(6,v)))].label : (masterFX.delay.time*1000).toFixed(0)+'ms', min:0, max:6, step:1 },
        { key:'sync',    label:'Sync',   fmt: v => v ? '● BPM' : '○ free', type:'toggle' },
        { key:'feedback',label:'Feedb',  fmt: v => Math.round(v*100)+'%', min:0, max:0.95 },
        { key:'filter',  label:'Filter', fmt: v => v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'Hz', min:200, max:16000, log:true },
      ],
    },
    {
      id:'reverb', name:'REVERB', slots:[2,3], col:'#58f',
      params: [
        { key:'type',       label:'Type',   type:'typesel', fmt: v => (v||'hall1').toUpperCase() },
        { key:'decay',      label:'Decay',  fmt: v => v.toFixed(1)+'s', min:0.2, max:20.0 },
        { key:'brightness', label:'Bright', fmt: v => Math.round(v*100)+'%', min:0, max:1 },
        { key:'predelay',   label:'PreDly', fmt: v => (v*1000).toFixed(1)+'ms', min:0, max:0.1 },
      ],
    },
    {
      id:'comp', name:'COMP', slots:[4,5], col:'#ff8',
      params: [
        { key:'threshold', label:'Thres', fmt: v => Math.round(v)+'dB', min:-60, max:0 },
        { key:'ratio',     label:'Ratio', fmt: v => Math.round(v)+':1',  min:1,   max:20 },
        { key:'attack',    label:'Atk',   fmt: v => v<0.01?(v*1000).toFixed(1)+'ms':(v*1000).toFixed(0)+'ms', min:0.0005, max:1, log:true },
        { key:'release',   label:'Rel',   fmt: v => (v*1000).toFixed(0)+'ms', min:0.01, max:1, log:true },
      ],
    },
    {
      id:'lim', name:'LIMIT', slots:[6,7], col:'#f55',
      params: [
        { key:'threshold', label:'Ceil',  fmt: v => Math.round(v)+'dB',  min:-20, max:0 },
        { key:'release',   label:'Rel',   fmt: v => (v*1000).toFixed(0)+'ms', min:0.005, max:1, log:true },
        { key:'knee',      label:'Knee',  fmt: v => Math.round(v)+'dB',  min:0, max:10 },
        { key:'gain',      label:'Gain',  fmt: v => (v>=0?'+':'')+Math.round(v)+'dB', min:-6, max:12 },
      ],
    },
  ];

  const margin = 4, encR = 11;

  MASTER_DEFS.forEach(def => {
    const sg = document.getElementById(`fxslot_${def.slots[0]}`);
    if (!sg) return;
    const x = fxSlotX(def.slots[0]), y = fxSlotY(def.slots[0]);
    const w = FX_SW * 2, h = FX_SH;
    const col = def.col;

    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', x+margin); bg.setAttribute('y', y+margin);
    bg.setAttribute('width', w-margin*2); bg.setAttribute('height', h-margin*2);
    bg.setAttribute('rx', 7);
    bg.setAttribute('fill', col+'18'); bg.setAttribute('stroke', col+'88');
    bg.setAttribute('stroke-width', '1.2');
    sg.appendChild(bg);

    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', x+14); nameEl.setAttribute('y', y+19);
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '9'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', col); nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = def.name;
    sg.appendChild(nameEl);

    const REVERB_TYPES = ['plate','room','hall1','hall2','atmos'];
    const nP = def.params.length;
    const colW = (w - margin*2) / nP;
    const yBase = y + 28;

    def.params.forEach((p, pi) => {
      const val = masterFX[def.id][p.key];
      const px  = x + margin + colW*pi + colW/2;

      if (p.type === 'toggle') {
        const tbg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        tbg.setAttribute('x', px-16); tbg.setAttribute('y', yBase+4);
        tbg.setAttribute('width', 32); tbg.setAttribute('height', 18);
        tbg.setAttribute('rx', 4);
        tbg.setAttribute('fill', val ? col+'33' : '#1a1a1e');
        tbg.setAttribute('stroke', val ? col : '#333');
        tbg.setAttribute('stroke-width','0.8');
        tbg.setAttribute('pointer-events','none');
        sg.appendChild(tbg);
        const ttxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        ttxt.setAttribute('x', px); ttxt.setAttribute('y', yBase+16);
        ttxt.setAttribute('text-anchor','middle');
        ttxt.setAttribute('font-family',"'DM Mono',monospace");
        ttxt.setAttribute('font-size','7');
        ttxt.setAttribute('fill', val ? col : '#777');
        ttxt.setAttribute('pointer-events','none');
        ttxt.textContent = p.fmt(val);
        sg.appendChild(ttxt);

      } else if (p.type === 'typesel') {
        const curIdx = REVERB_TYPES.indexOf(val || 'hall');
        // Même hauteur que encodeur + label : encR*2 (22) + 20 = 42px
        const btnH2 = encR * 2 + 20;
        const btnW2 = colW - 4;
        const btnX2 = px - btnW2/2;
        const btnY2 = yBase;

        const rbg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rbg.setAttribute('x', btnX2); rbg.setAttribute('y', btnY2);
        rbg.setAttribute('width', btnW2); rbg.setAttribute('height', btnH2);
        rbg.setAttribute('rx', '7');
        rbg.setAttribute('fill', '#2a2a40'); rbg.setAttribute('stroke', col);
        rbg.setAttribute('stroke-width', '1.5'); rbg.setAttribute('cursor', 'pointer');
        rbg.addEventListener('click', e => {
          const idx = REVERB_TYPES.indexOf(masterFX.reverb.type || 'hall');
          masterFX.reverb.type = REVERB_TYPES[(idx + 1) % REVERB_TYPES.length];
          if (_masterNodes?.convReverb) _masterNodes.convReverb.setType(masterFX.reverb.type);
          renderMasterPanel();
          e.stopPropagation();
        });
        sg.appendChild(rbg);

        // Icône ↻
        const rico = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        rico.setAttribute('x', px); rico.setAttribute('y', btnY2 + btnH2 * 0.38);
        rico.setAttribute('text-anchor', 'middle');
        rico.setAttribute('font-family', "'DM Mono',monospace");
        rico.setAttribute('font-size', '16');
        rico.setAttribute('fill', col); rico.setAttribute('pointer-events', 'none');
        rico.textContent = '↻';
        sg.appendChild(rico);

        // Nom du type actif
        const rtxt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        rtxt.setAttribute('x', px); rtxt.setAttribute('y', btnY2 + btnH2 * 0.65);
        rtxt.setAttribute('text-anchor', 'middle');
        rtxt.setAttribute('font-family', "'DM Mono',monospace");
        rtxt.setAttribute('font-size', '9');
        rtxt.setAttribute('font-weight', '500');
        rtxt.setAttribute('fill', '#cce'); rtxt.setAttribute('pointer-events', 'none');
        rtxt.textContent = (val || 'hall').toUpperCase();
        sg.appendChild(rtxt);

        // 5 points en bas du bouton
        const dotSpacing = 7;
        const dotsStartX = px - (REVERB_TYPES.length - 1) * dotSpacing / 2;
        const dotY2 = btnY2 + btnH2 - 8;
        REVERB_TYPES.forEach((_, di) => {
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', String(dotsStartX + di * dotSpacing));
          dot.setAttribute('cy', String(dotY2));
          dot.setAttribute('r', di === curIdx ? '3' : '2');
          dot.setAttribute('fill', di === curIdx ? col : '#445');
          dot.setAttribute('opacity', di === curIdx ? '1' : '0.5');
          dot.setAttribute('pointer-events', 'none');
          sg.appendChild(dot);
        });

      } else {
        const CIRC = 2 * Math.PI * encR;
        let pct;
        if (p.step) {
          pct = (p.max - p.min) > 0 ? Math.round(val) / (p.max - p.min) : 0;
        } else if (p.log) {
          pct = Math.log(Math.max(val, p.min) / p.min) / Math.log(p.max / p.min);
        } else {
          pct = (val - p.min) / (p.max - p.min);
        }
        pct = Math.max(0, Math.min(1, pct));
        const filled = pct * CIRC * 0.75;

        const ta = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ta.setAttribute('cx', px); ta.setAttribute('cy', yBase+encR); ta.setAttribute('r', encR);
        ta.setAttribute('fill','none'); ta.setAttribute('stroke','#2a2a2e');
        ta.setAttribute('stroke-width','2.5'); ta.setAttribute('stroke-linecap','round');
        ta.setAttribute('stroke-dasharray', `${CIRC*0.75} ${CIRC*0.25}`);
        ta.setAttribute('transform', `rotate(-225 ${px} ${yBase+encR})`);
        ta.setAttribute('pointer-events','none');
        sg.appendChild(ta);

        const va = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        va.setAttribute('id', `mfx_arc_${def.id}_${pi}`);
        va.setAttribute('cx', px); va.setAttribute('cy', yBase+encR); va.setAttribute('r', encR);
        va.setAttribute('fill','none'); va.setAttribute('stroke', col);
        va.setAttribute('stroke-width','2.5'); va.setAttribute('stroke-linecap','round');
        va.setAttribute('stroke-dasharray', `${filled} ${CIRC - filled}`);
        va.setAttribute('transform', `rotate(-225 ${px} ${yBase+encR})`);
        va.setAttribute('pointer-events','none');
        sg.appendChild(va);
      }

      if (p.type !== 'typesel') {
        const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('x', px);
        lbl.setAttribute('y', p.type==='toggle' ? yBase+32 : yBase+encR*2+10);
        lbl.setAttribute('text-anchor','middle');
        lbl.setAttribute('font-family',"'DM Mono',monospace");
        lbl.setAttribute('font-size','10');
        lbl.setAttribute('fill','#888'); lbl.setAttribute('pointer-events','none');
        lbl.textContent = p.label;
        sg.appendChild(lbl);

        const valEl = document.createElementNS('http://www.w3.org/2000/svg','text');
        valEl.setAttribute('id', `mfx_val_${def.id}_${pi}`);
        valEl.setAttribute('x', px);
        valEl.setAttribute('y', p.type==='toggle' ? yBase+42 : yBase+encR*2+20);
        valEl.setAttribute('text-anchor','middle');
        valEl.setAttribute('font-family',"'DM Mono',monospace");
        valEl.setAttribute('font-size','10');
        valEl.setAttribute('fill', col); valEl.setAttribute('pointer-events','none');
        valEl.textContent = p.fmt(val);
        sg.appendChild(valEl);
      }

      const hit = document.createElementNS('http://www.w3.org/2000/svg','rect');
      hit.setAttribute('x', px-colW/2+1); hit.setAttribute('y', y+margin+24);
      hit.setAttribute('width', colW-2); hit.setAttribute('height', h-margin-26);
      hit.setAttribute('fill','transparent');
      hit.setAttribute('cursor', p.type==='toggle' ? 'pointer' : 'ns-resize');
      if (p.type !== 'typesel') {
        hit.setAttribute('data-mfx', def.id);
        hit.setAttribute('data-mfxp', pi);
        sg.appendChild(hit);
      }
    });
  });
}

function renderFXPageMain(ti) {
  const col = TRACK_COLORS[ti] || '#ff6b00';

  // Nouveau mapping des 8 slots SVG :
  // slot 0→FX[0]=Filter, 1→FX[1]=Tremolo, 2→FX[2]=Compress, 3→FX[3]=Chorus
  // slot 4+5 → FX[4]=Arp (double largeur, tous params en façade)
  // slot 6→FX[5]=Phaser, 7→FX[6]=Bitcrusher   (Sends supprimé)
  const SLOT_MAP = [0, 1, 2, 3, 4, 4, 5, 6]; // FX_DEFS index par slot SVG
  const margin = 5;

  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';

    // Slot 5 = 2e moitié de l'Arp → déjà dessiné dans slot 4, on le laisse vide
    if (i === 5) continue;

    const defIdx = SLOT_MAP[i];
    const def    = FX_DEFS[defIdx];
    if (!def) continue;
    const slot   = trackFX[ti][defIdx];
    const active = slot.active;
    const sx = fxSlotX(i), sy = fxSlotY(i);
    const isArp  = (def.id === 'arp'); // dessiné en double-largeur

    const w = isArp ? FX_SW * 2 : FX_SW; // Arp = 2 slots de large

    // Fond
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    bg.setAttribute('x', sx+margin); bg.setAttribute('y', sy+margin);
    bg.setAttribute('width', w-margin*2); bg.setAttribute('height', FX_SH-margin*2);
    bg.setAttribute('rx', 5);
    bg.setAttribute('fill',   active ? (def.color+'22') : '#141416');
    bg.setAttribute('stroke', active ? def.color        : '#2a2a2e');
    bg.setAttribute('stroke-width', active ? '2' : '0.5');
    sg.appendChild(bg);

    // Nom + LED
    const cx = sx + w/2;
    const nameEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    nameEl.setAttribute('x', cx); nameEl.setAttribute('y', sy + 20);
    nameEl.setAttribute('text-anchor', 'middle');
    nameEl.setAttribute('font-family', "'DM Mono',monospace");
    nameEl.setAttribute('font-size', '12'); nameEl.setAttribute('font-weight', '500');
    nameEl.setAttribute('fill', active ? def.color : '#555');
    nameEl.setAttribute('pointer-events', 'none');
    nameEl.textContent = def.name.toUpperCase();
    sg.appendChild(nameEl);

    const led = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    led.setAttribute('cx', sx + w - 14); led.setAttribute('cy', sy + 14);
    led.setAttribute('r', 4);
    led.setAttribute('fill',   active ? def.color : '#222');
    led.setAttribute('stroke', active ? def.color : '#333');
    led.setAttribute('pointer-events', 'none');
    sg.appendChild(led);

    if (isArp) {
      // ── MIDI CTRL double-slot : 4 indicateurs read-only ──
      const mainP = def.mainParams || [4, 5, 6, 0]; // Release, Cutoff, Resonance, ARP
      const colW  = w / 4;

      // Zone de toggle sur le fond du slot
      const toggleHit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      toggleHit.setAttribute('x', sx + margin); toggleHit.setAttribute('y', sy + margin);
      toggleHit.setAttribute('width', w - margin*2); toggleHit.setAttribute('height', FX_SH - margin*2);
      toggleHit.setAttribute('rx', 5); toggleHit.setAttribute('fill', 'transparent');
      toggleHit.setAttribute('cursor', 'pointer');
      toggleHit.setAttribute('data-fxslot', defIdx);
      sg.appendChild(toggleHit);

      mainP.forEach((pi, col) => {
        const p   = def.params[pi];
        const val = slot.params[p.key] ?? p.def;
        const px  = sx + colW * col + colW/2;

        // Nom du param
        const pname = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pname.setAttribute('x', px); pname.setAttribute('y', sy + 38);
        pname.setAttribute('text-anchor', 'middle');
        pname.setAttribute('font-family', "'DM Mono',monospace");
        pname.setAttribute('font-size', '10');
        pname.setAttribute('fill', active ? '#888' : '#444');
        pname.setAttribute('pointer-events', 'none');
        pname.textContent = p.name;
        sg.appendChild(pname);

        // Valeur du param
        const pval = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pval.setAttribute('id', `fxpv_${defIdx}_${pi}`);
        pval.setAttribute('x', px); pval.setAttribute('y', sy + 52);
        pval.setAttribute('text-anchor', 'middle');
        pval.setAttribute('font-family', "'DM Mono',monospace");
        pval.setAttribute('font-size', '11'); pval.setAttribute('font-weight', '500');
        pval.setAttribute('fill', active ? def.color : '#555');
        pval.setAttribute('pointer-events', 'none');
        pval.textContent = fxFormatVal(p, val);
        sg.appendChild(pval);
      });

      // Hint long press (cohérence avec les autres slots)
      const arpHint = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      arpHint.setAttribute('x', sx + w/2); arpHint.setAttribute('y', sy + FX_SH - 8);
      arpHint.setAttribute('text-anchor', 'middle');
      arpHint.setAttribute('font-family', "'DM Mono',monospace");
      arpHint.setAttribute('font-size', '10');
      arpHint.setAttribute('fill', '#333');
      arpHint.setAttribute('pointer-events', 'none');
      arpHint.textContent = 'long press = edit';
      sg.appendChild(arpHint);

    } else {
      // ── Slot standard (1 slot) : 2 params principaux ──
      const mainP = def.mainParams || [0, 1];
      mainP.forEach((pi, row) => {
        if (pi >= def.params.length) return;
        const p   = def.params[pi];
        const val = slot.params[p.key] ?? p.def;
        const py  = sy + 38 + row * 22;

        const pname = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pname.setAttribute('x', sx + 10); pname.setAttribute('y', py);
        pname.setAttribute('font-family', "'DM Mono',monospace");
        pname.setAttribute('font-size', '11');
        pname.setAttribute('fill', active ? '#888' : '#444');
        pname.setAttribute('pointer-events', 'none');
        pname.textContent = p.name;
        sg.appendChild(pname);

        const pval = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        pval.setAttribute('id', `fxpv_${defIdx}_${pi}`);
        pval.setAttribute('x', sx + FX_SW - 10); pval.setAttribute('y', py);
        pval.setAttribute('text-anchor', 'end');
        pval.setAttribute('font-family', "'DM Mono',monospace");
        pval.setAttribute('font-size', '11');
        pval.setAttribute('fill', active ? def.color : '#444');
        pval.setAttribute('pointer-events', 'none');
        pval.textContent = fxFormatVal(p, val);
        sg.appendChild(pval);
      });

      // Hint long press
      const hint = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      hint.setAttribute('x', sx + FX_SW/2); hint.setAttribute('y', sy + FX_SH - 8);
      hint.setAttribute('text-anchor', 'middle');
      hint.setAttribute('font-family', "'DM Mono',monospace");
      hint.setAttribute('font-size', '10');
      hint.setAttribute('fill', '#333');
      hint.setAttribute('pointer-events', 'none');
      hint.textContent = 'long press = edit';
      sg.appendChild(hint);

      // Zone de clic
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', sx+margin); hit.setAttribute('y', sy+margin);
      hit.setAttribute('width', FX_SW-margin*2); hit.setAttribute('height', FX_SH-margin*2);
      hit.setAttribute('rx', 5); hit.setAttribute('fill', 'transparent');
      hit.setAttribute('data-fxslot', defIdx);
      sg.appendChild(hit);
    }
  }
}


function renderFXPageAdvanced(ti, slotIdx) {
  const def    = FX_DEFS[slotIdx];
  const slot   = trackFX[ti][slotIdx];
  if (!def || !slot) return;
  // Filtrer les params cachés (hidden:true) pour l'affichage
  const visibleParams = def.params.filter(p => !p.hidden);
  const nParams = visibleParams.length;

  // 7 slots params + 1 slot retour
  for (let i = 0; i < 8; i++) {
    const sg = document.getElementById(`fxslot_${i}`);
    if (!sg) continue;
    sg.innerHTML = '';
    const sx = fxSlotX(i), sy = fxSlotY(i);
    const pad = 5;

    if (i === 7) {
      // Slot retour ←
      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', sx+pad); bg.setAttribute('y', sy+pad);
      bg.setAttribute('width', FX_SW-pad*2); bg.setAttribute('height', FX_SH-pad*2);
      bg.setAttribute('rx', 5); bg.setAttribute('fill', '#1a1a1e');
      bg.setAttribute('stroke', '#333'); bg.setAttribute('stroke-width', '0.5');
      sg.appendChild(bg);

      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      arrow.setAttribute('x', sx + FX_SW/2); arrow.setAttribute('y', sy + FX_SH/2 + 8);
      arrow.setAttribute('text-anchor', 'middle');
      arrow.setAttribute('font-family', "'DM Mono',monospace");
      arrow.setAttribute('font-size', '45'); arrow.setAttribute('fill', '#555');
      arrow.setAttribute('pointer-events', 'none');
      arrow.textContent = '←';
      sg.appendChild(arrow);

      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('x', sx+pad); hit.setAttribute('y', sy+pad);
