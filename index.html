<script>
// ══════════════════════════════════════════════════════════════
// SF2 BROWSER
// ══════════════════════════════════════════════════════════════
// ── État du browser catalogue ──────────────────────────────────────────────
const sf2Browser = {
  trackIdx:       0,
  dirHandle:      null,       // FileSystemDirectoryHandle (File System Access API)
  fileHandles:    {},         // { fileName: FileSystemFileHandle }
  fallbackFiles:  {},         // { fileName: File }  — mode webkitdirectory
  useFileHandles: false,
  // Catalogue chargé depuis library.json
  catalogue:      [],         // liste brute des entrées JSON
  categories:     [],         // liste ordonnée des catégories uniques
  activeCategory: null,       // catégorie sélectionnée
  allSounds:      [],         // entrées de la catégorie active (ou recherche globale)
  currentFiltered:[],         // liste affichée après filtre texte
  activeSoundIdx: null,       // index dans currentFiltered du son en preview/actif
  // Debounce preview
  previewDebounce: null,      // setTimeout handle
  PREVIEW_DELAY:  300,        // ms avant de lancer le chargement SF2 + preview
  previewTimer:   null,       // noteOff timer
  previewEnabled: false,      // false par défaut : ne pas jouer de note auto, charger seulement le preset
};

// ── Ouvrir / fermer ────────────────────────────────────────────────────────

function openSF2Browser(ti) {
  sf2Browser.trackIdx = ti;
  document.getElementById('sf2TrackLabel').textContent = `TRACK ${ti+1}`;
  const ts = trackSF2[ti];
  // Afficher le son actif dans le header
  document.getElementById('sf2CurrentPreset').textContent =
    ts.sfName ? ts.sfName.replace(/\.sf2$/i,'') : 'Aucun son chargé';
  document.getElementById('sf2PresetSearch').value = '';
  document.getElementById('sf2Browser').classList.add('open');

  if (sf2Browser.catalogue.length) {
    // Catalogue déjà chargé → afficher directement
    renderSF2CategoryList();
    // Rouvrir sur la catégorie du son actif si possible
    if (ts.sfName && !sf2Browser.activeCategory) {
      const entry = sf2Browser.catalogue.find(e => e.file === ts.sfName);
      if (entry) sf2SelectCategory(entry.category, false);
    } else if (sf2Browser.activeCategory) {
      sf2SelectCategory(sf2Browser.activeCategory, false);
    }
  } else if (sf2Browser.dirHandle) {
    // Handle dispo mais catalogue pas encore chargé
    loadSF2Catalogue(sf2Browser.dirHandle);
  }
  // else : attendre que l'utilisateur choisisse un dossier
}

function closeSF2Browser() {
  document.getElementById('sf2Browser').classList.remove('open');
  // Annuler le debounce preview en cours
  clearTimeout(sf2Browser.previewDebounce);
  sf2Browser.previewDebounce = null;
  clearTimeout(sf2Browser.previewTimer);
  sf2Browser.previewTimer = null;
  if (sf2Ready) {
    try { jsSynths[sf2Browser.trackIdx].midiAllNotesOff(SF2_CHANNEL); } catch(e) {}
  }
  // Décharger le SF2 temporaire de cette track si non confirmé
  const ti = sf2Browser.trackIdx;
  if (sf2TempBank[ti] && !sf2BankCache[ti][sf2TempBank[ti].name]) {
    try { jsSynths[ti].unloadSFont(sf2TempBank[ti].sfontId); } catch(e) {}
    console.log(`[SF2] Track ${ti+1} temp déchargé : ${sf2TempBank[ti].name}`);
    sf2TempBank[ti] = null;
  }
}

// ── Sélection du dossier ───────────────────────────────────────────────────

document.getElementById('sf2FolderBtn').addEventListener('click', async () => {
  if (window.showDirectoryPicker && window.isSecureContext) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      sf2Browser.dirHandle      = handle;
      sf2Browser.useFileHandles = true;
      try { const db = await openIDB(); await idbSet(db, 'sf2DirHandle', handle); } catch(e) {}
      await loadSF2Catalogue(handle);
      return;
    } catch(e) {
      if (e.name !== 'AbortError') console.warn('SF2 dir error:', e);
    }
  }
  // Fallback webkitdirectory
  const input = document.createElement('input');
  input.type = 'file';
  input.webkitdirectory = true;
  input.onchange = async () => {
    const files = [...input.files];
    sf2Browser.useFileHandles = false;
    sf2Browser.fallbackFiles  = {};
    files.forEach(f => { sf2Browser.fallbackFiles[f.name] = f; });
    // Chercher library.json dans les fichiers uploadés
    const jsonFile = files.find(f => f.name === 'library.json');
    if (!jsonFile) {
      alert('library.json introuvable dans ce dossier.');
      return;
    }
    try {
      const text = await jsonFile.text();
      sf2BrowserLoadCatalogue(JSON.parse(text));
    } catch(e) {
      console.error('Erreur lecture library.json :', e);
    }
  };
  input.click();
});

// ── Chargement du catalogue depuis le dossier ──────────────────────────────

async function loadSF2Catalogue(dirHandle) {
  sf2ShowLoading('Chargement du catalogue…');
  try {
    // Indexer tous les FileHandles SF2 du dossier
    sf2Browser.fileHandles = {};
    for await (const entry of dirHandle.values()) {
      if (entry.kind !== 'file') continue;
      if (entry.name.toLowerCase().endsWith('.sf2')) {
        sf2Browser.fileHandles[entry.name] = entry;
      } else if (entry.name === 'library.json') {
        // Lire library.json
        const file = await entry.getFile();
        const text = await file.text();
        try {
          sf2BrowserLoadCatalogue(JSON.parse(text));
        } catch(e) {
          console.error('Erreur parsing library.json :', e);
          sf2HideLoading();
          return;
        }
      }
    }
    sf2HideLoading();
    if (!sf2Browser.catalogue.length) {
      document.getElementById('sf2FileList').innerHTML =
        '<div style="padding:12px 14px;font-size:12px;color:#555">library.json introuvable dans ce dossier</div>';
    }
  } catch(e) {
    sf2HideLoading();
    console.error('loadSF2Catalogue error:', e);
  }
}

function sf2BrowserLoadCatalogue(entries) {
  // ── 1. Déduplication des noms au sein de chaque catégorie ──────────────
  // On regroupe par catégorie, puis on numérote les doublons : "Piano 1", "Piano 2"…
  const byCategory = {};
  for (const e of entries) {
    const cat = e.category || '';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(e);
  }
  for (const cat of Object.keys(byCategory)) {
    const nameCounts = {};
    for (const e of byCategory[cat]) {
      nameCounts[e.name] = (nameCounts[e.name] || 0) + 1;
    }
    // Deuxième passe : numéroter seulement les noms qui apparaissent plusieurs fois
    const nameIdx = {};
    for (const e of byCategory[cat]) {
      if (nameCounts[e.name] > 1) {
        nameIdx[e.name] = (nameIdx[e.name] || 0) + 1;
        e.displayName = `${e.name} ${nameIdx[e.name]}`;
      } else {
        e.displayName = e.name;
      }
    }
    // Tri alphabétique par displayName
    byCategory[cat].sort((a, b) => a.displayName.localeCompare(b.displayName));
  }

  // Reconstruire la liste aplatie
  sf2Browser.catalogue = Object.keys(byCategory).sort().flatMap(cat => byCategory[cat]);
  // Catégories triées alphabétiquement
  sf2Browser.categories = Object.keys(byCategory).sort((a,b) => a.localeCompare(b));
  sf2Browser.activeCategory = null;
  console.log(`[SF2] Catalogue : ${sf2Browser.catalogue.length} sons, ${sf2Browser.categories.length} catégories`);
  sf2HideLoading();
  renderSF2CategoryList();
}

// ── Rendu colonne gauche : catégories ─────────────────────────────────────

function renderSF2CategoryList() {
  const list = document.getElementById('sf2FileList');
  if (!sf2Browser.categories.length) {
    list.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:#555">Catalogue vide</div>';
    return;
  }
  list.innerHTML = sf2Browser.categories.map(cat => {
    const count  = sf2Browser.catalogue.filter(e => e.category === cat).length;
    const active = cat === sf2Browser.activeCategory ? ' active-sf2' : '';
    return `<div class="brItem${active}" data-cat="${cat}">
      <span class="brName">${cat}</span><span class="brSub">${count}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.brItem').forEach(el =>
    el.addEventListener('click', () => sf2SelectCategory(el.dataset.cat, true))
  );
  const active = list.querySelector('.active-sf2');
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function sf2SelectCategory(cat, resetSearch) {
  sf2Browser.activeCategory = cat;
  sf2Browser.allSounds = sf2Browser.catalogue.filter(e => e.category === cat);
  if (resetSearch) document.getElementById('sf2PresetSearch').value = '';
  renderSF2CategoryList();
  renderSF2SoundList(sf2Browser.allSounds);
}

// ── Rendu colonne droite : sons ────────────────────────────────────────────

function renderSF2SoundList(sounds) {
  const ti   = sf2Browser.trackIdx;
  const ts   = trackSF2[ti];
  sf2Browser.currentFiltered = sounds;
  document.getElementById('sf2PresetCount').textContent = `(${sounds.length})`;
  const list = document.getElementById('sf2PresetList');
  if (!sounds.length) {
    list.innerHTML = '<div style="padding:10px;font-size:12px;color:#333">Aucun son</div>';
    return;
  }
  list.innerHTML = sounds.map((s, i) => {
    const active = s.file === ts.sfName ? ' active-preset' : '';
    return `<div class="brItem${active}" data-idx="${i}">
      <span class="brName">${s.displayName || s.name}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.brItem').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.addEventListener('click',    () => sf2SoundClick(idx));
    el.addEventListener('dblclick', () => sf2SoundConfirm(idx));
  });
  const active = list.querySelector('.active-preset');
  if (active) active.scrollIntoView({ block: 'center' });
}

// ── Clic sur un son : debounce 300ms avant preview ────────────────────────

function sf2SoundClick(idx) {
  // Mettre en évidence immédiatement (feedback visuel instantané)
  document.querySelectorAll('#sf2PresetList .brItem').forEach((el, i) =>
    el.classList.toggle('active', i === idx)
  );
  const sound = sf2Browser.currentFiltered[idx];
  if (sound) {
    document.getElementById('sf2CurrentPreset').textContent = sound.displayName || sound.name;
  }
  sf2Browser.activeSoundIdx = idx;

  // Annuler le chargement précédent en attente
  clearTimeout(sf2Browser.previewDebounce);
  sf2Browser.previewDebounce = setTimeout(() => {
    sf2Browser.previewDebounce = null;
    sf2LoadAndPreview(idx);
  }, sf2Browser.PREVIEW_DELAY);
}

// ── Charger le SF2 et jouer la preview ────────────────────────────────────

async function sf2LoadAndPreview(idx) {
  const ti    = sf2Browser.trackIdx;
  const sound = sf2Browser.currentFiltered[idx];
  if (!sound) return;

  const name = sound.file; // ex: "GrandPiano.sf2"

  // Stopper la note précédente
  clearTimeout(sf2Browser.previewTimer);
  sf2Browser.previewTimer = null;
  try { jsSynths[ti].midiNoteOff(SF2_CHANNEL, 60); } catch(e) {}

  // Si déjà en cache → preview directe (pas de chargement, pas de mutex)
  if (sf2BankCache[ti][name]) {
    const { sfontId } = sf2BankCache[ti][name];
    sf2DoPreview(ti, sfontId, 0, 0);
    return;
  }
  // Si déjà en temp pour cette track → preview directe
  if (sf2TempBank[ti]?.name === name) {
    sf2DoPreview(ti, sf2TempBank[ti].sfontId, 0, 0);
    return;
  }

  // ── Mutex : bloquer noteOn et obtenir un token unique ──
  const myToken = ++_sf2LoadToken[ti];
  _sf2LoadingTrack[ti] = true;
  sf2AllNotesOff(ti);

  // Décharger l'ancien temp de cette track
  if (sf2TempBank[ti] && !sf2BankCache[ti][sf2TempBank[ti].name]) {
    try { jsSynths[ti].unloadSFont(sf2TempBank[ti].sfontId); } catch(e) {}
    sf2TempBank[ti] = null;
  }

  // Charger le SF2 depuis le dossier
  try {
    let file;
    if (sf2Browser.useFileHandles) {
      const handle = sf2Browser.fileHandles[name];
      if (!handle) { console.warn('[SF2] Handle introuvable :', name); _sf2LoadingTrack[ti] = false; return; }
      file = await handle.getFile();
    } else {
      file = sf2Browser.fallbackFiles[name];
      if (!file) { console.warn('[SF2] Fichier introuvable :', name); _sf2LoadingTrack[ti] = false; return; }
    }
    if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; } // supplanté
    const buf     = await file.arrayBuffer();
    if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }
    const sfontId = await jsSynths[ti].loadSFont(buf);
    if (_sf2LoadToken[ti] !== myToken) { _sf2LoadingTrack[ti] = false; return; }
    const presets = sf2GetPresets(ti, sfontId);
    sf2TempBank[ti] = { name, sfontId, presets };
    _sf2LoadingTrack[ti] = false; // ── libérer le mutex avant la preview ──
    sf2DoPreview(ti, sfontId, 0, 0);
  } catch(e) {
    console.error('[SF2] Erreur chargement preview :', e);
    _sf2LoadingTrack[ti] = false;
  }
}

function sf2DoPreview(ti, sfontId, bank, program) {
  try {
    jsSynths[ti].midiProgramSelect(SF2_CHANNEL, sfontId, bank, program);
  } catch(e) { return; }
  // Si preview désactivée : le preset est chargé, l'user peut jouer au clavier MIDI
  if (!sf2Browser.previewEnabled) return;
  sf2Browser.previewTimer = setTimeout(() => {
    try {
      jsSynths[ti].midiNoteOn(SF2_CHANNEL, 60, 100);
      sf2Browser.previewTimer = setTimeout(() => {
        try { jsSynths[ti].midiNoteOff(SF2_CHANNEL, 60); } catch(e) {}
      }, 1000);
    } catch(e) {}
  }, 30);
}

// ── Double-clic : confirmer le son ────────────────────────────────────────

function sf2SoundConfirm(idx) {
  const ti    = sf2Browser.trackIdx;
  const sound = sf2Browser.currentFiltered[idx];
  if (!sound) return;

  const name = sound.file;

  // Annuler le debounce et les notes en cours
  clearTimeout(sf2Browser.previewDebounce);
  sf2Browser.previewDebounce = null;
  clearTimeout(sf2Browser.previewTimer);
  sf2Browser.previewTimer = null;
  try { jsSynths[ti].midiNoteOff(SF2_CHANNEL, 60); } catch(e) {}

  // Récupérer les données du SF2 (cache ou temp)
  let bankData = sf2BankCache[ti][name];
  if (!bankData && sf2TempBank[ti]?.name === name) {
    // Promouvoir le temp en cache
    bankData = { sfontId: sf2TempBank[ti].sfontId, presets: sf2TempBank[ti].presets };
    sf2BankCache[ti][name] = bankData;
    sf2TempBank[ti] = null;
    console.log(`[SF2] Track ${ti+1} promu : ${name}`);
  }

  if (!bankData) {
    // SF2 pas encore chargé (confirm très rapide avant la fin du debounce)
    // On charge de façon synchrone-async puis on confirme
    sf2LoadAndPreview(idx).then(() => sf2SoundConfirm(idx));
    return;
  }

  const ts      = trackSF2[ti];
  const oldName = ts.sfName;
  const preset  = bankData.presets?.[0] ?? { bank: 0, program: 0 };

  ts.sfName  = name;
  ts.sfontId = bankData.sfontId;
  ts.presets = bankData.presets;
  ts.bank    = preset.bank;
  ts.program = preset.program;
  jsSynths[ti].midiProgramSelect(SF2_CHANNEL, ts.sfontId, preset.bank, preset.program);
  S.tracks[ti].outputMode = 'sf2';
  if (oldName && oldName !== name) sf2MaybeUnload(ti, oldName);

  oledForce(`T${ti+1}`, (sound.displayName || sound.name).slice(0,12), (sound.category || '').slice(0,12));
  setTimeout(() => { S._oledLocked = false; }, 1500);
  renderTrackButtons();
  setTimeout(closeSF2Browser, 100);
}

// ── Recherche (filtre sur toutes les catégories) ───────────────────────────

document.getElementById('sf2PresetSearch').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  if (q) {
    // Recherche globale sur tout le catalogue
    const filtered = sf2Browser.catalogue.filter(s => s.name.toLowerCase().includes(q));
    renderSF2SoundList(filtered);
  } else {
    // Retour à la catégorie active
    renderSF2SoundList(sf2Browser.allSounds);
  }
});

document.getElementById('sf2CloseBtn').addEventListener('click', closeSF2Browser);

// Checkbox Preview : on/off → joue ou non la note auto au clic d'un preset
document.getElementById('sf2PreviewChk').addEventListener('change', (e) => {
  sf2Browser.previewEnabled = e.target.checked;
  if (!sf2Browser.previewEnabled) {
    // Couper immédiatement toute note de preview en cours
    clearTimeout(sf2Browser.previewTimer);
    sf2Browser.previewTimer = null;
    const ti = sf2Browser.trackIdx;
    if (jsSynths[ti]) {
      try { jsSynths[ti].midiNoteOff(SF2_CHANNEL, 60); } catch(e) {}
      try { jsSynths[ti].midiAllNotesOff(SF2_CHANNEL); } catch(e) {}
    }
  }
});

// IndexedDB
function openIDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open('jseq',1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv');
    req.onsuccess = e => res(e.target.result);
    req.onerror = rej;
  });
}
function idbSet(db,key,val) {
  return new Promise((res,rej) => {
    const tx = db.transaction('kv','readwrite');
    tx.objectStore('kv').put(val,key);
    tx.oncomplete=res; tx.onerror=rej;
  });
}
function idbGet(db,key) {
  return new Promise((res,rej) => {
    const tx = db.transaction('kv','readonly');
    const req = tx.objectStore('kv').get(key);
    req.onsuccess = e => res(e.target.result); req.onerror=rej;
  });
}

// Restaurer le dossier au démarrage
async function restoreSF2Dir() {
  try {
    const db = await openIDB();
    const handle = await idbGet(db, 'sf2DirHandle');
    if (handle) {
      const perm = await handle.queryPermission({ mode: 'read' });
      if (perm === 'granted') {
        sf2Browser.dirHandle      = handle;
        sf2Browser.useFileHandles = true;
        await loadSF2Catalogue(handle);
      }
    }
  } catch(e) {}
}

// Clic sur l'OLED → ouvrir le browser adapté à la track courante
// ── Projet Demo par défaut ──
function createDemoProject() {
  const demo = {
    version: 2, bpm: 110, masterVolume: 0.65, octave: 0,
    masterFX: JSON.parse(JSON.stringify(masterFX)),
    tracks: [],
    _meta: { savedAt: Date.now(), name: 'DemoSong', color: '#3ddc84', demoVersion: 12 }
  };

  // Helper : créer un clip vide
  function emptyClip(numBars, cr) {
    return { nb: numBars || 1, ls: 0, le: (numBars || 1) - 1, cr: cr || 0, b: [], d: [] };
  }

  // T1 (SF2) — basse mélodique
  const t1clips = [];
  // Col 0 : basse simple 2 bars
  const c0b = [];
  [0, 4, 8, 12].forEach(s => c0b.push([0, s, {n:36, v:0.8}])); // C2
  [0, 4, 8, 12].forEach(s => c0b.push([1, s, {n:36, v:0.75}]));
  c0b.push([1, 6, {n:39, v:0.7}]); // Eb2
  c0b.push([1, 10, {n:43, v:0.7}]); // G2
  t1clips.push({ nb: 2, ls: 0, le: 1, cr: 0, b: c0b, d: [] });
  // Col 1 : variation
  const c1b = [];
  [0, 8].forEach(s => c1b.push([0, s, {n:41, v:0.8}])); // F2
  c1b.push([0, 4, {n:43, v:0.75}]); // G2
  c1b.push([0, 12, {n:39, v:0.7}]); // Eb2
  t1clips.push({ nb: 1, ls: 0, le: 0, cr: 0, b: c1b, d: [] });
  // Col 2-7 vides
  for (let i = 2; i < 8; i++) t1clips.push(emptyClip(1));

  // T2 (SF2) — accords/pads
  const t2clips = [];
  // Col 0 : accords
  const c0a = [];
  c0a.push([0, 0, {n:60, v:0.6, e:[63,67]}]); // Cm (C Eb G)
  c0a.push([0, 8, {n:60, v:0.55, e:[63,67]}]);
  t2clips.push({ nb: 1, ls: 0, le: 0, cr: 0, b: c0a, d: [] });
  // Col 1 : accord différent
  const c1a = [];
  c1a.push([0, 0, {n:65, v:0.6, e:[68,72]}]); // Fm
  c1a.push([0, 8, {n:63, v:0.55, e:[67,70]}]); // Eb
  t2clips.push({ nb: 1, ls: 0, le: 0, cr: 0, b: c1a, d: [] });
  // Col 2 : break
  const c2a = [];
  c2a.push([0, 0, {n:67, v:0.65, e:[70,74]}]); // G dim-ish
  t2clips.push({ nb: 1, ls: 0, le: 0, cr: 0, b: c2a, d: [] });
  for (let i = 3; i < 8; i++) t2clips.push(emptyClip(1));

  // T3 (drum) — kick/snare pattern
  const t3clips = [];
  // Col 0 : basic beat
  const c0d = [];
  c0d.push([0, 0, 0, {v:0.9}]); c0d.push([0, 0, 8, {v:0.85}]);
  c0d.push([1, 0, 4, {v:0.8}]); c0d.push([1, 0, 12, {v:0.8}]);
  for (let s = 0; s < 16; s += 2) c0d.push([2, 0, s, {v: s%4===0 ? 0.7 : 0.5}]);
  t3clips.push({ nb: 1, ls: 0, le: 0, cr: 0, b: [], d: c0d });
  // Col 1 : fill
  const c1d = [];

function drumBrRenderFolderList() {
  const list = document.getElementById('drumBrFolderList');
  if (!drumBr.dirHandle) {
    list.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:#333">Choisir un dossier…</div>';
    return;
  }
  if (!drumBr.folders.length) {
    list.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:#333">Pas de sous-dossiers</div>';
    drumBrLoadFolder(drumBr.dirHandle, '__root__');

  }
  list.innerHTML = drumBr.folders.map(f => {

    return `<div class="brItem${active}" data-folder="${f.name}">📁 ${f.name}</div>`;
  }).join('');
  list.querySelectorAll('.brItem').forEach(el => {
    el.addEventListener('click', () => {
      const folder = drumBr.folders.find(f => f.name === el.dataset.folder);
      if (folder) {

          document.querySelectorAll('#drumBrFolderList .brItem').forEach(e =>

async function drumBrLoadFolder(folderHandle, folderName) {
  if (folderHandle === '__input__') return;
  drumBrStopPreview(); // stopper le sample en cours
  drumBr.activeFolder = folderName;
  drumBr.files = [];
  const AUDIO_EXTS = ['.wav','.mp3','.ogg','.flac','.aif','.aiff'];
  try {
    for await (const [name, handle] of folderHandle.entries()) {
      if (handle.kind === 'file') {
        const ext = name.slice(name.lastIndexOf('.')).toLowerCase();
        if (AUDIO_EXTS.includes(ext)) drumBr.files.push({ name, handle });
      }
    }
    drumBr.files.sort((a, b) => a.name.localeCompare(b.name));
  } catch(e) { console.warn('[DrumBr] folder read error:', e); }
  document.querySelectorAll('#drumBrFolderList .brItem').forEach(el =>
    el.classList.toggle('active-folder', el.dataset.folder === folderName));
  drumBr.filteredFiles = [...drumBr.files];
  drumBrRenderFileList();
}

function drumBrRenderFileList() {
  const files = drumBr.filteredFiles;
  document.getElementById('drumBrFileCount').textContent = `(${files.length})`;
  const list = document.getElementById('drumBrFileList');
  if (!files.length) {
    list.innerHTML = '<div style="padding:10px 14px;font-size:13px;color:#333">Aucun fichier audio</div>';
    return;
  }
  const curFile = S.tracks[S.currentTrack].drumPads?.[drumBr.padIdx]?.fileName || '';
  list.innerHTML = files.map((f, i) => {
    const dot  = f.name.lastIndexOf('.');
    const ext  = dot > 0 ? f.name.slice(dot) : '';
    const base = dot > 0 ? f.name.slice(0, dot) : f.name;
    const active = f.name === curFile ? ' active-file' : '';
    return `<div class="brItem${active}" data-idx="${i}">
      <span class="brName">${base}</span><span class="brSub">${ext}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.brItem').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    el.addEventListener('click',    () => drumBrPreviewFile(idx));
    el.addEventListener('dblclick', () => drumBrConfirmFile(idx));
  });
  const active = list.querySelector('.active-file');
  if (active) active.scrollIntoView({ block: 'center' });
}

async function drumBrPreviewFile(idx) {
  drumBrStopPreview();
  const f = drumBr.filteredFiles[idx];
  if (!f) return;
  document.querySelectorAll('#drumBrFileList .brItem').forEach((el, i) =>
    el.classList.toggle('active-file', i === idx));
  try {
    const file = f.handle ? await f.handle.getFile() : f.file;
    const buf  = await file.arrayBuffer();
    const audioBuf = await actx.decodeAudioData(buf);
    drumBrStopPreview();
    const src = actx.createBufferSource();
    src.buffer = audioBuf; src.connect(getMaster()); src.start();
    drumBr.previewSrc = src;
    drumBr.previewTimer = setTimeout(() => drumBrStopPreview(), 2000);
  } catch(e) { console.warn('[DrumBr] preview error:', e); }
}

function drumBrStopPreview() {
  clearTimeout(drumBr.previewTimer);
  if (drumBr.previewSrc) { try { drumBr.previewSrc.stop(); } catch(e) {} drumBr.previewSrc = null; }
}

async function drumBrConfirmFile(idx) {
  const f = drumBr.filteredFiles[idx];
  if (!f) return;
  const t = S.tracks[S.currentTrack];
  if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
  const pad = t.drumPads[drumBr.padIdx];
  const doReverse = document.getElementById('drumBrReverse').checked;
  try {
    const file = f.handle ? await f.handle.getFile() : f.file;
    const buf  = await file.arrayBuffer();
    let audioBuf = await actx.decodeAudioData(buf);
    if (doReverse) audioBuf = reverseAudioBuffer(audioBuf);
    pad.buffer   = audioBuf;
    pad.fileName = f.name;
    pad.mode     = 'sample';
    pad.reverse  = doReverse;
    saveUndo();
    drumBrUpdateCurrent(pad);
    const revTag = doReverse ? ' ◀' : '';
    oledForce('DRUM', f.name.replace(/\.[^.]+$/,'').slice(0,10) + revTag, `pad ${drumBr.padIdx+1}`);
    renderDrumPadSelection(); updateEncArcs();
    setTimeout(() => { S._oledLocked = false; closeDrumBrowser(); }, 80);
  } catch(e) { console.warn('[DrumBr] confirm error:', e); }
}

// Inverser un AudioBuffer (pré-calcul, zéro coût au playback)
function reverseAudioBuffer(buffer) {
  const reversed = actx.createBuffer(
    buffer.numberOfChannels,
    buffer.length,
    buffer.sampleRate
  );
  for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
    const src = buffer.getChannelData(ch);
    const dst = reversed.getChannelData(ch);
    for (let i = 0; i < src.length; i++) {
      dst[i] = src[src.length - 1 - i];
    }
  }
  return reversed;
}

document.getElementById('drumBrFolderBtn').addEventListener('click', async () => {
  if (window.showDirectoryPicker && window.isSecureContext) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      drumBr.dirHandle = handle; drumBr.folders = []; drumBr.files = []; drumBr.activeFolder = null;
      for await (const [name, entry] of handle.entries()) {
        if (entry.kind === 'directory') drumBr.folders.push({ name, handle: entry });
      }
      drumBr.folders.sort((a, b) => a.name.localeCompare(b.name));
      try { const db = await openIDB(); await idbSet(db, 'drumDirHandle', handle); } catch(e) {}
      drumBrRenderFolderList();
      document.getElementById('drumBrFileList').innerHTML =
        '<div style="padding:10px 14px;font-size:13px;color:#333">Sélectionner un dossier…</div>';
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  // Fallback : input webkitdirectory (Android, Firefox)
  const input = document.createElement('input');
  input.type = 'file'; input.webkitdirectory = true;
  input.onchange = () => {
    const AUDIO_EXTS = ['.wav','.mp3','.ogg','.flac','.aif','.aiff'];
    const allFiles = [...input.files].filter(f => {
      const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
      return AUDIO_EXTS.includes(ext);
    });
    if (!allFiles.length) return;
    drumBr.dirHandle = '__input__'; drumBr.folders = []; drumBr.files = []; drumBr.activeFolder = null;
    const folderMap = {};
    allFiles.forEach(f => {
      const parts = (f.webkitRelativePath || f.name).split('/');
      const folderName = parts.length > 2 ? parts[1] : '__root__';
      if (!folderMap[folderName]) folderMap[folderName] = [];
      folderMap[folderName].push({ name: f.name, file: f, handle: null });
    });
    Object.entries(folderMap).forEach(([name, files]) => {
      if (name !== '__root__') drumBr.folders.push({ name, handle: null, files });
    });
    drumBr.folders.sort((a, b) => a.name.localeCompare(b.name));
    if (folderMap['__root__']) drumBr.rootFiles = folderMap['__root__'];
    drumBrRenderFolderList();
  };
  input.click();
});

// ── Step Cursor (gamepad navigation) ─────────────────────────
// Curseur visible sur les 16 steps, déplacé par croix directionnelle
var stepCursorPos = 0;
var stepCursorVisible = false;
var _gamepadBHeld = false;
var _gamepadBTimer = null;
var _gamepadBLong = false;
const STEP_X_POSITIONS = [11,64,117,170,223,276,329,382,435,488,541,594,647,700,753,806];

function updateStepCursor() {
  const cur = document.getElementById('stepCursor');
  if (!cur) return;
  cur.setAttribute('x', STEP_X_POSITIONS[stepCursorPos]);
  if (stepCursorVisible) {
    // Show the cursor animation
    cur.setAttribute('opacity', '0.8');
    cur.innerHTML = '<animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.2s" repeatCount="indefinite"/>';
  } else {
    cur.setAttribute('opacity', '0');
    cur.innerHTML = '';
  }
}

function showStepCursor() {
  stepCursorVisible = true;
  updateStepCursor();
}

function hideStepCursor() {
  stepCursorVisible = false;
  updateStepCursor();
}

function moveStepCursor(delta) {
  // Désactivé en session ou si cursorMode off → fallback navBar
  if (!cursorEnabled || S.mode === 'session') {
    navBar(delta);
    return;
  }
  stepCursorPos = ((stepCursorPos + delta) % 16 + 16) % 16; // cycle 0-15
  showStepCursor();
  // Feedback OLED bref
  const bar = currentStepBar();
  const st = bar[stepCursorPos];
  const t = S.tracks[S.currentTrack];
  let info = st.on ? 'ON' : '—';
  if (st.on && t.mode === 'master') info = st.note + ' BPM';
  else if (st.on && t.mode !== 'drum') info = noteName(st.note);
  oled(`STEP ${stepCursorPos + 1}`, info, `Bar ${S.currentBar + 1}`);
}

// Gamepad button B : appui court = toggle step, appui long = hold step
var _gamepadBHeldIdx = -1; // index du step pressé via gamepad

function gamepadBDown() {
  if (_gamepadBHeld) return;
  // Mode Project → naviguer les pages avec le curseur
  if (projectModeActive) {
    projectPage = stepCursorPos;
    renderProjectMode();
    oledForce('PROJECTS', `Page ${projectPage+1}/16`, 'clic=preview · 2x=charger');
    return;
  }
  if (!cursorEnabled || S.mode === 'session') return;
  _gamepadBHeld = true;
  _gamepadBLong = false;
  _gamepadBHeldIdx = stepCursorPos;
  showStepCursor();
  
  // Mode Loop → mémoriser la bar de départ pour le déplacement
  if (S.mode === 'loop') {
    _gamepadBLong = true;
    S._loopBarHeld = stepCursorPos; // bar saisie
    saveUndo(); // un seul undo pour toute l'opération de déplacement
    renderLoopMode();
    const barNotes = countBarNotes(stepCursorPos);
    oled('SAISIE', `Bar ${stepCursorPos+1}`, `${barNotes} note${barNotes!==1?'s':''} · dpad=déplacer`);
    return;
  }
  
  _gamepadBTimer = setTimeout(() => {
    _gamepadBLong = true;
    pressStep(_gamepadBHeldIdx);
  }, 300);
}

// Force le hold immédiatement si D-pad pressé pendant le timer
function gamepadForceHold() {
  if (_gamepadBHeld && !_gamepadBLong && _gamepadBTimer) {
    clearTimeout(_gamepadBTimer);
    _gamepadBTimer = null;
    _gamepadBLong = true;
    if (S.mode === 'loop') {
      S._loopBarHeld = _gamepadBHeldIdx;
      saveUndo();
      renderLoopMode();
    } else {
      pressStep(_gamepadBHeldIdx);
    }
  }
}

function gamepadBUp() {
  if (!_gamepadBHeld) return;
  _gamepadBHeld = false;
  clearTimeout(_gamepadBTimer);
  _gamepadBTimer = null;
  if (_gamepadBLong) {
    if (S.mode === 'loop') {
      // Fin du déplacement - confirmer la position finale
      S._loopBarHeld = -1;
      S._loopBar2 = -1;
      renderLoopMode();
      const clip = activeClipObj();
      oled('LOOP MODE', trackInfo(), `${clip.numBars} bar${clip.numBars>1?'s':''}`);
    } else {
      releaseStep(stepCursorPos);
    }
    _gamepadBLong = false;
  } else {
    // Appui court → toggle step on/off (note mode seulement)
    if (S.mode !== 'loop') {
      ensureAudio();
      toggleStep(stepCursorPos);
      renderSteps();
      updateStepCursor();
    }
  }
  _gamepadBHeldIdx = -1;
}

  const t = S.tracks[S.currentTrack];
  if (t.mode === 'drum') oled('DRUM', getDrumPadName(S.currentTrack, S.selectedDrumPad), `pad ${S.selectedDrumPad+1}`);
  else if (t.mode === 'master') oled('MASTER', 'Master Track', `BPM ${S.bpm}`);
  else oled('SOUND', getSF2PresetName(S.currentTrack), trackInfo());
}

const _gpShoulders = [
  { idx: 4, down: () => { S._copyHeld = true; S._copySource = null; setCopyLit(true); oled('COPY', 'Copy...', ''); },
           up:   () => { S._copyHeld = false; S._copySource = null; setCopyLit(false); _gpRestoreOled(); } },
  { idx: 5, down: () => { setShiftOn(true); },
           up:   () => { setShiftOn(false); } },
  { idx: 6, down: () => { S._deleteHeld = true; setDeleteLit(true); oled('DELETE', 'Delete...', ''); },
           up:   () => { S._deleteHeld = false; setDeleteLit(false); _gpRestoreOled(); } },
  { idx: 7, down: () => { S._mHeld = true; setBtnLit('btnMute', true, '#ff6b00'); oled('MUTE', 'Mute...', ''); },
           up:   () => { S._mHeld = false; setBtnLit('btnMute', false, '#ff6b00'); _gpRestoreOled(); } },
];

const _gpDirs = [
  { idx: 12, name: 'up' },
  { idx: 13, name: 'down' },
  { idx: 14, name: 'left' },
  { idx: 15, name: 'right' }
];
if (!window._gpDpadRepeat) window._gpDpadRepeat = {};

const JOY_THRESHOLD = 0.65;
const JOY_DELAY     = 350;
const JOY_REPEAT    = 200;
if (!window._joyRepeat) window._joyRepeat = {};

function joyTrackSelect(axisId, rawValue, groupStart) {
  const val = -rawValue;
  const rKey = 'joy_' + axisId;
  if (Math.abs(val) < JOY_THRESHOLD) {
    if (window._joyRepeat[rKey]) {
      clearTimeout(window._joyRepeat[rKey].timer);
      clearInterval(window._joyRepeat[rKey].interval);
      delete window._joyRepeat[rKey];
    }
    return;
  }
  if (window._joyRepeat[rKey]) return;
  function fireAction() {
    const delta = val > 0 ? -1 : 1;
    const groupEnd = groupStart + 3;
    let current = S.currentTrack;
    if (current < groupStart || current > groupEnd) {
      current = groupStart;
    }
    let next = current + delta;
    if (next < groupStart) next = groupEnd;
    if (next > groupEnd) next = groupStart;
    selectTrack(next);
  }
  fireAction();
  window._joyRepeat[rKey] = {
    timer: setTimeout(() => {
      window._joyRepeat[rKey].interval = setInterval(fireAction, JOY_REPEAT);
    }, JOY_DELAY),
    interval: null
  };
}

function pollGamepad() {
  const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const gp of gamepads) {
    if (!gp) continue;
    const axes = gp.axes;
    const btns = gp.buttons;

    // Bouton A = index 0 (step cursor action)
    const aPressed = btns[0]?.pressed || false;
    const aWas = _gpPrevButtons[gp.index + '_0'] || false;
    if (aPressed && !aWas) gamepadBDown();
    if (!aPressed && aWas) gamepadBUp();
    _gpPrevButtons[gp.index + '_0'] = aPressed;

    // Bouton B = index 1 → Loop (maintenu = hold pour combos, court = toggle)
    const bPressed = btns[1]?.pressed || false;
    const bWas = _gpPrevButtons[gp.index + '_1'] || false;
    if (bPressed && !bWas) {
      _gpLoopPressTime = Date.now();
      _gpLoopLongFired = false;
      setLoopHeld(true); // activer immédiatement pour les combos
      // loop button pressed
    }
    if (!bPressed && bWas) {
      const held = Date.now() - _gpLoopPressTime;
      if (held < 300) {
        toggleLoopMode();
      }
      setLoopHeld(false);
      _gpLoopLongFired = false;
    }
    _gpPrevButtons[gp.index + '_1'] = bPressed;

    // Bouton X = index 2 → Undo (court) / Redo (si Shift tenu)
    const xPressed = btns[2]?.pressed || false;
    const xWas = _gpPrevButtons[gp.index + '_2'] || false;
    if (xPressed && !xWas) {
      setBtnLit('btnUndo', true, '#aaa');
      if (S.shiftHeld) doRedo(); else doUndo();
    }
    if (!xPressed && xWas) {
      setBtnLit('btnUndo', false, '#aaa');
    }
    _gpPrevButtons[gp.index + '_2'] = xPressed;

    // Bouton Y = index 3 → Toggle Session/Note mode
    const yPressed = btns[3]?.pressed || false;
    const yWas = _gpPrevButtons[gp.index + '_3'] || false;
    if (yPressed && !yWas) {
      setModeButtonLit(true);
      const otherMode = S.mode === 'note' ? 'session' : 'note';
      enterMode(otherMode);
    }
    if (!yPressed && yWas) {
      setModeButtonLit(false);
    }
    _gpPrevButtons[gp.index + '_3'] = yPressed;

    // (debug gamepad removed)

    // Bouton Start = index 9 → Play
    const startPressed = btns[9]?.pressed || false;
    const startWas = _gpPrevButtons[gp.index + '_9'] || false;
    if (startPressed && !startWas) { ensureAudio(); togglePlay(); }
    _gpPrevButtons[gp.index + '_9'] = startPressed;

    // Bouton Select = index 8 → Project mode
    const selectPressed = btns[8]?.pressed || false;
    const selectWas = _gpPrevButtons[gp.index + '_8'] || false;
    if (selectPressed && !selectWas) {
      if (projectModeActive) { exitProjectMode(); setBtnLit('btnSets', false, '#aaa'); }
      else { enterProjectMode(); setBtnLit('btnSets', true, '#aaa'); }
    }
    _gpPrevButtons[gp.index + '_8'] = selectPressed;

    // L1=4 (Copy), R1=5 (Shift), L2=6 (Delete), R2=7 (Mute)
    _gpShoulders.forEach(s => {
      const pressed = btns[s.idx]?.pressed || false;
      const was = _gpPrevButtons[gp.index + '_' + s.idx] || false;
      if (pressed && !was) s.down();
      if (!pressed && was) s.up();
      _gpPrevButtons[gp.index + '_' + s.idx] = pressed;
    });

    // D-pad buttons (standard: 12=up, 13=down, 14=left, 15=right)

    
// ── Déplacer une bar par insertion (gamepad A+dpad en loop mode) ──
// La bar "saisie" se déplace dans le sens du dpad, les autres se décalent.
// Sens détermine l'insertion : vient de gauche → insère après, vient de droite → insère avant.
function moveBarInsert(fromIdx, direction) {
  // direction = +1 (droite) ou -1 (gauche)
  const clip = activeClipObj();
  const maxBar = clip.numBars - 1;
  const toIdx = fromIdx + direction;
  if (toIdx < 0 || toIdx > maxBar) return fromIdx; // bord atteint
  if (fromIdx < 0 || fromIdx > maxBar) return fromIdx; // sécurité

  // Extraire la bar source (mélo + drums)
  const srcBars = clip.bars[fromIdx]
    ? clip.bars[fromIdx].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
    : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));

  const srcDrum = clip.drumBars.map(padSeq =>
    padSeq[fromIdx]
      ? padSeq[fromIdx].map(st => ({...st}))
      : Array.from({length:16}, () => ({on:false, vel:0.787}))
  );

  // Décaler les bars entre from et to
  if (direction > 0) {
    for (let i = fromIdx; i < toIdx; i++) {
      clip.bars[i] = clip.bars[i+1]
        ? clip.bars[i+1].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
        : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
      clip.drumBars.forEach(padSeq => {
        padSeq[i] = padSeq[i+1]
          ? padSeq[i+1].map(st => ({...st}))
          : Array.from({length:16}, () => ({on:false, vel:0.787}));
      });
    }
  } else {
    for (let i = fromIdx; i > toIdx; i--) {
      clip.bars[i] = clip.bars[i-1]
        ? clip.bars[i-1].map(st => ({...st, extraNotes: st.extraNotes ? [...st.extraNotes] : []}))
        : Array.from({length:16}, () => ({on:false, note:60, vel:0.787}));
      clip.drumBars.forEach(padSeq => {
        padSeq[i] = padSeq[i-1]
          ? padSeq[i-1].map(st => ({...st}))
          : Array.from({length:16}, () => ({on:false, vel:0.787}));
      });
    }
  }

  // Placer la bar source à la nouvelle position
  clip.bars[toIdx] = srcBars;
  clip.drumBars.forEach((padSeq, pi) => { padSeq[toIdx] = srcDrum[pi]; });

  return toIdx;
}

function dpadAction(name) {
      // Si bouton A maintenu mais timer pas encore expiré → forcer le hold
      if (_gamepadBHeld && !_gamepadBLong) gamepadForceHold();

      // Priorité 1 : Loop held (bouton B tenu) → combos pattern (toujours, quel que soit le mode)
      if (S._loopHeld) {
        if (name === 'up')    duplicatePattern();
        if (name === 'down')  halvePattern();
        if (name === 'left')  compressPattern();
        if (name === 'right') stretchPattern();
        return;
      }

      // Priorité 2 : Loop mode + A maintenu → déplacer la bar par insertion
      if (S.mode === 'loop' && _gamepadBHeld && _gamepadBLong) {
        if (name === 'left' || name === 'right') {
          const direction = name === 'right' ? 1 : -1;
          const newPos = moveBarInsert(S._loopBarHeld, direction);
          if (newPos !== S._loopBarHeld) {
            S._loopBarHeld = newPos;
            stepCursorPos = newPos;
            updateStepCursor();
            renderLoopMode();
            illuminateLoopBarNotes(newPos);
            oled('DÉPLACER', `Bar → pos ${newPos+1}`, 'relâche A pour valider');
          }
        }
        if (name === 'up')   loopBarTranspose(1);
        if (name === 'down') loopBarTranspose(-1);
        return;
      }
      // Priorité 2 : Step maintenu → transpose/nudge
      if (anyStepHeld()) {
        if (name === 'up')    transposeHeldSteps(1);
        if (name === 'down')  transposeHeldSteps(-1);
        if (name === 'left')  nudgeHeldSteps(-1);
        if (name === 'right') nudgeHeldSteps(1);
        return;
      }
      // Priorité 3 : Shift maintenu → add/remove bar
      if (S.shiftHeld) {
        if (name === 'left')  removeBar();
        if (name === 'right') addBar();
        if (name === 'up')    addBar();
        if (name === 'down')  removeBar();
        return;
      }
      // Priorité 4 : Normal → curseur/navigation
      if (name === 'left')  moveStepCursor(-1);
      if (name === 'right') moveStepCursor(1);
      if (name === 'up')    navBar(1);
      if (name === 'down')  navBar(-1);
    }

    _gpDirs.forEach(d => {
      const pressed = btns[d.idx]?.pressed || false;
      const was = _gpPrevButtons[gp.index + '_' + d.idx] || false;
      const rKey = 'dpad_' + d.name;
      if (pressed && !was) {
        // Première pression
        dpadAction(d.name);
        // Auto-repeat — désactivé en loop mode + A tenu (1 mouvement par press)
        if (!(S.mode === 'loop' && _gamepadBHeld)) {
          window._gpDpadRepeat[rKey] = { timer: setTimeout(() => {
            window._gpDpadRepeat[rKey].interval = setInterval(() => dpadAction(d.name), 100);
          }, 300) };
        }
      }
      if (!pressed && was) {
        // Relâchement → stopper auto-repeat
        const r = window._gpDpadRepeat[rKey];
        if (r) {
          clearTimeout(r.timer);
          clearInterval(r.interval);
          delete window._gpDpadRepeat[rKey];
        }
      }
      _gpPrevButtons[gp.index + '_' + d.idx] = pressed;
    });

    // Note: axes[1] (joystick gauche vertical) = tracks 1-4, axes[3] (joystick droit vertical) = tracks 5-8
    // Le D-pad utilise les boutons 12-15 (voir dirs.forEach ci-dessus)

    // ── Joysticks analogiques → Sélection de track ─────────────────
    // Joystick gauche vertical → tracks 1-4
    joyTrackSelect('LV', axes[1] || 0, 0);
    // Joystick droit vertical → tracks 5-8
    joyTrackSelect('RV', axes[3] || 0, 4);

    break; // Utiliser seulement le premier gamepad connecté
  }
  requestAnimationFrame(pollGamepad);
}

// Démarrer le polling gamepad
window.addEventListener('gamepadconnected', e => {
  console.log('[J-seq] Gamepad connecté:', e.gamepad.id);
  oledForce('GAMEPAD', e.gamepad.id.slice(0, 14), 'Connecté');
  setTimeout(() => S._oledLocked = false, 1500);
});
requestAnimationFrame(pollGamepad);


// ── Double-tap encodeurs → reset ─────────────────────────────
// Ce script est en fin de body — DOM garanti chargé
(function() {
  const _tap = {};
  const DRUM_KEYS = ['tune','decay','tone','drive','tune','decay'];

  for (let i = 0; i < 6; i++) {
    const el = document.getElementById('enc' + i);
    if (!el) continue;
    function handleDoubleTap(e) {
      const now = Date.now();
      const id = 'enc' + i;
      if (_tap[id] && now - _tap[id] < 350) {
        _tap[id] = 0;
        const t = S.tracks[S.currentTrack];
        const res = getHeldSt();
        if (res && res.st.on) {
          // Mode step tenu — reset Length/Vel/Offset/Prob
          const def = ENC_DEFS[i];
          def.set(res.st, def.def);
          saveUndo(); updateEncArcs();
          oledForce(def.label, def.fmt(def.def), 'RESET');
        } else if (t.mode === 'drum') {
          // Mode drum — reset Tune/Decay/Tone/Drive
          if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
          const pad = t.drumPads[S.selectedDrumPad];
          const key = DRUM_ENC_KEYS[i];
          const defs = DRUM_SYNTH_DEFAULTS[pad.synthType] || DRUM_SYNTH_DEFAULTS['Kick'];
          if (key in defs) { pad[key] = defs[key]; updateEncArcs(); oledForce('RESET', key.toUpperCase(), String(defs[key])); }
        } else if (t.mode === 'master') {
          // Mode master — pas d'encodeurs actifs, ignorer
        }
        e.preventDefault();
      } else {
        _tap[id] = now;
      }
    }
    el.addEventListener('mousedown', handleDoubleTap, true);
    el.addEventListener('touchstart', function(e) {
      handleDoubleTap(e);
      if (e.defaultPrevented) { e.stopPropagation(); return; }
      const touch = e.changedTouches[0];
      if (touch) {
        // Enregistrer dans touchTargets pour que touchmove/touchend fonctionnent
        if (window._touchTargets) {
          window._touchTargets[touch.identifier] = { target: el, startX: touch.clientX, startY: touch.clientY };
        }
        el.dispatchEvent(new MouseEvent('mousedown', {
          bubbles: true, cancelable: true,
          clientX: touch.clientX, clientY: touch.clientY,
          button: 0, buttons: 1
        }));
      }
      e.preventDefault();
      e.stopPropagation();
    }, true);
  }

  // Sends enc4/enc5
  const SEND_KEYS = ['sendDelay', 'sendReverb'];
  const SEND_LABELS = ['DELAY', 'REVERB'];
  for (let si = 0; si < 2; si++) {
    const el = document.getElementById('enc' + (si + 4));
    if (!el) continue;
    function handleSendDoubleTap(e) {
      const now = Date.now();
      const id = 'send' + si;
      if (_tap[id] && now - _tap[id] < 350) {
        _tap[id] = 0;
        const t = S.tracks[S.currentTrack];
        if (t.mode === 'master') return;
        const key = SEND_KEYS[si];
        if (t.mode === 'drum') {
          if (!t.drumPads) t.drumPads = makeDefaultDrumPads();
          t.drumPads[S.selectedDrumPad][key] = 0;
        } else {
          t[key] = 0;
          const nodes = trackSendNodes[S.currentTrack];
          if (nodes) {
            if (key === 'sendDelay')  nodes.dSend.gain.value = 0;
            if (key === 'sendReverb') nodes.rSend.gain.value = 0;
          }
        }
        updateSendArcs();
        oledForce(SEND_LABELS[si] + ' SEND', '0%', 'RESET');
        e.preventDefault();
      } else {
        _tap[id] = now;
      }
    }
    el.addEventListener('mousedown', handleSendDoubleTap, true);
    el.addEventListener('touchstart', function(e) {
      handleSendDoubleTap(e);
      if (e.defaultPrevented) { e.stopPropagation(); return; }
      const touch = e.changedTouches[0];
      if (touch) {
        if (window._touchTargets) {
          window._touchTargets[touch.identifier] = { target: el, startX: touch.clientX, startY: touch.clientY };
        }
        el.dispatchEvent(new MouseEvent('mousedown', {
          bubbles: true, cancelable: true,
          clientX: touch.clientX, clientY: touch.clientY,
          button: 0, buttons: 1
        }));
      }
      e.preventDefault();
      e.stopPropagation();
    }, true);
  }
})();
